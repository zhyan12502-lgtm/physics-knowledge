<!-- ==================== ch16s1: 欧姆定律 ==================== -->
<div class="knowledge-card card-formula" id="ch16s1">
  <span class="card-label label-formula">16.1 核心定律 ⭐</span>
  <h3>一、欧姆定律——I = U/R（最关键！）</h3>

  <h4>1. 欧姆定律内容</h4>
  <p><strong>内容：</strong>导体中的电流，跟导体两端的电压成<strong>正比</strong>，跟导体的电阻成<strong>反比</strong>。</p>
  <div class="formula-display">$$I = \\frac{U}{R}$$</div>
  <p>I——通过导体的电流（A）；U——导体两端的电压（V）；R——导体的电阻（Ω）。</p>

  <div class="card-warning">
    <p><strong>核心理解（三层含义）：</strong></p>
    <ol>
      <li><strong>因果关系：</strong>电压是<strong>因</strong>，电流是<strong>果</strong>——电阻一定时，电压越大，电流越大</li>
      <li><strong>电阻的独立性：</strong>R 是导体<strong>本身的性质</strong>，由材料、长度、横截面积和温度决定，<strong>与 U 和 I 无关</strong></li>
      <li><strong>公式变形：</strong>$R = U/I$ 提供了一种<strong>测量/计算</strong>电阻的方法（伏安法），但不能说"R 与 U 成正比、与 I 成反比"</li>
    </ol>
  </div>

  <h4>2. 欧姆定律的实验探究（控制变量法）</h4>
  <p><strong>实验一：探究电流与电压的关系（保持 R 不变）</strong></p>
  <ul>
    <li>器材：电源、开关、定值电阻 R、滑动变阻器、电流表、电压表、导线</li>
    <li>电路：R 与滑动变阻器<strong>串联</strong>，电压表与 R <strong>并联</strong>，电流表<strong>串联</strong>在电路中</li>
    <li>操作：调节滑动变阻器改变 R 两端电压，记录对应的 I 和 U</li>
    <li><strong>结论：</strong>电阻一定时，通过导体的电流与导体两端的电压成<strong>正比</strong>（I-U 图像为<strong>过原点</strong>的倾斜直线）</li>
  </ul>

  <p><strong>实验二：探究电流与电阻的关系（保持 U 不变）</strong></p>
  <ul>
    <li>操作：更换不同阻值的定值电阻，每次调节滑动变阻器使 R 两端电压<strong>保持不变</strong>，记录 I 和 R</li>
    <li><strong>结论：</strong>电压一定时，通过导体的电流与导体的电阻成<strong>反比</strong>（I-R 图像为<strong>双曲线</strong>的一支）</li>
  </ul>

  <h4>3. 欧姆定律的应用——动态电路分析（⭐⭐⭐ 中考压轴题型）</h4>
  <p><strong>滑动变阻器引起的动态变化：</strong></p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>变化</th><th>串联电路（R 与 R<sub>滑</sub> 串联）</th><th>并联电路（R 与 R<sub>滑</sub> 并联）</th></tr></thead>
    <tbody>
      <tr><td>R<sub>滑</sub> ↑</td><td>总电阻↑→总电流↓（A 示数↓）→R 电压↓→R<sub>滑</sub> 电压↑</td><td>各支路电压不变→R 所在支路电流不变；R<sub>滑</sub> 所在支路电流↓→干路电流↓</td></tr>
      <tr><td>R<sub>滑</sub> ↓</td><td>总电阻↓→总电流↑→R 电压↑→R<sub>滑</sub> 电压↓</td><td>各支路电压不变→干路电流↑</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>关键步骤（四步法）：</strong>① 判断电路连接方式（串联/并联）→ ② 看清各电表测量对象 → ③ 分析电阻变化→总电阻变化→总电流变化 → ④ 由局部规律推各电表示数变化。</p>

  <h4>4. I-U 图像（U-I 图像）分析</h4>
  <ul>
    <li><strong>定值电阻：</strong>I-U 图像为过原点的<strong>直线</strong>，斜率 = 1/R（斜率越大→R 越小）</li>
    <li><strong>非定值电阻（如灯泡）：</strong>I-U 图像为<strong>曲线</strong>（灯丝电阻随温度升高而增大→曲线"越来越平"）</li>
    <li>从图像中读取 U 和 I 可直接利用 $R = U/I$ 计算电阻</li>
  </ul>
</div>

<!-- ==================== ch16s2: 电阻的串联与并联 ==================== -->
<div class="knowledge-card card-formula" id="ch16s2">
  <span class="card-label label-formula">16.2 核心公式</span>
  <h3>二、电阻的串联与并联</h3>

  <h4>1. 电阻串联的总电阻</h4>
  <div class="formula-display">$$R_{\\text{串}} = R_1 + R_2 + R_3 + \\cdots + R_n$$</div>
  <p><strong>推导：</strong>$U = U_1 + U_2$，$IR_{\\text{串}} = IR_1 + IR_2$，得 $R_{\\text{串}} = R_1 + R_2$。</p>
  <p><strong>理解：</strong>串联相当于增加了导体的<strong>长度</strong>，因此总电阻<strong>大于</strong>任何一个分电阻。n 个相同电阻 R₀ 串联：$R_{\\text{串}} = nR_0$。</p>

  <h4>2. 电阻并联的总电阻</h4>
  <div class="formula-display">$$\\frac{1}{R_{\\text{并}}} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\frac{1}{R_3} + \\cdots + \\frac{1}{R_n}$$</div>
  <p><strong>推导：</strong>$I = I_1 + I_2$，$\\frac{U}{R_{\\text{并}}} = \\frac{U}{R_1} + \\frac{U}{R_2}$，得 $\\frac{1}{R_{\\text{并}}} = \\frac{1}{R_1} + \\frac{1}{R_2}$。</p>
  <p><strong>理解：</strong>并联相当于增加了导体的<strong>横截面积</strong>，因此总电阻<strong>小于</strong>任何一个分电阻。</p>

  <h4>3. 两个电阻并联的简便公式</h4>
  <div class="formula-display">$$R_{\\text{并}} = \\frac{R_1 R_2}{R_1 + R_2}$$</div>
  <p><strong>特例：</strong>n 个相同电阻 R₀ 并联：$R_{\\text{并}} = R_0 / n$。</p>

  <h4>4. 串联分压与并联分流</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>电路类型</th><th>规律</th><th>公式</th></tr></thead>
    <tbody>
      <tr><td><strong>串联分压</strong></td><td>电压与电阻成正比</td><td>$\\dfrac{U_1}{U_2} = \\dfrac{R_1}{R_2}$；$\\dfrac{U_1}{U} = \\dfrac{R_1}{R_{\\text{串}}}$</td></tr>
      <tr><td><strong>并联分流</strong></td><td>电流与电阻成反比</td><td>$\\dfrac{I_1}{I_2} = \\dfrac{R_2}{R_1}$；$\\dfrac{I_1}{I} = \\dfrac{R_{\\text{并}}}{R_1}$</td></tr>
    </tbody>
  </table>
  </div>

  <div class="card-warning">
    <p><strong>串联分压记忆口诀：</strong>"大电阻分大电压，小电阻分小电压"。<strong>并联分流记忆口诀：</strong>"大电阻过小电流，小电阻过大电流"——电流"欺软怕硬"。</p>
  </div>

  <h4>5. 串并联总电阻的大小关系</h4>
  <p>对两个电阻 R₁ 和 R₂（设 R₁ > R₂）：</p>
  <div class="formula-display">$$R_{\\text{并}} < R_2 < R_1 < R_{\\text{串}}$$</div>
  <p>即：并联总电阻最小，串联总电阻最大（"并小串大"）。</p>
</div>

<!-- ==================== ch16s3: 伏安法测量电阻 ==================== -->
<div class="knowledge-card card-experiment" id="ch16s3">
  <span class="card-label label-experiment">16.3 实验探究 ⭐</span>
  <h3>三、伏安法测量电阻</h3>

  <h4>1. 实验原理</h4>
  <div class="formula-display">$$R = \\frac{U}{I}$$</div>
  <p>用电压表测出导体两端电压 U，电流表测出通过导体的电流 I，即可根据欧姆定律计算电阻。</p>

  <h4>2. 实验电路与器材</h4>
  <p><strong>器材：</strong>电源、开关、待测电阻（Rₓ）、滑动变阻器、电流表、电压表、导线若干。</p>
  <p><strong>电路连接：</strong>$R_x$ 与滑动变阻器<strong>串联</strong>，电压表与 $R_x$<strong>并联</strong>，电流表<strong>串联</strong>在干路中。</p>
  <p><strong>滑动变阻器的作用：</strong>① <strong>保护电路</strong>——闭合开关前滑至最大阻值；② 改变 $R_x$ 两端电压和通过的电流，实现<strong>多次测量取平均值</strong>。</p>

  <h4>3. 实验步骤</h4>
  <ol>
    <li>按电路图连接实物，开关<strong>断开</strong>，滑动变阻器滑至<strong>最大阻值</strong>处</li>
    <li>闭合开关，调节滑动变阻器，记录一组 U 和 I 值</li>
    <li>重复步骤 2，再测量两组数据（至少<strong>三组</strong>数据求平均）</li>
    <li>计算每次的 $R = U/I$，取平均值：$\\bar{R} = (R_1 + R_2 + R_3)/3$</li>
  </ol>

  <h4>4. 测量小灯泡电阻（注意与定值电阻的区别）</h4>
  <p>测量小灯泡电阻时<strong>不能求平均值</strong>！原因：小灯泡灯丝电阻随<strong>温度</strong>升高而显著增大，不同电压下电阻不同，求平均值没有物理意义。</p>

  <h4>5. 实验注意事项</h4>
  <ul>
    <li>连接电路时开关必须<strong>断开</strong></li>
    <li>闭合开关前，滑动变阻器调到<strong>最大阻值</strong></li>
    <li>电表量程选择：电流表/电压表量程要大于可能的最大值，在安全前提下选<strong>小量程</strong></li>
    <li>电流表<strong>串联</strong>（"正进负出"），电压表<strong>并联</strong>（"正进负出"）</li>
    <li>多次测量求平均值目的是<strong>减小误差</strong></li>
  </ul>

  <h4>6. 特殊方法测电阻（补充）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>方法</th><th>器材</th><th>原理</th></tr></thead>
    <tbody>
      <tr><td><strong>安阻法</strong></td><td>电流表 + 定值电阻 R₀</td><td>用电流表和 R₀ 间接测出电压：$U_x = I R_0$，则 $R_x = \\frac{U_x}{I_x}$</td></tr>
      <tr><td><strong>伏阻法</strong></td><td>电压表 + 定值电阻 R₀</td><td>用电压表和 R₀ 间接测出电流：$I_x = U_0 / R_0$，则 $R_x = \\frac{U_x}{I_x}$</td></tr>
      <tr><td><strong>等效替代法</strong></td><td>电阻箱 + 电流表/电压表</td><td>调节电阻箱使电流/电压示数与接 Rₓ 时相同，电阻箱读数 = Rₓ</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- ==================== ch16s4: 电路故障分析 ==================== -->
<div class="knowledge-card card-warning" id="ch16s4">
  <span class="card-label label-warning">16.4 故障分析 ⭐</span>
  <h3>四、电路故障分析（中考必考）</h3>

  <h4>1. 电路故障的基本类型</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>故障类型</th><th>定义</th><th>特征</th></tr></thead>
    <tbody>
      <tr><td><strong>断路（开路）</strong></td><td>电路中某处断开</td><td>电流表示数为<strong>0</strong>；断开处两端电压为<strong>电源电压</strong>；其他部分电压为 0</td></tr>
      <tr><td><strong>短路</strong></td><td>用电器两端被导线直接连接</td><td>被短路的用电器<strong>不工作</strong>，两端电压为<strong>0</strong>；电路中电流<strong>变大</strong></td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 用电压表判断故障（最常用方法）</h4>
  <p><strong>串联电路中：</strong></p>
  <ul>
    <li>电压表有示数（=电源电压）→ 电压表并联的用电器<strong>断路</strong>（或与之并联的其他部分短路）</li>
    <li>电压表示数为 0 → 电压表并联的用电器<strong>短路</strong>（或与之并联的其他部分断路）</li>
  </ul>

  <h4>3. 用电流表判断故障</h4>
  <ul>
    <li>电流表示数为 0 → 电路中存在<strong>断路</strong></li>
    <li>电流表示数<strong>异常偏大</strong> → 某处发生<strong>短路</strong></li>
    <li>电流表示数正常 → 电路正常（通路上无故障）</li>
  </ul>

  <h4>4. 故障分析口诀</h4>
  <div class="formula-display">
    <strong>"有压无流是断路，无压大流是短路"</strong><br>
    <strong>"哪里断路哪里有电压，哪里短路哪里无电压"</strong>
  </div>

  <h4>5. 常见电路故障及现象</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>故障情况</th><th>灯泡现象</th><th>电流表示数</th><th>电压表示数</th></tr></thead>
    <tbody>
      <tr><td>灯泡 L<sub>1</sub> 断路（串联）</td><td>两灯均不亮</td><td>0</td><td>V<sub>1</sub> = 电源电压；V<sub>2</sub> = 0</td></tr>
      <tr><td>灯泡 L<sub>1</sub> 短路（串联）</td><td>L<sub>1</sub> 不亮，L<sub>2</sub> 更亮</td><td>变大</td><td>V<sub>1</sub> = 0；V<sub>2</sub> = 电源电压</td></tr>
      <tr><td>灯泡 L<sub>1</sub> 断路（并联）</td><td>L<sub>1</sub> 不亮，L<sub>2</sub> 正常亮</td><td>干路电流变小</td><td>各支路电压仍为电源电压</td></tr>
      <tr><td>灯泡 L<sub>1</sub> 短路（并联）</td><td>所有灯均不亮（电源短路）</td><td>极大→烧表</td><td>—</td></tr>
      <tr><td>滑动变阻器断路</td><td>灯不亮</td><td>0</td><td>变阻器两端=电源电压</td></tr>
      <tr><td>滑动变阻器短路</td><td>灯非常亮</td><td>变大</td><td>变阻器两端=0</td></tr>
    </tbody>
  </table>
  </div>

  <h4>6. 电路故障分析的系统方法（四步法）</h4>
  <ol>
    <li><strong>辨类型：</strong>判断是串联电路还是并联电路</li>
    <li><strong>看现象：</strong>观察灯泡亮暗、电表示数情况</li>
    <li><strong>假设法：</strong>逐个假设某个元件发生断路/短路，看现象是否与题设吻合</li>
    <li><strong>验证：</strong>利用欧姆定律和电路规律验证分析结果</li>
  </ol>
</div>

<!-- Ch16 典型例题 -->
<div class="knowledge-card card-example" id="ch16-examples">
  <span class="card-label label-example">典型例题</span>
  <h3>典型例题精讲 ⭐</h3>

  <div class="card-example">
    <h4>例1（欧姆定律基本计算——基础必会）</h4>
    <p>一个定值电阻两端加 6 V 电压时，通过它的电流是 0.3 A。求：(1)该电阻的阻值；(2)若电压增加到 10 V，此时电流是多少？</p>
    <p><strong>解：</strong></p>
    <p>(1) $R = \\frac{U}{I} = \\frac{6}{0.3} = \\mathbf{20\\,\\Omega}$</p>
    <p>(2) 电阻不变，$I' = \\frac{U'}{R} = \\frac{10}{20} = \\mathbf{0.5\\,\\text{A}}$</p>
    <p><strong>关键：</strong>定值电阻的阻值是<strong>不变的</strong>，先求 R，再代入新电压求新电流。</p>
  </div>

  <div class="card-example">
    <h4>例2（电阻串并联计算）</h4>
    <p>电阻 R₁ = 6 Ω 和 R₂ = 12 Ω：(1)串联时的总电阻是多少？(2)并联时的总电阻是多少？(3)若将它们串联接入 9 V 电源，求 R₁ 两端的电压。</p>
    <p><strong>解：</strong></p>
    <p>(1) $R_{\\text{串}} = R_1 + R_2 = 6 + 12 = \\mathbf{18\\,\\Omega}$</p>
    <p>(2) $\\frac{1}{R_{\\text{并}}} = \\frac{1}{6} + \\frac{1}{12} = \\frac{2+1}{12} = \\frac{3}{12}$，$R_{\\text{并}} = \\mathbf{4\\,\\Omega}$</p>
    <p>或用简便公式：$R_{\\text{并}} = \\frac{6 \\times 12}{6 + 12} = \\frac{72}{18} = \\mathbf{4\\,\\Omega}$</p>
    <p>(3) 串联电流 $I = \\frac{U}{R_{\\text{串}}} = \\frac{9}{18} = 0.5\\,\\text{A}$；$U_1 = IR_1 = 0.5 \\times 6 = \\mathbf{3\\,\\text{V}}$</p>
    <p>或直接用分压公式：$U_1 = \\frac{R_1}{R_1+R_2}U = \\frac{6}{18} \\times 9 = \\mathbf{3\\,\\text{V}}$</p>
  </div>

  <div class="card-example">
    <h4>例3（动态电路分析——中考压轴题型）</h4>
    <p>如图所示，电源电压不变，R 为定值电阻，闭合开关 S，将滑动变阻器的滑片 P 向右移动。分析各电表示数的变化。</p>
    <p><strong>解（四步法）：</strong></p>
    <p>① 判断电路：R 与 R<sub>滑</sub> 串联 → ② 滑片右移→R<sub>滑</sub> 接入阻值↑ → ③ 总电阻 R<sub>总</sub>↑ → ④ 总电流 I = U/R<sub>总</sub>↓（电流表示数↓）→ ⑤ U<sub>R</sub> = IR↓（定值电阻电压↓）→ ⑥ U<sub>滑</sub> = U − U<sub>R</sub>↑（滑动变阻器电压↑）。</p>
    <p><strong>总结：</strong>电流表示数<strong>减小</strong>；电压表 V<sub>R</sub> 示数<strong>减小</strong>；电压表 V<sub>滑</sub> 示数<strong>增大</strong>。</p>
  </div>

  <div class="card-example">
    <h4>例4（电路故障分析）</h4>
    <p>串联电路中 L₁ 和 L₂ 均不亮，电流表示数为 0。用电压表测 L₁ 两端电压为 3 V（=电源电压），测 L₂ 两端电压为 0。判断故障类型和位置。</p>
    <p><strong>解：</strong>电流表示数为 0 → 电路中存在<strong>断路</strong>。电压表测 L₁ 得 3 V → 电压表两端分别与电源正负极相连→L₁ <strong>断路</strong>。L₂ 两端电压为 0 → L₂ 所在导线已因 L₁ 断路而无电流流过。结论：<strong>L₁ 断路</strong>。</p>
  </div>

  <div class="card-example">
    <h4>例5（伏安法测电阻实验综合）</h4>
    <p>小明用伏安法测量未知电阻 Rₓ，三次测量数据如下表。请计算 Rₓ 的阻值。</p>
    <div class="table-wrap">
    <table>
      <thead><tr><th>实验次数</th><th>U/V</th><th>I/A</th></tr></thead>
      <tbody>
        <tr><td>1</td><td>1.0</td><td>0.10</td></tr>
        <tr><td>2</td><td>2.0</td><td>0.21</td></tr>
        <tr><td>3</td><td>3.0</td><td>0.30</td></tr>
      </tbody>
    </table>
    </div>
    <p><strong>解：</strong></p>
    <p>$R_1 = \\frac{1.0}{0.10} = 10.0\\,\\Omega$；$R_2 = \\frac{2.0}{0.21} \\approx 9.52\\,\\Omega$；$R_3 = \\frac{3.0}{0.30} = 10.0\\,\\Omega$</p>
    <p>$\\bar{R} = \\frac{10.0 + 9.52 + 10.0}{3} \\approx \\mathbf{9.84\\,\\Omega}$</p>
    <p><strong>注意：</strong>此处测量的是定值电阻，三组求平均值可减小误差。若是小灯泡则不能求平均。</p>
  </div>
</div>

<!-- Ch16 易错辨析 -->
<div class="knowledge-card card-warning" id="ch16-misconceptions">
  <span class="card-label label-warning">易错辨析</span>
  <h3>常见误区（本章最全！）</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>易错点</th><th>正确理解</th></tr></thead>
    <tbody>
      <tr><td>"由 R=U/I 可知，R 与 U 成正比，与 I 成反比"</td><td><strong>大错特错！</strong>R 是导体<strong>本身的性质</strong>（由材料、长度、横截面积、温度决定），与 U 和 I 无关。R = U/I 只是<strong>计算</strong>电阻的方法</td></tr>
      <tr><td>"通过导体的电流与电压成正比，与电阻成反比"</td><td>这句话<strong>有条件</strong>！必须说"<strong>电阻一定时</strong>，电流与电压成正比；<strong>电压一定时</strong>，电流与电阻成反比"</td></tr>
      <tr><td>"串联电路总电阻等于各电阻之和，所以并联也等于之和"</td><td><strong>严重错误！</strong>并联总电阻的<strong>倒数</strong>等于各电阻倒数之和，总电阻<strong>小于</strong>任一分电阻</td></tr>
      <tr><td>"电压表有示数一定是被测元件通路"</td><td>不！电压表有示数（≠0）且等于电源电压，被测元件可能正好<strong>断路</strong></td></tr>
      <tr><td>"电流表示数为 0 一定是因为短路"</td><td><strong>搞反了！</strong>短路时电流反而<strong>极大</strong>。电流表为 0 是<strong>断路</strong></td></tr>
      <tr><td>"滑动变阻器在实验中只起保护作用"</td><td>不止！它还用来<strong>改变电压/电流</strong>实现多次测量。探究欧姆定律时，变阻器用于改变电压（探究 I-U）或保持电压不变（探究 I-R）</td></tr>
      <tr><td>"并联电路中各支路电流相等"</td><td><strong>错！</strong>并联是<strong>电压</strong>相等，<strong>电流</strong>不一定相等（电流与电阻成反比）</td></tr>
      <tr><td>"电阻越大，电流越小"</td><td>有前提——<strong>电压一定时</strong>。若电压也变化，结论不成立！</td></tr>
      <tr><td>"I-U 图像的斜率等于 R"</td><td><strong>正好反了！</strong>斜率 = I/U =<strong> 1/R</strong>。斜率越大，电阻<strong>越小</strong></td></tr>
      <tr><td>"灯泡的 I-U 图像是直线"</td><td><strong>错！</strong>灯丝电阻随温度升高而<strong>增大</strong>→I 与 U <strong>不成正比</strong>→图像是<strong>曲线</strong>（向下弯曲）</td></tr>
    </tbody>
  </table>
  </div>
</div>
`;

<!-- ==================== ch17s1: 电功 ==================== -->
<div class="knowledge-card card-formula" id="ch17s1">
  <span class="card-label label-formula">17.1 核心公式</span>
  <h3>一、电功——W = UIt</h3>

  <h4>1. 电功的定义</h4>
  <p><strong>定义：</strong>电流所做的功叫做<strong>电功</strong>，符号 <strong>W</strong>，单位：<strong>焦耳（J）</strong>。常用单位：千瓦时（kW·h，俗称"度"）。</p>
  <div class="formula-display">$$1\\,\\text{kW·h} = 3.6 \\times 10^6\\,\\text{J}$$</div>
  <p><strong>实质：</strong>电流做功的过程就是<strong>电能转化为其他形式能</strong>的过程。电流做了多少功，就有多少电能转化为其他形式的能。</p>

  <h4>2. 电功的计算公式</h4>
  <div class="formula-display">$$W = UIt$$</div>
  <p>W——电功（J）；U——电压（V）；I——电流（A）；t——通电时间（s）。</p>

  <h4>3. 电功公式的变形（结合欧姆定律）</h4>
  <p><strong>适用于纯电阻电路（电能全部转化为内能）：</strong></p>
  <div class="formula-display">$$W = I^2Rt \\qquad W = \\frac{U^2}{R}t$$</div>
  <div class="card-warning">
    <p><strong>公式适用范围：</strong>$W = UIt$ 适用于<strong>所有</strong>电路（普适公式）。$W = I^2Rt$ 和 $W = U^2t/R$ 只能用于<strong>纯电阻电路</strong>（电能→内能）。电动机（电能→机械能+内能）只能用 $W = UIt$ 求总电功！</p>
  </div>

  <h4>4. 电能表（电度表）</h4>
  <p><strong>作用：</strong>测量用电器在一段时间内消耗的<strong>电功（电能）</strong>。</p>
  <p><strong>铭牌参数解读：</strong></p>
  <ul>
    <li>"220 V"——额定电压</li>
    <li>"10(20) A"——标定电流 10 A，最大电流 20 A</li>
    <li>"50 Hz"——适用交流电频率</li>
    <li>"600 r/(kW·h)"——每消耗 1 kW·h 电能，转盘转 600 转（或脉冲闪 600 次）</li>
  </ul>
  <p><strong>利用电能表测电功率：</strong>记录转盘转数 n 和时间 t：$P = \\frac{W}{t} = \\frac{n/N}{t} \\times 3.6 \\times 10^6$（W），其中 N 为每 kW·h 的转数。</p>
</div>

<!-- ==================== ch17s2: 电功率 ==================== -->
<div class="knowledge-card card-key" id="ch17s2">
  <span class="card-label label-formula">17.2 核心考点 ⭐</span>
  <h3>二、电功率——P = UI</h3>

  <h4>1. 电功率的定义</h4>
  <p><strong>物理意义：</strong>表示电流做功<strong>快慢</strong>的物理量。符号 <strong>P</strong>，单位：<strong>瓦特（W）</strong>。</p>
  <div class="formula-display">$$P = \\frac{W}{t} = UI$$</div>
  <p>常用单位：千瓦（kW），1 kW = 10³ W。</p>

  <h4>2. 电功率公式变形（纯电阻电路）</h4>
  <div class="formula-display">$$P = I^2R \\qquad P = \\frac{U^2}{R}$$</div>
  <p>对同一电阻，电压减半 → 功率变为原来的 <strong>1/4</strong>（因 $P \\propto U^2$）。</p>

  <h4>3. 额定功率 vs 实际功率（⭐⭐⭐ 必考辨析）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>概念</th><th>符号</th><th>定义</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>额定电压</strong></td><td>U<sub>额</sub></td><td>用电器<strong>正常工作</strong>时的电压</td><td>铭牌标注值</td></tr>
      <tr><td><strong>额定功率</strong></td><td>P<sub>额</sub></td><td>用电器在额定电压下工作时的功率</td><td>铭牌标注值</td></tr>
      <tr><td><strong>实际电压</strong></td><td>U<sub>实</sub></td><td>用电器实际接入的电压</td><td>可等于或不等 U<sub>额</sub></td></tr>
      <tr><td><strong>实际功率</strong></td><td>P<sub>实</sub></td><td>用电器在实际电压下工作时的功率</td><td>由实际电压和电阻决定</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>核心关系（对同一用电器，认为 R 不变）：</strong></p>
  <div class="formula-display">$$\\frac{P_{\\text{实}}}{P_{\\text{额}}} = \\left(\\frac{U_{\\text{实}}}{U_{\\text{额}}}\\right)^2$$</div>
  <div class="card-warning">
    <p><strong>结论：</strong>U<sub>实</sub> > U<sub>额</sub> → P<sub>实</sub> > P<sub>额</sub>（用电器<strong>过亮</strong>，可能烧毁）；U<sub>实</sub> < U<sub>额</sub> → P<sub>实</sub> < P<sub>额</sub>（用电器<strong>暗</strong>或工作不正常）；U<sub>实</sub> = U<sub>额</sub> → P<sub>实</sub> = P<sub>额</sub>（<strong>正常</strong>工作）。</p>
  </div>

  <h4>4. 串并联电路中电功率的分配</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>电路类型</th><th>功率分配规律</th><th>公式</th></tr></thead>
    <tbody>
      <tr><td><strong>串联</strong></td><td>功率与电阻成正比</td><td>$\\dfrac{P_1}{P_2} = \\dfrac{R_1}{R_2}$（因为 I 相同，P = I²R）</td></tr>
      <tr><td><strong>并联</strong></td><td>功率与电阻成反比</td><td>$\\dfrac{P_1}{P_2} = \\dfrac{R_2}{R_1}$（因为 U 相同，P = U²/R）</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- ==================== ch17s3: 焦耳定律 ==================== -->
<div class="knowledge-card card-formula" id="ch17s3">
  <span class="card-label label-formula">17.3 核心定律 ⭐</span>
  <h3>三、焦耳定律——Q = I²Rt</h3>

  <h4>1. 电流的热效应</h4>
  <p><strong>定义：</strong>电流通过导体时，导体会<strong>发热</strong>——电能转化为<strong>内能</strong>（焦耳热）的现象。</p>

  <h4>2. 焦耳定律的内容</h4>
  <p><strong>内容：</strong>电流通过导体产生的热量，跟<strong>电流的平方</strong>成正比，跟导体的<strong>电阻</strong>成正比，跟<strong>通电时间</strong>成正比。</p>
  <div class="formula-display">$$Q = I^2 R t$$</div>
  <p>Q——热量（J）；I——电流（A）；R——电阻（Ω）；t——时间（s）。</p>

  <div class="card-warning">
    <p><strong>核心提醒：</strong>焦耳定律公式中热量与 <strong>I²</strong> 成正比（不是 I！）。电流变为 2 倍→热量变为<strong> 4 倍</strong>（同 R 同 t 条件下）。这是 "平方" 的意义！</p>
  </div>

  <h4>3. 焦耳定律公式变形（纯电阻电路）</h4>
  <div class="formula-display">$$Q = UIt \\qquad Q = \\frac{U^2}{R}t$$</div>
  <p><strong>公式适用范围：</strong>$Q = I^2Rt$ 适用于<strong>任何</strong>电路（普适公式！）。$Q = UIt$ 和 $Q = U^2t/R$ 仅适用于<strong>纯电阻电路</strong>。</p>

  <h4>4. 纯电阻电路 vs 非纯电阻电路（重要区分）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>类型</th><th>实例</th><th>能量转化</th><th>W 与 Q 关系</th><th>可用公式</th></tr></thead>
    <tbody>
      <tr><td><strong>纯电阻电路</strong></td><td>白炽灯、电炉、电热器、电饭煲</td><td>电能<strong>全部</strong>→内能</td><td>W = Q</td><td>W=UIt=I²Rt=U²t/R 均可</td></tr>
      <tr><td><strong>非纯电阻电路</strong></td><td>电动机、充电电池、电解槽</td><td>电能→内能+其他能</td><td>W > Q</td><td>W=UIt（总功）；Q=I²Rt（焦耳热）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>5. 多档位电热器问题（中考压轴 ⭐⭐⭐）</h4>
  <p>电热器（电饭煲、电热水器、电暖器等）通常通过<strong>改变接入电阻</strong>来改变功率，实现不同档位：</p>
  <ul>
    <li><strong>高温档：</strong>电阻最小 → 功率最大（$P = U^2/R$，并联或短路部分电阻）</li>
    <li><strong>低温档：</strong>电阻最大 → 功率最小（串联所有电阻）</li>
    <li><strong>中温档（如有）：</strong>接入部分电阻，中等功率</li>
  </ul>
  <p><strong>解题关键：</strong>画出每种档位对应的<strong>等效电路图</strong>，标出接入的电阻，用 $P = U^2/R_{\\text{总}}$ 计算功率。</p>
</div>

<!-- ==================== ch17s4: 家庭电路与安全用电 ==================== -->
<div class="knowledge-card card-warning" id="ch17s4">
  <span class="card-label label-warning">17.4 安全用电</span>
  <h3>四、家庭电路与安全用电</h3>

  <h4>1. 家庭电路的组成</h4>
  <p><strong>顺序：</strong>进户线 → 电能表 → 总开关（闸刀开关）→ 保险装置（熔断器/空气开关）→ 用电器支路（各用电器<strong>并联</strong>，开关接<strong>火线</strong>侧）。</p>

  <h4>2. 火线与零线</h4>
  <p>家庭电路为交流电（220 V，50 Hz），进户线有两根：</p>
  <ul>
    <li><strong>火线（L）：</strong>与大地之间有 220 V 电压。用<strong>测电笔</strong>测试时氖管发光</li>
    <li><strong>零线（N）：</strong>与大地之间电压为 0 V。测电笔触及时氖管不发光</li>
    <li><strong>接地线（PE）：</strong>连接用电器金属外壳与大地，防止触电（三孔插座的上孔）</li>
  </ul>

  <h4>3. 安全用电原则</h4>
  <ol>
    <li><strong>不接触低压带电体</strong>（不超 36 V 的安全电压除外）</li>
    <li><strong>不靠近高压带电体</strong>（高压电弧触电、跨步电压触电）</li>
    <li><strong>不弄湿用电器</strong>（水是导体，湿手不触摸开关/插座）</li>
    <li><strong>不损坏绝缘层</strong>（导线绝缘皮破损要及时更换）</li>
    <li>保险丝熔断后，<strong>先排除故障再更换</strong>，严禁用铜丝/铁丝代替</li>
  </ol>

  <h4>4. 家庭电路中的保护装置</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>装置</th><th>原理</th><th>作用</th></tr></thead>
    <tbody>
      <tr><td><strong>熔断器（保险丝）</strong></td><td>电流过大→发热多→熔点低的保险丝熔断</td><td>过载和短路保护</td></tr>
      <tr><td><strong>空气开关（断路器）</strong></td><td>电流过大→电磁脱扣或热脱扣</td><td>过载和短路保护（可复位）</td></tr>
      <tr><td><strong>漏电保护器</strong></td><td>检测火线与零线电流差异</td><td>漏电保护（防止触电和电气火灾）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>5. 家庭电路故障排查</h4>
  <ul>
    <li><strong>所有用电器都不工作：</strong>检查总开关、保险丝、进户线是否断开</li>
    <li><strong>部分支路不工作：</strong>检查该支路的开关和用电器的连接</li>
    <li><strong>一用电器金属外壳带电：</strong>接地线<strong>未接</strong>或<strong>断开</strong></li>
    <li><strong>测电笔测插座两孔都发光：</strong><strong>零线断路</strong>（零线某处断开，火线通过用电器与断开的零线相连）</li>
  </ul>

  <h4>6. 避免触电事故</h4>
  <p>触电是电流通过人体达到一定值造成伤害。人体安全电压：<strong>不高于 36 V</strong>（潮湿环境为 12 V）。触电形式：单相触电（一手触火线→通过人体→大地）、双相触电（同时触火线和零线）、跨步电压触电（高压线落地→两脚之间有电压）。</p>
</div>

<!-- Ch17 典型例题 -->
<div class="knowledge-card card-example" id="ch17-examples">
  <span class="card-label label-example">典型例题</span>
  <h3>典型例题精讲 ⭐</h3>

  <div class="card-example">
    <h4>例1（额定功率与实际功率）</h4>
    <p>一个灯泡标有"220 V 100 W"字样。求：(1)灯泡正常发光时的电流和电阻；(2)若将此灯泡接到 110 V 电源上，实际功率是多少？</p>
    <p><strong>解：</strong></p>
    <p>(1) $I_{\\text{额}} = \\frac{P_{\\text{额}}}{U_{\\text{额}}} = \\frac{100}{220} \\approx \\mathbf{0.455\\,\\text{A}}$</p>
    <p>$R = \\frac{U_{\\text{额}}^2}{P_{\\text{额}}} = \\frac{220^2}{100} = \\mathbf{484\\,\\Omega}$</p>
    <p>(2) 方法一：$P_{\\text{实}} = \\frac{U_{\\text{实}}^2}{R} = \\frac{110^2}{484} = \\mathbf{25\\,\\text{W}}$</p>
    <p>方法二（比值法）：$\\frac{P_{\\text{实}}}{P_{\\text{额}}} = \\left(\\frac{110}{220}\\right)^2 = \\frac{1}{4}$，$P_{\\text{实}} = 100 \\times \\frac{1}{4} = \\mathbf{25\\,\\text{W}}$</p>
    <p><strong>结论：</strong>电压减半 → 功率变为原来的 1/4（而非 1/2）！</p>
  </div>

  <div class="card-example">
    <h4>例2（焦耳定律——基本计算）</h4>
    <p>一个电阻 R = 10 Ω，通过 2 A 的电流 60 s。求产生的热量。</p>
    <p><strong>解：</strong>$Q = I^2Rt = 2^2 \\times 10 \\times 60 = 4 \\times 10 \\times 60 = \\mathbf{2400\\,\\text{J}}$</p>
  </div>

  <div class="card-example">
    <h4>例3（多档位电热器——中考压轴题型）</h4>
    <p>某电饭煲有两个发热电阻 R₁ = 44 Ω 和 R₂ = 110 Ω，家庭电路电压 220 V。通过开关 S 控制，可以实现两个档位。求：(1)只有 R₁ 接入时（高温档）的功率；(2)R₁ 与 R₂ 串联时（低温档）的功率；(3)将 2 kg、20℃ 的水加热到 100℃，用高温档需要多少时间？（不计热损失，c<sub>水</sub> = 4.2×10³ J/(kg·℃)）</p>
    <p><strong>解：</strong></p>
    <p>(1) 高温档：$P_{\\text{高}} = \\frac{U^2}{R_1} = \\frac{220^2}{44} = \\mathbf{1100\\,\\text{W}}$</p>
    <p>(2) 低温档：$R_{\\text{总}} = 44 + 110 = 154\\,\\Omega$；$P_{\\text{低}} = \\frac{U^2}{R_{\\text{总}}} = \\frac{220^2}{154} \\approx \\mathbf{314.3\\,\\text{W}}$</p>
    <p>(3) $Q_{\\text{吸}} = cm\\Delta t = 4.2 \\times 10^3 \\times 2 \\times (100-20) = 6.72 \\times 10^5\\,\\text{J}$</p>
    <p>$W = Q_{\\text{吸}}$（不计热损失），$t = \\frac{W}{P_{\\text{高}}} = \\frac{6.72 \\times 10^5}{1100} \\approx \\mathbf{611\\,\\text{s}} \\approx \\mathbf{10.2\\,\\text{min}}$</p>
  </div>
</div>

<!-- Ch17 易错辨析 -->
<div class="knowledge-card card-warning" id="ch17-misconceptions">
  <span class="card-label label-warning">易错辨析</span>
  <h3>常见误区</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>易错点</th><th>正确理解</th></tr></thead>
    <tbody>
      <tr><td>"电功和电热是同一回事"</td><td><strong>不一定！</strong>纯电阻电路中 W = Q；非纯电阻电路（电动机、充电）中 W > Q，$Q = I^2Rt$ 只是发热部分</td></tr>
      <tr><td>"额定功率越大的灯泡越亮"</td><td><strong>需要条件！</strong>在<strong>额定电压</strong>下，功率越大越亮。但实际亮度取决于<strong>实际功率</strong>——一个"220 V 100 W"的灯接 110 V，比"220 V 25 W"的灯接 220 V<strong>暗</strong></td></tr>
      <tr><td>"由 P = U²/R 知，电阻越大功率越小"</td><td>这是<strong>并联</strong>的特征（电压相等时）。<strong>串联</strong>时（电流相等），由 P = I²R 知，电阻<strong>越大</strong>功率越大！</td></tr>
      <tr><td>"Q = I²Rt 只适用于纯电阻电路"</td><td><strong>恰恰相反！</strong>$Q = I^2Rt$ 是焦耳热计算的<strong>普适公式</strong>，任何电路都适用。反过来 $Q = UIt$ = $U^2t/R$ 才只适用于纯电阻电路</td></tr>
      <tr><td>"电能表测量的是电功率"</td><td><strong>错！</strong>电能表测的是<strong>电功（消耗的电能）</strong>，不是电功率。功率是做功<strong>快慢</strong>，功是做功<strong>多少</strong></td></tr>
      <tr><td>"保险丝熔断后用铜丝代替"</td><td><strong>严禁！</strong>铜丝熔点高、不易熔断，失去保险作用，电流过大时可能引发火灾</td></tr>
      <tr><td>"火线零线之间的电压为 0 V"</td><td><strong>大错！</strong>火线零线之间电压是<strong> 220 V</strong>。零线与大地之间才是 0 V</td></tr>
      <tr><td>"电动机发热功率用 P=UI 计算"</td><td><strong>错！</strong>发热功率用 $P_{\\text{热}} = I^2R$（焦耳定律）。P=UI 是<strong>总功率</strong>（含机械功率），总功率 > 发热功率</td></tr>
    </tbody>
  </table>
  </div>
</div>
`;

<!-- ==================== ch18s1: 磁现象与磁场 ==================== -->
<div class="knowledge-card card-definition" id="ch18s1">
  <span class="card-label label-def">18.1 核心概念</span>
  <h3>一、磁现象与磁场</h3>

  <h4>1. 磁体与磁极</h4>
  <p><strong>磁性：</strong>物体能够吸引铁、钴、镍等物质的性质。</p>
  <p><strong>磁体：</strong>具有磁性的物体。分为<strong>天然磁体</strong>（磁铁矿石）和<strong>人造磁体</strong>（条形磁铁、蹄形磁铁等）。</p>
  <p><strong>磁极：</strong>磁体上磁性<strong>最强</strong>的部位。任何磁体都有<strong>两个</strong>磁极：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>磁极</th><th>符号</th><th>指向（自由悬挂时）</th><th>颜色标记</th></tr></thead>
    <tbody>
      <tr><td><strong>南极（S极）</strong></td><td>S</td><td>指向<strong>地理南方</strong></td><td>蓝色</td></tr>
      <tr><td><strong>北极（N极）</strong></td><td>N</td><td>指向<strong>地理北方</strong></td><td>红色</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 磁极间的相互作用规律</h4>
  <div class="formula-display">同名磁极相互<strong>排斥</strong>，异名磁极相互<strong>吸引</strong></div>
  <p><strong>注意：</strong>磁铁吸引铁钉不是磁极间相互作用——铁钉本身不是磁体，是被<strong>磁化</strong>后产生的吸引力。</p>

  <h4>3. 磁化</h4>
  <p><strong>定义：</strong>使原来没有磁性的物体获得磁性的过程。磁化的实质是物体内<strong>磁分子（磁畴）</strong>从无序排列变为有序排列。</p>
  <p><strong>分类：</strong>① <strong>易磁化、易退磁</strong>——软铁（用于电磁铁铁芯）；② <strong>难磁化、难退磁</strong>——钢（用于永磁体）。</p>

  <h4>4. 磁场（Magnetic Field）</h4>
  <p><strong>定义：</strong>磁体周围存在的一种<strong>看不见、摸不着</strong>的特殊物质，它对放入其中的磁体产生<strong>力的作用</strong>。</p>
  <p><strong>基本性质：</strong>对放入其中的磁体产生<strong>磁力</strong>的作用。</p>
  <p><strong>方向规定：</strong>磁场中某点，小磁针<strong>N极</strong>静止时所指的方向（或N极所受磁力的方向）为该点磁场方向。</p>

  <h4>5. 磁感线（Magnetic Field Lines）</h4>
  <p><strong>定义：</strong>为了形象描述磁场而<strong>假想</strong>的有方向的曲线（<strong>不是</strong>实际存在的线）。</p>
  <div class="table-wrap">

    <tbody>
      <tr><td><strong>方向</strong></td><td>磁体外：从<strong>N极出发</strong>，回到<strong>S极</strong>；磁体内部：从S极到N极（形成闭合曲线）</td></tr>
      <tr><td><strong>疏密</strong></td><td>磁感线越<strong>密</strong>，磁场越<strong>强</strong></td></tr>
      <tr><td><strong>不相交</strong></td><td>任意两条磁感线<strong>不会相交</strong>（同一点磁场方向唯一）</td></tr>
      <tr><td><strong>切线</strong></td><td>任意一点的<strong>切线方向</strong>即是该点磁场方向（N极受力方向）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>6. 地磁场</h4>
  <p><strong>地球本身是一个巨大的磁体</strong>，地磁北极在地理<strong>南极</strong>附近，地磁南极在地理<strong>北极</strong>附近。</p>
  <div class="card-warning">

  </div>
</div>

  <h3>二、电流的磁效应——安培定则</h3>

  <h4>1. 奥斯特实验（1820年）</h4>
  <p><strong>实验：</strong>在静止的小磁针上方平行放置一根导线，导线通电后，小磁针发生<strong>偏转</strong>；断电后恢复原位。</p>
  <p><strong>结论：</strong>① 通电导体周围存在<strong>磁场</strong>（电流的磁效应）；② 电流的磁场方向与<strong>电流方向</strong>有关。</p>
  <p><strong>意义：</strong>首次揭示了<strong>电与磁的联系</strong>——电可以生磁。</p>

  <h4>2. 通电螺线管的磁场</h4>
  <p><strong>特点：</strong>通电螺线管外部的磁场与<strong>条形磁铁</strong>的磁场相似。两端相当于磁体的两个磁极。</p>
  <p><strong>磁极判断因素：</strong>通电螺线管两端的极性取决于<strong>电流方向</strong>和<strong>线圈绕向</strong>。</p>

  <div class="card-key">

  <ol>

    <li>大拇指所指即为N极</li>
  </ol>
  <p><strong>应用方向：</strong>安培定则可以由电流方向→判磁极，也可以由磁极→判电流方向，进而确定电源正负极。</p>

  <p><strong>现象：</strong>通电导线在磁场中会受到<strong>力</strong>的作用（安培力），力的方向与<strong>电流方向</strong>和<strong>磁场方向</strong>都有关。</p>
  <p><strong>左手定则（电动机定则）：</strong>伸开左手，让磁感线<strong>穿入手心</strong>，四指指向<strong>电流方向</strong>，则大拇指所指方向即为通电导线<strong>受力方向</strong>。</p>

  <h4>2. 影响安培力方向的因素</h4>
  <div class="table-wrap">
  <table>

    </tbody>
  </table>
  </div>

  <h4>3. 电动机的基本原理</h4>
  <p><strong>原理：</strong>通电<strong>线圈</strong>在磁场中受力而<strong>转动</strong>——电能转化为<strong>机械能</strong>。</p>

  <div class="card-key">

  </div>

  <h4>5. 电动机与发电机的辨析（中考高频对比）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>比较项</th><th>电动机</th><th>发电机</th></tr></thead>

    <p>在"探究电磁铁磁性强弱的影响因素"实验中：(1)怎样判断磁性强弱？(2)如何研究电流大小的影响？(3)若实验中发现两个串联的电磁铁（匝数不同）吸引大头针数量不同，说明了什么？</p>

  <div class="card-example">
    <h4>例3（电动机与发电机辨析）</h4>
    <p>小华自制了一个装置：在支架上安装一个可以自由转动的线圈，线圈两端分别接在换向器上，下方有磁铁。当线圈两端接入电池后，线圈持续转动。请问：(1)该装置是什么？(2)换向器的作用是什么？(3)如果取下电池，用手转动线圈，在外部电路中接入电流表，指针会怎样？这又是什么原理？</p>
    <p><strong>答：</strong>(1)该装置是<strong>直流电动机</strong>模型。(2)换向器在线圈转过平衡位置时自动改变线圈中<strong>电流方向</strong>，使线圈持续转动。(3)电流表指针会<strong>左右摆动</strong>——因为线圈在磁场中转动产生了<strong>交流电</strong>，这是<strong>电磁感应（发电机原理）</strong>。</p>

  <div class="table-wrap">

<!-- ==================== ch19s3: 电能的输送 ==================== -->
<div class="knowledge-card card-formula" id="ch19s3">
  <span class="card-label label-formula">19.3 核心公式</span>
  <h3>三、电能的输送</h3>

  <h4>1. 远距离输电的基本问题</h4>
  <p><strong>核心矛盾：</strong>输电线路有电阻，电流通过时会发热（焦耳定律）→ 电能损耗。如何减少损耗？</p>

  <h4>2. 输电损耗公式</h4>
  <div class="formula-display">$$P_{\\text{损}} = I^2 R_{\\text{线}}$$</div>
  <p>P<sub>损</sub> —— 输电线路上的功率损耗（W），I —— 输电线中的电流（A），R<sub>线</sub> —— 输电线的总电阻（Ω）。</p>

  <h4>3. 减少输电损耗的两种途径</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>途径</th><th>方法</th><th>局限性</th></tr></thead>
    <tbody>
      <tr><td><strong>减小R<sub>线</sub></strong></td><td>加粗导线、用电阻率小的材料</td><td>导线不能无限加粗（成本、重量），且R<sub>线</sub>减小有限</td></tr>
      <tr><td><strong>减小I</strong></td><td>在输送功率P一定时，<strong>提高输电电压U</strong></td><td>需要变压器配合；电压过高绝缘要求高</td></tr>
    </tbody>
  </table>
  </div>

  <h4>4. 为什么高压输电可以减少损耗（核心推导）</h4>
  <div class="card-key">
    <p>输送功率一定：<strong>P = UI</strong>，U 越高 → I 越<strong>小</strong>。</p>
    <p>损耗功率：P<sub>损</sub> = I<sup>2</sup>R → I 减小，P<sub>损</sub> 大幅减小（平方关系）。</p>
    <p><strong>结论：</strong>在输送功率相同的情况下，电压提高到n倍，电流降为1/n，损耗降为<strong>1/n<sup>2</sup></strong>。</p>
  </div>
  <div class="formula-display">$$P_{\\text{损}} = \\left(\\frac{P}{U}\\right)^2 R_{\\text{线}} = \\frac{P^2 R_{\\text{线}}}{U^2}$$</div>

  <h4>5. 实际输电系统</h4>
  <p><strong>发电厂</strong> → 升压变压器 → <strong>高压输电线路</strong> → 降压变压器 → <strong>用户</strong>。</p>
  <p><strong>我国远距离输电电压等级：</strong>110 kV、220 kV、330 kV、500 kV、±800 kV（特高压直流）等。</p>

  <div class="card-warning">
    <p><strong>常见误区：</strong>"提高电压会增加损耗"——错！输送功率一定时，$P = UI$，电压高则电流小，$P_{\\text{损}} = I^2R$反而<strong>减小</strong>。不能把输电电压直接代入 $P = U^2/R$！（那个U必须是<strong>输电线两端的电压差</strong>，而不是输电电压）</p>
  </div>
</div>

    <p>某发电站输送功率为 1.0 × 10<sup>6</sup> kW，输电线总电阻为 10 Ω。分别用 10 kV 和 500 kV 两种电压输电，求输电线上的功率损耗各为多少？</p>
    <p><strong>解：</strong>用 10 kV 时：$I = \\frac{P}{U} = \\frac{10^9}{10^4} = 10^5\\,\\text{A}$；$P_{\\text{损}} = I^2R = (10^5)^2 \\times 10 = \\mathbf{1.0 \\times 10^{11}\\,\\text{W}}$（大于输送功率，不可能实际输电！）</p>
    <p>用 500 kV 时：$I = \\frac{10^9}{5 \\times 10^5} = 2 \\times 10^3\\,\\text{A}$；$P_{\\text{损}} = (2 \\times 10^3)^2 \\times 10 = \\mathbf{4.0 \\times 10^{7}\\,\\text{W}}$。电压提高50倍，损耗降低到原来的 1/2500。</p>

<div class="knowledge-card card-warning" id="ch19-misconceptions">

</div>

<!-- ==================== ch20s1: 电磁波的产生与传播 ==================== -->
<div class="knowledge-card card-definition" id="ch20s1">
  <span class="card-label label-def">20.1 核心概念</span>
  <h3>一、电磁波的产生与传播</h3>

  <h4>1. 电磁波的产生</h4>
  <p><strong>产生条件：</strong><strong>变化的电流</strong>能在周围空间中产生电磁波（麦克斯韦电磁理论的核心结论）。</p>
  <p><strong>实验验证：</strong>赫兹实验（1887年）——第一个用实验证实电磁波存在的人。</p>
  <p><strong>生活中的发射源：</strong>广播电台、电视台、手机基站的天线中都通有<strong>大小和方向快速变化的电流</strong>（振荡电流），向外发射电磁波。</p>

  <h4>2. 电磁波的传播</h4>
  <div class="card-key">
    <p><strong>核心特点：</strong>电磁波的传播<strong>不需要介质</strong>，在<strong>真空</strong>中也可以传播（与声波不同！）。</p>
  </div>
  <p><strong>真空中电磁波速度：</strong></p>
  <div class="formula-display">$$c = 3.0 \\times 10^8\\,\\text{m/s}$$</div>
  <p>真空中的电磁波速度等于<strong>光速</strong>——光本身就是一种电磁波。</p>
  <p><strong>在其他介质中：</strong>电磁波在空气、水、玻璃等介质中的速度<strong>小于</strong>真空中的速度（但通常仍非常快）。</p>

  <h4>3. 描述电磁波的物理量</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>物理量</th><th>符号</th><th>单位</th><th>含义</th></tr></thead>
    <tbody>
      <tr><td><strong>波速</strong></td><td>c(真空中) 或 v</td><td>m/s</td><td>电磁波传播的快慢</td></tr>
      <tr><td><strong>频率</strong></td><td>f</td><td>Hz</td><td>单位时间内完成振动的次数</td></tr>
      <tr><td><strong>波长</strong></td><td>λ</td><td>m</td><td>相邻两个波峰（或波谷）之间的距离</td></tr>
    </tbody>
  </table>
  </div>

  <h4>4. 波速、波长与频率的关系（中考必考公式）</h4>
  <div class="formula-display">$$c = f \\lambda$$</div>
  <p>c —— 电磁波在真空中的速度（固定值），f —— 频率，λ —— 波长。</p>
  <p><strong>重要结论：</strong>c 是定值 → 频率越<strong>大</strong>，波长越<strong>短</strong>（f 与 λ 成<strong>反比</strong>）。</p>

  <h4>5. 电磁波谱（按频率从低到高/波长从长到短排列）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>波段</th><th>频率范围</th><th>波长范围</th><th>主要应用</th></tr></thead>
    <tbody>
      <tr><td><strong>无线电波</strong></td><td>数Hz ~ 10<sup>9</sup> Hz</td><td>数千km ~ 0.3 m</td><td>广播、电视、通信、雷达</td></tr>
      <tr><td><strong>微波</strong></td><td>10<sup>9</sup> ~ 3×10<sup>11</sup> Hz</td><td>0.3 m ~ 1 mm</td><td>微波炉、卫星通信、雷达</td></tr>
      <tr><td><strong>红外线</strong></td><td>3×10<sup>11</sup> ~ 4×10<sup>14</sup> Hz</td><td>1 mm ~ 760 nm</td><td>遥控器、红外测温、热成像</td></tr>
      <tr><td><strong>可见光</strong></td><td>4×10<sup>14</sup> ~ 7.5×10<sup>14</sup> Hz</td><td>760 nm ~ 400 nm</td><td>人眼可见、照明、摄影</td></tr>
      <tr><td><strong>紫外线</strong></td><td>7.5×10<sup>14</sup> ~ 10<sup>17</sup> Hz</td><td>400 nm ~ 1 nm</td><td>杀菌消毒、验钞、促进维生素D合成</td></tr>
      <tr><td><strong>X射线</strong></td><td>10<sup>17</sup> ~ 10<sup>20</sup> Hz</td><td>1 nm ~ 10<sup>−3</sup> nm</td><td>医学透视（X光片）、安检、晶体结构分析</td></tr>
      <tr><td><strong>γ射线</strong></td><td>&gt; 10<sup>20</sup> Hz</td><td>&lt; 10<sup>−3</sup> nm</td><td>放射治疗、工业探伤、天体物理</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>记忆口诀：</strong>从无线电→微波→红外→可见光→紫外→X射线→γ射线，<strong>频率递增、波长递减</strong>。</p>

  <h4>6. 电磁波与声波的对比</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>比较项</th><th>电磁波</th><th>声波</th></tr></thead>
    <tbody>
      <tr><td><strong>产生</strong></td><td>变化的电流</td><td>物体振动</td></tr>
      <tr><td><strong>传播是否需要介质</strong></td><td><strong>不需要</strong>（真空中可传播）</td><td><strong>需要</strong>（真空中不能传播）</td></tr>
      <tr><td><strong>真空中速度</strong></td><td>3×10<sup>8</sup> m/s</td><td>0（无法传播）</td></tr>
      <tr><td><strong>本质</strong></td><td>电磁振荡的传播</td><td>机械振动的传播</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- ==================== ch20s2: 广播、电视与移动通信 ==================== -->
<div class="knowledge-card card-experiment" id="ch20s2">
  <span class="card-label label-experiment">20.2 应用实践</span>
  <h3>二、广播、电视与移动通信</h3>

  <h4>1. 无线电广播与电视的基本流程</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>环节</th><th>过程</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>① 调制</strong></td><td>把音频信号（低频）"加载"到高频振荡电流（载波）上</td><td>两种方式：<strong>调幅（AM）</strong>和<strong>调频（FM）</strong></td></tr>
      <tr><td><strong>② 发射</strong></td><td>通过天线将调制后的高频信号以电磁波形式向空间发射</td><td>天线尺寸与波长匹配</td></tr>
      <tr><td><strong>③ 接收</strong></td><td>接收天线感应出与发射信号同频率的高频振荡电流</td><td>通过<strong>调谐器</strong>选择特定频率（选台）</td></tr>
      <tr><td><strong>④ 解调</strong></td><td>从高频载波信号中"取出"音频信号（检波）</td><td>恢复为原来的声音/图像信号</td></tr>
      <tr><td><strong>⑤ 还原</strong></td><td>音频信号经放大后驱动扬声器发声；视频信号驱动显示器成像</td><td>完成信息传递</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 调幅（AM）与调频（FM）的区别</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>类型</th><th>变化方式</th><th>特点</th><th>应用</th></tr></thead>
    <tbody>
      <tr><td><strong>调幅（AM）</strong></td><td>用信号改变载波的<strong>振幅</strong></td><td>传播距离远，但<strong>抗干扰能力差</strong></td><td>中波、短波广播</td></tr>
      <tr><td><strong>调频（FM）</strong></td><td>用信号改变载波的<strong>频率</strong></td><td>传播距离近，但<strong>音质好、抗干扰强</strong></td><td>音乐广播、电视伴音</td></tr>
    </tbody>
  </table>
  </div>

  <h4>3. 移动通信（手机）</h4>
  <p><strong>基本原理：</strong>手机既是<strong>发射机</strong>也是<strong>接收机</strong>。它将声音转换为电信号，调制后以电磁波形式发射到<strong>基站</strong>，通过基站网络连接对方手机。</p>
  <p><strong>手机通信网络结构：</strong>手机 → 基站 → 交换中心 → 基站 → 对方手机。基站将覆盖区域分成一个个<strong>蜂房</strong>（蜂窝网络）——这就是为什么手机也叫"蜂窝电话"。</p>
</div>

<!-- ==================== ch20s3: 光纤通信 ==================== -->
<div class="knowledge-card card-key" id="ch20s3">
  <span class="card-label label-formula">20.3 核心考点</span>
  <h3>三、光纤通信</h3>

  <h4>1. 光纤通信的基本原理</h4>
  <p><strong>原理：</strong>利用<strong>光的全反射</strong>将携带信息的光信号在光纤（光导纤维）中传输。</p>
  <p><strong>光在光纤中传播的条件：</strong>光从光纤芯射向包层时，入射角<strong>大于临界角</strong>，发生全反射，光被"囚禁"在光纤芯中不断反射向前传输。</p>

  <h4>2. 光纤的结构</h4>
  <ul>
    <li><strong>纤芯：</strong>位于中心，由高折射率的玻璃或塑料制成，用于传输光信号</li>
    <li><strong>包层：</strong>包裹在纤芯外，由低折射率材料制成，确保全反射条件</li>
    <li><strong>涂覆层（保护层）：</strong>最外层，起保护作用</li>
  </ul>

  <h4>3. 光纤通信的优点</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>优点</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>传输容量大</strong></td><td>一根光纤可同时传输上百万路电话，远超电缆和微波</td></tr>
      <tr><td><strong>抗干扰能力强</strong></td><td>光信号不受电磁干扰，通信质量高</td></tr>
      <tr><td><strong>保密性好</strong></td><td>光被限制在光纤内，不向外辐射，极难被窃听</td></tr>
      <tr><td><strong>传输损耗小</strong></td><td>中继距离可达上百公里，减少放大站数量</td></tr>
      <tr><td><strong>材料资源丰富</strong></td><td>光纤主要原料是石英（SiO<sub>2</sub>），铝和铜资源有限</td></tr>
    </tbody>
  </table>
  </div>

  <h4>4. 光纤通信的基本流程</h4>
  <p>电信号 → <strong>光发射机</strong>（将电信号转换为光信号，光源是激光器/LED）→ <strong>光纤</strong>（光信号传输，全反射）→ <strong>光接收机</strong>（将光信号还原为电信号，光检测器是光电二极管）→ 电信号输出。</p>
</div>

<!-- ==================== ch20s4: 卫星通信与互联网 ==================== -->
<div class="knowledge-card card-experiment" id="ch20s4">
  <span class="card-label label-experiment">20.4 知识拓展</span>
  <h3>四、卫星通信与互联网</h3>

  <h4>1. 卫星通信</h4>
  <p><strong>原理：</strong>利用<strong>微波</strong>作为载体，通过<strong>通信卫星</strong>作为中继站，实现远距离通信。</p>
  <p><strong>通信卫星的工作位置：</strong>大多数通信卫星位于赤道上空<strong>36 000 km</strong>的<strong>地球同步轨道</strong>（静止轨道），卫星与地球自转同步，从地面看相对静止。</p>

  <h4>2. 卫星通信的特点</h4>
  <ul>
    <li><strong>覆盖范围广：</strong>三颗等间隔分布在赤道上空的同步卫星即可覆盖全球（除两极地区）</li>
    <li><strong>传输延迟：</strong>信号往返卫星约需 0.24 秒（距离远），通话时会有<strong>延迟感</strong></li>
    <li><strong>应用领域：</strong>越洋电视转播、全球卫星电话、GPS导航（中圆轨道卫星）、卫星互联网（低轨道卫星星座，如星链）</li>
  </ul>

  <h4>3. 互联网</h4>
  <p><strong>定义：</strong>互联网是全球最大的<strong>计算机网络</strong>，将世界各地数以亿计的计算机连接在一起，实现信息资源的共享。</p>
  <p><strong>物理基础：</strong>互联网的数据传输依赖于<strong>光纤网络</strong>（陆地骨干网和海底光缆）和<strong>卫星通信</strong>（偏远地区和移动场景）。</p>

  <h4>4. 通信方式的演变总结</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>时代</th><th>通信方式</th><th>载体</th><th>特点</th></tr></thead>
    <tbody>
      <tr><td>古代</td><td>烽火台、驿马</td><td>光信号、人力</td><td>速度慢、信息量极小</td></tr>
      <tr><td>近代</td><td>电报、电话</td><td>有线电信号</td><td>速度性飞跃（电流），但需铺设线路</td></tr>
      <tr><td>现代</td><td>无线电广播、电视</td><td>无线电波</td><td>摆脱线路束缚、覆盖广</td></tr>
      <tr><td>当代</td><td>光纤、卫星、互联网</td><td>光 + 微波 + 网络</td><td>超大容量、超高速度、全球化</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- 典型例题 -->
<div class="knowledge-card card-example" id="ch20-examples">
  <span class="card-label label-example">典型例题</span>
  <h3>典型例题精讲</h3>

  <div class="card-example">
    <h4>例1（电磁波波速公式计算）</h4>
    <p>某广播电台发射的电磁波频率为 100 MHz，求该电磁波的波长。（c = 3×10<sup>8</sup> m/s）</p>
    <p><strong>解：</strong>$\\lambda = \\frac{c}{f} = \\frac{3 \\times 10^8}{100 \\times 10^6} = \\frac{3 \\times 10^8}{10^8} = \\mathbf{3\\,\\text{m}}$。</p>
  </div>

  <div class="card-example">
    <h4>例2（电磁波谱排序）</h4>
    <p>将以下电磁波按频率从低到高排列：紫外线、无线电波、可见光、X射线、红外线、γ射线。</p>
    <p><strong>答：</strong>无线电波 &lt; 红外线 &lt; 可见光 &lt; 紫外线 &lt; X射线 &lt; γ射线。（频率递增 = 波长递减）</p>
  </div>

  <div class="card-example">
    <h4>例3（电磁波与声波对比）</h4>
    <p>宇航员在月球上面对面说话，对方听不到声音；但他们用无线电通信设备可以正常通话。请解释原因。</p>
    <p><strong>答：</strong>月球表面<strong>没有大气（真空）</strong>。声音传播需要介质（固体/液体/气体），真空不能传声→直接说话听不到。但电磁波的传播<strong>不需要介质</strong>，可以在真空中传播→无线电通信设备正常工作。</p>
  </div>
</div>

</div>

<!-- 易错辨析 -->
<div class="knowledge-card card-warning" id="ch20-misconceptions">
  <span class="card-label label-warning">易错辨析</span>
  <h3>常见误区</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>易错点</th><th>正确理解</th></tr></thead>
    <tbody>
      <tr><td>"电磁波在真空中不能传播"</td><td>错！电磁波<strong>不需要介质</strong>，在真空中传播最快（c = 3×10<sup>8</sup> m/s）。声波才需要介质。</td></tr>
      <tr><td>"电磁波中各波段速度不同"</td><td>错！所有频率的电磁波在<strong>真空中速度相同</strong>（都是 c）。在介质中不同频率速度略有差异（色散）。</td></tr>
      <tr><td>"波长越长，频率越高"</td><td>错！c = fλ 中 c 定值 → f 与 λ 成<strong>反比</strong>。波长越长的电磁波，频率反而<strong>越低</strong>。</td></tr>
      <tr><td>"光纤通信靠光的折射传播"</td><td>错！光纤通信靠的是光的<strong>全反射</strong>，不是普通折射。光在不同介质界面发生全反射，才能被束缚在纤芯中。</td></tr>
      <tr><td>"手机直接与另一手机通信"</td><td>错！手机通过<strong>基站</strong>中继，并非直接发送给另一手机。基站网络构成蜂窝通信系统。</td></tr>
      <tr><td>"紫外线对人体只有好处"</td><td>并非如此。适量紫外线可促进维生素D合成和杀菌；过量紫外线<strong>灼伤皮肤、增加皮肤癌风险</strong>、损伤眼睛。</td></tr>
      <tr><td>"同步卫星在地球任何地方都看得见"</td><td>错！地球同步卫星在赤道上空，<strong>两极地区</strong>看不到（被地球自身阻挡）。三颗同步卫星可覆盖全球除两极。</td></tr>
    </tbody>
  </table>
  </div>
</div>
`;

<!-- ==================== ch21s2: 核能——裂变与聚变 ==================== -->
<div class="knowledge-card card-key" id="ch21s2">
  <span class="card-label label-formula">21.2 核心考点</span>
  <h3>二、核能——裂变与聚变</h3>

  <h4>1. 核能（原子能）</h4>
  <p><strong>定义：</strong>原子核在发生变化（分裂或结合）时释放出来的巨大能量。</p>
  <p><strong>质能方程：</strong></p>
  <div class="formula-display">$$E = mc^2$$</div>
  <p>E —— 能量（J），m —— 质量（kg），c —— 真空中光速（3×10<sup>8</sup> m/s）。</p>
  <p><strong>含义：</strong>物体质量减小（质量亏损）时，会释放出巨大的能量。即使只有极小的质量亏损，也能释放巨大的能量（因为乘以c<sup>2</sup> = 9×10<sup>16</sup>）。</p>

  <h4>2. 核裂变（Fission）</h4>
  <p><strong>定义：</strong>质量较大的<strong>重核</strong>（如铀-235）被中子轰击后<strong>分裂</strong>成两个中等质量的核，同时释放出<strong>2~3个中子</strong>和大量能量。</p>
  <p><strong>链式反应：</strong>裂变产生的新中子继续轰击其他铀核，引发更多裂变→反应持续进行，核能不断释放。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>链式反应的控制</th><th>装置</th><th>应用</th></tr></thead>
    <tbody>
      <tr><td><strong>不加控制</strong>（瞬时大量裂变）</td><td>原子弹</td><td>军事武器</td></tr>
      <tr><td><strong>人工控制</strong>（缓慢平稳释放）</td><td>核反应堆</td><td>核电站（发电）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>3. 核电站的工作原理</h4>
  <p><strong>能量转化过程：</strong></p>
  <div class="formula-display">核能 → 内能（蒸汽热能） → 机械能（汽轮机） → 电能（发电机）</div>
  <p><strong>核心结构：</strong>① <strong>核反应堆</strong>（核燃料发生链式裂变，释放核能）；② <strong>控制棒</strong>（吸收中子，调节反应速率）；③ <strong>冷却剂</strong>（将核能转化产生的热能带出）；④ <strong>防护层</strong>（防止核辐射泄漏）。</p>
  <p><strong>核能的优点：</strong>① 能量密度极高（1 kg 铀 ≈ 2500 吨煤）；② 不排放CO<sub>2</sub>、SO<sub>2</sub>等温室气体和酸性气体；③ 燃料运输量小。</p>
  <p><strong>核能的问题：</strong>① 核废料处理困难（放射性持续数万年）；② 核泄漏风险（切尔诺贝利、福岛）；③ 核扩散风险。</p>

  <h4>4. 核聚变（Fusion）</h4>
  <p><strong>定义：</strong>质量较小的<strong>轻核</strong>（如氢的同位素氘和氚）在<strong>极高温度</strong>下结合成较重的核，同时释放出巨大能量。</p>
  <p><strong>应用：</strong>① <strong>氢弹</strong>（不可控聚变，用原子弹引爆产生高温）；② <strong>可控核聚变</strong>——人类终极能源梦想（如ITER国际热核聚变实验反应堆、中国"东方超环"EAST），目前仍在试验阶段。</p>

  <h4>5. 裂变与聚变的对比</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>比较项</th><th>核裂变</th><th>核聚变</th></tr></thead>
    <tbody>
      <tr><td><strong>原理</strong></td><td>重核分裂</td><td>轻核结合</td></tr>
      <tr><td><strong>燃料</strong></td><td>铀-235、钚-239</td><td>氘（D）、氚（T）</td></tr>
      <tr><td><strong>条件</strong></td><td>中子轰击</td><td>极高温度（数百万度以上）</td></tr>
      <tr><td><strong>可控性</strong></td><td>已实现可控（核电站）</td><td>受控聚变仍处于实验阶段</td></tr>
      <tr><td><strong>放射性废物</strong></td><td>较多</td><td>极少</td></tr>
      <tr><td><strong>燃料资源</strong></td><td>有限</td><td>丰富（海水中的氘取之不尽）</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- ==================== ch21s3: 太阳能 ==================== -->
<div class="knowledge-card card-experiment" id="ch21s3">
  <span class="card-label label-experiment">21.3 知识拓展</span>
  <h3>三、太阳能</h3>

  <h4>1. 太阳能——人类能源的宝库</h4>
  <p><strong>本质：</strong>太阳能来自太阳内部的<strong>核聚变</strong>反应。太阳每秒向宇宙空间辐射的能量中，到达地球的仅约<strong>二十亿分之一</strong>，但这已相当于全世界一年能源消耗总量的数万倍。</p>

  <h4>2. 人类利用太阳能的三种主要途径</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>途径</th><th>原理</th><th>实例</th></tr></thead>
    <tbody>
      <tr><td><strong>光热转化</strong></td><td>利用太阳能集热器将太阳辐射能转化为内能（热能）</td><td>太阳能热水器、太阳灶、太阳能干燥</td></tr>
      <tr><td><strong>光电转化</strong></td><td>利用<strong>太阳能电池</strong>（光伏电池）将光能直接转化为电能</td><td>太阳能路灯、光伏电站、太阳能计算器、航天器太阳能电池板</td></tr>
      <tr><td><strong>光化学转化</strong></td><td>通过植物<strong>光合作用</strong>将光能转化为化学能储存</td><td>绿色植物、藻类（间接：化石能源本质上是远古储存的太阳能）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>3. 太阳能的优点和局限性</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>优点</th><th>局限性</th></tr></thead>
    <tbody>
      <tr><td>① 取之不尽、用之不竭（可再生能源）</td><td>① 能量<strong>分散</strong>（单位面积受热功率小，约 1 kW/m<sup>2</sup>）</td></tr>
      <tr><td>② 清洁无污染（不排放温室气体和污染物）</td><td>② <strong>不稳定</strong>（受天气、昼夜、季节影响，需储能装置配合）</td></tr>
      <tr><td>③ 分布广泛、无需运输</td><td>③ 太阳能电池制造成本仍较高</td></tr>
    </tbody>
  </table>
  </div>

  <h4>4. 间接太阳能</h4>
  <p>风能（太阳加热空气→气压差→风）、水能（太阳蒸发水→降雨→河流）、生物质能（光合作用）、化石能源（远古生物储存的太阳能）——追根溯源，<strong>绝大多数能源都来自太阳能</strong>。例外：核能（原子核内部能量）、地热能（地球内部热量）、潮汐能（天体引力）。</p>
</div>

<!-- ==================== ch21s4: 能源与可持续发展 ==================== -->
<div class="knowledge-card card-warning" id="ch21s4">
  <span class="card-label label-warning">21.4 实践应用</span>
  <h3>四、能源与可持续发展</h3>

  <h4>1. 能源消耗引发的环境问题</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>问题</th><th>原因</th><th>后果</th></tr></thead>
    <tbody>
      <tr><td><strong>温室效应</strong></td><td>大量燃烧化石能源 → CO<sub>2</sub> 排放激增 → 大气保温</td><td>全球变暖、冰川融化、海平面上升、极端天气增多</td></tr>
      <tr><td><strong>酸雨</strong></td><td>燃烧含硫煤和石油 → SO<sub>2</sub>、NO<sub>x</sub> 排放 → 形成硫酸、硝酸</td><td>土壤酸化、森林死亡、水体污染、建筑腐蚀</td></tr>

      <tr><td><strong>能源枯竭</strong></td><td>过度开采不可再生能源</td><td>能源危机、价格暴涨</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 可持续发展的能源策略</h4>
  <ol>
    <li><strong>节约能源</strong>——提高能源利用效率（节能灯、节能建筑、新能源汽车）</li>
    <li><strong>开发新能源</strong>——大力发展太阳能、风能、核能、氢能、生物质能等</li>
    <li><strong>优化能源结构</strong>——减少化石能源比例，提高清洁能源占比</li>
    <li><strong>能源梯级利用</strong>——如热电联产，提高综合能效</li>
    <li><strong>加强环保措施</strong>——脱硫脱硝、碳捕获与封存（CCS）技术</li>
  </ol>

  <h4>3. 材料科学与社会发展</h4>
  <p><strong>材料的分类：</strong>① <strong>金属材料</strong>（钢铁、合金、铝、铜）；② <strong>无机非金属材料</strong>（陶瓷、玻璃、水泥）；③ <strong>有机高分子材料</strong>（塑料、橡胶、纤维）；④ <strong>复合材料</strong>（碳纤维、玻璃钢、钢筋混凝土）；⑤ <strong>纳米材料</strong>（碳纳米管、石墨烯）。</p>
  <p><strong>新材料的前沿方向：</strong>超导材料（零电阻、完全抗磁性——磁悬浮列车）、形状记忆合金、光电转换材料（钙钛矿太阳能电池）、生物医用材料等。材料是科技进步的物质基础——从石器时代到青铜时代到铁器时代到硅时代，每一次文明跃迁都以新材料为标志。</p>

  <h4>4. 未来能源展望</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>方向</th><th>现状</th><th>前景</th></tr></thead>

      <tr><td><strong>智能电网</strong></td><td>各国正在推进</td><td>物联网+储能协调多能源互补，解决可再生能源波动性问题</td></tr>

<!-- 典型例题 -->
<div class="knowledge-card card-example" id="ch21-examples">
  <span class="card-label label-example">典型例题</span>
  <h3>典型例题精讲</h3>

  <div class="card-example">
    <h4>例1（能源分类辨析）</h4>
    <p>下列能源中：煤、太阳能、风能、核能、电能、石油、天然气、水能。请将其分别归类：(1)一次能源有哪些？(2)可再生能源有哪些？(3)清洁能源有哪些？</p>
    <p><strong>答：</strong>(1)一次能源：煤、太阳能、风能、核能、石油、天然气、水能（直接从自然界获取）。电能是二次能源（由其他能源转化而来）。 (2)可再生能源：太阳能、风能、水能。 (3)清洁能源：太阳能、风能、水能（核能在发电过程中不排CO<sub>2</sub>，但存在核废料和辐射风险，一般不将其归入"清洁能源"，但属于"低碳能源"）。</p>
  </div>

  <div class="card-example">
    <h4>例2（裂变与聚变辨析）</h4>
    <p>原子弹和氢弹都是核武器，原理有何不同？核电站利用的是哪种核反应？</p>
    <p><strong>答：</strong>原子弹利用<strong>核裂变</strong>（重核铀-235/钚-239分裂，链式反应不加控制）；氢弹利用<strong>核聚变</strong>（轻核氘与氚在高温下结合），氢弹需用原子弹引爆产生高温条件。核电站利用的是<strong>受控核裂变</strong>——通过控制棒吸收中子来控制反应速率，使能量平稳释放。</p>
  </div>

  <div class="card-example">
    <h4>例3（能量转化分析）</h4>
    <p>写出以下过程中的能量转化：① 太阳能电池板工作；② 核电站发电；③ 植物光合作用。</p>
    <p><strong>答：</strong>① 太阳能电池板：<strong>太阳能 → 电能</strong>（光电转化）。② 核电站：<strong>核能 → 内能（蒸汽热能）→ 机械能（汽轮机）→ 电能</strong>。③ 光合作用：<strong>光能 → 化学能</strong>（光化学转化，储存在有机物中）。</p>
  </div>
</div>

<!-- 易错辨析 -->
<div class="knowledge-card card-warning" id="ch21-misconceptions">
  <span class="card-label label-warning">易错辨析</span>
  <h3>常见误区</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>易错点</th><th>正确理解</th></tr></thead>
    <tbody>
      <tr><td>"电能是一次能源"</td><td>错！电能是由其他能源<strong>转化</strong>得来的，是<strong>二次能源</strong>。发电机不"产生"能量，只转化能量。</td></tr>
      <tr><td>"核能是可再生能源"</td><td>错！核燃料（铀矿）储量有限、不可再生。核能是<strong>不可再生</strong>的一次能源。但如果未来实现可控核聚变（燃料氘在海水中取之不尽），则视为可再生。</td></tr>

  // Chapter level toggle (expand sections)
  const chToggle = e.target.closest('.chapter-toggle');
  if (chToggle) {
    const sublist = chToggle.nextElementSibling;
    if (!sublist || !sublist.classList.contains('section-sublist')) return;
    const isOpen = chToggle.classList.contains('open');
    if (isOpen) { chToggle.classList.remove('open'); sublist.classList.add('collapsed'); chToggle.setAttribute('aria-expanded','false'); sublist.setAttribute('aria-hidden','true'); }
    else { chToggle.classList.add('open'); sublist.classList.remove('collapsed'); chToggle.setAttribute('aria-expanded','true'); sublist.removeAttribute('aria-hidden'); }

  if (chLink) {

const menuToggle = document.getElementById('menuToggle');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebarOverlay');
menuToggle.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); document.body.classList.toggle('sidebar-open'); });
overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); });
// Use event delegation for chapter links (they're dynamically rendered)
document.getElementById('sidebarNav').addEventListener('click', e => {
  const link = e.target.closest('.chapter-link, .section-link');
  if (link && window.innerWidth <= 768) { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); }
});

// ===== Search =====
let searchIndex = [];

function buildSearchIndex() {
  searchIndex = [];
  COURSE.forEach(g => {
    g.chapters.forEach(ch => {
      searchIndex.push({ type:'chapter', title:ch.title, chapter:ch.title, grade:g.label, id:ch.id, n:ch.n });
      ch.sections.forEach(s => {
        searchIndex.push({ type:'section', title:s.t, chapter:ch.title, grade:g.label, id:s.id, n:ch.n });
      });
      // Also index chapter content text for full-text search
      if (CHAPTER_CONTENT[ch.id]) {
        const text = CHAPTER_CONTENT[ch.id].replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        if (text.length > 0) {
          searchIndex.push({ type:'content', title:ch.title, content:text, chapter:ch.title, grade:g.label, id:ch.id, n:ch.n });
        }
      }
    });
  });
}

// ===== Init =====
buildSearchIndex();
renderAllChapters();
// Reprocess MathJax for dynamically rendered content
if (window.MathJax && MathJax.typesetPromise) {
  MathJax.typesetPromise([document.getElementById('chapterContainer')]).catch(console.error);
}

// Scroll spy - tracks both chapter and section
const spyObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.chapter-link.active, .chapter-toggle.active, .section-link.active').forEach(l => l.classList.remove('active'));
      // Try chapter match first
      const chLink = document.querySelector(`.chapter-link[data-ch="${e.target.id}"], .chapter-toggle[data-ch="${e.target.id}"]`);
      if (chLink) { chLink.classList.add('active'); return; }
      // Then section match
      const secLink = document.querySelector(`.section-link[data-sec="${e.target.id}"]`);
      if (secLink) {
        secLink.classList.add('active');
        // Also highlight parent chapter
        const parentCh = secLink.closest('.chapter-group');
        if (parentCh) {
          const pLink = parentCh.querySelector('.chapter-link, .chapter-toggle');
          if (pLink) pLink.classList.add('active');
        }
      }
    }
  });
}, { rootMargin: '-15% 0px -75% 0px' });
document.querySelectorAll('.chapter, .knowledge-card[id]').forEach(s => spyObserver.observe(s));

// ===== Search Handlers =====
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
let searchDebounce;

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const q = searchInput.value.trim().toLowerCase();
    if (q.length < 1) { searchResults.classList.remove('visible'); return; }
    const allMatches = searchIndex.filter(item =>
      item.title.toLowerCase().includes(q) || item.chapter.toLowerCase().includes(q) || item.grade.toLowerCase().includes(q) || (item.content && item.content.toLowerCase().includes(q))
    );
    const totalCount = allMatches.length;
    const matches = allMatches.slice(0, 15);
    if (matches.length === 0) {
      searchResults.innerHTML = '<div class="no-results">未找到相关知识点，请尝试其他关键词</div>';
    } else {
      searchResults.innerHTML = matches.map(m =>
        `<a href="#${m.id}" class="search-result-item">
          <div class="sr-title">${m.title}</div>
          <div class="sr-chapter">第${m.n}章 ${m.chapter} · ${m.grade}</div>
        </a>`
      ).join('') + (totalCount > 15 ? `<div class="no-results">显示 15/${totalCount} 条结果，请输入更精确的关键词</div>` : '');
    }
    searchResults.classList.add('visible');
  }, 200);
});

// Keyboard: Ctrl+K or / to focus search
document.addEventListener('keydown', e => {
  if ((e.ctrlKey && e.key === 'k') || (e.key === '/' && document.activeElement !== searchInput && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA')) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  if (e.key === 'Escape' && searchResults.classList.contains('visible')) {
    searchResults.classList.remove('visible');
    searchInput.blur();
  }
});

document.addEventListener('click', e => { if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) searchResults.classList.remove('visible'); });
searchResults.addEventListener('click', e => {
  const link = e.target.closest('.search-result-item');
  if (link) { searchResults.classList.remove('visible'); searchInput.value = ''; if (window.innerWidth <= 768) { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); } }
});

// ===== To-Top Button =====
const toTop = document.getElementById('toTop');
window.addEventListener('scroll', () => { toTop.classList.toggle('visible', window.scrollY > 500); });

</script>
</body>
</html>
