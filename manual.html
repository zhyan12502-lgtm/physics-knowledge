<!-- §17.2 能源 -->
<!-- ================================================================================== -->
<div class="section-title" id="s17-2">§17.2 能源</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">分类</span>
  <h3>一、能源的分类——一次能源与二次能源</h3>
  <p><strong>一次能源</strong>：可以<strong>直接从自然界获取</strong>的能源，不需经过人工加工转化。例如：煤、石油、天然气、太阳能、风能、水能、地热能、核燃料（铀矿）、生物质能、潮汐能。</p>
  <p><strong>二次能源</strong>：由一次能源经过<strong>加工或转化</strong>而得到的能源。例如：电能、汽油（由石油炼制）、柴油、煤油、氢能（需通过电解水或天然气重整制取）、液化气、酒精（由生物质发酵蒸馏）。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>维度</th><th>一次能源</th><th>二次能源</th></tr></thead>
    <tbody>
      <tr><td><strong>定义</strong></td><td>直接从自然界获取，不需加工转化</td><td>由一次能源加工、转化后得到</td></tr>
      <tr><td><strong>本质区别</strong></td><td>"原材料"——大自然的直接馈赠</td><td>"产品"——人工加工后的能源载体</td></tr>
      <tr><td><strong>典型例子</strong></td><td>煤、石油、天然气、阳光、风、水流、地热</td><td>电能、汽油、柴油、氢能、液化气</td></tr>
      <tr><td><strong>判断技巧</strong></td><td>问："不经过工厂/发电站，大自然直接给不给？"能→一次能源</td><td>问："是不是需要人用机器/设备加工转换过的？"是→二次能源</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>最容易混淆的判例</strong>：电能是<strong>二次能源</strong>——自然界不存在可以直接使用的"电矿"，电必须通过发电机（火电、水电、风电、核电等）将其他能源转化而来。同理，汽油也是二次能源——是石油（一次能源）经过分馏炼制得到的。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">分类</span>
  <h3>二、不可再生能源与可再生能源</h3>

  <h4>不可再生能源</h4>
  <p><strong>不可再生能源</strong>：在自然界中经过亿万年地质年代形成，<strong>储量有限</strong>、短期内<strong>无法得到补充</strong>，用一点少一点的能源。主要包括：</p>
  <ul>
    <li><strong>化石能源</strong>：煤、石油、天然气——古代动植物遗体在特定地质条件下经亿万年演变形成。当前探明储量有限，按目前消耗速度，石油约可用40～50年，天然气约60～70年，煤约200年。</li>
    <li><strong>核燃料</strong>：铀（U-235）、钚等——用于核裂变发电的原料。铀矿在地球上储量也有限，也是不可再生的。</li>
  </ul>

  <h4>可再生能源</h4>
  <p><strong>可再生能源</strong>：在自然界中可以<strong>不断再生</strong>、<strong>短期内得到补充</strong>的能源，取之不尽、用之不竭。主要包括：</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>可再生能源类型</th><th>能量来源</th><th>利用方式</th></tr></thead>
    <tbody>
      <tr><td><strong>太阳能</strong></td><td>太阳内部核聚变反应辐射出的能量</td><td>太阳能热水器、光伏发电、太阳灶</td></tr>
      <tr><td><strong>风能</strong></td><td>太阳辐射使大气受热不均→空气流动</td><td>风力发电（风力发电机）</td></tr>
      <tr><td><strong>水能</strong></td><td>太阳辐射→水蒸发→降水→河流（水的重力势能）</td><td>水力发电（水电站——三峡水电站）</td></tr>
      <tr><td><strong>生物质能</strong></td><td>植物通过光合作用固定的太阳能</td><td>薪柴燃烧、沼气发酵、生物乙醇</td></tr>
      <tr><td><strong>地热能</strong></td><td>地球内部放射性元素衰变产生的热量</td><td>地热发电、地热供暖、温泉</td></tr>
      <tr><td><strong>潮汐能</strong></td><td>月球和太阳对地球的引力→海水周期性涨落</td><td>潮汐电站（涨潮蓄水、落潮放水发电）</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>辨析关键</strong>：判断可再生or不可再生，看"在人类可预见的时间范围内能否自然补充"。太阳能、风能、水能来自太阳辐射——只要太阳还在发光，它们就源源不断→可再生。煤、石油、天然气形成需要亿万年→对人类历史而言不可再生。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">分类</span>
  <h3>三、常规能源与新能源</h3>
  <p><strong>常规能源（传统能源）</strong>：技术上已经<strong>成熟</strong>、已被人类<strong>大规模</strong>长期使用的能源。主要包括：<strong>煤、石油、天然气、水能</strong>（注意：水能虽是可再生能源，但因已大规模利用多年，归入常规能源）。</p>
  <p><strong>新能源</strong>：相对于常规能源而言，正在<strong>积极研发</strong>和<strong>逐步推广</strong>利用、目前尚未大规模普及的能源。主要包括：<strong>太阳能、风能、核能、地热能、海洋能（潮汐能/波浪能/温差能）、氢能</strong>。</p>

  <div class="formula-block">
    $\\text{一种能源可以同时属于多个分类维度}$
  </div>

  <p><strong>多维度分类举例</strong>（中考常见设问——要求同时判定多个分类属性）：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>能源</th><th>一次/二次</th><th>可再生/不可再生</th><th>常规/新能源</th></tr></thead>
    <tbody>
      <tr><td><strong>煤</strong></td><td>一次能源</td><td>不可再生能源</td><td>常规能源</td></tr>
      <tr><td><strong>石油</strong></td><td>一次能源</td><td>不可再生能源</td><td>常规能源</td></tr>
      <tr><td><strong>天然气</strong></td><td>一次能源</td><td>不可再生能源</td><td>常规能源</td></tr>
      <tr><td><strong>太阳能</strong></td><td>一次能源</td><td>可再生能源</td><td>新能源</td></tr>
      <tr><td><strong>风能</strong></td><td>一次能源</td><td>可再生能源</td><td>新能源</td></tr>
      <tr><td><strong>水能</strong></td><td>一次能源</td><td>可再生能源</td><td>常规能源（已大规模利用多年）</td></tr>
      <tr><td><strong>核能</strong></td><td>一次能源（铀矿直接开采）</td><td>不可再生能源</td><td>新能源</td></tr>
      <tr><td><strong>电能</strong></td><td>二次能源</td><td>——（不适用，本身是加工产物）</td><td>——</td></tr>
      <tr><td><strong>汽油</strong></td><td>二次能源</td><td>——</td><td>常规能源</td></tr>
      <tr><td><strong>氢能</strong></td><td>二次能源（需制取）</td><td>——（但原料水可再生）</td><td>新能源</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>"水能"的特殊地位</strong>：水能既是可再生能源（靠太阳能驱动水循环→水源源不断），又是常规能源（水力发电已有百年以上大规模利用史——三峡、葛洲坝等）。这是三个分类维度交叉后最特殊的案例，中考辨析题高频出现。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">辨析</span>
  <h3>四、化石能源的形成与有限性</h3>
  <p><strong>煤的形成</strong>：古代植物遗体被埋藏在地层中，在<strong>缺氧、高温、高压</strong>的条件下，经过亿万年复杂的地质化学变化逐渐形成。煤是固体化石燃料，主要成分是碳。</p>
  <p><strong>石油和天然气的形成</strong>：古代海洋生物（浮游生物、藻类等）遗体沉积在海底，被泥沙覆盖，在<strong>高温、高压、缺氧</strong>条件下经过亿万年分解转化形成。石油是液态，天然气是气态（主要成分是甲烷 CH₄）。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>化石能源</th><th>状态</th><th>主要成分</th><th>形成物质来源</th><th>预计可采年限</th></tr></thead>
    <tbody>
      <tr><td><strong>煤</strong></td><td>固体</td><td>碳（C）</td><td>古代植物</td><td>约 200 年</td></tr>
      <tr><td><strong>石油</strong></td><td>液体</td><td>碳氢化合物（烃类）</td><td>古代海洋生物</td><td>约 40～50 年</td></tr>
      <tr><td><strong>天然气</strong></td><td>气体</td><td>甲烷（CH₄）</td><td>古代海洋生物</td><td>约 60～70 年</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>燃烧产物与环境污染</strong>：煤燃烧产生 CO₂（温室气体）、SO₂（酸雨）、烟尘等；石油燃烧产生 CO₂、CO、NOₓ、碳氢化合物；天然气燃烧相对清洁（主要产物 CO₂ 和 H₂O）。这也是推动向清洁能源转型的重要驱动力。</p>
  <p><strong>能源危机意识</strong>：化石能源是地球亿万年积累的"能源存款"，人类在短短几百年内正快速消耗殆尽。开发新能源、提高能源利用效率、节约能源是人类社会可持续发展的必然要求。</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">探究活动</span>
  <h3>五、生活中常见能源的识别与归类</h3>
  <p><strong>日常能源识别练习</strong>——判断以下生活场景中涉及的能源的完整分类属性：</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>生活场景</th><th>涉及的能源</th><th>一次/二次</th><th>可再生/不可再生</th><th>常规/新能源</th></tr></thead>
    <tbody>
      <tr><td>烧煤取暖</td><td>煤</td><td>一次</td><td>不可再生</td><td>常规</td></tr>
      <tr><td>开燃气灶做饭</td><td>天然气</td><td>一次</td><td>不可再生</td><td>常规</td></tr>
      <tr><td>开电动车出行</td><td>电能</td><td>二次</td><td>——</td><td>——</td></tr>
      <tr><td>太阳能路灯</td><td>太阳能</td><td>一次</td><td>可再生</td><td>新能源</td></tr>
      <tr><td>风力发电场</td><td>风能→电能</td><td>一次→二次</td><td>可再生</td><td>新能源→——</td></tr>
      <tr><td>三峡水电站</td><td>水能→电能</td><td>一次→二次</td><td>可再生</td><td>常规→——</td></tr>
      <tr><td>沼气池</td><td>生物质能→沼气（CH₄）</td><td>一次→二次</td><td>可再生</td><td>新能源</td></tr>
      <tr><td>加汽油</td><td>汽油</td><td>二次</td><td>——</td><td>常规</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>多步转化链的判定</strong>：当能源经过多步转化时，每一步的能源性质都要分别判断。例如"煤→燃烧→蒸汽→汽轮机→发电机→电能"：煤是一次能源，电能是二次能源。风力发电：风能是一次能源（可再生、新能源），转化成电能后，电能是二次能源。</p>
</div>

<!-- ================================================================================== -->
<!-- §17.3 新能源的开发与利用 -->
<!-- ================================================================================== -->
<div class="section-title" id="s17-3">§17.3 新能源的开发与利用</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心</span>
  <h3>一、太阳能——地球上最大的能量来源</h3>
  <p><strong>太阳能的本质</strong>：太阳内部持续发生<strong>核聚变</strong>反应（氢核聚变为氦核），释放出巨大的能量。太阳每秒钟辐射到地球的能量高达 $1.7 \\times 10^{17}\\,\\mathrm{J}$，大约相当于全世界一年总能耗的<strong>三万倍</strong>。</p>

  <h4>太阳能的三大利用方式</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>利用方式</th><th>原理</th><th>能量转化</th><th>典型应用</th></tr></thead>
    <tbody>
      <tr><td><strong>光热转化</strong></td><td>利用集热器吸收太阳辐射→使介质（水/油）升温</td><td>光能 → 内能</td><td>太阳能热水器、太阳灶、太阳能干燥器</td></tr>
      <tr><td><strong>光电转化</strong></td><td>利用半导体材料的光伏效应——光子激发电子跃迁→产生电动势</td><td>光能 → 电能</td><td>太阳能电池（光伏板）、太阳能发电站、太阳能路灯、太阳能计算器</td></tr>
      <tr><td><strong>光化转化</strong></td><td>利用光能驱动化学反应——植物光合作用是最典型的光化转化</td><td>光能 → 化学能</td><td>绿色植物光合作用、人工光合成（研发中）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>太阳能的优点与局限</h4>
  <p><strong>优点</strong>：① 取之不尽、用之不竭（可再生能源）；② 清洁无污染，不产生温室气体和有害排放；③ 分布广泛，无需运输，就地可用。</p>
  <p><strong>局限</strong>：① 能量密度低——单位面积接收的能量有限，需要大面积的集热器或光伏板；② 受天气和昼夜影响大——阴雨天、夜晚无法有效利用；③ 储存困难——目前储能技术（蓄电池）成本高、容量有限。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心</span>
  <h3>二、核能——原子核内部蕴藏的巨大能量</h3>
  <p><strong>核能</strong>：原子核在发生变化时释放出的能量，也叫<strong>原子能</strong>。主要有两种释放方式：<strong>核裂变</strong>（重核分裂为中等质量的核释放能量）和<strong>核聚变</strong>（轻核结合为重核释放能量）。</p>

  <h4>1. 核裂变</h4>
  <p>重原子核（如铀-235）在中子轰击下<strong>分裂</strong>为两个中等质量的原子核，同时释放出<strong>2～3个中子</strong>和<strong>巨大能量</strong>。释放的中子继续轰击其他铀核→引发<strong>链式反应</strong>——反应一旦开始就自持进行下去。</p>
  <p><strong>链式反应的控制</strong>：核电站中利用<strong>控制棒</strong>（含镉、硼等能吸收中子的材料）吸收部分中子，使链式反应以可控速度进行（平均每次裂变只有一个中子引发下一次裂变）。若不控制→短时间内释放全部能量→原子弹。</p>

  <h4>2. 核电站的工作原理——能量转化链</h4>
  <p>核电站的核心能量转化链条（中考高频考点）：</p>
  <div class="formula-block">
    $\\text{核能}\\;\\xrightarrow{\\text{核裂变}}\\;\\text{内能（热能）}\\;\\xrightarrow{\\text{加热水}}\\;\\text{水蒸气内能}\\;\\xrightarrow{\\text{推动汽轮机}}\\;\\text{机械能}\\;\\xrightarrow{\\text{带动发电机}}\\;\\text{电能}$
  </div>
  <p><strong>每一步的装置对应</strong>：核燃料（铀-235）→反应堆（核裂变→产热）→一回路冷却剂（将热量带出堆芯）→蒸汽发生器（一回路热量传给二回路水→产生高温高压水蒸气）→汽轮机（水蒸气推动转动）→发电机（转子转动切割磁感线发电）→输出电能。</p>

  <h4>3. 核电站的安全防护</h4>
  <ul>
    <li><strong>多重防护屏障</strong>：燃料包壳→压力容器→安全壳（厚达1m以上的钢筋混凝土+钢衬）——"纵深防御"原则。</li>
    <li><strong>控制棒自动停堆</strong>：一旦出现异常，控制棒自动落入堆芯吸收中子→链式反应立即终止。</li>
    <li><strong>冷却系统冗余设计</strong>：多套独立冷却系统确保堆芯始终得到充分冷却，防止堆芯熔毁。</li>
  </ul>

  <h4>4. 核废料处理</h4>
  <p>核废料具有<strong>高放射性</strong>、持续数万年的危害性。其处理是核能利用面临的最大挑战之一。处理方式：先在核电站内水池中<strong>冷却储存</strong>数年→再运至专门的<strong>深地质处置库</strong>（地下数百米稳定岩层中）永久封存。低放射性废料经压缩、固化后浅层填埋。我国正积极推进高放废液玻璃固化技术和深地质处置研究。</p>

  <h4>5. 核聚变——未来的能源希望</h4>
  <p><strong>核聚变</strong>：轻原子核（氢的同位素——氘和氚）在超高温（上亿摄氏度）下结合成较重的原子核（氦），释放出比核裂变更大的能量。太阳的能量就来自核聚变。核聚变的优点：燃料（氘）可从海水中提取，近乎无限；产物为无放射性的氦，清洁无污染。但目前技术难题——"可控核聚变"需将上亿摄氏度的高温等离子体约束在磁场中（托卡马克装置），仍处于实验阶段（如国际热核聚变实验堆 ITER）。</p>

  <p><strong>初中考试要点</strong>：知道核电站能量转化链（核能→内能→机械能→电能），知道核裂变和链式反应的基本概念，知道核聚变是太阳的能量来源，知道核能属于一次能源/不可再生能源/新能源。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">应用</span>
  <h3>三、风能与水能——利用自然界的动能和势能</h3>

  <h4>一、风能</h4>
  <p><strong>风能</strong>：空气<strong>流动</strong>（风）所具有的<strong>动能</strong>。风的形成源于太阳辐射使地球表面受热不均→产生气压差→空气从高压区流向低压区。因此风能的根本来源是<strong>太阳能</strong>。</p>
  <p><strong>风力发电</strong>：风吹动风力机的<strong>风轮（叶片）</strong>旋转→将风的动能转化为风轮的机械能→通过传动装置带动<strong>发电机</strong>转子旋转→产生电能。能量转化链：<strong>风的动能→风轮的机械能→电能</strong>。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>优点</th><th>局限</th></tr></thead>
    <tbody>
      <tr><td>清洁无污染，运行中不排放任何温室气体</td><td>发电量<strong>不稳定</strong>——风大时多发电，无风时停转，输出功率波动大</td></tr>
      <tr><td>可再生能源，取之不尽</td><td>受<strong>地域限制</strong>——需要年平均风速较大的地区（沿海、高原、山口等）</td></tr>
      <tr><td>占地面积相对较小（风机之间还可耕种）</td><td>占用较大空间，对鸟类迁徙有一定影响，有噪声</td></tr>
    </tbody>
  </table>
  </div>

  <h4>二、水能</h4>
  <p><strong>水能</strong>：流动的水所具有的<strong>动能</strong>，其根本来源是水的<strong>重力势能</strong>（水从高处流向低处）。水循环由太阳能驱动→水蒸发→降水→形成河流→水能本质上间接来源于<strong>太阳能</strong>。</p>
  <p><strong>水力发电</strong>：水从高处流下（或从水库释放），冲动<strong>水轮机</strong>旋转→将水流的动能（来自重力势能）转化为水轮机的机械能→水轮机带动<strong>发电机</strong>转子旋转→产生电能。能量转化链：<strong>水的重力势能→水的动能→水轮机的机械能→电能</strong>。</p>

  <h4>三峡水电站</h4>
  <p>三峡水电站是世界上<strong>装机容量最大的水电站</strong>（总装机容量 2250 万千瓦，年发电量约 1000 亿千瓦时）。它利用长江三峡段巨大的<strong>落差</strong>（水位差约 113 米）和<strong>流量</strong>（平均约 14000 m³/s），将水的重力势能转化为电能，为中国华东、华中、华南地区提供大量清洁电力。</p>

  <h4>小水电</h4>
  <p>装机容量在 5 万千瓦以下的水电站称为<strong>小水电</strong>。在我国农村和偏远山区，小水电利用山区溪流的落差和流量发电，建设成本相对较低，可就地供电，具有重要的民生意义。</p>

  <h4>水能的综合评价</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>优点</th><th>局限</th></tr></thead>
    <tbody>
      <tr><td>清洁、可再生、发电成本低（建成后无燃料成本）</td><td>大型水坝建设淹没大量土地，影响流域生态（鱼类洄游受阻、泥沙淤积等）</td></tr>
      <tr><td>发电稳定（相比风电和太阳能），可调节（需蓄水调节）</td><td>需建在有足够落差和流量的河流段——受地理条件制约</td></tr>
      <tr><td>兼具防洪、灌溉、航运等综合效益（如三峡）</td><td>极端干旱年份发电量可能锐减</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">新能源</span>
  <h3>四、氢能——最清洁的二次能源</h3>
  <p><strong>氢能</strong>：通过氢气<strong>燃烧</strong>或<strong>氢燃料电池</strong>释放的化学能。氢是自然界中<strong>最轻</strong>的元素（密度约 0.09 kg/m³，约为空气的 1/14），燃烧时与氧气化合生成水——产物只有<strong>水</strong>，不产生任何 CO₂ 等温室气体。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>特性</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>燃烧热值</strong></td><td>氢的燃烧热值约为 $1.43 \\times 10^8\\,\\mathrm{J/kg}$，约是汽油的<strong>3倍</strong>、煤的<strong>4.5倍</strong>——单位质量释放能量极高</td></tr>
      <tr><td><strong>燃烧产物</strong></td><td>仅生成水（$2\\mathrm{H_2} + \\mathrm{O_2} \\rightarrow 2\\mathrm{H_2O}$）——零碳排放，对环境完全无害</td></tr>
      <tr><td><strong>能源属性</strong></td><td>二次能源——自然界没有天然的氢气矿藏，须通过制取获得</td></tr>
    </tbody>
  </table>
  </div>

  <h4>氢气的制取方法</h4>
  <ul>
    <li><strong>电解水</strong>：$2\\mathrm{H_2O} \\xrightarrow{\\text{通电}} 2\\mathrm{H_2} \\uparrow + \\mathrm{O_2} \\uparrow$——最理想的方式（原料只有水，产物只有氢和氧），但耗电量大，成本高。</li>
    <li><strong>天然气重整</strong>：$\\mathrm{CH_4} + \\mathrm{H_2O} \\xrightarrow{\\text{高温}} \\mathrm{CO} + 3\\mathrm{H_2}$——目前工业上最主要的制氢方式，但仍产生 CO₂。</li>
  </ul>

  <h4>氢能利用面临的挑战</h4>
  <p>① <strong>制取成本高</strong>——电解水耗电量巨大，用化石燃料发电来电解水得不偿失（当务之急是用清洁电制氢，即"绿氢"）；② <strong>储存困难</strong>——氢气密度极小，需高压压缩或液化（-253℃）储存，技术复杂且耗能；③ <strong>运输不便</strong>——氢气易泄漏、易燃易爆，输送管道和容器需特殊材料。目前氢能主要用于航天（火箭燃料）、氢燃料电池汽车（与氧气反应发电驱动电动机）。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">新能源</span>
  <h3>五、地热能与海洋能——来自地球自身和海洋的能量</h3>

  <h4>一、地热能</h4>
  <p><strong>地热能</strong>：地球<strong>内部</strong>蕴藏的热能。来源：地球内部的<strong>放射性元素（铀、钍、钾-40等）衰变</strong>释放的热量。越往地心，温度越高（地心温度约 4000～6000℃）。地下水渗入地下高温岩层被加热→形成地下热水和蒸汽。</p>
  <p><strong>利用方式</strong>：① <strong>地热发电</strong>——钻取地下蒸汽直接推动汽轮机→带动发电机→发电（适用于高温地热田）；② <strong>地热供暖</strong>——抽取地下热水为建筑供暖（如冰岛首都雷克雅未克——90%以上建筑用地热供暖）；③ <strong>温泉</strong>——地下热水自然涌出，用于洗浴、疗养、水产养殖等。</p>
  <p><strong>优点与局限</strong>：地热能是一种清洁的可再生能源（来自地球内部的持续性产热）。但其分布受地质条件限制——仅在地热资源丰富地区（板块交界处、火山地震带）才有经济开采价值。我国地热资源主要集中在西藏（羊八井地热电站）、云南、台湾等地。</p>

  <h4>二、海洋能</h4>
  <p>海洋能的三种主要形式：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>类型</th><th>能量来源</th><th>利用原理</th></tr></thead>
    <tbody>
      <tr><td><strong>潮汐能</strong></td><td>月球和太阳对地球的引力→海水周期性涨落（潮差）</td><td>在潮差较大的海湾建坝→涨潮蓄水→落潮放水→水流推动水轮机→发电。类似于小型水力发电，但动力来自潮汐而非降水</td></tr>
      <tr><td><strong>波浪能</strong></td><td>海风吹过海面产生的波浪动能</td><td>利用波浪的上下浮动或水平往复运动驱动发电机发电（波浪能发电装置）</td></tr>
      <tr><td><strong>温差能</strong></td><td>海洋表层（被太阳晒热）与深层（寒冷）之间的温差（可达20℃以上）</td><td>利用温差驱动热机（或温差发电器）发电——浅层温水蒸发低沸点工质（如氨）→蒸汽推动汽轮机→深层冷水冷凝→循环</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>海洋能的共性与现状</strong>：海洋能总量极为巨大（地球海洋面积约占71%），且都是可再生能源。但目前开发利用技术尚不成熟——设备成本高、海洋环境腐蚀严重、发电效率低、维护困难。潮汐能相对最成熟（法国朗斯潮汐电站、中国江厦潮汐电站），波浪能和温差能仍处于研发试验阶段。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">观念</span>
  <h3>六、能源与可持续发展——绿色低碳与碳中和</h3>
  <p><strong>可持续发展</strong>：既满足当代人的需求，又<strong>不危及后代人</strong>满足其需求的能力的发展。能源的可持续意味着：在能源开发利用中，不仅要满足当前的能源需求，还要确保未来有足够的能源供应，并且将环境影响降到最低。</p>

  <h4>能源利用带来的环境问题</h4>
  <ul>
    <li><strong>温室效应与全球变暖</strong>：化石燃料燃烧排放大量 CO₂→大气中 CO₂浓度从工业化前的 280ppm 升至当前的约 420ppm→全球平均气温上升→冰川融化、海平面上升、极端天气增多。</li>
    <li><strong>酸雨</strong>：煤和石油燃烧排放 SO₂ 和 NOₓ→与大气中水反应生成硫酸和硝酸→随降水落地形成酸雨（pH < 5.6）→腐蚀建筑物、酸化土壤和湖泊。</li>
    <li><strong>空气污染</strong>：化石燃料燃烧产生的烟尘、PM2.5 等可吸入颗粒物危害人体呼吸系统。</li>
  </ul>

  <h4>绿色低碳与碳中和</h4>
  <p><strong>碳中和</strong>：在一定时间内，通过<strong>植树造林、节能减排</strong>等方式，抵消自身产生的 CO₂ 排放量，实现 CO₂"净零排放"。中国承诺：争取在 <strong>2030 年前</strong>实现<strong>碳达峰</strong>（CO₂ 排放量不再增长、达到峰值后下降），在 <strong>2060 年前</strong>实现<strong>碳中和</strong>。</p>

  <h4>节能减排的具体措施</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>领域</th><th>措施</th></tr></thead>
    <tbody>
      <tr><td><strong>能源生产</strong></td><td>大力发展太阳能、风能、水能、核能等清洁能源——逐步减少煤电比重</td></tr>
      <tr><td><strong>工业</strong></td><td>采用节能技术和设备，循环利用废热，提高能源利用效率</td></tr>
      <tr><td><strong>建筑</strong></td><td>推广绿色建筑——良好的保温隔热设计、自然采光通风、太阳能热水系统和光伏面板</td></tr>
      <tr><td><strong>交通</strong></td><td>推广电动汽车、氢燃料电池汽车，发展公共交通，鼓励步行和骑行</td></tr>
      <tr><td><strong>个人生活</strong></td><td>人走灯灭；夏天空调设 26℃；减少一次性用品；一水多用；随手关水龙头</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>绿色低碳的核心逻辑</strong>：减少化石能源消耗→减少 CO₂ 排放→减缓全球变暖→保护地球生态环境。而实现这一点，一靠<strong>节能</strong>（用更少的能源办更多的事），二靠<strong>清洁能源替代</strong>（用风电、太阳能等零碳能源代替煤和石油），三靠<strong>碳汇</strong>（植树造林吸收大气中的 CO₂）。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">常见误区</span>
  <h3>本章常见误区辨析（8 条）</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>#</th><th>误区</th><th>正确理解</th><th>类型</th></tr></thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>"能量在转化中会逐渐减少"</td>
        <td>能量<strong>不会减少</strong>——能量守恒定律明确指出，能量在转化或转移过程中<strong>总量保持不变</strong>。看似"减少"的机械能实际上转化为了等量的内能（摩擦生热散失到环境中）——能量并没有消失，只是变成了一种不易再利用的形式。</td>
        <td><span class="miscon-type miscon-deep">&#129504; 深层</span></td>
      </tr>
      <tr>
        <td>2</td>
        <td>"热传递中热量从高温物体传到低温物体，也可以自发地从低温物体传到高温物体"</td>
        <td>热量<strong>不能自发地</strong>从低温物体传向高温物体。冰箱制冷并不违背方向性——它是靠压缩机<strong>做功</strong>（消耗电能）才将热量从低温（冰箱内）搬到高温（冰箱外散热器），这属于"外加干预"而非"自发过程"。</td>
        <td><span class="miscon-type miscon-structural">&#128736; 结构</span></td>
      </tr>
      <tr>
        <td>3</td>
        <td>"电能是一次能源"</td>
        <td>电能是典型的<strong>二次能源</strong>——自然界不存在"电矿"，所有电能都必须由其他能源（煤、水、风、核等）通过发电机转化而来。同理，汽油也是二次能源——是石油经过分馏炼制得到的。</td>
        <td><span class="miscon-type miscon-surface">&#127993; 表面</span></td>
      </tr>
      <tr>
        <td>4</td>
        <td>"水能既是常规能源，所以不是可再生能源"</td>
        <td>水能<strong>同时属于</strong>常规能源和可再生能源——这两个分类维度并不互斥。"常规/新能源"是按利用历史和技术成熟度分类，"可再生/不可再生"是按能否在短期内自然补充分类。水能靠太阳能驱动水循环补充→可再生；又有百年以上的大规模利用史→常规。</td>
        <td><span class="miscon-type miscon-structural">&#128736; 结构</span></td>
      </tr>
      <tr>
        <td>5</td>
        <td>"核电站的能量转化是：核能→电能"</td>
        <td>核电站的能量转化经过了<strong>多个中间环节</strong>：<strong>核能→内能→机械能→电能</strong>。核裂变释放的能量首先使一回路冷却剂（水）升温（核能→内能）→通过蒸汽发生器产生高温高压水蒸气（内能传递）→水蒸气推动汽轮机转动（内能→机械能）→汽轮机带动发电机转子切割磁感线（机械能→电能）。</td>
        <td><span class="miscon-type miscon-deep">&#129504; 深层</span></td>
      </tr>
      <tr>
        <td>6</td>
        <td>"太阳能电池是将太阳能转化为内能再转化为电能"</td>
        <td>太阳能电池利用的是<strong>光伏效应（光电直接转化）</strong>：光子激发半导体中的电子跃迁→产生电动势→光能<strong>直接</strong>转化为电能。不像太阳能热水器那样需要先转化为内能。光能→电能，中间没有"内能"环节。</td>
        <td><span class="miscon-type miscon-structural">&#128736; 结构</span></td>
      </tr>
      <tr>
        <td>7</td>
        <td>"核聚变已经在核电站中广泛使用了"</td>
        <td>目前所有商业运行的核电站利用的都是<strong>核裂变</strong>（铀-235裂变）。可控<strong>核聚变</strong>（"人造太阳"）尚处于实验阶段——需要将上亿摄氏度的等离子体用强磁场约束（托卡马克装置），至今未实现商业发电。"核能=核裂变"是当前的事实，"核能=核裂变+核聚变（后者还在研发中）"才是完整认识。</td>
        <td><span class="miscon-type miscon-surface">&#127993; 表面</span></td>
      </tr>
      <tr>
        <td>8</td>
        <td>"能量转移和能量转化是同一个意思"</td>
        <td>两者本质不同：<strong>转移</strong>是同一形式能量在不同物体间的传递（能量形式不变——如内能从热水到冷水）；<strong>转化</strong>是能量从一种形式变为另一种形式（能量形式改变——如机械能变为内能）。热传递是转移，摩擦生热是转化。</td>
        <td><span class="miscon-type miscon-structural">&#128736; 结构</span></td>
      </tr>
    </tbody>
  </table>
  </div>
</div>

function doSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('searchResults');

  if (query.length < 2) {
    resultsDiv.classList.remove('visible');
    return;
  }

  // Collect all searchable content
  const cards = document.querySelectorAll('.knowledge-card');
  const results = [];
  // Store card references for direct scrolling
  window._searchCards = [];

  cards.forEach((card, i) => {
    const text = card.textContent.toLowerCase();
    if (text.includes(query)) {
      const chapter = card.closest('.chapter');
      const chHeader = chapter ? chapter.querySelector('h2') : null;
      const chName = chHeader ? chHeader.textContent : '';
      const cardTitle = card.querySelector('h3');
      const title = cardTitle ? cardTitle.textContent : '知识卡片';
      const idx = text.indexOf(query);
      const start = Math.max(0, idx - 20);
      const end = Math.min(text.length, idx + query.length + 40);
      let snippet = text.substring(start, end);
      if (start > 0) snippet = '…' + snippet;
      if (end < text.length) snippet = snippet + '…';

      const idx_sr = window._searchCards.length;
      window._searchCards.push(card);

      results.push({
        chapterId: chapter ? chapter.id : '',
        chName, title, snippet,
        idx_sr
      });
    }
  });

  if (results.length === 0) {
    resultsDiv.innerHTML = '<div class="no-results">未找到相关内容，请尝试其他关键词</div>';
  } else {
    resultsDiv.innerHTML = results.slice(0, 15).map(r => `
      <a href="javascript:void(0)" class="search-result-item" onclick="var c=window._searchCards[${r.idx_sr}]; if(c){c.scrollIntoView({behavior:'smooth',block:'center'}); c.style.boxShadow='0 0 0 3px var(--accent)'; setTimeout(function(){c.style.boxShadow=''},2000);} document.getElementById('searchResults').classList.remove('visible'); document.getElementById('searchInput').value='';">
        <div class="sr-title">${r.title}</div>
        <div class="sr-chapter">${r.chName} — ${r.snippet}</div>
      </a>
    `).join('');
  }
  resultsDiv.classList.add('visible');
}

// Close search on outside click
document.addEventListener('click', (e) => {
  const searchWrap = document.querySelector('.search-wrap');
  if (!searchWrap.contains(e.target)) {
    document.getElementById('searchResults').classList.remove('visible');
  }
});

const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  if (window.scrollY > 400) {
    scrollTopBtn.classList.add('visible');
  } else {
    scrollTopBtn.classList.remove('visible');
  }

  // Update active chapter in sidebar
  const chapters = document.querySelectorAll('.chapter');
  let currentId = null;
  chapters.forEach(ch => {
    const rect = ch.getBoundingClientRect();
    if (rect.top <= 120) {
      currentId = ch.id;
    }
  });
  if (currentId) {
    document.querySelectorAll('.chapter-link').forEach(link => {
      link.classList.remove('active');
      if (link.dataset.chapter === currentId) {
        link.classList.add('active');
      }
    });
  }
});

document.addEventListener('keydown', (e) => {
  // Ctrl/Cmd + K to focus search
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  // Escape to close search
  if (e.key === 'Escape') {
    document.getElementById('searchResults').classList.remove('visible');
    document.getElementById('searchInput').blur();
  }
});

// ================================================================
// INIT
// ================================================================
buildSidebar();
buildContent();

// After MathJax renders, set correct chapter list heights
setTimeout(() => {
  document.querySelectorAll('.chapter-list').forEach(el => {
    if (!el.classList.contains('collapsed')) {
      el.style.maxHeight = 'none';
    }
  });
}, 1500);
</script>
