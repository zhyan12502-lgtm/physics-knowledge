      <tr><td><strong>若计滑轮重</strong></td><td>$F = (G + G_{\\text{动}})/2$</td></tr>
      <tr><td><strong>应用</strong></td><td>与定滑轮配合组成滑轮组，广泛用于起重机、电梯</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心公式</span>
  <h3>三、滑轮组</h3>
  <p><strong>定义</strong>：将<strong>定滑轮</strong>和<strong>动滑轮</strong>组合在一起构成的装置，既可以<strong>省力</strong>，又可以<strong>改变力的方向</strong>。</p>

  <h4>1. 拉力大小（不计摩擦和绳重）</h4>
  <div class="formula-block">
    $F = \\frac{G}{n}$
  </div>
  <p>若计动滑轮重 $G_{\\text{动}}$（不计绳重和摩擦）：</p>
  <div class="formula-block">
    $F = \\frac{G + G_{\\text{动}}}{n}$
  </div>
  <p>其中 $n$ 为<strong>承担动滑轮（及重物）的绳子股数</strong>。</p>

  <h4>2. 如何数绳子股数 $n$</h4>
  <p><strong>方法</strong>：只看与<strong>动滑轮</strong>直接接触（相连）的绳子段数。绳子自由端从定滑轮绕出不计数，从动滑轮绕出则计数。</p>
  <p><strong>口诀</strong>："只看动滑轮，与其相连的绳子有几段，$n$ 就是几。"</p>

  <h4>3. 距离和速度关系</h4>
  <div class="formula-block">
    $s = n h \\qquad v_{\\text{绳}} = n v_{\\text{物}}$
  </div>
  <p>$s$——绳端移动距离（m）；$h$——物体上升高度（m）；$n$——承担动滑轮的绳子股数。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">组装规律</span>
  <h3>四、滑轮组的组装（绕绳方法）</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>$n$ 的奇偶</th><th>绳头固定位置</th><th>绕法</th></tr></thead>
    <tbody>
      <tr><td><strong>$n$ 为奇数</strong>（如 3、5）</td><td>绳头固定在<strong>动滑轮</strong>上</td><td>从动滑轮开始绕，经过各滑轮，最后从定滑轮引出</td></tr>
      <tr><td><strong>$n$ 为偶数</strong>（如 2、4）</td><td>绳头固定在<strong>定滑轮</strong>上</td><td>从定滑轮开始绕，经过各滑轮，最后从定滑轮引出</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>口诀</strong>："奇动偶定"——$n$ 为奇数绳头在动滑轮上，$n$ 为偶数绳头在定滑轮上。</p>
</div>

<!-- ================================================================================== -->
<!-- §8.3 功与功率 -->
<!-- ================================================================================== -->
<div class="section-title" id="s8-3">§8.3 功与功率</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、功（机械功）</h3>

  <h4>1. 做功的两个必要因素</h4>
  <ol>
    <li>作用在物体上的<strong>力</strong>（$F$）</li>
    <li>物体在<strong>力的方向上</strong>移动了<strong>距离</strong>（$s$）</li>
  </ol>
  <p>两个条件<strong>缺一不可</strong>。以下三种情况<strong>不做功</strong>：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>情形</th><th>原因</th><th>实例</th></tr></thead>
    <tbody>
      <tr><td><strong>有力无距离</strong></td><td>物体受力但保持静止</td><td>推墙墙不动、举着杠铃不动</td></tr>
      <tr><td><strong>有距离无力</strong></td><td>物体靠惯性运动，不受推力</td><td>足球被踢出后在草地上滚动的过程（脚已离开球）</td></tr>
      <tr><td><strong>力与距离方向垂直</strong></td><td>力方向与运动方向垂直</td><td>提着水桶水平匀速行走——提力竖直向上，移动方向水平</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心公式</span>
  <h3>二、功的计算</h3>
  <p><strong>定义</strong>：力与物体在力的方向上移动的距离的乘积叫做<strong>机械功</strong>，简称功，符号 $W$。</p>
  <div class="formula-block">
    $W = F s$
  </div>
  <p><strong>单位</strong>：功的单位是<strong>焦耳</strong>（J），$1\\,\\text{J} = 1\\,\\text{N} \\cdot \\text{m}$。</p>
  <p><strong>功的原理</strong>：使用任何机械都<strong>不能省功</strong>。省力的机械（如动滑轮）必然费距离，省距离的机械（如费力杠杆）必然费力。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>三、功率</h3>
  <p><strong>定义</strong>：功与做功所用时间之比叫做<strong>功率</strong>，符号 $P$。功率是表示<strong>做功快慢</strong>的物理量。</p>
  <p><strong>辨析</strong>：功表示做功的<strong>多少</strong>，功率表示做功的<strong>快慢</strong>。功率大的机器做功快，但不一定做功多（还要看时间）。</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心公式</span>
  <h3>四、功率的计算</h3>

  <h4>1. 定义式</h4>
  <div class="formula-block">
    $P = \\frac{W}{t}$
  </div>
  <p><strong>单位</strong>：功率的单位是<strong>瓦特</strong>（W），$1\\,\\text{W} = 1\\,\\text{J/s}$。</p>
  <p><strong>常用换算</strong>：$1\\,\\text{kW} = 10^3\\,\\text{W}$，$1\\,\\text{MW} = 10^6\\,\\text{W}$。</p>

  <h4>2. 推导式（匀速运动时）</h4>
  <div class="formula-block">
    $P = \\frac{W}{t} = \\frac{F s}{t} = F v$
  </div>
  <p>即 $P = Fv$ —— 功率等于力与速度的乘积。</p>
  <p><strong>应用</strong>：汽车上坡时，功率 $P$ 一定，降低速度 $v$ 可以获得更大的牵引力 $F$（即"降速增力"）。</p>
</div>

<!-- ================================================================================== -->
<!-- §8.4 机械能及其转化 -->
<!-- ================================================================================== -->
<div class="section-title" id="s8-4">§8.4 机械能及其转化</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、能量</h3>
  <p>物体<strong>能够对外做功</strong>，我们就说这个物体具有<strong>能量</strong>（简称能），符号 $E$，单位也是<strong>焦耳</strong>（J）。一个物体能够做的功越多，表示这个物体的能量越大。</p>
  <p><strong>能量与功的关系</strong>：做功的过程就是能量转化的过程，做了多少功就有多少能量发生转化。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>二、动能（$E_k$）</h3>
  <p><strong>定义</strong>：物体由于<strong>运动</strong>而具有的能量叫做动能。一切运动的物体都具有动能。</p>
  <p><strong>影响因素</strong>：<strong>质量</strong>和<strong>速度</strong>。</p>
  <ul>
    <li>质量相同的物体，<strong>速度越大</strong>，动能越大</li>
    <li>速度相同的物体，<strong>质量越大</strong>，动能越大</li>
  </ul>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">实验探究</span>
  <h3>探究：动能大小与哪些因素有关</h3>
  <p><strong>方法</strong>：控制变量法 + 转换法（通过木块被撞击后移动的距离来反映动能的大小）。</p>
  <p><strong>实验1（探究动能与速度的关系）</strong>：控制<strong>质量相同</strong>——同一个小球从斜面<strong>不同高度</strong>滚下（到达底端速度不同）→ 高度越高（速度越大），木块被撞得越远 → <strong>质量相同时，速度越大，动能越大</strong>。</p>
  <p><strong>实验2（探究动能与质量的关系）</strong>：控制<strong>速度相同</strong>——不同质量的小球从<strong>同一高度</strong>滚下（到达底端速度相同）→ 质量越大的小球，木块被撞得越远 → <strong>速度相同时，质量越大，动能越大</strong>。</p>
  <p><strong>注意</strong>：实验中"让小球从斜面滚下"的目的是使小球到达底端时具有一定的<strong>速度</strong>；从同一高度释放是为了控制<strong>速度相同</strong>。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>三、势能（$E_p$）</h3>

  <h4>1. 重力势能</h4>
  <p><strong>定义</strong>：物体由于<strong>被举高</strong>而具有的能量。</p>
  <p><strong>影响因素</strong>：<strong>质量</strong>和<strong>高度</strong>。</p>
  <ul>
    <li>质量相同的物体，高度越高，重力势能越大</li>
    <li>高度相同的物体，质量越大，重力势能越大</li>
  </ul>

  <h4>2. 弹性势能</h4>
  <p><strong>定义</strong>：物体由于发生<strong>弹性形变</strong>而具有的能量。</p>
  <p><strong>影响因素</strong>：<strong>形变程度</strong>。对同一物体，弹性形变越大，弹性势能越大。</p>
  <p>例如：拉开的弓、压缩的弹簧、拧紧的发条都具有弹性势能。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心规律</span>
  <h3>四、机械能守恒定律</h3>
  <p><strong>机械能</strong>：<strong>动能</strong>和<strong>势能</strong>（重力势能和弹性势能）统称为<strong>机械能</strong>。</p>
  <div class="formula-block">
    $E = E_k + E_p$
  </div>
  <p><strong>机械能守恒定律</strong>：在<strong>只有动能和势能相互转化</strong>的过程中（即没有摩擦力、空气阻力等外力做功，或只有重力/弹力做功），机械能的总量<strong>保持不变</strong>。</p>
  <div class="formula-block">
    $E_{k1} + E_{p1} = E_{k2} + E_{p2}$
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">经典实例</span>
  <h3>五、机械能转化的经典实例</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>实例</th><th>能量转化过程</th><th>是否守恒</th></tr></thead>
    <tbody>
      <tr><td><strong>滚摆</strong>（麦克斯韦摆）</td><td>下降：重力势能 → 动能；上升：动能 → 重力势能</td><td>守恒（理想）</td></tr>
      <tr><td><strong>单摆</strong></td><td>最高点→最低点：重力势能 → 动能；最低点→最高点：动能 → 重力势能</td><td>守恒（理想）</td></tr>
      <tr><td><strong>人造卫星</strong>（椭圆轨道）</td><td>近地点→远地点：动能 → 重力势能；远地点→近地点：重力势能 → 动能</td><td>守恒</td></tr>
      <tr><td><strong>篮球自由下落</strong>（不计空气阻力）</td><td>下落：重力势能 → 动能；触地：动能 → 弹性势能；反弹：弹性势能 → 动能 → 重力势能</td><td>守恒</td></tr>
      <tr><td><strong>过山车</strong></td><td>最高点：重力势能最大、动能最小；最低点：动能最大、重力势能最小</td><td>近似守恒</td></tr>
      <tr><td><strong>上紧发条的玩具</strong></td><td>拧发条：动能 → 弹性势能（储存）；释放：弹性势能 → 动能</td><td>近似守恒</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">易错辨析</span>
  <h3>六、机械能不守恒的情况</h3>
  <p>当存在<strong>摩擦力</strong>或<strong>空气阻力</strong>做功时，一部分机械能会转化为<strong>内能</strong>（热能），总机械能<strong>减小</strong>。例如：</p>
  <ul>
    <li>皮球在地面上弹跳，每次反弹高度逐渐降低——空气阻力 + 碰撞能量损耗 → 机械能减小，转化为内能</li>
    <li>自由落体有空气阻力时，机械能逐渐减小（转化为空气和物体的内能）</li>
    <li>汽车刹车——机械能转化为刹车片和轮胎的内能</li>
    <li>从滑梯上滑下——重力势能转化为动能和内能（摩擦生热），机械能不守恒</li>
  </ul>
</div>

<!-- ================================================================================== -->
<!-- §8.5 机械效率 -->
<!-- ================================================================================== -->
<div class="section-title" id="s8-5">§8.5 机械效率</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、三种功</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>类型</th><th>符号</th><th>定义</th><th>实例（用滑轮组提升重物）</th></tr></thead>
    <tbody>
      <tr><td><strong>有用功</strong></td><td>$W_{\\text{有}}$</td><td>为达到目的<strong>必须做</strong>的功</td><td>$W_{\\text{有}} = Gh$（提升重物所做的功）</td></tr>
      <tr><td><strong>额外功</strong></td><td>$W_{\\text{额}}$</td><td>不需要但又<strong>不得不做</strong>的功</td><td>克服动滑轮重做的功、克服绳重做的功、克服摩擦做的功</td></tr>
      <tr><td><strong>总功</strong></td><td>$W_{\\text{总}}$</td><td>使用机械时<strong>实际做的总功</strong>（即动力做的功）</td><td>$W_{\\text{总}} = Fs$（拉力 $F$ 在绳端移动距离 $s$ 上做的功）</td></tr>
    </tbody>
  </table>
  </div>
  <div class="formula-block">
    $W_{\\text{总}} = W_{\\text{有}} + W_{\\text{额}}$
  </div>
  <p><strong>关键理解</strong>：额外功永远存在（摩擦不可避免，动滑轮有自重），因此 $W_{\\text{额}} > 0$，从而 $W_{\\text{总}} > W_{\\text{有}}$。</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心公式</span>
  <h3>二、机械效率</h3>
  <p><strong>定义</strong>：<strong>有用功</strong>与<strong>总功</strong>的比值叫做<strong>机械效率</strong>，符号 $\\eta$（希腊字母，读作 yita/eta）。</p>
  <div class="formula-block">
    $\\eta = \\frac{W_{\\text{有}}}{W_{\\text{总}}} \\times 100\\%$
  </div>
  <p><strong>核心结论</strong>：因为 $W_{\\text{有}} < W_{\\text{总}}$（额外功永远存在），所以机械效率 $\\eta$ 总是<strong>小于 1</strong>（小于 100%）。机械效率<strong>无单位</strong>，通常用<strong>百分数</strong>表示。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">提高方法</span>
  <h3>三、提高机械效率的方法</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>方法</th><th>原理</th><th>具体措施</th></tr></thead>
    <tbody>
      <tr><td><strong>减小额外功</strong></td><td>减小 $W_{\\text{额}}$ 可使 $W_{\\text{总}}$ 中 $W_{\\text{有}}$ 占比增大</td><td>① 减小动滑轮重（用轻质滑轮）；② 减小摩擦（加润滑油）；③ 减小绳重（用轻质绳子）</td></tr>
      <tr><td><strong>增大有用功</strong></td><td>在额外功不变时，增大有用功提高比值</td><td>① 增加提升的重物重量（$W_{\\text{有}} = Gh$ 增大）；② 对同一机械，物重越大，机械效率越高</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>核心规律</strong>：对同一滑轮组，提升的物体越重，机械效率<strong>越高</strong>（因为 $W_{\\text{额}}$ 基本不变，$W_{\\text{有}}$ 增大）。</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">实验探究</span>
  <h3>四、实验：测量滑轮组的机械效率</h3>
  <p><strong>实验原理</strong>：$\\eta = \\dfrac{W_{\\text{有}}}{W_{\\text{总}}} \\times 100\\% = \\dfrac{Gh}{Fs} \\times 100\\%$</p>
  <p><strong>实验器材</strong>：滑轮组、弹簧测力计、刻度尺、钩码、铁架台。</p>
  <p><strong>实验步骤</strong>：</p>
  <ol>
    <li>组装好滑轮组，用弹簧测力计测出钩码重力 $G$。</li>
    <li>匀速竖直拉动弹簧测力计，读出拉力 $F$。</li>
    <li>用刻度尺测出钩码上升高度 $h$ 和绳端移动距离 $s$。</li>
    <li>计算 $\\eta = \\dfrac{Gh}{Fs} \\times 100\\%$。</li>
    <li>改变钩码数量（改变物重），重复实验，比较机械效率的变化。</li>
  </ol>
  <p><strong>结论</strong>：同一滑轮组，提升的物体越重，机械效率越高。</p>
  <p><strong>注意事项</strong>：必须<strong>匀速竖直</strong>拉动弹簧测力计（使 $F$ 稳定可读）；$s$ 与 $h$ 关系满足 $s = nh$（$n$ 为承担动滑轮的绳子股数）。</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">常用推导</span>
  <h3>五、滑轮组机械效率的常用计算公式</h3>

  <h4>1. 通用公式</h4>
  <div class="formula-block">
    $\\eta = \\frac{W_{\\text{有}}}{W_{\\text{总}}} \\times 100\\% = \\frac{Gh}{Fs} \\times 100\\%$
  </div>

  <h4>2. 当 $s = nh$ 时</h4>
  <div class="formula-block">
    $\\eta = \\frac{G}{nF} \\times 100\\%$
  </div>

  <h4>3. 不计绳重和摩擦时（$W_{\\text{额}}$ 仅为克服动滑轮重做的功）</h4>
  <div class="formula-block">
    $\\eta = \\frac{G}{G + G_{\\text{动}}} \\times 100\\%$
  </div>
  <p><strong>理解</strong>：物重 $G$ 越大，$G$ 在 $(G + G_{\\text{动}})$ 中的占比越大，$\\eta$ 越接近于 1（但永远小于 1）。</p>
</div>

<!-- ================================================================================== -->
<!-- 跨学科实践：斜拉桥 -->
<!-- ================================================================================== -->
<div class="section-title" id="cross">跨学科实践：斜拉桥的原理与模型制作</div>

<div class="cross-discipline">
  <span class="cd-badge">跨学科实践</span>
  <h3>斜拉桥 —— 简单机械原理的工程应用</h3>
  <p><strong>斜拉桥</strong>（Cable-Stayed Bridge）是一种由<strong>桥塔</strong>、<strong>斜拉索</strong>和<strong>桥面</strong>组成的大跨度桥梁结构。其力学原理与本章所学的<strong>杠杆</strong>、<strong>滑轮</strong>知识紧密相关。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">结构原理</span>
  <h3>一、斜拉桥的基本结构</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>组成部分</th><th>作用</th><th>力学原理</th></tr></thead>
    <tbody>
      <tr><td><strong>桥塔</strong></td><td>支撑斜拉索，承受压力</td><td>桥塔类似于<strong>杠杆的支点</strong>，将桥面的力传递到地基</td></tr>
      <tr><td><strong>斜拉索</strong></td><td>将桥面的重力传递到桥塔</td><td>每根拉索承受拉力，力的方向沿拉索方向——类似于滑轮组中的绳子</td></tr>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">力学分析</span>
  <h3>二、斜拉桥中的杠杆原理</h3>
  <p>以桥塔为中心，两侧的桥面通过拉索对称受力，可视为<strong>以桥塔为支点的杠杆平衡</strong>（近似）。两侧拉索的拉力力矩互相平衡，使桥塔保持竖直稳定。</p>
  <p><strong>核心力学模型</strong>：每根斜拉索对桥面的拉力可分解为竖直向上的分力（支持桥面重力）和水平分力（两侧相互抵消）。这涉及<strong>力的分解</strong>与<strong>力矩平衡</strong>——是杠杆原理的延伸应用。</p>
</div>

<div class="knowledge-card card-example">

  <h3>杠杆分类判断</h3>
  <p>下列工具中属于费力杠杆的是（ ）</p>
  <p>A. 瓶起子 &nbsp;&nbsp; B. 镊子 &nbsp;&nbsp; C. 羊角锤 &nbsp;&nbsp; D. 撬棒</p>
  <p><strong>答案</strong>：<strong>B</strong>。镊子的支点在尾端，动力臂（手指施力处到支点）小于阻力臂（夹取物体处到支点），$l_1 < l_2$，$F_1 > F_2$，是费力杠杆（省距离）。A、C、D 都是省力杠杆（$l_1 > l_2$）。</p>
</div>

<div class="knowledge-card card-example">
  <span class="card-badge badge-example">例题2</span>
  <h3>杠杆平衡计算</h3>
  <p>一根轻质杠杆长 1.2 m，支点在一端，在距支点 0.3 m 处悬挂重为 200 N 的物体。在另一端施加多大力可使杠杆水平平衡？</p>
  <p><strong>解</strong>：$l_2 = 0.3\\,\\text{m}$，$l_1 = 1.2\\,\\text{m}$。</p>
  <p>由 $F_1 l_1 = F_2 l_2$：$F_1 \\times 1.2 = 200 \\times 0.3$，得 $F_1 = \\dfrac{60}{1.2} = \\mathbf{50\\,\\text{N}}$。</p>
  <p>因为动力臂（1.2 m）是阻力臂（0.3 m）的 4 倍，所以动力仅为阻力的 1/4——这是省力杠杆。</p>
</div>

<div class="knowledge-card card-example">

  <h3>滑轮组计算</h3>

  <p><strong>解</strong>：(1) $F = \\dfrac{G + G_{\\text{动}}}{n} = \\dfrac{600 + 100}{3} \\approx \\mathbf{233\\,\\text{N}}$</p>
  <p>(2) $s = n h = 3h$，即绳端移动距离是物体上升高度的 3 倍。</p>
</div>

<div class="knowledge-card card-example">

<div class="knowledge-card card-example">

  <h3>机械能转化分析</h3>
  <p>一个皮球从高处静止释放，落到地面后又弹起到一定高度。请分析整个过程中的能量转化。（不计空气阻力）</p>
  <p><strong>答</strong>：下落过程：重力势能 → 动能。触地压缩过程：动能 → 弹性势能。恢复弹起过程：弹性势能 → 动能 → 重力势能。由于不计空气阻力，整个过程机械能守恒。实际中由于空气阻力和碰撞能量损耗，弹起高度逐渐降低——部分机械能转化为了内能。</p>

  <p><strong>解</strong>：</p>
  <p>(1) $W_{\\text{有}} = Gh = 600 \\times 2 = \\mathbf{1200\\,\\text{J}}$</p>

  <p><strong>解</strong>：</p>

<!-- ================================================================================== -->
<div class="section-title" id="misconceptions">常见误区</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">🏷️表面误区</span>
  <h3>误区1：「力臂是支点到力作用点的距离」</h3>
  <p><strong>正确理解</strong>：力臂是支点到力<strong>作用线</strong>的垂直距离。当力与杠杆不垂直时，力臂必定<strong>小于</strong>支点到力作用点的距离。很多学生出错是因为没有画垂线，直接量取支点到作用点的长度。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">🔧结构误区</span>
  <h3>误区2：「动滑轮一定省一半力」</h3>
  <p><strong>正确理解</strong>：只有<strong>竖直向上</strong>匀速拉且不计滑轮重和摩擦时才成立。斜拉时力臂减小，拉力增大。实际使用中还要考虑动滑轮自重，$F = (G + G_{\\text{动}})/2$。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">🧠深层误区</span>
  <h3>误区3：「有力有距离就一定做功」</h3>
  <p><strong>正确理解</strong>：必须是在<strong>力的方向上</strong>移动的距离。提着水桶水平匀速走——人对水桶竖直向上的提力不做功（力方向与运动方向垂直）。足球被踢出后在草地上滚动——脚已离开球，人对球不做功（有距离无力）。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">🏷️表面误区</span>
  <h3>误区4：「功率大的机器做功多」</h3>
  <p><strong>正确理解</strong>：功率大说明做功<strong>快</strong>，但做功多少还要看<strong>时间</strong>（$W = Pt$）。功率小的机器如果工作时间很长，做的总功可以超过功率大但工作时间短的机器。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">🧠深层误区</span>
  <h3>误区5：「机械能守恒就是动能和势能都不变」</h3>
  <p><strong>正确理解</strong>：守恒指动能和势能的<strong>总和</strong>不变，但两者之间可以<strong>相互转化</strong>。单摆从最高点到最低点，重力势能不断转化为动能，两者的和在任一位置都相等——这才是守恒的含义。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">🧠深层误区</span>
  <h3>误区6：「机械效率可以等于或大于 100%」</h3>
  <p><strong>正确理解</strong>：<strong>绝对不可能。</strong>任何实际机械都存在额外功（动滑轮自重、绳重、摩擦），$W_{\\text{有}} < W_{\\text{总}}$，因此 $\\eta$ 永远小于 1。如果题目算出 $\\eta \\ge 100\\%$，说明数据有误或计算错误。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">🔧结构误区</span>
  <h3>误区7：「滑轮组的 $n$ 是所有滑轮的绳子总数」</h3>
  <p><strong>正确理解</strong>：$n$ 仅指<strong>承担动滑轮</strong>的绳子股数，不包括绕在定滑轮上仅改变方向的那一段。口诀："只看动滑轮，与其相连的绳子有几段，$n$ 就是几。"</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">🧠深层误区</span>
  <h3>误区8：「同一机械的机械效率固定不变」</h3>
  <p><strong>正确理解</strong>：同一滑轮组，提升的物体越重，机械效率<strong>越高</strong>。因为 $W_{\\text{额}}$（克服动滑轮重、摩擦）基本不变，而 $W_{\\text{有}} = Gh$ 随 $G$ 增大而增大，所以 $\\eta = W_{\\text{有}}/(W_{\\text{有}} + W_{\\text{额}})$ 也随之增大。</p>
</div>

  <strong>本章概述：</strong>「物态变化」是沪科版五四制2024八年级物理<strong>热学基础章节</strong>，也是上海中考<strong>必考知识点</strong>（通常以选择题、填空题或实验探究题出现，占分 3～8 分）。本章以<strong>温度</strong>的测量和<strong>分子动理论</strong>为基石，系统学习<strong>六种物态变化</strong>：熔化和凝固（§9.3）、汽化和液化（§9.2）、升华和凝华（§9.4）。核心在于把握每种变化的<strong>定义、吸放热规律、条件</strong>以及<strong>晶体熔化（凝固）曲线的图像分析</strong>，并能用物态变化知识解释"白气"、霜、雾凇、干冰制冷等生活现象。六种物态变化的三角关系、晶体与非晶体的熔化曲线对比是中考图像题的高频来源，必须熟练掌握。
</div>

<!-- §9.1 温度与分子动理论 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s9-1"><span class="sec-num">&#167;9.1</span> 温度与分子动理论</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、温度的定义与微观本质</h3>
  <p><strong>宏观定义</strong>：温度是表示物体<strong>冷热程度</strong>的物理量，符号 $t$。</p>
  <p><strong>微观本质</strong>：温度是物体内部分子<strong>热运动剧烈程度</strong>的宏观表现——温度越高，分子无规则运动越剧烈。</p>
  <p><strong>辨析</strong>：热的物体温度高，冷的物体温度低。但"热"和"温度"是两个不同概念——热量是传递的能量（过程量），温度是状态的量度（状态量）。</p>
  <div class="formula-block">
    $$T = t + 273.15 \\quad (\\text{热力学温标与摄氏温标的关系})$$
  </div>
  <p>自然界的最低极限温度为 <strong>-273.15 ℃</strong>（绝对零度），这是热力学温标（开尔文温标 K）的起点。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">温标</span>
  <h3>二、摄氏温标的规定（1 标准大气压下）</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>参考点</th><th>温度值</th><th>物理含义</th></tr></thead>
    <tbody>
      <tr><td><strong>冰水混合物</strong></td><td>0 ℃</td><td>冰与水共存——冰将要熔化（或水将要凝固）时的温度</td></tr>
      <tr><td><strong>沸水</strong></td><td>100 ℃</td><td>水沸腾（剧烈的汽化）时的温度</td></tr>
    </tbody>
  </table>
  </div>
  <p>在 0 ℃ 和 100 ℃ 之间分成 <strong>100 等份</strong>，每等份代表 <strong>1 ℃</strong>。</p>
  <p><strong>读法规范</strong>：37 ℃ 读作"37 摄氏度"（不能读作"摄氏 37 度"）；-5 ℃ 读作"负 5 摄氏度"或"零下 5 摄氏度"。</p>
  <p><strong>冰水混合物的恒温特性</strong>：无论冰多水少还是水多冰少，只要冰和水共存，温度一直保持 0 ℃——外界热量先用于熔化（而不升温），直到冰化完水温才上升。反之亦然。这一规律的前提是<strong>标准大气压下的纯水</strong>。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>三、温度计——原理与使用</h3>

  <h4>1. 原理：热胀冷缩</h4>
  <p>常用温度计利用液体（水银、酒精、煤油）<strong>热胀冷缩</strong>的性质工作——温度升高时液体膨胀，液柱上升；温度降低时液体收缩，液柱下降。</p>
  <p><strong>注意</strong>：水在 0 ℃～4 ℃ 之间<strong>冷胀热缩</strong>（反常膨胀），这一特殊性质使得 4 ℃ 时水的密度最大，是冰浮在水面的微观原因。温度计用的液体（水银、酒精、煤油）在测温范围内不存在反常膨胀。</p>

  <h4>2. 三种常用温度计对比</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>类型</th><th>测温物质</th><th>量程</th><th>分度值</th><th>特殊结构</th><th>用途</th></tr></thead>
    <tbody>
      <tr><td><strong>实验室温度计</strong></td><td>水银/煤油</td><td>-20 ℃～110 ℃</td><td>1 ℃</td><td>无</td><td>测量液体温度</td></tr>
      <tr><td><strong>体温计</strong></td><td>水银</td><td>35 ℃～42 ℃</td><td>0.1 ℃</td><td>缩口（细弯管）</td><td>测量人体温度</td></tr>
      <tr><td><strong>寒暑表</strong></td><td>酒精（染色）</td><td>-30 ℃～50 ℃</td><td>1 ℃</td><td>无</td><td>测量气温</td></tr>
    </tbody>
  </table>
  </div>

  <h4>3. 温度计使用方法（"三看四会"）</h4>
  <p><strong>使用前</strong>：看<strong>量程</strong>（被测温度不能超量程）、看<strong>分度值</strong>、看<strong>零刻度</strong>。</p>
  <p><strong>操作规范</strong>：</p>
  <ol>
    <li><strong>放</strong>：玻璃泡全部浸入被测液体，不碰容器底和壁</li>
    <li><strong>等</strong>：待示数稳定后读数</li>
    <li><strong>读</strong>：玻璃泡继续留在被测液体中（体温计除外），视线与液柱上表面相平</li>
    <li><strong>记</strong>：记录数值 + 单位</li>
  </ol>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">辨析</span>
  <h3>四、体温计的特殊结构——缩口</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>对比项</th><th>体温计</th><th>普通温度计</th></tr></thead>
    <tbody>
      <tr><td><strong>缩口</strong></td><td>有——玻璃泡上方极细的弯管</td><td>无</td></tr>
      <tr><td><strong>读数方式</strong></td><td>可以<strong>离开人体</strong>读数</td><td>必须留在被测液体中</td></tr>
      <tr><td><strong>使用前</strong></td><td>必须用力<strong>甩</strong>，使液柱退回玻璃泡</td><td>不需甩</td></tr>
      <tr><td><strong>量程/分度值</strong></td><td>35 ℃～42 ℃ / 0.1 ℃</td><td>较宽 / 1 ℃</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>缩口原理</strong>：体温计离开人体后，玻璃泡内液体冷却收缩，在缩口处断开，上方液柱不会自动流回——所以可以取出读数，但用前必须甩（使液柱退回）。</p>
  <p><strong>关键题</strong>：用一未甩的体温计（示数 36.8 ℃）去测实际体温为 38.5 ℃ 的人→示数 <strong>38.5 ℃</strong>（液柱可继续上升）。测实际体温为 36.2 ℃ 的人→示数仍为 <strong>36.8 ℃</strong>（缩口断开，无法下降）。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>五、分子动理论——物态变化的微观基础</h3>
  <p>物态变化的本质是<strong>分子热运动动能与分子间作用力</strong>的博弈。温度升高→分子动能增大→克服分子间引力→改变宏观物态。分子动理论包括三大要点：</p>

  <h4>1. 物质由大量分子、原子构成</h4>
  <p>分子是保持物质化学性质的最小微粒，直径在 $10^{-10}\\,\\mathrm{m}$ 量级。一切物质（固态、液态、气态）都由大量分子组成。</p>

  <h4>2. 分子在永不停息地做无规则运动——扩散</h4>
  <p><strong>扩散</strong>：不同物质在<strong>相互接触</strong>时，自发地进入对方的现象。扩散证明了分子在做无规则运动，且分子间有<strong>间隙</strong>。</p>
  <p><strong>实例</strong>：香水瓶打开后满屋飘香；方糖入水整杯变甜；金块与铅块紧压数年后互相渗入约 1mm——固体之间也有扩散！</p>
  <p><strong>扩散快慢与温度的关系</strong>：温度越<strong>高</strong>，扩散越<strong>快</strong>——这是"分子热运动"名称的由来（温度越高，分子运动越剧烈）。</p>
  <p><strong>重要辨析</strong>：扩散是<strong>微观分子运动</strong>的宏观表现；肉眼可见的颗粒运动（灰尘、烟尘等）不是分子运动——那是宏观小颗粒的机械运动。</p>

  <h4>3. 分子间同时存在引力和斥力</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>分子间距 r</th><th>引力 vs 斥力</th><th>宏观表现</th></tr></thead>
    <tbody>
      <tr><td>$r = r_0$（平衡位置）</td><td>引力 = 斥力，合力为零</td><td>分子处于平衡</td></tr>
      <tr><td>$r_0 < r < 10r_0$</td><td>引力 > 斥力，合力为<strong>引力</strong></td><td>拉断固体需要克服此引力</td></tr>
      <tr><td>$r < r_0$</td><td>斥力 > 引力，合力为<strong>斥力</strong></td><td>固体、液体很难被压缩</td></tr>
      <tr><td>$r \\gg 10r_0$</td><td>两者均极其微弱</td><td>"破镜不能重圆"——间距太大，引力可忽略</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">规律</span>
  <h3>六、物质三态的微观解释</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>状态</th><th>分子间距</th><th>分子间作用力</th><th>分子运动特点</th><th>宏观特征</th></tr></thead>
    <tbody>
      <tr><td><strong>固态</strong></td><td>极小</td><td>很强</td><td>分子只能在平衡位置附近振动</td><td>有固定体积和形状</td></tr>
      <tr><td><strong>液态</strong></td><td>较大</td><td>较强</td><td>分子可在平衡位置振动，也可移动</td><td>有固定体积，无固定形状，具流动性</td></tr>
      <tr><td><strong>气态</strong></td><td>极大</td><td>极弱</td><td>分子自由高速运动，频繁碰撞</td><td>无固定体积和形状，充满容器</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>物态变化的微观本质</strong>：从固态→液态→气态，分子间距越来越大，分子间作用力越来越弱，分子运动越来越自由——这需要<strong>不断吸收能量</strong>（热量）来克服分子间引力。反过来则不断<strong>放出能量</strong>。</p>
</div>

<!-- §9.2 汽化和液化 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s9-2"><span class="sec-num">&#167;9.2</span> 汽化和液化</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、汽化——液态变气态，吸收热量</h3>
  <p><strong>汽化</strong>：物质从<strong>液态</strong>变为<strong>气态</strong>的过程，<strong>需要吸热</strong>。汽化有两种方式——<strong>蒸发</strong>和<strong>沸腾</strong>。</p>

  <h4>1. 蒸发——任何温度下、液体表面的缓慢汽化</h4>
  <p>蒸发在任何温度下都能发生，只发生在<strong>液体表面</strong>，过程<strong>缓慢</strong>。蒸发有<strong>制冷作用</strong>——液体蒸发时从自身和周围物体吸热，使温度降低。</p>

  <h4>2. 沸腾——一定温度下、表面和内部同时的剧烈汽化</h4>
  <p>沸腾必须在<strong>沸点</strong>温度下，在液体<strong>表面和内部同时</strong>剧烈进行。沸腾必须满足两个条件：<strong>达到沸点 + 继续吸热</strong>。沸腾过程中温度<strong>保持不变</strong>。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">对比</span>
  <h3>二、蒸发与沸腾的全面对比（高频考点）</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>对比项目</th><th>蒸发</th><th>沸腾</th></tr></thead>
    <tbody>
      <tr><td><strong>发生部位</strong></td><td>只在液体<strong>表面</strong></td><td>液体<strong>表面和内部</strong>同时</td></tr>
      <tr><td><strong>温度条件</strong></td><td><strong>任何温度</strong>下均可发生</td><td>必须达到<strong>沸点</strong>并继续吸热</td></tr>
      <tr><td><strong>剧烈程度</strong></td><td><strong>缓慢</strong></td><td><strong>剧烈</strong>（大量气泡）</td></tr>
      <tr><td><strong>温度变化</strong></td><td>自身及周围温度<strong>降低</strong>（蒸发致冷）</td><td>沸腾过程中温度<strong>保持不变</strong></td></tr>
      <tr><td><strong>影响因素</strong></td><td>温度、表面积、空气流速、湿度、液体种类</td><td>液面上方<strong>气压</strong></td></tr>
      <tr><td><strong>共同点</strong></td><td colspan="2" style="text-align:center;">都是汽化现象，<strong>都需要吸热</strong></td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">探究实验</span>
  <h3>三、探究：影响蒸发快慢的因素</h3>
  <p><strong>实验目的</strong>：探究液体蒸发快慢与哪些因素有关。</p>
  <p><strong>实验方法</strong>：<strong>控制变量法</strong>——每次只改变一个因素，其他条件保持不变，比较蒸发快慢。</p>

  <h4>实验 1：液体温度的影响</h4>
  <p>在两块相同的玻璃片上各滴一滴质量相同的水，一片在常温下，一片放在温水杯上方（不接触水）。观察到温度高的那滴水<strong>先消失</strong>。结论：<strong>液体温度越高，蒸发越快。</strong></p>

  <h4>实验 2：液体表面积的影响</h4>
  <p>在玻璃片上滴两滴质量相同的水，一滴摊开（大表面积），一滴保持球状（小表面积）。在相同室温下，摊开的那滴<strong>先消失</strong>。结论：<strong>液体表面积越大，蒸发越快。</strong></p>

  <h4>实验 3：液面上方空气流速的影响</h4>
  <p>在两块玻璃片上各滴一滴质量相同的水，一片保持静止空气，一片用小风扇吹风。被风吹的那滴<strong>先消失</strong>。结论：<strong>液面上方空气流速越大，蒸发越快。</strong></p>

  <h4>实验 4：液体种类的影响</h4>
  <p>在室温下，取质量相同的酒精和水各一滴放在玻璃片上，酒精<strong>先消失</strong>。结论：<strong>不同液体蒸发快慢不同</strong>（这与液体的沸点和分子间作用力有关）。</p>

  <p><strong>综合结论</strong>：蒸发快慢与<strong>液体温度、表面积、液面上方空气流速、液体种类、空气湿度</strong>有关。</p>
  <p><strong>生活应用</strong>：晒衣服在阳光下（提高温度）、摊开晾（增大表面积）、通风处（增大空气流速）干得最快——三管齐下。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">规律</span>
  <h3>四、沸点与气压的关系</h3>
  <p><strong>沸点</strong>：液体沸腾时的温度。不同液体沸点不同（水标准大气压下 100 ℃，酒精 78 ℃，汞 357 ℃）。</p>
  <p><strong>核心规律</strong>：液体的沸点随液面上方<strong>气压增大而升高</strong>，随气压减小而降低。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>气压变化</th><th>沸点变化</th><th>实例与解释</th></tr></thead>
    <tbody>
      <tr><td>气压<strong>增大</strong></td><td>沸点<strong>升高</strong></td><td>高压锅——锅内气压 $\\sim 2$ atm，水沸点约 120 ℃，食物熟得快（温度更高）</td></tr>
      <tr><td>气压<strong>减小</strong></td><td>沸点<strong>降低</strong></td><td>高原地区——海拔高、气压低，水不到 100 ℃ 就沸腾，米饭煮不熟，需用高压锅</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>水沸腾实验现象</strong>：沸腾前——气泡底部大、上升变小（上层水温低，水蒸气遇冷液化）；沸腾时——气泡底部产生、上升变大（上下水温一致，气泡持续增长），到水面即破裂。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>五、液化——气态变液态，放出热量</h3>
  <p><strong>液化</strong>：物质从<strong>气态</strong>变为<strong>液态</strong>的过程，<strong>放出热量</strong>。</p>
  <p><strong>液化的两种方法</strong>：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>方法</th><th>原理</th><th>生活实例</th></tr></thead>
    <tbody>
      <tr><td><strong>降低温度</strong></td><td>降温至足够低，气体即可液化</td><td>冬天口中呼出"白气"；冰箱取出的饮料罐外壁水珠；浴室镜面变模糊</td></tr>
      <tr><td><strong>压缩体积</strong>（加压）</td><td>在临界温度以下压缩气体使其液化</td><td>液化石油气罐（丁烷加压液化）；打火机中的液态丁烷；氧气瓶中的液态氧</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>临界温度</strong>：每种气体都有一个<strong>临界温度</strong>，高于此温度无论怎样加压都不能液化。如氮气的临界温度约为 -147 ℃，必须在极低温度下才能液化。这也是"温室效应"所讨论的 CO₂（临界温度约 31 ℃）在常温下可以加压液化的原因。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">核心辨析</span>
  <h3>六、"白气"的本质——中考反复考察</h3>
  <p><strong>核心结论："白气"不是水蒸气！"白气"是水蒸气遇冷液化形成的微小水滴（液态），看得见。水蒸气是无色无味看不见的。</strong></p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>场景</th><th>"白气"来源</th><th>物态变化</th><th>详细解释</th></tr></thead>
    <tbody>
      <tr><td><strong>冬天口中呼出"白气"</strong></td><td>呼出水蒸气遇冷空气</td><td><strong>液化</strong> 气→液（放热）</td><td>体内高温水蒸气呼出后遇到冷空气，降温液化形成微小水滴</td></tr>
      <tr><td><strong>烧水壶嘴冒"白气"</strong></td><td>壶中水蒸气遇冷空气</td><td><strong>液化</strong> 气→液（放热）</td><td>水蒸气从壶嘴冒出后降温液化。离壶嘴越远越明显——温度降到足够低</td></tr>
      <tr><td><strong>冰棍周围"白气"</strong></td><td>周围空气的水蒸气遇冷</td><td><strong>液化</strong> 气→液（放热）</td><td>冰棍使周围空气温度骤降，水蒸气液化——白气向下飘是因为小水滴密度大于空气</td></tr>
      <tr><td><strong>干冰"白雾"</strong></td><td>空气中的水蒸气遇冷</td><td><strong>液化</strong> 气→液（放热）</td><td>干冰升华吸热使空气温度骤降，水蒸气液化——CO₂ 气体本身无色，看不见！</td></tr>
      <tr><td><strong>浴室镜面模糊</strong></td><td>热水蒸气遇冷镜面</td><td><strong>液化</strong> 气→液（放热）</td><td>热水产生的水蒸气遇到温度低的镜面，液化为水珠附着</td></tr>
      <tr><td><strong>夏天自来水管"出汗"</strong></td><td>空气中水蒸气遇冷水管</td><td><strong>液化</strong> 气→液（放热）</td><td>空气中的水蒸气遇到温度低的冷水管外壁，液化为水珠——"回南天"原理相同</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>重要结论</strong>：被 100 ℃ 水蒸气烫伤比被 100 ℃ 开水烫伤更严重——水蒸气接触皮肤时<strong>先液化放热</strong>（放出大量液化热），再降温放热。多一个液化放热阶段（每克水液化放热约 $2.26 \\times 10^3\\,\\mathrm{J}$）。</p>
</div>

<!-- §9.3 熔化和凝固 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s9-3"><span class="sec-num">&#167;9.3</span> 熔化和凝固</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、熔化和凝固的基本概念</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>物态变化</th><th>方向</th><th>热量</th><th>生活实例</th></tr></thead>
    <tbody>
      <tr><td><strong>熔化</strong></td><td>固态 → 液态</td><td><strong>吸热</strong></td><td>冰化成水、铁块烧红化铁水、巧克力在口中融化、蜡烛燃烧时蜡油流下</td></tr>
      <tr><td><strong>凝固</strong></td><td>液态 → 固态</td><td><strong>放热</strong></td><td>水结成冰、铁水浇铸成零件、融化的蜡油冷却后凝固、冬天水缸里的水结冰</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>核心结论</strong>：熔化和凝固是<strong>互逆</strong>的物态变化，同一种晶体的<strong>熔点和凝固点相同</strong>（例如冰的熔点是 0 ℃，水的凝固点也是 0 ℃）。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">分类</span>
  <h3>二、晶体与非晶体（重要分类）</h3>
  <p>固体可分为<strong>晶体</strong>和<strong>非晶体</strong>两类，这一分类是图像分析题的基础。</p>

  <h4>1. 晶体的特征</h4>
  <ul>
    <li>具有<strong>固定熔点</strong>（和凝固点）</li>
    <li>熔化（凝固）过程中不断吸（放）热，但温度<strong>保持不变</strong></li>
    <li>熔化（凝固）图象中出现<strong>水平段</strong>（平台）</li>
    <li>常见晶体：冰（熔点 0 ℃）、海波/硫代硫酸钠（熔点 48 ℃）、萘（熔点 80 ℃）、各种金属、食盐（NaCl）、石英、钻石、石墨</li>
  </ul>

  <h4>2. 非晶体的特征</h4>
  <ul>
    <li><strong>没有</strong>固定的熔点和凝固点</li>
    <li>熔化过程中不断吸热，温度<strong>持续升高</strong>（逐渐变软、变稀）</li>
    <li>图象<strong>无水平段</strong>——温度一直上升</li>
    <li>常见非晶体：玻璃、松香、蜂蜡、沥青、塑料、橡胶</li>
  </ul>

  <div class="table-wrap">
  <table>
    <thead><tr><th>对比项</th><th>晶体</th><th>非晶体</th></tr></thead>
    <tbody>
      <tr><td><strong>有无熔点/凝固点</strong></td><td><strong>有</strong>（固定不变）</td><td><strong>无</strong></td></tr>
      <tr><td><strong>熔化过程中温度变化</strong></td><td><strong>保持不变</strong>（吸热不升温）</td><td><strong>持续升高</strong></td></tr>
      <tr><td><strong>熔化条件</strong></td><td>达到熔点 + 继续吸热（缺一不可）</td><td>持续吸热即可</td></tr>
      <tr><td><strong>温度-时间图象</strong></td><td>有<strong>水平段</strong>（固液共存）</td><td>无水平段，连续上升</td></tr>
      <tr><td><strong>例</strong></td><td>冰、海波、金属、食盐</td><td>玻璃、松香、沥青、蜂蜡</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">图象</span>
  <h3>三、晶体熔化图象与凝固图象的对比分析（中考图像题核心）</h3>

  <h4>晶体熔化温度-时间图象（以海波为例，熔点 48 ℃）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>段</th><th>温度范围</th><th>状态</th><th>吸/放热</th><th>温度变化</th><th>详细分析</th></tr></thead>
    <tbody>
      <tr><td><strong>AB 段</strong></td><td>$\{\}$$< 48\\,\\text{℃}$（升温）</td><td><strong>固态</strong></td><td>吸热</td><td>不断升高</td><td>固态海波吸热，温度上升，尚未达到熔点，分子动能增大、振动加剧但未摆脱晶格束缚</td></tr>
      <tr><td style="background:#fff8e1;"><strong>BC 段</strong>（平台）</td><td style="background:#fff8e1;">$\{\}$$= 48\\,\\text{℃}$（恒温）</td><td style="background:#fff8e1;"><strong>固液共存</strong></td><td style="background:#fff8e1;">吸热</td><td style="background:#fff8e1;">保持不变</td><td style="background:#fff8e1;">海波开始熔化——固液共存。吸收的热量全部用于破坏晶体结构（熔化热），不用于升温。只要冰和液共存，温度就固定为熔点</td></tr>
      <tr><td><strong>CD 段</strong></td><td>$\{\}$$> 48\\,\\text{℃}$（升温）</td><td><strong>液态</strong></td><td>吸热</td><td>不断升高</td><td>海波已全部熔化为液态，吸热继续升温，分子运动更加剧烈</td></tr>
    </tbody>
  </table>
  </div>

  <h4>晶体凝固温度-时间图象（以海波为例，凝固点 48 ℃）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>段</th><th>温度范围</th><th>状态</th><th>吸/放热</th><th>温度变化</th><th>详细分析</th></tr></thead>
    <tbody>
      <tr><td><strong>DE 段</strong></td><td>$\{\}$$> 48\\,\\text{℃}$（降温）</td><td><strong>液态</strong></td><td>放热</td><td>不断降低</td><td>液态海波放热降温，温度从高温逐渐下降趋近凝固点</td></tr>
      <tr><td style="background:#fee2e2;"><strong>EF 段</strong>（平台）</td><td style="background:#fee2e2;">$\{\}$$= 48\\,\\text{℃}$（恒温）</td><td style="background:#fee2e2;"><strong>液固共存</strong></td><td style="background:#fee2e2;">放热</td><td style="background:#fee2e2;">保持不变</td><td style="background:#fee2e2;">液态海波开始凝固——放出凝固热，但温度不变，直到全部凝固</td></tr>
      <tr><td><strong>FG 段</strong></td><td>$\{\}$$< 48\\,\\text{℃}$（降温）</td><td><strong>固态</strong></td><td>放热</td><td>不断降低</td><td>已全部凝固为固态，继续放热降温</td></tr>
    </tbody>
  </table>
  </div>

  <h4>熔化图象与凝固图象的对称对比</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>对比项</th><th>熔化图象（AB-BC-CD）</th><th>凝固图象（DE-EF-FG）</th></tr></thead>
    <tbody>
      <tr><td><strong>图象走势</strong></td><td>温度<strong>上升</strong>（吸热）</td><td>温度<strong>下降</strong>（放热）</td></tr>
      <tr><td><strong>平台温度</strong></td><td>= 熔点（海波 48 ℃）</td><td>= 凝固点（海波 48 ℃）——<strong>与熔点相同</strong></td></tr>
      <tr><td><strong>平台时状态</strong></td><td>固液共存（固态渐少，液态渐多）</td><td>液固共存（液态渐少，固态渐多）</td></tr>
      <tr><td><strong>平台热过程</strong></td><td>吸热不升温（热量用于熔化）</td><td>放热不降温（热量来自凝固）</td></tr>
      <tr><td><strong>非晶体图象</strong></td><td colspan="2" style="text-align:center;">无平台，温度连续变化——熔化时连续上升，凝固时连续下降</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>口诀记忆</strong>："熔化吸热平台平，凝固放热平台也平；熔点凝固点相同，晶体特征要记明。"</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">探究实验</span>
  <h3>四、实验：探究固体熔化时温度的变化规律</h3>
  <p><strong>实验器材</strong>：海波（晶体）/ 冰、松香（非晶体）、试管、烧杯、温度计、铁架台、酒精灯、秒表。</p>
  <p><strong>加热方式</strong>：<strong>水浴加热</strong>（使试管受热均匀，避免局部过热）。</p>
  <p><strong>实验步骤</strong>：</p>
  <ol>
    <li>将适量海波（或冰）的细粉装入试管，插入温度计（玻璃泡不要碰管壁和管底）。</li>
    <li>将试管放入盛有水（或冰水）的烧杯中，水浴加热。</li>
    <li>每隔一定时间（如 30 s 或 1 min）记录海波状态和温度。</li>
    <li>根据数据绘制温度-时间图象，分析熔化特点。</li>
  </ol>
  <p><strong>实验结论</strong>：</p>
  <ul>
    <li><strong>海波（晶体）</strong>：熔化前升温（固态）→熔化中恒温 48 ℃ 且固液共存 → 熔化后升温（液态）。熔化条件：达到熔点 + 继续吸热。</li>
    <li><strong>松香（非晶体）</strong>：加热后逐渐变软、变稀，温度持续升高，无固定熔化温度。</li>
  </ul>
  <p><strong>拓展思考</strong>：如果海波中混有杂质，熔点会<strong>降低</strong>——这是"冬天下雪后路面撒盐"的原理（盐降低冰的熔点，使冰在更低温度下熔化，防止路面结冰）。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">辨析</span>
  <h3>五、熔化与凝固的高频易错辨析</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>易错命题</th><th>正确理解</th></tr></thead>
    <tbody>
      <tr><td>"晶体达到熔点就一定会熔化"</td><td><strong>不一定。</strong>达到熔点只是条件之一，还须<strong>继续吸热</strong>。0 ℃ 的冰放入 0 ℃ 的水中无温差，不吸热→不熔化</td></tr>
      <tr><td>"熔化图象的水平段表示不吸热"</td><td><strong>错。</strong>水平段表示<strong>吸热但不升温</strong>，吸收的热量全部用于改变状态（破坏晶体结构——熔化热）</td></tr>
      <tr><td>"所有固体都有熔点"</td><td><strong>错。</strong>只有<strong>晶体</strong>有熔点。非晶体加热时逐渐变软，没有固定的熔化温度</td></tr>
      <tr><td>"食盐是非晶体"</td><td><strong>错。</strong>食盐（NaCl）是<strong>晶体</strong>，有规则几何外形和固定熔点（801 ℃）</td></tr>
      <tr><td>"冰在熔化过程中温度一定保持在 0 ℃"</td><td>前提是<strong>1 标准大气压下</strong>。气压变化会影响熔点（压强增大对冰来说<strong>稍稍降低</strong>熔点——因为冰熔化为水时体积收缩）</td></tr>
      <tr><td>"凝固图象就是熔化图象颠倒过来"</td><td><strong>错。</strong>方向不同（升温 vs 降温）、热量方向不同（吸热 vs 放热）——两者<strong>对称但不互逆</strong>，需分别分析</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- §9.4 升华和凝华 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s9-4"><span class="sec-num">&#167;9.4</span> 升华和凝华</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、升华与凝华的定义</h3>
  <p>升华和凝华是<strong>固态与气态之间</strong>的直接转化——跳过了液态这一中间状态。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>物态变化</th><th>方向</th><th>热量</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>升华</strong></td><td>固态 → 气态（直接）</td><td><strong>吸热</strong></td><td>物质不经过液态，直接从固态变为气态</td></tr>
      <tr><td><strong>凝华</strong></td><td>气态 → 固态（直接）</td><td><strong>放热</strong></td><td>物质不经过液态，直接从气态变为固态</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>理解关键</strong>：任何温度下都可能发生升华和凝华——不一定需要高温或低温。冰在 -10 ℃ 也会缓慢升华（冬天的冻衣服变干），樟脑丸在常温下也会升华消失。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">实例</span>
  <h3>二、升华与凝华的生活实例汇总</h3>

  <h4>1. 升华实例（固→气，吸热）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>实例</th><th>物态变化过程</th><th>详细解释</th></tr></thead>
    <tbody>
      <tr><td><strong>干冰（固态 CO₂）制冷</strong></td><td>固态 CO₂ 升华为 CO₂ 气体</td><td>干冰在常温下迅速升华，吸收大量热→周围温度骤降→空气中水蒸气液化为"白雾"。用于人工降雨、舞台烟雾、冷链运输（-78.5 ℃ 的低温环境）。升华热约 $573\\,\\mathrm{J/g}$</td></tr>
      <tr><td><strong>樟脑丸（卫生球）变小消失</strong></td><td>固态樟脑升华为樟脑蒸气</td><td>樟脑在常温下缓慢升华——不经过液态，直接由固变气，在衣柜中保护衣物</td></tr>
      <tr><td><strong>冬天冰冻衣服变干</strong></td><td>冰（固态）升华为水蒸气</td><td>0 ℃ 以下的冰直接升华变为水蒸气——所以冬天晒在户外的冰冻衣服也会慢慢变干（升华干燥）</td></tr>
      <tr><td><strong>冻肉解冻后表面变干</strong></td><td>冰升华为水蒸气</td><td>冰箱冷冻室中，肉表面的冰缓慢升华，长期后肉表面变得干燥发白——"冻干"</td></tr>
      <tr><td><strong>加热碘产生紫色蒸气</strong></td><td>固态碘升华为碘蒸气</td><td>加热碘时，固体碘直接升华成紫色碘蒸气（不经过液态）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 凝华实例（气→固，放热）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>实例</th><th>物态变化过程</th><th>详细解释</th></tr></thead>
    <tbody>
      <tr><td><strong>霜</strong></td><td>水蒸气凝华成冰晶</td><td>深秋或冬季清晨，气温降到冰点以下，近地面水蒸气直接凝华为固态冰晶（白色）。0 ℃ 以上形成的是<strong>露</strong>（液化），0 ℃ 以下形成的是<strong>霜</strong>（凝华）</td></tr>
      <tr><td><strong>雪</strong></td><td>云层中水蒸气凝华成冰晶</td><td>高空云层温度极低，水蒸气直接在凝结核上凝华为六角形冰晶，聚合下落为雪花</td></tr>
      <tr><td><strong>窗玻璃内侧冰花</strong></td><td>室内水蒸气在冷玻璃上凝华</td><td>冬天室内温暖水蒸气遇冷玻璃（<0 ℃）直接凝华为冰花——北方常见，岭南罕见</td></tr>
      <tr><td><strong>雾凇（树挂）</strong></td><td>过冷水滴/水蒸气凝华成冰晶</td><td>水蒸气在低温的树枝、电线上直接凝华为蓬松白色冰晶——吉林雾凇为著名自然景观</td></tr>
      <tr><td><strong>白炽灯泡内壁变黑</strong></td><td>钨丝先升华、后凝华</td><td>高温钨丝（~2800 ℃，未达熔点 3422 ℃）<strong>升华</strong>为钨蒸气→蒸气遇冷灯泡内壁<strong>凝华</strong>为固态钨使壁变黑——兼有升华+凝华</td></tr>
      <tr><td><strong>碘蒸气冷却成固态碘</strong></td><td>碘蒸气凝华为碘晶体</td><td>加热碘升华后的紫色碘蒸气，遇到冷的器皿表面直接凝华为紫黑色固态碘——是凝华经典演示实验</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">辨析</span>
  <h3>三、霜 vs 露——最易混淆的一对</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>对比项</th><th>露</th><th>霜</th></tr></thead>
    <tbody>
      <tr><td><strong>物态变化</strong></td><td><strong>液化</strong>（气态→液态）</td><td><strong>凝华</strong>（气态→固态）</td></tr>
      <tr><td><strong>热量方向</strong></td><td>放热</td><td>放热</td></tr>
      <tr><td><strong>形成温度</strong></td><td>气温 > 0 ℃</td><td>气温 < 0 ℃</td></tr>
      <tr><td><strong>形态</strong></td><td>液态小水珠（透明）</td><td>固态小冰晶（白色）</td></tr>
      <tr><td><strong>形成过程</strong></td><td>水蒸气遇冷（未到冰点）液化在水珠</td><td>水蒸气遇冷（冰点以下）直接凝华为冰晶</td></tr>
      <tr><td><strong>常见季节</strong></td><td>春、夏、初秋清晨</td><td>深秋、冬日清晨</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>口诀</strong>："露是液，霜是固；露在零上，霜在零下。露是液化霜凝华，两个变化别混淆。"</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心总结</span>
  <h3>四、六种物态变化三角关系（表格文字描述）</h3>
  <p><strong>总体规律</strong>：物质在固态、液态、气态三者之间依序转化，构成六种物态变化。能量的吸放取决于"走向"——能量增加的方向（固→液→气）全为吸热，能量减小的方向（气→液→固）全为放热。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>序号</th><th>物态变化</th><th>方向</th><th>中间经过液态？</th><th>热量</th><th>口诀记忆</th></tr></thead>
    <tbody>
      <tr><td>1</td><td><strong>熔化</strong></td><td>固 → 液</td><td>—</td><td><strong>吸热</strong></td><td>「上坡」——固向液走，吸热</td></tr>
      <tr><td>2</td><td><strong>汽化</strong></td><td>液 → 气</td><td>—</td><td><strong>吸热</strong></td><td>「上坡」——液向气走，吸热</td></tr>
      <tr><td>3</td><td><strong>升华</strong></td><td>固 → 气（直接）</td><td><strong>× 跳过液态</strong></td><td><strong>吸热</strong></td><td>「跨坡」——固直跳气，吸热最多（跳过液态需更大能量）</td></tr>
      <tr><td>4</td><td><strong>凝固</strong></td><td>液 → 固</td><td>—</td><td><strong>放热</strong></td><td>「下坡」——液向固走，放热</td></tr>
      <tr><td>5</td><td><strong>液化</strong></td><td>气 → 液</td><td>—</td><td><strong>放热</strong></td><td>「下坡」——气向液走，放热</td></tr>
      <tr><td>6</td><td><strong>凝华</strong></td><td>气 → 固（直接）</td><td><strong>× 跳过液态</strong></td><td><strong>放热</strong></td><td>「跨坡」——气直跳固，放出热量最多</td></tr>
    </tbody>
  </table>
  </div>

  <h4>吸放热分组记忆</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>热量方向</th><th>三个物态变化</th><th>口诀</th></tr></thead>
    <tbody>
      <tr><td><strong>吸热三变</strong></td><td>熔化（固→液）+ 汽化（液→气）+ 升华（固→气）</td><td><strong>"熔汽升，都吸热"</strong>——都是"朝上"走（能量增加）</td></tr>
      <tr><td><strong>放热三变</strong></td><td>凝固（液→固）+ 液化（气→液）+ 凝华（气→固）</td><td><strong>"凝液凝，都放热"</strong>——都是"朝下"走（能量减少）</td></tr>
    </tbody>
  </table>
  </div>

  <div style="text-align:center; padding:14px; background:#e0f2fe; border-radius:8px; margin:12px 0;">
    <p style="font-size:1.05rem; font-weight:700; color:var(--primary);">
      <strong>「上坡吸热，下坡放热」</strong><br>
      从固态→液态→气态（"上坡"）= 吸热三变：熔化、汽化、升华<br>
      从气态→液态→固态（"下坡"）= 放热三变：液化、凝固、凝华<br>
      固态 ⇄ 气态直接跳跃：升华吸热，凝华放热
    </p>
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">综合应用</span>
  <h3>五、自然界中的水循环——物态变化的综合体现</h3>
  <p>地球上的水通过物态变化不断循环，以下按水在地球上"旅行"的过程逐一分析：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>环节</th><th>物态变化</th><th>方向</th><th>热量</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>海洋/湖泊蒸发</strong></td><td><strong>汽化（蒸发）</strong></td><td>液 → 气</td><td>吸热</td><td>太阳辐射提供能量，水从海面进入大气</td></tr>
      <tr><td><strong>植物蒸腾</strong></td><td><strong>汽化（蒸发）</strong></td><td>液 → 气</td><td>吸热</td><td>植物通过叶片气孔释放水蒸气</td></tr>
      <tr><td><strong>冰川/积雪融化</strong></td><td><strong>熔化</strong></td><td>固 → 液</td><td>吸热</td><td>全球变暖加剧冰川融化</td></tr>
      <tr><td><strong>极地冰盖升华</strong></td><td><strong>升华</strong></td><td>固 → 气</td><td>吸热</td><td>低温下冰直接变为水蒸气（不经过液态）</td></tr>
      <tr><td><strong>云的形成（水滴）</strong></td><td><strong>液化</strong></td><td>气 → 液</td><td>放热</td><td>高空温度低，水蒸气在凝结核上液化形成小水滴</td></tr>
      <tr><td><strong>云的形成（冰晶）</strong></td><td><strong>凝华</strong></td><td>气 → 固</td><td>放热</td><td>高空温度极低（< 0 ℃），水蒸气直接凝华为冰晶</td></tr>
      <tr><td><strong>降雨</strong></td><td>（液态下落）</td><td>—</td><td>—</td><td>云中水滴聚合成雨滴→降落。物态未变（还是液），但来源为液化</td></tr>
      <tr><td><strong>降雪</strong></td><td>（固态下落）</td><td>—</td><td>—</td><td>云中冰晶聚合成雪花→降落。物态未变（还是固），但来源为凝华</td></tr>
      <tr><td><strong>河面/湖面结冰</strong></td><td><strong>凝固</strong></td><td>液 → 固</td><td>放热</td><td>冬季气温低于 0 ℃，地表水结冰</td></tr>
      <tr><td><strong>形成霜</strong></td><td><strong>凝华</strong></td><td>气 → 固</td><td>放热</td><td>近地面水蒸气在冰点以下凝华为霜</td></tr>
      <tr><td><strong>形成露</strong></td><td><strong>液化</strong></td><td>气 → 液</td><td>放热</td><td>近地面水蒸气在冰点以上液化为露</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>人工降雨的物态变化原理</strong>：两种方式——(1) 播撒<strong>干冰</strong>：干冰升华吸热 → 云层温度骤降 → 水蒸气凝华为冰晶 → 冰晶下落过程中熔化为雨滴（涉及：升华+凝华+熔化）；(2) 播撒<strong>碘化银</strong>：作为凝结核 → 促进水蒸气凝华为冰晶 → 冰晶增大下落（涉及：凝华+熔化）。</p>
</div>

<div class="knowledge-card card-example">
  <span class="card-badge badge-example">典型例题</span>
  <h3>典型例题精讲（8 道）</h3>

  <h4>例 1（温度计使用——体温计缩口）</h4>
  <p>某人用一支未甩的体温计（示数 36.8 ℃）依次测甲、乙两人的体温。甲实际体温 38.5 ℃，乙实际体温 36.2 ℃。两次读数各为多少？</p>
  <p><strong>解</strong>：测甲（38.5 ℃ > 36.8 ℃）→水银受热膨胀可通过缩口上升→示数 <strong>38.5 ℃</strong>。测乙（36.2 ℃ < 38.5 ℃）→缩口断开后，水银柱不会自动下降→示数仍为 <strong>38.5 ℃</strong>。结论：用前须甩，使液柱退回玻璃泡。</p>

  <h4>例 2（"白气"本质判断）</h4>
  <p>冬天的早晨，小明看到妈妈做饭时锅盖掀开后冒出大量"白气"。这"白气"是（ ）</p>
  <p>A. 水蒸气 &nbsp; B. 小水滴 &nbsp; C. 冰晶 &nbsp; D. CO₂ 气体</p>
  <p><strong>答案</strong>：<strong>B</strong>。"白气"是锅内的水蒸气遇到冷空气后<strong>液化</strong>形成的<strong>小水滴</strong>（液态）。水蒸气是无色无味看不见的气体。</p>

  <h4>例 3（蒸发致冷原理）</h4>
  <p>夏天游泳后刚从水中上岸，一阵风吹过，感觉特别冷。请用物态变化知识解释原因。</p>
  <p><strong>答</strong>：人上岸后身上有水。风加快了<strong>空气流速</strong>，使水分<strong>蒸发加快</strong>。水蒸发时从人体皮肤<strong>吸收热量</strong>（蒸发致冷），使皮肤温度降低，所以感到冷。涉及因素：液体表面积（水覆盖皮肤）+空气流速（风）。</p>

  <h4>例 4（晶体熔化图象分析——中考经典）</h4>
  <p>某同学对一种固体持续加热，记录温度变化数据如下：0～3 min，温度由 20 ℃ 升至 48 ℃；3～7 min，温度保持 48 ℃ 不变；7～10 min，温度由 48 ℃ 升至 80 ℃。请判断：(1) 该固体是晶体还是非晶体？(2) 熔点是多少？(3) 3～7 min 时物质处于什么状态？</p>
  <p><strong>解</strong>：(1) 有固定熔化温度（48 ℃ 恒温段）→是<strong>晶体</strong>（可能是海波）。
  (2) 熔化过程中温度不变的温度即熔点：<strong>48 ℃</strong>。
  (3) 3～7 min 为熔化过程→处于<strong>固液共存态</strong>（部分固态+部分液态）。如果第 5 min 时停止加热，熔化会停止——因为不再吸热（缺少熔化第二条件）。</p>

  <h4>例 5（凝固图象分析——与熔化图象对比）</h4>
  <p>将熔化的海波（液态，100 ℃）放在空气中自然冷却，测得其温度变化如下：0～4 min，温度从 100 ℃ 降至 48 ℃；4～8 min，温度保持 48 ℃；8 min 以后温度继续下降。请分析各段状态并指出凝固点。</p>
  <p><strong>解</strong>：0～4 min：<strong>液态</strong>海波放热降温（对应熔化图象的 DE 段）。4～8 min：海波处于<strong>液固共存</strong>状态，放热但温度保持在 48 ℃（对应凝固图象的 EF 段）——此时进行凝固。凝固点 = <strong>48 ℃</strong>（与熔点相同）。8 min 后：全部凝固为<strong>固态</strong>，继续放热降温（对应 FG 段）。</p>

  <h4>例 6（六种物态变化综合判断）</h4>
  <p>指出以下现象各属于哪种物态变化，并说明吸热还是放热：</p>
  <p>(1) 冬天窗户玻璃上出现冰花 → <strong>凝华</strong>（室内水蒸气→固态冰晶，<strong>放热</strong>）</p>
  <p>(2) 樟脑丸变小变没 → <strong>升华</strong>（固态樟脑→樟脑蒸气，<strong>吸热</strong>）</p>
  <p>(3) 夏天冰棍周围冒"白气" → <strong>液化</strong>（空气中的水蒸气→小水滴，<strong>放热</strong>）</p>
  <p>(4) 白炽灯泡用久变黑 → 钨丝先<strong>升华</strong>（固→气，<strong>吸热</strong>），后<strong>凝华</strong>（气→固，<strong>放热</strong>）</p>
  <p>(5) 冰箱取出的饮料罐外壁有水珠 → <strong>液化</strong>（空气中水蒸气遇冷→液态水，<strong>放热</strong>）</p>

  <h4>例 7（水蒸气烫伤更严重的原因）</h4>
  <p>被 100 ℃ 的水蒸气烫伤往往比被 100 ℃ 的开水烫伤更严重，为什么？</p>
  <p><strong>答</strong>：100 ℃ 水蒸气接触皮肤后，首先<strong>液化</strong>（气→液）为 100 ℃ 的水，这一过程<strong>放出大量液化热</strong>（每克约 $2.26 \\times 10^3\\,\\mathrm{J}$）；然后 100 ℃ 的水再继续放热降温。100 ℃ 开水则只有降温放热阶段，缺少液化放热过程。因此水蒸气烫伤释放的总热量更多，伤得更深。</p>

  <h4>例 8（干冰人工降雨的原理）</h4>
  <p>人工降雨时，常用飞机向云中播撒干冰（固态 CO₂）。请用物态变化知识解释其原理。</p>
  <p><strong>答</strong>：干冰在云层中迅速<strong>升华</strong>（固→气），<strong>吸收大量热量</strong>，使云层温度骤降。云层中的水蒸气在低温下<strong>凝华</strong>为大量冰晶（气→固）。冰晶在下落过程中温度升高，<strong>熔化</strong>为水滴（固→液），形成降雨。整个过程涉及：<strong>升华（吸热）→ 凝华（放热）→ 熔化（吸热）</strong>三个物态变化。</p>
</div>

<div  id="ch09-cfu"class="knowledge-card card-warning">

        </tbody>
      </table></div>
    </div>

<div class="section-title" id="s11-1"><span class="sec-num">&#167;11.1</span> 两种电荷</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、摩擦起电——用摩擦的方法使物体带电</h3>
  <p><strong>现象</strong>：用毛皮摩擦橡胶棒，或用丝绸摩擦玻璃棒，棒能吸引轻小物体（碎纸屑、头发等）——说明棒<strong>带了电</strong>（有了电荷）。</p>
  <p><strong>微观本质</strong>：不同物质的原子核<strong>束缚电子的能力不同</strong>。当两物体相互摩擦时：</p>
  <ul>
    <li><strong>束缚电子能力弱的物体</strong>→<strong>失去电子</strong>→原子核的正电荷多于核外电子负电荷→<strong>带正电</strong></li>
    <li><strong>束缚电子能力强的物体</strong>→<strong>得到电子</strong>→核外电子负电荷多于原子核正电荷→<strong>带负电</strong></li>
  </ul>
  <p><strong>核心结论</strong>：摩擦起电不是"创造"了电荷，而是<strong>电子从一个物体转移到另一个物体</strong>——电荷总量不变（电荷守恒）。失去电子的带正电，得到电子的带负电，两物体带<strong>等量异种</strong>电荷。</p>
  <p><strong>原子结构回顾</strong>：原子由带正电的<strong>原子核</strong>（质子带正电 + 中子不带电）和核外带负电的<strong>电子</strong>组成。正常情况下原子不显电性（正负电荷量相等）。摩擦起电只涉及<strong>核外电子</strong>的转移，原子核内的质子不移动。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">规律</span>
  <h3>二、两种电荷与电荷间相互作用</h3>
  <h4>1. 自然界只有两种电荷</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>电荷种类</th><th>规定</th><th>经典摩擦起电实例</th></tr></thead>
    <tbody>
      <tr><td><strong>正电荷（+）</strong></td><td>用<strong>丝绸</strong>摩擦过的<strong>玻璃棒</strong>所带的电荷</td><td>玻璃棒束缚电子能力弱于丝绸→玻璃棒失去电子→带正电；丝绸得到电子→带负电</td></tr>
      <tr><td><strong>负电荷（-）</strong></td><td>用<strong>毛皮</strong>摩擦过的<strong>橡胶棒</strong>所带的电荷</td><td>毛皮束缚电子能力弱于橡胶棒→毛皮失去电子→带正电；橡胶棒得到电子→带负电</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 电荷间相互作用规律</h4>
  <div class="formula-block">
    $\\text{同种电荷相互排斥，异种电荷相互吸引}$
  </div>
  <p><strong>同斥异吸</strong>——这是判断物体是否带电以及带何种电荷的基本依据。两个轻小物体：若相互排斥→一定带<strong>同种</strong>电荷；若相互吸引→可能带<strong>异种</strong>电荷，也可能一个带电一个不带电（带电体吸引轻小物体）。</p>
  <p><strong>重要辨析</strong>：两个物体相互吸引，<strong>不一定</strong>都带电！可能是一个带电体吸引不带电的轻小物体。但两个物体相互排斥，则<strong>一定</strong>带同种电荷。</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">实验</span>
  <h3>三、验电器——检验物体是否带电</h3>
  <p><strong>结构</strong>：金属球、金属杆、两片金属箔（封装在玻璃瓶内）。</p>
  <p><strong>原理</strong>：<strong>同种电荷相互排斥</strong>。当带电体接触验电器的金属球时，电荷通过金属杆传到两片金属箔上，两箔片带<strong>同种电荷</strong>，相互排斥而张开。箔片张角越大，说明带的电荷越多。</p>
  <p><strong>功能</strong>：验电器只能检验物体<strong>是否带电</strong>，不能直接判断带的是正电还是负电（除非先用已知电荷种类的带电体接触作为参考）。</p>
  <p><strong>验电器带电方式</strong>：</p>
  <ul>
    <li><strong>接触带电</strong>：带电体直接接触金属球→电荷转移至箔片→箔片张开。</li>
    <li><strong>感应带电</strong>（拓展）：带电体靠近但不接触金属球→金属球感应异种电荷、箔片感应同种电荷→箔片张开（静电感应）。移走带电体后箔片闭合。</li>
  </ul>
</div>

<div class="knowledge-card card-definition">

  <h3>四、电荷量——电荷的多少</h3>
  <p><strong>定义</strong>：电荷的多少叫做<strong>电荷量</strong>，简称<strong>电荷</strong>，符号 <strong>$Q$</strong>（或 $q$）。</p>
  <p><strong>单位</strong>：<strong>库仑</strong>，简称<strong>库</strong>，符号 <strong>$\\mathrm{C}$</strong>。</p>
  <p><strong>元电荷</strong>：一个电子所带的电荷量是最小的电荷单元，称为<strong>元电荷</strong>（$e$）：</p>

  <p>任何物体所带的电荷量都是元电荷的<strong>整数倍</strong>（$Q = ne$，$n$ 为正整数）。一个电子带 $-e$ 的电荷，一个质子带 $+e$ 的电荷。</p>
  <p><strong>常见电荷量对比</strong>：摩擦起电时橡胶棒带的电荷量约 $10^{-7}\\,\\mathrm{C}$；雷雨云带电量可达几十库仑。1 C 约等于 $6.25 \\times 10^{18}$ 个电子所带的电荷量——这是一个<strong>巨大的</strong>数量。</p>
  <p><strong>电荷守恒定律</strong>：电荷既不能创造，也不能消灭，只能从一个物体<strong>转移</strong>到另一个物体，或者从物体的一部分转移到另一部分，在转移过程中<strong>电荷的总量保持不变</strong>。</p>
</div>

<div class="section-title" id="s11-2"><span class="sec-num">&#167;11.2</span> 导体与绝缘体</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、导体——容易导电的物体</h3>
  <p><strong>定义</strong>：<strong>容易导电</strong>的物体叫做导体。</p>
  <p><strong>导电原因（微观解释）</strong>：导体内有大量<strong>自由电荷</strong>。金属导体中有大量<strong>自由电子</strong>——它们可以脱离原子核的束缚，在金属内部自由移动。当导体两端加上电压时，自由电荷定向移动形成电流。</p>
  <p><strong>常见的导体（5 例）</strong>：</p>
  <ol>
    <li><strong>金属</strong>（铜、铝、铁、银等——自由电子导电，银的导电性最好但铜最常用）</li>
    <li><strong>石墨</strong>（碳的导电形式——也有自由电子，铅笔芯是石墨做的所以能导电）</li>
    <li><strong>人体</strong>（含大量电解质离子——人体是导体，所以会触电）</li>
    <li><strong>大地</strong>（土壤中的水分含离子——"接地"利用大地作为导体）</li>
    <li><strong>酸碱盐的水溶液</strong>（如食盐溶液、稀硫酸——靠正负离子导电）</li>
  </ol>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>二、绝缘体——不容易导电的物体</h3>
  <p><strong>定义</strong>：<strong>不容易导电</strong>的物体叫做绝缘体。</p>
  <p><strong>不导电原因（微观解释）</strong>：绝缘体内部<strong>几乎没有自由电荷</strong>——核外电子被原子核牢牢束缚，不能自由移动。因此即使加上电压，也无法形成持续的定向电荷移动。</p>
  <p><strong>常见的绝缘体（5 例）</strong>：</p>
  <ol>
    <li><strong>橡胶</strong>（电线外皮、电工手套）</li>
    <li><strong>塑料</strong>（插座外壳、电线包皮）</li>
    <li><strong>玻璃</strong>（常温下是绝缘体——用丝绸摩擦玻璃棒，电子不能自由移动，所以电荷留在表面）</li>
    <li><strong>陶瓷</strong>（高压电线的绝缘子——绝缘性能极好）</li>
    <li><strong>干燥的木头/空气</strong>（干燥木头是绝缘体，但潮湿木头含水分→变成导体；干燥空气是绝缘体，潮湿空气导电性增大）</li>
  </ol>
  <p><strong>重要警示</strong>：导体和绝缘体之间<strong>没有绝对界限</strong>。条件改变时，绝缘体可能变成导体：</p>
  <ul>
    <li>干燥木头 → 潮湿木头（水分含离子→导电）</li>
    <li>常温玻璃不导电 → 高温下玻璃变成导体（加热到红炽状态，部分电子获得足够能量摆脱束缚）</li>
    <li>纯水是绝缘体 → 含杂质的水是导体（实验中的水常含电解质离子）</li>
  </ul>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">对比</span>
  <h3>三、导体 vs 绝缘体 vs 半导体对比</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>类型</th><th>导电性</th><th>微观原因</th><th>常见实例</th><th>应用</th></tr></thead>
    <tbody>
      <tr><td><strong>导体</strong></td><td>容易导电</td><td>有大量<strong>自由电荷</strong>（金属有自由电子；溶液有正负离子）</td><td>铜、铝、铁、石墨、人体、大地、酸碱盐溶液</td><td>电线芯、电路连接</td></tr>
      <tr><td><strong>绝缘体</strong></td><td>不容易导电</td><td><strong>几乎没有</strong>自由电荷（电子被原子核紧紧束缚）</td><td>橡胶、塑料、玻璃、陶瓷、干燥木头、纯水</td><td>电线外皮、电工工具手柄</td></tr>
      <tr><td><strong>半导体</strong></td><td>导电性介于导体与绝缘体之间</td><td>自由电荷数量介于两者间，且随温度/光照/杂质急剧变化</td><td>硅（Si）、锗（Ge）、砷化镓（GaAs）</td><td>二极管、三极管、集成电路芯片</td></tr>
    </tbody>
  </table>
  </div>
  <h4>半导体与二极管（单向导电性）</h4>
  <p><strong>半导体</strong>导电性处于导体与绝缘体之间，且导电性受<strong>温度、光照、杂质</strong>的影响极大——这是半导体的独特性质。利用半导体制成的<strong>二极管</strong>具有<strong>单向导电性</strong>：电流只能从二极管的正极（+）流向负极（-），反向则不能导通（相当于断路）。二极管在电路图中符号为：<strong>+</strong>（P 端）←|（PN 结）→<strong>-</strong>（N 端），箭头方向表示允许电流通过的方向。</p>
  <p><strong>发光二极管（LED）</strong>：当电流通过时能发光，长脚为正极。</p>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<!-- §11.3 电流与电路 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s11-3"><span class="sec-num">&#167;11.3</span> 电流与电路</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、电流的形成与方向</h3>
  <h4>1. 电流的形成</h4>
  <p><strong>定义</strong>：<strong>电荷的定向移动</strong>就形成了电流。注意三个关键词：①电荷（有自由电荷）；②定向（有方向地移动，不是杂乱无章的热运动）；③移动（电荷在移动）。</p>
  <p><strong>微观过程</strong>：以金属导体为例——金属内部有大量自由电子，它们一直在做无规则热运动。当导体两端加上电压时，自由电子除了热运动之外，还沿<strong>一个方向</strong>做定向移动，于是就形成了电流。</p>

  <h4>2. 电流方向的规定</h4>
  <p><strong>规定</strong>：<strong>正电荷定向移动的方向</strong>为电流方向。</p>
  <p><strong>重要结论</strong>：在金属导体中，电流是由<strong>自由电子</strong>的定向移动形成的（自由电子带负电）。自由电子移动的方向与电流方向<strong>相反</strong>——电流从电源正极出发→经用电器→回到电源负极，而自由电子实际上是从负极出发→经用电器→回到正极。</p>
  <p><strong>酸、碱、盐水溶液中</strong>：电流由正离子和负离子同时定向移动形成——正离子向负极移动（方向与电流方向一致），负离子向正极移动（方向与电流方向相反）。</p>

  <h4>3. 获得持续电流的条件</h4>
  <p>电路中要获得<strong>持续</strong>的电流，必须同时满足两个条件：</p>
  <ol>
    <li><strong>有电源</strong>——提供电压（电压是使电荷定向移动形成电流的原因）</li>
    <li><strong>电路是闭合的</strong>（通路）——形成闭合回路，电荷才能循环流动</li>
  </ol>
  <p>两者<strong>缺一不可</strong>。有电源但电路断开（断路）→无电流；电路闭合但没有电源→也无电流。</p>
  <div class="formula-block">
    $\\text{持续电流的形成条件：有电源} + \\text{电路闭合}$
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">组成</span>
  <h3>二、电路的组成——四大元件各司其职</h3>
  <p><strong>电路</strong>：把<strong>电源、用电器、开关</strong>用<strong>导线</strong>连接起来组成的电流可以流过的路径，叫做电路。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>元件</th><th>符号</th><th>作用</th><th>能量转化</th><th>举例</th></tr></thead>
    <tbody>
      <tr><td><strong>电源</strong></td><td style="text-align:center;"><strong>+|  -</strong></td><td>提供<strong>电压</strong>，使电路中有持续电流</td><td>将其它形式的能转化为<strong>电能</strong></td><td>干电池（化学能→电能）、蓄电池、发电机（机械能→电能）、太阳能电池（光能→电能）</td></tr>
      <tr><td><strong>用电器</strong></td><td style="text-align:center;">灯泡/电动机</td><td>利用电能工作</td><td>将<strong>电能</strong>转化为其它形式的能</td><td>电灯（电能→光能+热能）、电动机（电能→机械能）、电铃、电炉</td></tr>
      <tr><td><strong>开关</strong></td><td style="text-align:center;">—/ —</td><td><strong>控制</strong>电路的通断</td><td>—</td><td>拉线开关、按钮开关、闸刀开关、空气开关</td></tr>
      <tr><td><strong>导线</strong></td><td style="text-align:center;">——</td><td><strong>连接</strong>各元件，输送电能</td><td>—（理想导线不耗电）</td><td>铜导线、铝导线</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>记忆口诀</strong>：电源供电压，导线连成路，用电器干活，开关管通断。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">辨析</span>
  <h3>三、电路的三种状态——通路、断路、短路</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>状态</th><th>定义</th><th>是否有电流</th><th>特征与危害</th></tr></thead>
    <tbody>
      <tr><td><strong>通路</strong></td><td>处处连通的电路（闭合电路）</td><td><strong>有</strong>电流</td><td>用电器正常工作。这是电路中<strong>唯一正常</strong>的状态。</td></tr>
      <tr><td><strong>断路</strong>（开路）</td><td>电路在某处<strong>断开</strong>（开关断开、导线断裂、接线松动、用电器损坏）</td><td><strong>无</strong>电流</td><td>用电器不工作。查找断路点可用"电流法"逐一排查。</td></tr>
      <tr><td><strong>短路</strong></td><td>电源两极<strong>不经过用电器</strong>直接用导线连接</td><td><strong>有</strong>电流（且极大！）</td><td><strong>极其危险！</strong>电流极大→烧毁电源、引发火灾。短路时导线中电流极大，但用电器中<strong>无电流通过</strong>（电流走了"捷径"）。短路是绝对不能允许的故障状态！</td></tr>
    </tbody>
  </table>
  </div>

  <h4>短路的核心理解（高频考点）</h4>
  <p><strong>电源短路</strong>：导线直接连接电源正负极，不经过任何用电器——短路电流 $I = \\frac{U}{r}$（$r$ 为导线电阻，极小），电流极大，会烧坏电源甚至引发火灾。实验中绝不允许！</p>
  <p><strong>用电器被短接（局部短路）</strong>：某用电器两端被导线直接连通——电流绕过该用电器（走了"捷径"），该用电器无电流通过、不工作，但电源和其他用电器仍可能工作。例如：两灯串联，用导线将其中一盏灯短路→该灯熄灭，另一盏更亮。</p>
  <p><strong>判定方法</strong>：如果电流可以不经过用电器而从电源正极直接流回负极→是短路。看电路图中是否存在纯导线路径能绕过所有用电器——如有，必短路！</p>
</div>

<!-- §11.4 串联电路与并联电路 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s11-4"><span class="sec-num">&#167;11.4</span> 串联电路与并联电路</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">对比</span>
  <h3>一、串联电路——逐个顺次连接</h3>
  <p><strong>定义</strong>：把电路元件<strong>逐个顺次</strong>连接起来的电路叫做串联电路。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>特点</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>电流路径</strong></td><td>只有<strong>一条</strong>路径，电流依次流过每个元件</td></tr>
      <tr><td><strong>各用电器关系</strong></td><td>相互<strong>影响</strong>——一个用电器损坏或断开，整个电路断路，所有用电器都不工作</td></tr>
      <tr><td><strong>开关控制</strong></td><td>一个开关控制<strong>整个电路</strong>——无论在何处断开，电路中所有用电器都停止工作（开关位置不影响控制效果）</td></tr>
      <tr><td><strong>"一断全断"</strong></td><td>串联电路的最大特征——任何一处断开，整条电路都没有电流</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>类比</strong>：一串糖葫芦——一根签子串起所有山楂，拿走一颗全串散架。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">对比</span>
  <h3>二、并联电路——并列连接</h3>
  <p><strong>定义</strong>：把电路元件<strong>并列</strong>连接在电路两点之间的电路叫做并联电路。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>特点</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>电流路径</strong></td><td>有<strong>多条</strong>路径——电流在分支点（节点）分流，在汇合点合流</td></tr>
      <tr><td><strong>干路与支路</strong></td><td><strong>干路</strong>：电流必经的共同路径（从电源到第一个分支点，以及从汇合点到电源）。<strong>支路</strong>：从分支点分开后到汇合点之前各自独立的路径。每条支路与电源单独构成回路。</td></tr>
      <tr><td><strong>各用电器关系</strong></td><td>各支路<strong>独立工作</strong>——一个支路断开，其他支路仍正常工作（互不影响）</td></tr>
      <tr><td><strong>开关控制</strong></td><td><strong>干路开关</strong>控制整个电路（控制所有用电器）；<strong>支路开关</strong>只控制其所在支路的用电器（不影响其他支路）</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>类比</strong>：家中的多个插座——每个插座独立接到电源，拔掉一个不影响其他。</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">方法</span>
  <h3>三、串联与并联的识别方法（三种核心方法）</h3>

  <h4>方法 1：电流流向法（最常用）</h4>
  <p>从电源正极出发，沿导线"走"，看电流流经各元件的路径：</p>
  <ul>
    <li>如果电流<strong>只有一条路径</strong>、依次经过所有元件→<strong>串联</strong></li>
    <li>如果电流在某处出现"岔路"（<strong>分流</strong>），分成多条路径再汇合→<strong>并联</strong></li>
  </ul>
  <p>若有 $n$ 个用电器，并联时至少有两个节点（分支点与汇合点），每个用电器两端的连接点相同。</p>

  <h4>方法 2：拆除法（断开法）</h4>
  <p>设想<strong>拆除</strong>（或断开）其中一个用电器：</p>
  <ul>
    <li>拆除后<strong>所有</strong>用电器都不工作→<strong>串联</strong>（一断全断）</li>
    <li>拆除后<strong>其它用电器仍工作</strong>→<strong>并联</strong>（互不影响）</li>
  </ul>
  <p><strong>技巧</strong>：对着电路图，用手指"遮住"一个用电器——看其余用电器是否还能构成闭合回路。</p>

  <h4>方法 3：节点法</h4>
  <p>找出电路中所有<strong>节点</strong>（三条或以上导线交汇的点）。如果所有用电器连接在<strong>同一对节点</strong>之间→是并联。如果每个用电器连在<strong>不同的节点</strong>之间、首尾相连→是串联。</p>
  <p><strong>口诀</strong>："串联一条路，并联有岔路；断开看影响，节点定结构。"</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">应用</span>
  <h3>四、生活中的串并联电路实例</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>实例</th><th>连接方式</th><th>原因</th></tr></thead>
    <tbody>
      <tr><td><strong>家庭电路</strong></td><td><strong>并联</strong></td><td>各用电器独立工作——关掉电灯不影响电视机、冰箱。各用电器电压相等（都等于 220 V）。如果串联则一个电器关掉全屋停电，且各用电器分压不足。</td></tr>
      <tr><td><strong>节日小彩灯</strong></td><td><strong>串联</strong></td><td>几十个小彩灯逐个顺次串联在电路中——一个灯坏了（灯丝断开），整串灯都不亮。也有改进型：每灯内部并联一个电阻丝→某灯断路时电流可从电阻丝流过，只灭一盏。</td></tr>
      <tr><td><strong>教室照明灯</strong></td><td><strong>并联</strong></td><td>六盏日光灯并联在照明电路中——每盏灯有独立开关（支路开关），互不影响。</td></tr>
      <tr><td><strong>路灯</strong></td><td><strong>并联</strong></td><td>一盏路灯坏了，其它路灯照常工作——因此不是串联。</td></tr>
      <tr><td><strong>电冰箱内的灯与压缩机</strong></td><td><strong>并联</strong></td><td>开门灯亮，关门灯灭——但压缩机（电动机）关门时仍在运转制冷。不同时工作，互不影响。</td></tr>
      <tr><td><strong>装饰灯带的混联</strong></td><td><strong>串并联混合</strong></td><td>若干小灯先串联为一组，多组再并联（先串后并）——兼顾美观与可靠性，一组中坏一个只灭该组。</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- §11.5 电流的测量 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s11-5"><span class="sec-num">&#167;11.5</span> 电流的测量</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、电流——定义与单位</h3>
  <p><strong>物理意义</strong>：电流是表示<strong>电流强弱</strong>的物理量。</p>
  <p><strong>定义式</strong>：单位时间内通过导体某一横截面的<strong>电荷量</strong>，叫做电流，符号 $I$。</p>
  <div class="formula-block">
    $I = \\frac{Q}{t}$
  </div>
  <p>式中 $I$ 为电流，$Q$ 为通过的电荷量，$t$ 为通电时间。</p>
  <p><strong>单位</strong>：</p>
  <ul>
    <li>国际单位：<strong>安培</strong>，简称<strong>安</strong>，符号 <strong>$\\mathrm{A}$</strong></li>
    <li>常用单位：<strong>毫安</strong>（$\\mathrm{mA}$）、<strong>微安</strong>（$\\mathrm{\\mu A}$）</li>
    <li>换算关系：</li>
  </ul>
  <div class="formula-block">
    $1\\,\\mathrm{A} = 10^3\\,\\mathrm{mA} = 10^6\\,\\mathrm{\\mu A}$
  </div>
  <div class="table-wrap">
  <table>
    <thead><tr><th>常见用电器</th><th>电流约值</th></tr></thead>
    <tbody>
      <tr><td>电子手表（液晶屏）</td><td>1.5 ～ 2 $\\mathrm{\\mu A}$</td></tr>
      <tr><td>小型计算器</td><td>约 130 $\\mathrm{\\mu A}$</td></tr>
      <tr><td>普通家用白炽灯</td><td>约 0.2 ～ 0.5 $\\mathrm{A}$</td></tr>
      <tr><td>家用电冰箱</td><td>约 0.5 ～ 1 $\\mathrm{A}$</td></tr>
      <tr><td>家用空调</td><td>约 4 ～ 8 $\\mathrm{A}$</td></tr>
      <tr><td>雷电</td><td>可达 $2 \\times 10^4$ ～ $2 \\times 10^5\\,\\mathrm{A}$</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">实验</span>
  <h3>二、电流表——使用规则与读数</h3>

  <h4>1. 电流表的使用规则（"四要两不"）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>规则</th><th>具体操作</th><th>原因/后果</th></tr></thead>
    <tbody>
      <tr><td><strong>1. 串联</strong>在电路中</td><td>电流表必须<strong>串联</strong>接入被测电路——让被测电流全部流过电流表</td><td>并联会使电流表短路（电流表内阻很小→并联相当于导线短路）</td></tr>
      <tr><td><strong>2. 正入负出</strong></td><td>电流从<strong>正（+）接线柱</strong>流入，从<strong>负（-）接线柱</strong>流出</td><td>接反会<strong>反向偏转</strong>→指针反偏→损坏电流表！</td></tr>
      <tr><td><strong>3. 不超量程</strong></td><td>被测电流不能超过电流表的<strong>量程</strong>（最大测量值）</td><td>超量程会<strong>烧坏</strong>电流表！量程选择原则：先用<strong>大量程</strong>试触</td></tr>
      <tr><td><strong>4. 绝对不允许直接接电源！</strong></td><td>电流表<strong>不能直接</strong>接在电源两极上（不经过用电器）</td><td>电流表内阻极小→直接接电源＝电源短路→<strong>电流极大→立即烧毁电流表！</strong></td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 电流表的读数——三步法</h4>
  <p><strong>第一步：先看量程</strong>——看接线柱选的是哪个量程（0 ～ 0.6 A 还是 0 ～ 3 A）。</p>
  <p><strong>第二步：再看分度值</strong>——</p>
  <ul>
    <li>量程 <strong>0 ～ 0.6 A</strong>：分度值为 <strong>0.02 A</strong>（一大格 0.2 A，10 小格）</li>
    <li>量程 <strong>0 ～ 3 A</strong>：分度值为 <strong>0.1 A</strong>（一大格 1 A，10 小格）</li>
  </ul>
  <p><strong>第三步：读指针位置</strong>——指针偏转了多少格，乘以分度值即得电流值。读数一定要带单位。</p>

  <h4>3. 电流表量程选择策略</h4>
  <p><strong>试触法</strong>：先用 <strong>0 ～ 3 A</strong> 量程<strong>大量程</strong>接线柱试触——如果指针偏转角度 <strong>小于 0.6 A</strong>，则换用 <strong>0 ～ 0.6 A</strong> 量程（小量程分度值更精细，读数更精确）。如果指针偏转超过 3 A→电流太大，不能测！</p>
  <p><strong>原则</strong>：在<strong>不超过量程</strong>的前提下，尽量选择<strong>小量程</strong>——提高测量精度。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">核心辨析</span>
  <h3>三、电流与水流——建立物理直觉</h3>
  <p><strong>类比法理解电流</strong>：将电流类比为<strong>水流</strong>——</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>电流概念</th><th>水流类比</th></tr></thead>
    <tbody>
      <tr><td><strong>电流（I）</strong></td><td>水流（每秒流过多少水）</td></tr>
      <tr><td><strong>电源（电压）</strong></td><td>水泵（提供水压——使水流动的推力）</td></tr>
      <tr><td><strong>导线</strong></td><td>水管（水流的通道）</td></tr>
      <tr><td><strong>开关</strong></td><td>水龙头阀门（控制通断）</td></tr>
      <tr><td><strong>用电器</strong></td><td>水轮机/水车（利用水流做功的装置）</td></tr>
      <tr><td><strong>串联</strong></td><td>一根水管串起所有水轮机——水流依次经过每一个</td></tr>
      <tr><td><strong>并联</strong></td><td>总管分岔成多根支管——每根支管独立供水，各自有阀门</td></tr>
      <tr><td><strong>短路</strong></td><td>水直接通过旁通管绕过了所有水轮机流回水泵——水轮机不转，水泵过载</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>类比局限性</strong>：水流模型不能解释电流的<strong>方向规定</strong>（正电荷移动方向=电流方向，与电子移动方向相反），也不能解释半导体导电等微观机制。类比是构建直觉的桥梁，不是精确的物理模型。</p>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<!-- 常见误区 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">常见误区</span>
  <h3>本章常见误区辨析（8 条）</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>#</th><th>误区</th><th>正确理解</th><th>类型</th></tr></thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>"摩擦起电是创造了电荷"</td>
        <td>摩擦起电是<strong>电子转移</strong>——电荷总量不变（电荷守恒）。失去电子的带正电，得到电子的带负电。</td>
        <td><span class="miscon-type miscon-surface">&#127993; 表面</span></td>
      </tr>
      <tr>
        <td>2</td>
        <td>"摩擦起电中，带正电的物体得到了质子"</td>
        <td>质子（在原子核内）<strong>不会</strong>在摩擦过程中转移！摩擦起电只涉及<strong>核外电子</strong>的转移。失去电子→带正电，不是得到质子。</td>
        <td><span class="miscon-type miscon-deep">&#129504; 深层</span></td>
      </tr>
      <tr>
        <td>3</td>
        <td>"两个物体相互吸引，一定都带电"</td>
        <td><strong>不一定。</strong>可能一个带电、一个不带电（带电体吸引轻小物体）；也可能带异种电荷。但互相排斥则<strong>一定</strong>带同种电荷。</td>
        <td><span class="miscon-type miscon-structural">&#128736; 结构</span></td>
      </tr>
      <tr>
        <td>4</td>
        <td>"验电器可以判断带正电还是负电"</td>
        <td><strong>不可以。</strong>验电器只能检验<strong>是否带电</strong>——箔片张角说明带了电，至于是正是负，不能直接判断（需借助已知电荷的物体）。</td>
        <td><span class="miscon-type miscon-surface">&#127993; 表面</span></td>
      </tr>
      <tr>
        <td>5</td>
        <td>"导体能导电是因为内部有大量自由质子"</td>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、电阻的定义与物理意义</h3>
  <p><strong>定义</strong>：电阻表示<strong>导体对电流阻碍作用</strong>的大小。符号为 <strong>$R$</strong>（Resistance），国际单位是<strong>欧姆</strong>，简称<strong>欧</strong>，符号 <strong>$\\Omega$</strong>。</p>
  <p><strong>常用单位换算</strong>：</p>
  <div class="formula-block">
    $1\\,\\mathrm{k\\Omega} = 10^3\\,\\Omega,\\quad 1\\,\\mathrm{M\\Omega} = 10^6\\,\\Omega$
  </div>
  <p><strong>物理意义</strong>：电阻是导体<strong>本身的一种属性</strong>，反映导体对电流阻碍作用的强弱。在相同电压下，导体的电阻越大，通过它的电流越小——电阻是衡量导体导电能力"好与差"的物理量。</p>
  <p><strong>类比理解</strong>：电流如水，电压如水压，电阻如水管对水流的阻力。水管越细越长→阻力越大→水流越小（电压一定时，电阻越大→电流越小）。</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">探究实验</span>
  <h3>二、探究：影响导体电阻大小的因素（控制变量法）</h3>
  <p><strong>实验目的</strong>：探究导体电阻大小与<strong>材料、长度、横截面积、温度</strong>的关系。</p>
  <p><strong>实验方法</strong>：<strong>控制变量法</strong>——每次只改变一个因素，保持其他因素不变，比较电路中电流表示数（电流大→电阻小；电流小→电阻大）。也可用电压表和电流表精确测量 $R = U/I$。</p>

  <h4>实验 1：材料对电阻的影响</h4>
  <p>取<strong>长度、横截面积相同</strong>的镍铬合金丝和铜丝，分别接入同一电路（电压不变），观察电流表示数。镍铬合金丝接入时电流<strong>明显偏小</strong>。结论：<strong>导体的电阻与材料有关。</strong>不同材料的导电性能不同——银、铜、铝的导电性能好（电阻率小），镍铬合金、锰铜的导电性能较差（电阻率大）。</p>

  <h4>实验 2：长度对电阻的影响</h4>
  <p>取<strong>同种材料、相同横截面积</strong>的导线，分别接入不同长度，保持电压不变。导线越长，电流<strong>越小</strong>。结论：<strong>同种材料、相同横截面积时，导体越长，电阻越大。</strong>（电阻与长度成正比：$R \\propto L$）</p>

  <h4>实验 3：横截面积对电阻的影响</h4>
  <p>取<strong>同种材料、相同长度</strong>的导线，分别接入不同横截面积，保持电压不变。导线越粗，电流<strong>越大</strong>。结论：<strong>同种材料、相同长度时，导体的横截面积越大，电阻越小。</strong>（电阻与横截面积成反比：$R \\propto 1/S$）</p>

  <h4>实验 4：温度对电阻的影响</h4>
  <p>用酒精灯加热接入电路中的金属丝（镍铬合金丝），观察电流表示数变化。加热后电流<strong>变小</strong>。结论：<strong>多数金属导体的电阻随温度升高而增大。</strong>（少数材料如碳、某些半导体，温度升高→电阻减小）</p>

  <p><strong>综合结论——电阻定律（定性）</strong>：导体的电阻由<strong>材料、长度、横截面积</strong>共同决定，还与<strong>温度</strong>有关。用公式表达（初中不要求计算）：</p>
  <div class="formula-block">
    $R = \\rho\\frac{L}{S}$
  </div>
  <p>其中 $L$ 为导体长度，$S$ 为横截面积，$\\rho$ 为<strong>电阻率</strong>（由材料决定，单位 $\\Omega \\cdot \\mathrm{m}$）。初中阶段只作定性理解，不要求用此公式进行计算。</p>
</div>

<div class="knowledge-card card-warning">

  <h3>三、电阻是导体本身的属性——与电压、电流无关</h3>
  <p><strong>核心结论：电阻是导体本身的一种属性，由导体的材料、长度、横截面积和温度决定，与加在导体两端的电压和通过导体的电流<strong>无关</strong>。</strong></p>
  <p><strong>辨析要点</strong>：</p>

    <li><strong>类比</strong>：$\\rho = m/V$ 测密度、$v = s/t$ 测速度——这些都是"测法公式"而非"决定式"。</li>
  </ul>
</div>

  <h3>一、滑动变阻器——原理与结构</h3>
  <p><strong>原理</strong>：通过改变接入电路中<strong>电阻丝的长度</strong>来改变电阻，从而改变电路中的电流和电压分配。</p>

  <h4>结构认知</h4>
  <div class="table-wrap">
  <table>

      <tr><td><strong>滑片 P</strong></td><td>可在电阻丝上滑动的金属片，接触处绝缘层被磨掉——滑片接触处与一端接线柱之间的电阻丝为接入部分</td></tr>
      <tr><td><strong>四个接线柱</strong></td><td>上方两个 $C, D$（接金属杆——电阻为零），下方两个 $A, B$（接电阻丝两端）</td></tr>
      <tr><td><strong>金属杆</strong></td><td>连接上方两个接线柱，滑片通过金属杆与上方接线柱电连通</td></tr>
    </tbody>
  </table>
  </div>

  <h4>电路符号</h4>
  <div class="formula-block">

  <p>符号中箭头表示滑片，长方形框表示电阻丝本体。更常见的画法是带有箭头斜穿电阻符号的矩形。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">操作规范</span>
  <h3>二、滑动变阻器的接线方法——"一上一下"</h3>
  <p><strong>核心规则：接线必须"一上一下"——一个接线柱接上方（金属杆），一个接线柱接下方（电阻丝端）。</strong></p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>接法</th><th>接入电路的部分</th><th>滑片 P 向左移→电阻变化</th><th>滑片 P 向右移→电阻变化</th></tr></thead>
    <tbody>
      <tr><td><strong>接 A+ C（或 A + D）</strong></td><td>AP 段（A → P）</td><td>AP 变短 → 电阻<strong>减小</strong></td><td>AP 变长 → 电阻<strong>增大</strong></td></tr>
      <tr><td><strong>接 B + C（或 B + D）</strong></td><td>BP 段（B → P）</td><td>BP 变长 → 电阻<strong>增大</strong></td><td>BP 变短 → 电阻<strong>减小</strong></td></tr>
      <tr><td><strong>接 A + B（两个下方）</strong></td><td>全部电阻丝 AB</td><td colspan="2" style="text-align:center;">滑片移动<strong>无法改变电阻</strong>→相当于定值电阻（最大阻值）</td></tr>
      <tr><td><strong>接 C + D（两个上方）</strong></td><td>金属杆 CD（零电阻）</td><td colspan="2" style="text-align:center;">电阻始终为<strong>零</strong>→相当于导线</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>使用注意事项</strong>：</p>
  <ol>
    <li><strong>连接方式</strong>：必须"一上一下"——才能通过滑片改变接入电阻。</li>
    <li><strong>闭合开关前</strong>：应将滑片调到<strong>接入电阻最大</strong>的位置（即离所接下方接线柱最远的一端）——起<strong>保护电路</strong>的作用。</li>
    <li><strong>铭牌参数</strong>：如标有"$50\\,\\Omega\\;1\\,\\mathrm{A}$"表示最大阻值为 $50\\,\\Omega$，允许通过的最大电流为 $1\\,\\mathrm{A}$。使用中电流不能超过额定值。</li>
    <li><strong>缓慢调节</strong>：调节滑片时观察电流表，避免电流骤增烧坏仪器。</li>
  </ol>

  <p><strong>记忆口诀</strong>："一上一下来接线，开关闭合调最大；滑片移近电阻小，滑片移远电阻大。"</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>三、电阻箱——读数方法</h3>
  <p><strong>电阻箱</strong>是一种可以<strong>直接读出阻值</strong>的变阻器。与滑动变阻器不同，电阻箱可以<strong>精确地提供某一确定电阻值</strong>（而滑动变阻器只能连续改变但无法直接读值）。</p>

  <h4>旋钮式电阻箱的读数方法</h4>
  <p>面板上有若干个旋钮，每个旋钮对应一个数位（千位、百位、十位、个位），每个旋钮的边缘标有 0～9。读数时将各旋钮<strong>对准标记点的数字</strong>乘以对应位的<strong>倍率</strong>，然后<strong>求和</strong>：</p>
  <div class="formula-block">
    $R_{\\text{总}} = \\text{千位值} \\times 1000 + \\text{百位值} \\times 100 + \\text{十位值} \\times 10 + \\text{个位值} \\times 1$
  </div>
  <p>例如：千位指向 3，百位指向 6，十位指向 0，个位指向 8 → 电阻为 $3608\\,\\Omega$。</p>

  <h4>插入式电阻箱（了解）</h4>
  <p>有多个定值电阻，通过<strong>拔出铜塞</strong>使对应电阻接入电路（未拔出铜塞时，电流通过铜塞短路了该电阻——电流走捷径不走电阻）。读数 = 所有被拔出铜塞处对应电阻值之和。</p>

  <h4>滑动变阻器 vs 电阻箱对比</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>对比项</th><th>滑动变阻器</th><th>电阻箱</th></tr></thead>
    <tbody>
      <tr><td><strong>优点</strong></td><td>可连续改变电阻</td><td>可直接读出精确阻值</td></tr>
      <tr><td><strong>缺点</strong></td><td>无法直接读出接入阻值</td><td>只能跳跃式改变（不连续）</td></tr>
      <tr><td><strong>主要用途</strong></td><td>保护电路、分压调节、多次测量时改变电流/电压</td><td>需要精确电阻值的实验中替代定值电阻</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">功能</span>
  <h3>四、变阻器在电路中的作用</h3>
  <p>滑动变阻器和电阻箱在电路中有两大类作用：</p>

  <h4>1. 保护电路</h4>
  <p>闭合开关前将变阻器调到最大阻值，限制初始电流——防止电流过大烧坏电流表或用电器。这是所有电学实验的基本操作规范。</p>

  <h4>2. 改变电路中的电流和电压分配</h4>
  <p>在实验进行中，调节变阻器的阻值可以：</p>
  <ul>
    <li><strong>改变通过某段电路的电流</strong>（串联时改变总电阻→改变总电流）</li>
    <li><strong>改变某段电路两端的电压</strong>（串联分压原理——变阻器的阻值变化→分到的电压比例变化→其他用电器分到的电压也变化）</li>
    <li><strong>实现多次测量</strong>（如"伏安法测电阻"中，调节滑动变阻器获得多组 $U, I$ 数据→求平均值减小误差）</li>
  </ul>
</div>

<!-- §12.3 欧姆定律 -->
<!-- ================================================================================== -->
<div class="section-title" id="s12-3"><span class="sec-num">&#167;12.3</span> 欧姆定律</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、欧姆定律的内容</h3>
  <p><strong>内容</strong>：<strong>导体中的电流，跟导体两端的电压成正比，跟导体的电阻成反比。</strong></p>
  <p>这是由德国物理学家<strong>乔治·西蒙·欧姆</strong>（Georg Simon Ohm，1787—1854）于 1826 年通过大量实验总结出的定量规律，是电学中最基本的定律之一。</p>

  <h4>三段论完整表述</h4>
  <ol>
    <li><strong>在电阻一定时</strong>，通过导体的电流与导体两端的电压<strong>成正比</strong>：$I \\propto U$（$R$ 不变）</li>
    <li><strong>在电压一定时</strong>，通过导体的电流与导体的电阻<strong>成反比</strong>：$I \\propto 1/R$（$U$ 不变）</li>
    <li>综合起来即得欧姆定律的数学表达式</li>
  </ol>
  <p><strong>注意表述规范</strong>：必须说"电流与电压成正比"，不能说"电压与电流成正比"——因为电压是产生电流的原因，电流是电压作用的结果。因果关系不能颠倒。</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">公式</span>
  <h3>二、欧姆定律的公式及变形</h3>

  <h4>基本公式</h4>
  <div class="formula-block">
    $I = \\frac{U}{R}$
  </div>
  <p>其中：$I$——通过导体的电流（单位：安培 A），$U$——导体两端的电压（单位：伏特 V），$R$——导体的电阻（单位：欧姆 $\\Omega$）。</p>

  <h4>两个变形公式</h4>
  <div class="formula-block">
    $U = IR \\qquad\\text{（已知 } I, R \\text{ 求电压）}$
    $R = \\frac{U}{I} \\qquad\\text{（已知 } U, I \\text{ 求电阻——伏安法原理）}$
  </div>

  <h4>三个公式的地位辨析</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>公式</th><th>物理含义</th><th>地位</th></tr></thead>
    <tbody>
      <tr><td><strong>$I = U/R$</strong></td><td>反映 $I$ 由 $U$ 和 $R$ 共同决定的因果规律</td><td>欧姆定律的<strong>本质表达式</strong></td></tr>
      <tr><td><strong>$U = IR$</strong></td><td>由欧姆定律变形而来，可求电压</td><td><strong>计算式</strong></td></tr>
      <tr><td><strong>$R = U/I$</strong></td><td>提供了一种<strong>测量电阻的方法</strong>（伏安法）</td><td>电阻的<strong>测量式（定义式）</strong>，<strong>不是决定式</strong></td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">核心辨析</span>
  <h3>三、$R = U/I$ 是定义式不是决定式——极易出错</h3>
  <p><strong>核心结论：$R = U/I$ 只是提供了一种计算（或测量）电阻的方法，并不意味着电阻由电压和电流决定。</strong></p>
  <p><strong>电阻的本质决定因素</strong>：材料（电阻率 $\\rho$）、长度 $L$、横截面积 $S$、温度 $t$。公式 $R = \\rho L/S$ 才是电阻的真正决定式。</p>

  <h4>常见命题辨析</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>命题</th><th>正误</th><th>解释</th></tr></thead>
    <tbody>
      <tr><td>"由 $R = U/I$ 知，导体的电阻与电压成正比"</td><td><strong>错误</strong></td><td>导体电阻是自身属性，不随电压变化。同一根导线，接 3V 和接 6V 时电阻相同（忽略温度变化）</td></tr>
      <tr><td>"由 $R = U/I$ 知，导体的电阻与电流成反比"</td><td><strong>错误</strong></td><td>同理，电阻不由电流决定。电流小是因为电阻大（因果关系不能倒置）</td></tr>
      <tr><td>"导体两端电压为零时，电阻也为零"</td><td><strong>错误</strong></td><td>导体不通电时仍有电阻——电阻是导体本身的固有性质。你桌上的导线并没接电源，但它有电阻</td></tr>
      <tr><td>"$U=0$ 时 $R=U/I$ 无意义，所以导体没有电阻"</td><td><strong>错误</strong></td><td>$R=U/I$ 仅是用电压和电流的比值来<strong>量度</strong>电阻。没有通电时不能用此式，但电阻依然存在</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>类比强化理解</strong>：一个物体的密度 $\\rho = m/V$，但这不意味着把物体切小→质量减小→密度也减小。密度是物质本身的属性，与质量和体积无关。电阻同理。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">条件</span>
  <h3>四、欧姆定律的适用条件</h3>
  <p><strong>适用条件 1——纯电阻电路</strong>：欧姆定律适用于<strong>纯电阻电路</strong>（电能全部转化为内能的电路）。在纯电阻电路中，欧姆定律既适用于整个电路（总电压 = 总电流 × 总电阻），也适用于电路中的任意一段导体。</p>
  <p>含有电动机、电解槽、给电池充电等<strong>非纯电阻电路</strong>（电能部分转化为机械能或化学能）不适用 $I = U/R$——此时 $U > IR$（但有反电动势或化学电动势）。初中阶段接触的均为纯电阻电路（定值电阻、小灯泡——灯丝也可视为电阻），无需担心适用条件。</p>

  <p><strong>适用条件 2——同一段导体、同一时刻</strong>：欧姆定律中的 $U, I, R$ 必须对应<strong>同一段导体</strong>，且必须是在<strong>同一时刻</strong>（或同一工作状态）下的值。即"同时同体"原则：</p>
  <ul>
    <li><strong>同体</strong>：$I_1 = U_1/R_1$ 中的 $U_1$ 必须是 $R_1$ 两端的电压，$I_1$ 必须是通过 $R_1$ 的电流</li>
    <li><strong>同时</strong>：滑片移动前和移动后，同一电阻上的 $U, I$ 关系分别应用欧姆定律，不能混用</li>
  </ul>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">图象</span>
  <h3>五、I-U 图象（电流-电压图象）</h3>
  <p><strong>I-U 图象</strong>是理解和应用欧姆定律的重要工具。以电压 $U$ 为横坐标、电流 $I$ 为纵坐标，绘出导体中的电流随两端电压变化的关系图。</p>

  <h4>1. 定值电阻的 I-U 图象</h4>
  <p>对于<strong>定值电阻</strong>（$R$ 不变），由 $I = U/R$ 可知 $I$ 与 $U$ 成正比→图象是一条<strong>过原点的直线</strong>。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>图象特征</th><th>物理含义</th></tr></thead>
    <tbody>
      <tr><td>过原点——$(0,0)$</td><td>导体两端不加电压（$U=0$）时，通过导体的电流为零（$I=0$）</td></tr>
      <tr><td>直线——$I \\propto U$</td><td>电阻一定时，电流与电压成正比（欧姆定律第一层）</td></tr>
      <tr><td>斜率 $k = 1/R$</td><td>直线的斜率等于导体的<strong>电阻的倒数</strong>。斜率越大→$1/R$ 越大→<strong>电阻越小</strong></td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>比较电阻大小的方法</strong>：在 I-U 图象中，越<strong>靠近 U 轴</strong>（斜率越小）→ $1/R$ 越小→<strong>电阻越大</strong>。口诀："谁趴得平，谁电阻大。"（同一电压下，电流小的电阻大）</p>

  <h4>2. 小灯泡的 I-U 图象（非直线——温度影响电阻）</h4>
  <p>小灯泡的灯丝是钨丝，电阻随<strong>温度升高而显著增大</strong>。当电压增大→电流增大→灯丝温度升高→电阻增大→I-U 图象<strong>不是直线</strong>（曲线向 U 轴弯曲——斜率越来越小）。说明灯丝的电阻不是定值。</p>

  <h4>3. U-I 图象（与 I-U 图象的区别）</h4>
  <p>若以 I 为横轴、U 为纵轴作 U-I 图象，则定值电阻的图象仍为过原点的直线，但此时<strong>斜率 = R</strong>（而不是 1/R）。读图时务必先看清楚坐标轴。</p>
</div>
