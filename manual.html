<!-- §12.4 欧姆定律的应用 -->
<!-- ================================================================================== -->
<div class="section-title" id="s12-4"><span class="sec-num">&#167;12.4</span> 欧姆定律的应用</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">测量实验</span>
  <h3>一、伏安法测电阻</h3>
  <p><strong>实验原理</strong>：<strong>$R = U/I$</strong>——用电压表测出导体两端的电压，用电流表测出通过导体的电流，两者之比即为导体的电阻。这是测量电阻最基本、最常用的方法。</p>

  <h4>实验器材</h4>
  <p>待测电阻 $R_x$（或小灯泡）、<strong>电压表</strong>（并联在 $R_x$ 两端）、<strong>电流表</strong>（串联在电路中）、<strong>滑动变阻器</strong>、电源、开关、导线若干。</p>

  <h4>电路图要点</h4>
  <ul>
    <li><strong>电压表</strong>：并联在待测电阻两端——"压并"原则</li>
    <li><strong>电流表</strong>：串联在干路中——"流串"原则</li>
    <li><strong>滑动变阻器</strong>：与待测电阻<strong>串联</strong>，接线"一上一下"</li>
    <li><strong>连接顺序</strong>：从电源正极出发→开关→电流表→待测电阻→滑动变阻器→电源负极（串联回路）；电压表最后并联在待测电阻两端</li>
  </ul>

  <h4>滑动变阻器在伏安法测电阻中的双重作用</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>作用</th><th>具体操作</th><th>目的</th></tr></thead>
    <tbody>
      <tr><td><strong>保护电路</strong></td><td>闭合开关前将滑片调到<strong>阻值最大</strong>处</td><td>限制初始电流，防止电流表或电阻损坏</td></tr>
      <tr><td><strong>多次测量</strong></td><td>闭合后调节滑片，改变 $R_x$ 两端的电压和通过它的电流</td><td>获得多组 $U, I$ 数据→求电阻的平均值→<strong>减小实验误差</strong></td></tr>
    </tbody>
  </table>
  </div>

  <h4>注意事项（7 大要点）</h4>
  <ol>
    <li><strong>连接电路时开关必须断开</strong>——防止接错短路损坏仪器。</li>
    <li><strong>闭合开关前将滑动变阻器调到最大阻值</strong>——保护电路。</li>
    <li><strong>电压表、电流表的量程选择</strong>：先用大量程试触，如不超量程可换小量程以提高精确度（读数尽量在量程的 2/3 以上）。</li>
    <li><strong>电压表、电流表的"+"接线柱接电流流入端</strong>——正接线柱靠近电源正极，绝不可接反。</li>
    <li><strong>电压表并联、电流表串联——不得接错</strong>（电流表内阻极小，若误并联会造成短路烧表！）。</li>
    <li><strong>测量定值电阻时，多次测量求平均值</strong>——减小误差（温度变化对定值电阻影响小）。</li>
    <li><strong>测量小灯泡电阻时，不能求平均值！</strong>——不同电压下灯丝温度不同→电阻不同→各次测量的阻值对应不同温度下的电阻，是<strong>不同的物理状态</strong>，不应求平均。仅能观察"电压升高→灯丝温度升高→电阻增大"的规律。</li>
  </ol>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">规律</span>
  <h3>二、串联电路的规律</h3>

  <h4>串联电路的基本特点</h4>
  <p>串联电路——各元件逐个顺次连接，电流只有<strong>一条路径</strong>。断开任何一处，整个电路<strong>同时断路</strong>。</p>

  <h4>串联电路的电流规律</h4>
  <div class="formula-block">
    $I = I_1 = I_2 = \\cdots = I_n$
  </div>
  <p><strong>串联电路中各处电流相等。</strong>无论电阻大小如何，流过各元件的电流都一样大——因为只有一条路径，电流"无处可分流"。</p>

  <h4>串联电路的电压规律</h4>
  <div class="formula-block">
    $U = U_1 + U_2 + \\cdots + U_n$
  </div>
  <p><strong>串联电路两端的总电压等于各部分电路两端的电压之和。</strong>即总电压在各电阻上分配——"分压"。这与能量守恒一致：电源提供的总电能 = 各电阻消耗的电能之和（同一电流下，电能与电压成正比）。</p>

  <h4>串联电路的电阻规律</h4>
  <div class="formula-block">
    $R_{\\text{总}} = R_1 + R_2 + \\cdots + R_n$
  </div>
  <p><strong>串联电路的总电阻等于各分电阻之和。</strong>推导：$U = U_1 + U_2$，代入 $U = IR_{\\text{总}},\\;U_1 = I R_1,\\;U_2 = I R_2$，得 $IR_{\\text{总}} = IR_1 + IR_2$，约去 $I$ 得 $R_{\\text{总}} = R_1 + R_2$。</p>
  <p><strong>物理意义</strong>：电阻串联相当于<strong>增加了导体的长度</strong>——导体越长，电阻越大（$R \\propto L$）。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心</span>
  <h3>三、串联分压原理</h3>
  <p><strong>串联分压</strong>：在串联电路中，各电阻两端的电压与其阻值<strong>成正比</strong>——电阻越大，分到的电压越多。</p>

  <div class="formula-block">
    $\\frac{U_1}{U_2} = \\frac{R_1}{R_2}, \\qquad \\frac{U_1}{U} = \\frac{R_1}{R_1+R_2}$
  </div>

  <p><strong>推导</strong>：串联电路中 $I_1 = I_2$，由欧姆定律 $I_1 = U_1/R_1$，$I_2 = U_2/R_2$，得 $U_1/R_1 = U_2/R_2$，即 <strong>$U_1/U_2 = R_1/R_2$</strong>。</p>

  <p><strong>分压原理的应用</strong>：</p>
  <ul>
    <li><strong>电压表扩大量程</strong>：电压表表头量程小（如 1mV），串联一个大电阻→绝大部分电压分在大电阻上→等效于扩大量程</li>
    <li><strong>音量调节（电位器）</strong>：旋转电位器改变接入电阻→改变收音机、音响中信号电压的分配→改变音量</li>
    <li><strong>解释变阻器如何改变电压分配</strong>：滑动变阻器与其串联的电阻构成分压电路→调节变阻器改变分压比例</li>
  </ul>

  <p><strong>串联电路规律汇总口诀</strong>："串流等，串压和，串阻加。"</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">规律</span>
  <h3>四、并联电路的规律</h3>

  <h4>并联电路的基本特点</h4>
  <p>并联电路——各元件并列连接，电流有<strong>多条路径</strong>（各支路独立工作）。断开某一支路，其他支路<strong>仍可有电流</strong>（并联互不影响）。</p>

  <h4>并联电路的电流规律</h4>
  <div class="formula-block">
    $I = I_1 + I_2 + \\cdots + I_n$
  </div>
  <p><strong>并联电路中，干路电流等于各支路电流之和。</strong>电流从电源正极流出→在节点分流→各支路按阻值大小"分得"相应电流→在另一节点汇合→流入电源负极。</p>

  <h4>并联电路的电压规律</h4>
  <div class="formula-block">
    $U = U_1 = U_2 = \\cdots = U_n$
  </div>
  <p><strong>并联电路中，各支路两端的电压相等。</strong>因为各支路都直接从同两个节点连接，节点间电压是唯一的。</p>

  <h4>并联电路的电阻规律</h4>
  <div class="formula-block">
    $\\frac{1}{R_{\\text{总}}} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\cdots + \\frac{1}{R_n}$
  </div>
  <p><strong>并联电路总电阻的倒数等于各支路电阻的倒数之和。</strong>推导：$I = I_1 + I_2$，代入 $I = U/R_{\\text{总}},\\;I_1 = U/R_1,\\;I_2 = U/R_2$（各支路电压均为 $U$），得 $U/R_{\\text{总}} = U/R_1 + U/R_2$，约去 $U$ 得 $1/R_{\\text{总}} = 1/R_1 + 1/R_2$。</p>

  <h4>两电阻并联的总电阻（特例——高频考点）</h4>
  <div class="formula-block">
    $R_{\\text{总}} = \\frac{R_1 R_2}{R_1 + R_2} \\qquad (\\text{仅适用于两电阻并联})$
  </div>
  <p><strong>口诀</strong>："积除以和"——两电阻并联=两电阻的乘积除以两电阻之和。</p>

  <p><strong>重要推论</strong>：</p>
  <ul>
    <li><strong>并联总电阻小于任何一个分电阻</strong>（电阻并联相当于增大了导体的横截面积→$R \\propto 1/S$→电阻减小）</li>
    <li><strong>并联的支路越多，总电阻越小</strong>（每个新支路增加一条电流通道→总电流增大→等效于总电阻减小）</li>
    <li>若 $n$ 个相等的电阻 $R_0$ 并联，则 $R_{\\text{总}} = R_0 / n$</li>
  </ul>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心</span>
  <h3>五、并联分流原理</h3>
  <p><strong>并联分流</strong>：在并联电路中，各支路的电流与其阻值<strong>成反比</strong>——电阻越大的支路，分到的电流越小。</p>

  <div class="formula-block">
    $\\frac{I_1}{I_2} = \\frac{R_2}{R_1}, \\qquad \\frac{I_1}{I} = \\frac{R_2}{R_1+R_2}$
  </div>

  <p><strong>推导</strong>：并联电路中 $U_1 = U_2$，由欧姆定律 $U_1 = I_1 R_1$，$U_2 = I_2 R_2$，得 $I_1 R_1 = I_2 R_2$，即 <strong>$I_1/I_2 = R_2/R_1$</strong>（注意：阻值与电流<strong>反比</strong>，不是正比——这是与分压原理的关键区别）。</p>

  <p><strong>分流原理的应用</strong>：</p>
  <ul>
    <li><strong>电流表扩大量程</strong>：电流表表头量程小（如 1mA），并联一个小电阻（分流电阻/分流器）→大部分电流从分流电阻流过→等效于扩大量程</li>
    <li><strong>家庭电路中的各用电器并联</strong>：每个用电器两端的电压相同（220V），各用电器按自身电阻"分取"相应电流——电阻小的（功率大的）用电器电流大</li>
  </ul>

  <p><strong>并联电路规律汇总口诀</strong>："并压等，并流和，并阻倒数加。"</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">概念</span>
  <h3>六、等效电阻</h3>
  <p><strong>等效电阻</strong>：如果一个电阻 $R_{\\text{总}}$ 接入电路时产生的效果（电路中的总电流、总电压关系），与一个复杂电阻网络产生的效果完全相同——则 $R_{\\text{总}}$ 就是这个复杂电阻网络的<strong>等效电阻</strong>（也叫<strong>总电阻</strong>）。</p>

  <p><strong>等效替代法</strong>是物理学中的重要思维方法——用一个简单的模型代替一个复杂的系统，效果相同即可。"等效"不等于"完全相等"，而是在电流、电压、功率消耗等外特性上等价。</p>

  <h4>常见结构的等效电阻（九年级要求掌握）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>电路结构</th><th>等效电阻</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td>$n$ 个电阻串联</td><td>$R_{\\text{总}} = R_1 + R_2 + \\cdots + R_n$</td><td>串联总电阻等于各电阻之和</td></tr>
      <tr><td>$n$ 个电阻并联</td><td>$1/R_{\\text{总}} = 1/R_1 + 1/R_2 + \\cdots + 1/R_n$</td><td>并联总电阻的倒数等于各电阻倒数之和</td></tr>
      <tr><td>两个电阻并联</td><td>$R_{\\text{总}} = R_1 R_2/(R_1+R_2)$</td><td>"积除以和"</td></tr>
      <tr><td>$n$ 个相等电阻 $R_0$ 串联</td><td>$R_{\\text{总}} = nR_0$</td><td>串联相当于增长长度</td></tr>
      <tr><td>$n$ 个相等电阻 $R_0$ 并联</td><td>$R_{\\text{总}} = R_0/n$</td><td>并联相当于增粗截面</td></tr>
    </tbody>
  </table>
  </div>
</div>

    $W = U I t$
  </div>
  <p><strong>文字表述</strong>：电流在某段电路上做的功，等于这段电路两端的电压（$U$）、电路中的电流（$I$）和通电时间（$t$）三者的乘积。</p>
  <p><strong>单位</strong>：$U$——伏特（V），$I$——安培（A），$t$——秒（s），$W$——焦耳（J）。$1\\,\\mathrm{J} = 1\\,\\mathrm{V} \\cdot \\mathrm{A} \\cdot \\mathrm{s}$。</p>

  <h4>2. 推导公式（仅适用于纯电阻电路）</h4>
  <p>在<strong>纯电阻电路</strong>（电能全部转化为内能的电路）中，由欧姆定律 $I = U/R$ 可推导出：</p>
  <div class="formula-block">
    $W = I^2 R t = \\frac{U^2}{R} t$
  </div>
  <p><strong>注意</strong>：这两个推导公式<strong>仅适用于纯电阻电路</strong>（如白炽灯、电炉、电饭煲）。对电动机等非纯电阻电路，只能用 $W = UIt$ 计算电功，不能用 $W = I^2Rt$ 或 $W = U^2t/R$。</p>

  <h4>3. 串联与并联电路中的电功分配</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>电路类型</th><th>相同量</th><th>比例关系</th><th>文字表述</th></tr></thead>
    <tbody>
      <tr><td><strong>串联</strong></td><td>电流 $I$ 相同</td><td>$W_1 : W_2 = U_1 : U_2 = R_1 : R_2$</td><td>串联电路中，电功与<strong>电阻</strong>成正比——电阻越大，在相同时间内消耗的电能越多</td></tr>
      <tr><td><strong>并联</strong></td><td>电压 $U$ 相同</td><td>$W_1 : W_2 = I_1 : I_2 = R_2 : R_1$</td><td>并联电路中，电功与<strong>电阻</strong>成反比——电阻越小，在相同时间内消耗的电能越多</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>口诀</strong>："串联正比分功，并联反比分功。"</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">单位换算</span>
  <h3>三、电能的单位——焦耳（J）与千瓦时（kW·h）</h3>
  <p><strong>国际单位</strong>：<strong>焦耳</strong>（J），$1\\,\\mathrm{J} = 1\\,\\mathrm{V} \\cdot \\mathrm{A} \\cdot \\mathrm{s}$。</p>
  <p><strong>常用（生活中的）单位</strong>：<strong>千瓦时</strong>（kW·h），俗称"度"。</p>
  <div class="formula-block">
    $1\\,\\mathrm{kW \\cdot h} = 3.6 \\times 10^6\\,\\mathrm{J}$
  </div>
  <p><strong>推导</strong>：$1\\,\\mathrm{kW \\cdot h} = 1000\\,\\mathrm{W} \\times 3600\\,\\mathrm{s} = 3.6 \\times 10^6\\,\\mathrm{J}$。</p>
  <p>$1\\,\\mathrm{J}$ 的物理感受：1J 约等于把两个鸡蛋匀速举高 1m 所做的功（极为微小）。日常用电以 kW·h（度）为计量单位——1 度电 = 1 kW·h。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">测量仪器</span>
  <h3>四、电能表——测量电功（消耗的电能）</h3>
  <p><strong>定义</strong>：<strong>电能表</strong>（俗称"电度表"）是测量<strong>电功</strong>（即用电器消耗的电能）的仪表。</p>

  <h4>1. 读数方法</h4>
  <p>电能表的计数器上先后<strong>两次读数之差</strong>，即为这段时间内消耗的电能。最后一位（红框内或小数点后一位）通常是<strong>小数位</strong>（0.1 kW·h）。</p>
  <p><strong>示例</strong>：月初读数为 3145.2 kW·h，月末读数为 3268.7 kW·h，则本月用电 3268.7 - 3145.2 = <strong>123.5 kW·h</strong>（度）。</p>

  <h4>2. 电能表铭牌参数的含义（高频考点）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>参数</th><th>含义</th></tr></thead>
    <tbody>
      <tr><td><strong>220 V</strong></td><td>电能表的<strong>额定电压</strong>——应接在 220 V 电路中使用</td></tr>
      <tr><td><strong>10(20) A</strong></td><td><strong>标定电流</strong>为 10 A（正常工作时的最大电流），<strong>最大额定电流</strong>为 20 A（短时间内允许通过的最大电流，超过此值电能表可能烧毁）</td></tr>
      <tr><td><strong>50 Hz</strong></td><td>电能表应在频率为 50 Hz 的交流电路中使用（我国交流电频率为 50 Hz）</td></tr>
      <tr><td><strong>1200 r/kW·h</strong>（或 xx imp/kW·h）</td><td>每消耗 <strong>1 kW·h</strong> 电能，电能表的转盘转过 <strong>1200 转</strong>（电子式则以指示灯闪烁次数计）。此参数用于精确计算消耗的电能</td></tr>
    </tbody>
  </table>
  </div>

  <h4>3. 利用 "r/kW·h" 参数计算电能</h4>
  <p>若电能表铭牌标有 $N\\,\\mathrm{r/kW \\cdot h}$，在一定时间内转盘转过 $n$ 转，则消耗的电能为：</p>
  <div class="formula-block">
    $W = \\frac{n}{N}\\,\\mathrm{kW \\cdot h} = \\frac{n}{N} \\times 3.6 \\times 10^6\\,\\mathrm{J}$
  </div>
  <p><strong>示例</strong>：某电能表标"3000 r/kW·h"，转盘在 2 min 内转过 150 转。消耗电能 $W = 150/3000 = 0.05\\,\\mathrm{kW \\cdot h} = 1.8 \\times 10^5\\,\\mathrm{J}$。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">节电意识</span>
  <h3>五、节约用电——从一度电的"含金量"谈起</h3>
  <p><strong>一度电（1 kW·h）能做什么？</strong></p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>用电器</th><th>功率</th><th>一度电可使它工作</th></tr></thead>
    <tbody>
      <tr><td>普通白炽灯（60 W）</td><td>60 W</td><td>约 16.7 小时</td></tr>
      <tr><td>节能灯 / LED 灯（10 W）</td><td>10 W</td><td>100 小时</td></tr>
      <tr><td>电视机（200 W）</td><td>200 W</td><td>5 小时</td></tr>
      <tr><td>空调（1000 W）</td><td>1000 W</td><td>1 小时</td></tr>
      <tr><td>电饭煲（800 W）煮一锅饭</td><td>800 W</td><td>约 1.25 小时（约煮 3 锅饭）</td></tr>
      <tr><td>手机充电（10 W）</td><td>10 W</td><td>100 小时（充约 30～50 次）</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>节电措施</strong>：① 人走灯灭，空调温度设定 26 ℃ 以上（每调低 1 ℃ 多耗约 7%～10% 电能）；② 使用 LED 灯代替白炽灯（节电约 80%）；③ 电器不用时拔下插头（待机功耗不可忽视——机顶盒待机约 10W，全年浪费约 87.6 kW·h）；④ 选用能效等级高的电器（一级能效最省）。</p>
</div>

<!-- ================================================================================== -->
<!-- §13.2 电功率 -->
<!-- ================================================================================== -->
<div class="section-title" id="s13-2">§13.2 电功率</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、电功率的定义</h3>
  <p><strong>电功率</strong>：<strong>电流在单位时间内所做的功</strong>，符号 $P$。电功率是表示<strong>电流做功快慢</strong>的物理量。</p>
  <p><strong>辨析</strong>：电功 $W$ 表示做功的<strong>多少</strong>，电功率 $P$ 表示做功的<strong>快慢</strong>。电功率大的用电器做功快，但不一定做功多（还要看时间——$W = Pt$）。这跟力学中功与功率的关系完全类同。</p>
  <p><strong>定义式</strong>：</p>
  <div class="formula-block">
    $P = \\frac{W}{t}$
  </div>
  <p><strong>单位</strong>：瓦特（W），简称瓦。$1\\,\\mathrm{W} = 1\\,\\mathrm{J/s}$。常用单位：千瓦（kW），$1\\,\\mathrm{kW} = 10^3\\,\\mathrm{W}$；兆瓦（MW），$1\\,\\mathrm{MW} = 10^6\\,\\mathrm{W}$。</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心公式</span>
  <h3>二、电功率的计算公式</h3>

  <h4>1. 基本公式（普遍适用）</h4>
  <p>将 $W = UIt$ 代入 $P = W/t$ 得：</p>
  <div class="formula-block">
    $P = U I$
  </div>
  <p><strong>文字表述</strong>：电功率等于<strong>电压</strong>与<strong>电流</strong>的乘积。</p>

  <h4>2. 推导公式（仅适用于纯电阻电路）</h4>
  <p>在纯电阻电路中，结合欧姆定律 $I = U/R$ 可得：</p>
  <div class="formula-block">
    $P = I^2 R = \\frac{U^2}{R}$
  </div>
  <p><strong>重要结论</strong>：$P = I^2R$ 和 $P = U^2/R$ 这两个公式<strong>仅适用于纯电阻电路</strong>（电能全部转化为内能）。对电动机等，只能用 $P = UI$。</p>

  <h4>3. 串联与并联电路中的电功率分配（纯电阻）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>电路类型</th><th>相同量</th><th>比例关系</th><th>文字表述</th></tr></thead>
    <tbody>
      <tr><td><strong>串联</strong></td><td>$I$ 相同</td><td>$P_1 : P_2 = R_1 : R_2$</td><td>串联电路中电功率与电阻<strong>成正比</strong>——电阻越大，实际功率越大，灯泡越亮</td></tr>
      <tr><td><strong>并联</strong></td><td>$U$ 相同</td><td>$P_1 : P_2 = R_2 : R_1$</td><td>并联电路中电功率与电阻<strong>成反比</strong>——电阻越小，实际功率越大，灯泡越亮</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>口诀</strong>："串大亮（电阻大者亮），并小亮（电阻小者亮）。"</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心对比</span>
  <h3>三、额定功率与实际功率——必考核心概念对</h3>

  <h4>1. 定义对比</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>概念</th><th>符号</th><th>定义</th><th>决定因素</th></tr></thead>
    <tbody>
      <tr><td><strong>额定电压</strong></td><td>$U_{\\text{额}}$</td><td>用电器<strong>正常工作</strong>时的电压</td><td>用电器本身的设计参数——印在铭牌上</td></tr>
      <tr><td><strong>额定功率</strong></td><td>$P_{\\text{额}}$</td><td>用电器在<strong>额定电压</strong>下的功率</td><td>由 $U_{\\text{额}}$ 和用电器电阻 $R$ 共同决定（$P_{\\text{额}} = U_{\\text{额}}^2 / R$）</td></tr>
      <tr><td><strong>实际电压</strong></td><td>$U_{\\text{实}}$</td><td>用电器<strong>实际</strong>工作时两端的电压</td><td>电源电压 / 电路连接方式——可能等于、大于或小于 $U_{\\text{额}}$</td></tr>
      <tr><td><strong>实际功率</strong></td><td>$P_{\\text{实}}$</td><td>用电器在<strong>实际电压</strong>下的功率</td><td>由 $U_{\\text{实}}$ 和用电器电阻 $R$ 决定（$P_{\\text{实}} = U_{\\text{实}}^2 / R$）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 额定功率与实际功率的关系（设用电器电阻 $R$ 不变）</h4>
  <div class="formula-block">
    $\\frac{P_{\\text{实}}}{P_{\\text{额}}} = \\left(\\frac{U_{\\text{实}}}{U_{\\text{额}}}\\right)^2$
  </div>
  <p><strong>三种工作状态</strong>：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>条件</th><th>关系</th><th>工作状态</th><th>实例</th></tr></thead>
    <tbody>
      <tr><td>$U_{\\text{实}} = U_{\\text{额}}$</td><td>$P_{\\text{实}} = P_{\\text{额}}$</td><td><strong>正常工作</strong>（发光正常）</td><td>220V 灯泡接在 220V 电路中</td></tr>
      <tr><td>$U_{\\text{实}} < U_{\\text{额}}$</td><td>$P_{\\text{实}} < P_{\\text{额}}$</td><td>不能正常工作（发光较暗）</td><td>220V 灯泡接在 110V 电路中，实际功率只有额定功率的 1/4</td></tr>
      <tr><td>$U_{\\text{实}} > U_{\\text{额}}$</td><td>$P_{\\text{实}} > P_{\\text{额}}$</td><td>可能影响寿命甚至<strong>烧毁</strong></td><td>220V 灯泡接在 380V 电路中极易烧断灯丝</td></tr>
    </tbody>
  </table>
  </div>

  <h4>3. 灯泡亮度由实际功率决定</h4>
  <p><strong>核心结论</strong>：灯泡的<strong>亮度由实际功率 $P_{\\text{实}}$</strong> 决定，而非额定功率。额定功率相同的灯泡在不同的实际电压下，亮度可以完全不同。</p>
  <p><strong>典型例题思路</strong>：比较两灯泡亮度——先求出每个灯泡的电阻（$R = U_{\\text{额}}^2 / P_{\\text{额}}$），再根据实际电路连接（串联或并联）和实际电压，求出每个灯泡的实际功率。实际功率大的那个灯泡更亮。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">铭牌解读</span>
  <h3>四、用电器铭牌的解读</h3>
  <p>用电器铭牌上的电压值和功率值均为<strong>额定值</strong>。正确解读铭牌是解题的第一步：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>铭牌信息</th><th>从中能求出的物理量</th><th>计算方法</th></tr></thead>
    <tbody>
      <tr><td>"220V 100W"（灯泡）</td><td>灯丝电阻 $R$、额定电流 $I_{\\text{额}}$</td><td>$R = U_{\\text{额}}^2 / P_{\\text{额}} = 220^2 / 100 = 484\\,\\Omega$；$I_{\\text{额}} = P_{\\text{额}} / U_{\\text{额}} = 100 / 220 \\approx 0.455\\,\\mathrm{A}$</td></tr>
      <tr><td>"12V 24W"（小灯泡）</td><td>电阻 $R$、额定电流 $I_{\\text{额}}$</td><td>$R = 12^2 / 24 = 6\\,\\Omega$；$I_{\\text{额}} = 24 / 12 = 2\\,\\mathrm{A}$</td></tr>
      <tr><td>"220V 800W"（电饭煲）</td><td>发热盘电阻 $R$、额定电流</td><td>$R = 220^2 / 800 = 60.5\\,\\Omega$；$I_{\\text{额}} = 800 / 220 \\approx 3.64\\,\\mathrm{A}$</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>要点</strong>：已知铭牌上的 $U_{\\text{额}}$ 和 $P_{\\text{额}}$，可以求出用电器的<strong>电阻 $R$</strong>（假设电阻不随温度变化）和<strong>额定电流 $I_{\\text{额}}$</strong>。电阻 $R$ 是计算实际功率的基础。</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">实验测量</span>
  <h3>五、实验：测量小灯泡的电功率（伏安法）</h3>
  <p><strong>实验原理</strong>：$P = UI$。用电压表测出小灯泡两端的电压 $U$，用电流表测出通过小灯泡的电流 $I$，乘积即为此时的实际功率。</p>
  <p><strong>实验电路</strong>：电源 + 开关 + 滑动变阻器 + 小灯泡 + 电流表（串联）+ 电压表（并联在小灯泡两端）。滑动变阻器的作用：① 保护电路；② 改变小灯泡两端的电压，使其分别在低于额定电压、等于额定电压、略高于额定电压（不超过 1.2 倍）的条件下发光，测量不同电压下的实际功率。</p>
  <p><strong>实验步骤</strong>：</p>
  <ol>
    <li>按电路图连接好电路，开关断开，滑动变阻器滑片调到最大阻值处。</li>
    <li>闭合开关，调节滑动变阻器，使电压表示数等于小灯泡的额定电压（$U = U_{\\text{额}}$），记录此时电流表的读数 $I$，计算 $P_{\\text{额}} = U_{\\text{额}} I$。</li>
    <li>调节滑动变阻器，使电压表示数略低于和略高于额定电压（分别约为 $0.8U_{\\text{额}}$ 和 $1.1U_{\\text{额}}$），分别记录电流读数和观察灯泡亮度，计算实际功率。</li>
    <li>比较三种情况下灯泡亮度与实际功率的关系。</li>
  </ol>
  <p><strong>实验结论</strong>：<strong>小灯泡的实际功率越大，灯泡越亮。</strong>小灯泡的灯丝电阻随温度升高而增大（电压越高→功率越大→温度越高→电阻越大）。注意——这与"电阻不变"的简化假设不同。</p>
</div>

<!-- §13.3 焦耳定律（电流的热效应） -->
<!-- ================================================================================== -->
<div class="section-title" id="s13-3">§13.3 焦耳定律（电流的热效应）</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、电流的热效应</h3>
  <p><strong>电流的热效应</strong>：电流通过导体时，导体会<strong>发热</strong>的现象。这是由电流的微观本质决定的——自由电子在定向移动中不断与金属阳离子碰撞，将电能转化为<strong>内能</strong>（热）。</p>
  <p>一切通电导体都有热效应——电饭煲、电热毯、电烙铁是对热效应的利用，而计算机散热器则是对热效应的防御。</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心定律</span>
  <h3>二、焦耳定律</h3>
  <p><strong>内容</strong>：电流通过导体产生的热量与<strong>电流的二次方</strong>成正比，与导体的<strong>电阻</strong>成正比，与<strong>通电时间</strong>成正比。</p>
  <p><strong>公式</strong>：</p>
  <div class="formula-block">
    $Q = I^2 R t$
  </div>
  <p><strong>单位</strong>：$Q$——焦耳（J），$I$——安培（A），$R$——欧姆（$\\Omega$），$t$——秒（s）。</p>
  <p><strong>注意</strong>：焦耳定律 $Q = I^2Rt$ 是对电流热效应的<strong>普适公式</strong>——无论纯电阻电路还是非纯电阻电路，计算电流产生的热量都必须用 $Q = I^2Rt$。这一点与电功公式不同。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心对比</span>
  <h3>三、纯电阻电路与非纯电阻电路——中考最难点</h3>

  <h4>1. 纯电阻电路</h4>
  <p><strong>定义</strong>：电流通过用电器时，电能<strong>全部</strong>转化为<strong>内能</strong>（热）的电路。常见用电器：白炽灯、电炉、电饭煲、电暖器、电烙铁。</p>
  <p><strong>特点</strong>：$W = Q$（电功全部转化为电热），即：</p>
  <div class="formula-block">
    $W = Q = UIt = I^2 R t = \\frac{U^2}{R} t$
  </div>
  <p>在纯电阻电路中，所有推导公式都可以直接使用。</p>

  <h4>2. 非纯电阻电路</h4>
  <p><strong>定义</strong>：电流通过用电器时，电能<strong>只有一部分</strong>转化为内能，其余转化为<strong>其他形式的能</strong>（如机械能、化学能）的电路。典型代表：<strong>电动机</strong>、充电中的蓄电池、电解槽。</p>
  <p><strong>关键关系</strong>（以电动机为例）：</p>
  <div class="formula-block">
    <p>$W = UIt \\quad (\\text{总电功——缴的总电费})$</p>
    <p>$Q = I^2 R t \\quad (\\text{发热消耗的电功——浪费的电能})$</p>
    <p>$W_{\\text{机}} = W - Q = UIt - I^2 R t \\quad (\\text{输出的机械功——有用的部分})$</p>
  </div>
  <p><strong>核心结论</strong>：在非纯电阻电路中，</p>
  <ul>
    <li>$W > Q$，即电功大于电热</li>
    <li>计算总电功只能用 $W = UIt$</li>
    <li>计算电热只能用 $Q = I^2Rt$</li>
    <li>$W = I^2Rt$ 和 $W = U^2t/R$ <strong>不成立</strong></li>
    <li>欧姆定律 $I = U/R$ <strong>不完全适用</strong>——$U$ 不是全部加在电阻上</li>
  </ul>

  <h4>3. 对比总结表</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>项目</th><th>纯电阻电路</th><th>非纯电阻电路</th></tr></thead>
    <tbody>
      <tr><td><strong>代表用电器</strong></td><td>白炽灯、电炉、电饭煲</td><td>电动机、充电电池、电解装置</td></tr>
      <tr><td><strong>能量转化</strong></td><td>电能 → 内能（100%）</td><td>电能 → 内能 + 机械能 / 化学能（内能仅一部分）</td></tr>
      <tr><td><strong>W 与 Q 的关系</strong></td><td>$W = Q$</td><td>$W > Q$ 即 $W = Q + W_{\\text{其他}}$</td></tr>
      <tr><td><strong>欧姆定律</strong></td><td>$I = U/R$<strong>适用</strong></td><td>$I = U/R$<strong>不适用</strong></td></tr>
      <tr><td><strong>计算 W</strong></td><td>$W = UIt = I^2Rt = U^2t/R$</td><td>只能用 $W = UIt$</td></tr>
      <tr><td><strong>计算 Q</strong></td><td>$Q = I^2Rt = UIt = U^2t/R$</td><td>只能用 $Q = I^2Rt$</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">应用</span>
  <h3>四、电热的利用与防止</h3>

  <h4>1. 电热的利用（电热器）</h4>
  <p><strong>电热器</strong>是利用电流的热效应工作的设备。核心部件是<strong>发热体</strong>——由电阻率大、熔点高的合金丝（如镍铬合金）绕在绝缘材料上制成。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>电热器</th><th>工作原理</th><th>核心能量转化</th></tr></thead>
    <tbody>
      <tr><td><strong>电饭煲</strong></td><td>电流通过发热盘（电阻丝）→ 产生热量 → 加热内胆 → 煮饭。温控磁钢（居里点 103 ℃）自动跳闸保温</td><td>电能 → 内能</td></tr>
      <tr><td><strong>电热毯</strong></td><td>细电阻丝均匀分布在毯体中，通电发热取暖</td><td>电能 → 内能</td></tr>
      <tr><td><strong>电烙铁</strong></td><td>电阻丝加热烙铁头熔化焊锡</td><td>电能 → 内能</td></tr>
      <tr><td><strong>电暖气 / "小太阳"</strong></td><td>电阻丝（或石英管内的电热丝）通电发热，加热空气或辐射热</td><td>电能 → 内能（+ 少量光能）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 电热的防止</h4>
  <p>很多用电器工作时不希望产生过多的热——电热会造成能量浪费、元件老化甚至烧毁。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>防止措施</th><th>原理</th><th>实例</th></tr></thead>
    <tbody>
      <tr><td><strong>散热孔（散热窗）</strong></td><td>利用空气对流带走热量</td><td>电视机后盖、电脑主机箱、功率放大器的散热窗</td></tr>
      <tr><td><strong>散热风扇</strong></td><td>强制空气流动，加快散热</td><td>电脑 CPU 风扇、显卡风扇、投影仪的排风扇</td></tr>
      <tr><td><strong>散热片（散热鳍片）</strong></td><td>增大与空气接触的表面积，提高散热效率</td><td>CPU 散热铝片、LED 路灯的铝合金散热外壳</td></tr>
      <tr><td><strong>选用低电阻材料</strong></td><td>减小焦耳热 $Q = I^2Rt$</td><td>输电线用铜（电阻率小）而非镍铬合金——输电要尽可能减少热损耗</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">探究实验</span>
  <h3>五、实验：探究影响电流热效应的因素（焦耳定律验证）</h3>
  <p><strong>研究方法</strong>：<strong>控制变量法</strong> + <strong>转换法</strong>（通过观察温度计示数变化或 U 形管液面高度差来反映产生热量的多少）。</p>
  <p><strong>为什么用煤油代替水？</strong>煤油的<strong>比热容小</strong>（约 $2.1 \\times 10^3\\,\\mathrm{J/(kg \\cdot \\Omega)}$，仅为水的约 1/2），吸收相同热量时温度升高更快更明显——便于观察。同时煤油是绝缘体，不会使电阻丝短路。煤油化学性质稳定，不会腐蚀电阻丝。</p>

  <h4>实验一：探究热量与电流的关系（控制 R 和 t 相同，改变 I）</h4>
  <p>将两个相同电阻 $R$ 分别放在两个相同装置的煤油中，一个串联在干路上（电流大），另一个串联在一条有并联支路的支路上（电流小）。相同时间后，电流大的装置中煤油升温更多。结论：<strong>电阻和通电时间相同时，电流越大，产生热量越多（</strong>$Q \\propto I^2$<strong>）。</strong></p>

  <h4>实验二：探究热量与电阻的关系（控制 I 和 t 相同，改变 R）</h4>
  <p>将两个不同阻值的电阻丝（如 $5\\,\\Omega$ 和 $10\\,\\Omega$）<strong>串联</strong>（保证 I 相同）放入相同煤油装置中。相同时间内，电阻大的装置中煤油升温更多。结论：<strong>电流和通电时间相同时，电阻越大，产生热量越多（</strong>$Q \\propto R$<strong>）。</strong></p>

  <h4>实验三：探究热量与通电时间的关系（控制 I 和 R 相同，改变 t）</h4>
  <p>用同一装置，随着加热时间延长，温度持续上升。结论：<strong>电流和电阻相同时，通电时间越长，产生热量越多（</strong>$Q \\propto t$<strong>）。</strong></p>

  <p><strong>综合结论</strong>：电流通过导体产生的热量与<strong>电流的二次方</strong>、<strong>电阻</strong>、<strong>通电时间</strong>均成正比——即焦耳定律 $Q = I^2Rt$。</p>
</div>

<div class="section-title" id="s13-4">§13.4 家庭电路与安全用电</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">组成结构</span>
  <h3>一、家庭电路的组成（按进户顺序）</h3>
  <p>家庭电路各组成部分按照从户外到户内的顺序连接：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>顺序</th><th>组成部分</th><th>功能</th><th>关键说明</th></tr></thead>
    <tbody>
      <tr><td>1</td><td><strong>进户线</strong></td><td>将电能从户外输送到户内</td><td>两根线——<strong>火线（L）</strong>和<strong>零线（N）</strong>。火线与大地之间电压 220V，零线与大地之间电压 0V</td></tr>
      <tr><td>2</td><td><strong>电能表</strong></td><td>计量消耗的电能</td><td>串联在干路最前端，串联在总开关之前——先计量后分配</td></tr>
      <tr><td>3</td><td><strong>总开关</strong>（闸刀开关）</td><td>控制整个家庭电路的通断</td><td>静触头（连接进户线）在上方——断开时刀片不带电，方便检修</td></tr>
      <tr><td>4</td><td><strong>保险装置</strong></td><td>电流过大时自动切断电路，保护电路安全</td><td>熔断器（保险丝）或空气开关（带漏电保护）。必须串联在<strong>火线</strong>上</td></tr>
      <tr><td>5</td><td><strong>插座</strong></td><td>给可移动用电器供电</td><td>并联在电路中。三孔插座：左零（N）右火（L）上接地（E）</td></tr>
      <tr><td>6</td><td><strong>用电器（灯、开关）</strong></td><td>消耗电能</td><td>所有用电器<strong>并联</strong>在火线与零线之间。开关必须接在<strong>火线</strong>上——开关断开后灯头不带电</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>核心原则</strong>：家庭电路中<strong>各用电器之间都是并联</strong>关系——这样任何一个用电器的通断不影响其他用电器工作。开关与受控用电器<strong>串联</strong>，并且开关必须接在<strong>火线</strong>一侧。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">工具</span>
  <h3>二、火线与零线——测电笔的使用</h3>

  <h4>1. 火线与零线的区分</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>线别</th><th>符号</th><th>对地电压</th><th>标识颜色</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>火线</strong></td><td>L（Live）</td><td>220 V</td><td>红 / 棕</td><td>与大地之间有 220V 电压，人体接触火线会触电</td></tr>
      <tr><td><strong>零线</strong></td><td>N（Neutral）</td><td>0 V</td><td>蓝 / 黑</td><td>与大地之间无电压（零线在变压器处接地），正常时接触零线不会触电</td></tr>
      <tr><td><strong>地线</strong></td><td>E（Earth/Ground）</td><td>0 V</td><td>黄绿双色</td><td>起安全保护作用——当用电器漏电时，将电流导入大地，防止人体触电</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 测电笔（试电笔）的原理与使用</h4>
  <p><strong>结构</strong>：金属笔尖（接触被测导线）→ 高值电阻（限流，约 1～2 M$\\Omega$）→ 氖管（发光指示）→ 弹簧 → 金属笔尾（用手指接触）。</p>
  <p><strong>原理</strong>：当笔尖接触<strong>火线</strong>时，电流从火线经测电笔的高值电阻、氖管、人体流入大地，形成通路——<strong>氖管发光</strong>。由于高值电阻限制电流极小（远小于 1 mA），人体完全安全。当笔尖接触<strong>零线</strong>时，零线与大地同电位，无电流通过——氖管<strong>不发光</strong>。</p>
  <p><strong>正确使用方法</strong>：用手接触<strong>金属笔尾</strong>（笔帽），笔尖接触被测导线。如果氖管发光——被测导线为<strong>火线</strong>。注意：手<strong>不能接触笔尖金属</strong>（否则直接触电），也不能在未接触笔尾的情况下使用（否则电路不通）。</p>
  <p><strong>测电笔的检测功能</strong>：</p>
  <ul>
    <li>笔尖碰火线 → 氖管发光 → 火线正常</li>
    <li>笔尖碰零线 → 氖管不发光 → 零线正常（若发光说明零线断路——火线通过用电器的电流无法经零线返回）</li>
    <li>笔尖碰用电器外壳 → 若发光说明<strong>外壳带电</strong>——漏电了！需立即断电检修</li>
  </ul>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">保险装置</span>
  <h3>三、保险丝——原理与选择</h3>

  <h4>1. 保险丝的工作原理</h4>
  <p>保险丝<strong>串联</strong>在火线上。当电路中电流<strong>过大</strong>（超过保险丝的额定电流）时，保险丝由于电流的热效应（$Q = I^2Rt$）<strong>温度急剧升高</strong>，达到其<strong>熔点</strong>而熔断——自动切断电路，起到保护作用。</p>

  <h4>2. 保险丝的材料要求</h4>
  <p>保险丝通常由<strong>铅锑合金</strong>制成。材料要求：<strong>电阻率较大</strong>（相同电流下产热更多，$Q = I^2Rt$）且<strong>熔点较低</strong>（更容易在电流过大时熔断）。</p>

  <h4>3. 保险丝的选择原则</h4>
  <p>保险丝的<strong>额定电流</strong>应等于或<strong>稍大于</strong>电路中所有用电器正常工作时的<strong>最大总电流</strong>。如果额定电流选得过大——电流过载时保险丝不会熔断，失去了保护作用。如果额定电流选得过小——用电器正常工作时保险丝就会频繁熔断。</p>

  <h4>4. 严禁用铜丝、铁丝代替保险丝</h4>
  <p><strong>绝对禁止！</strong>铜丝和铁丝的<strong>熔点高</strong>（铜约 1083 ℃，铁约 1535 ℃），即使电流严重过载也不会熔断——完全失去了过电流保护功能。电路发生短路或过载时，导线将剧烈发热引起火灾，而"保险丝"毫无反应。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">核心分析</span>
  <h3>四、家庭电路中电流过大的原因（两大原因）</h3>

  <h4>原因一：发生短路</h4>
  <p><strong>短路</strong>：火线和零线<strong>直接连通</strong>（不经用电器）。此时电路中电阻极小（仅导线电阻），根据欧姆定律 $I = U/R$，电流极大（可达数百安培）。</p>
  <p><strong>常见短路情形</strong>：① 电线绝缘皮老化破损，火线与零线触碰；② 插座内部接线松动导致火零短接；③ 电器内部线路故障；④ 装修施工中误将火线与零线接在一起。</p>
  <p><strong>后果</strong>：电流骤增 → 导线剧烈发热（$Q = I^2Rt$，$I$ 极大）→ 绝缘皮熔化或燃烧 → 引发火灾。</p>

  <h4>原因二：用电器总功率过大</h4>
  <p>在家庭电路中，各用电器<strong>并联</strong>，总功率 $P_{\\text{总}} = P_1 + P_2 + ... + P_n$。电压 $U = 220\\,\\text{V}$ 不变，由 $I = P_{\\text{总}} / U$ 可知，总功率越大干路电流越大。当电流超过电能表和导线的额定电流时，导线过热，引发危险。</p>
  <p><strong>典型情景</strong>：夏天同时开启多台空调 + 微波炉 + 电热水器等大功率电器 → 干路总电流超过限值 → 导线过载发热。</p>
  <p><strong>避免方法</strong>：① 大功率用电器错开使用时间（不要同时开）；② 大功率用电器使用独立插座和专线；③ 合理规划电路——空调、厨房、卫生间等大功率区域用独立回路。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">安全守则</span>
  <h3>五、安全用电原则</h3>

  <h4>1. 触电的原因与形式</h4>
  <p><strong>触电</strong>：人体直接或间接接触<strong>火线</strong>，使一定强度的电流通过人体引起的伤害事故。安全电压：不高于 <strong>36 V</strong>。日常 220V 远大于安全电压，必须严格防范。</p>
  <p><strong>常见触电形式</strong>：① <strong>单线触电</strong>——人体一部分接触火线，另一部分接触大地（或通过导体接地），电流经人体流入大地；② <strong>双线触电</strong>——人体同时接触火线和零线，电流经人体形成通路（无论是否站在绝缘体上都会触电，更加危险）。</p>

  <h4>2. 安全用电四大原则</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>原则</th><th>内容</th><th>原因/说明</th></tr></thead>
    <tbody>
      <tr><td><strong>不接触低压带电体</strong></td><td>绝对不要触碰裸露的火线、带电的金属部件</td><td>220V 远大于 36V 安全电压，可致命。更换灯泡或检修时必须<strong>先断开开关</strong></td></tr>
      <tr><td><strong>不靠近高压带电体</strong></td><td>远离高压电线、变压器、配电柜。高压警示区域不得靠近</td><td>高压电可<strong>击穿空气放电</strong>（电弧），不接触也可能触电！高压线落地后，在接地点周围形成跨步电压——应<strong>单脚跳出</strong>而非迈步逃离</td></tr>

  <h4>3. 触电急救</h4>
  <p>发现有人触电时：<strong>不要用手直接拉触电者！</strong>（救人者也会触电。）正确做法：① <strong>立即切断电源</strong>（拉闸、拔插头）；② 用<strong>干燥的木棒、竹竿等绝缘体</strong>挑开电线；③ 拨打 120 急救电话；④ 如触电者呼吸停止，在确认环境安全后进行心肺复苏（CPR）。</p>

  <h4>4. 电气火灾的应对</h4>
  <p>电器或线路起火时：① 先<strong>切断电源</strong>；② 使用<strong>干粉灭火器</strong>或二氧化碳灭火器灭火；③ <strong>严禁用水</strong>泼——水导电，泼水会扩大触电范围，且水遇到带电体可能发生电解产生氢气（爆炸风险）。</p>

  <ol class="review-checklist">

    <li><strong>额定功率和实际功率是什么关系？如何比较两盏灯泡的实际亮度？</strong>额定功率是额定电压下的功率（铭牌值），实际功率是实际电压下的功率。灯泡亮度由<strong>实际功率</strong>决定。比较亮度的方法：① 先由铭牌求各灯电阻 $R = U_{\\text{额}}^2 / P_{\\text{额}}$；② 根据实际电路求各灯实际电压（串联分压或并联同压）；③ 用 $P_{\\text{实}} = U_{\\text{实}}^2 / R$ 算实际功率，大的更亮。</li>
    <li><strong>焦耳定律的内容是什么？实验中为什么用煤油而不用水？</strong>电流通过导体产生的热量与<strong>电流的平方、电阻、通电时间</strong>都成正比——$Q = I^2Rt$。用煤油的原因：煤油<strong>比热容小</strong>，吸收同样热量升温更明显（便于观察）；煤油是<strong>绝缘体</strong>（不会使电阻丝短路），且化学性质稳定。若用水则升温慢、还可能导致电阻丝短路。</li>
    <li><strong>电能表铭牌上的 "220V 10(20)A 50Hz 1200r/kW·h" 各代表什么含义？</strong>220V——额定电压；10(20)A——标定电流 10A、最大电流 20A；50Hz——适用交流电频率；1200r/kW·h——每消耗 1kW·h 电能转盘转 1200 转（利用此参数可精确计算消耗的电能：$W = n/N$ kW·h）。</li>

  </ol>

<div class="section-title" id="s15-1">§15.1 电磁波的产生与传播</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、电磁波的产生</h3>
  <p><strong>电磁波</strong>是由<strong>变化的电流</strong>（即<strong>变化的电场和磁场</strong>）产生的。当导线中的电流<strong>迅速变化</strong>时，就会在空间<strong>向外辐射电磁波</strong>。</p>
  <p><strong>核心理解</strong>：变化的电场产生磁场，变化的磁场产生电场——二者交替激发，由近及远向空间传播，形成电磁波。电磁波是<strong>横波</strong>——电场方向、磁场方向与传播方向三者<strong>互相垂直</strong>。</p>
  <p><strong>产生条件</strong>：</p>
  <ul>
    <li><strong>稳定的电流</strong>（如直流电通过电阻）——不产生电磁波（电场和磁场不变）。</li>
    <li><strong>变化的电流</strong>（如<strong>交变电流</strong>或<strong>振荡电流</strong>）——产生电磁波。电流变化得越快，辐射的电磁波越强。</li>
    <li><strong>高频振荡电流</strong>——辐射电磁波的能力最强，无线电通信中使用的载波就是高频振荡电流产生的电磁波。</li>
  </ul>
  <p><strong>类比</strong>：水面振动的木棒会产生水波向四周传播；同样，迅速变化的电流会在空间激发电磁波向四面八方传播。</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心公式</span>
  <h3>二、电磁波的传播特性</h3>

  <h4>1. 不需要介质</h4>
  <p>电磁波的传播<strong>不需要介质</strong>——它可以在<strong>真空</strong>中传播。这与声波（机械波）截然不同：声波必须有介质（空气、水、固体等）才能传播，在真空中声波无法传播。太阳光（电磁波）能穿过太空到达地球，正是这一特性的直接证据。</p>

  <h4>2. 真空中的速度——c</h4>
  <p>电磁波在<strong>真空</strong>中的传播速度为：</p>
  <div class="formula-block">
    $c = 3.0 \\times 10^8\\,\\mathrm{m/s}$
  </div>
  <p>这一速度是宇宙中的<strong>极限速度</strong>——任何物质或信息的传播速度都不能超过真空中的光速 <strong>c</strong>。电磁波在<strong>空气</strong>中的速度略小于 c，但差别极小——通常近似视为 <strong>c</strong>。</p>

  <h4>3. 波长、频率与波速的关系</h4>
  <p>电磁波的<strong>波速 c</strong>、<strong>波长 $\\lambda$</strong> 和<strong>频率 $\\nu$</strong> 满足以下普适关系：</p>
  <div class="formula-block">
    $c = \\lambda \\nu$
  </div>
  <p><strong>文字表述</strong>：波速 = 波长 × 频率。由于真空中的波速 c 是<strong>恒定值</strong>（$3.0 \\times 10^8\\,\\mathrm{m/s}$），因此波长 $\\lambda$ 与频率 $\\nu$ 成<strong>反比</strong>——频率越大，波长越短；频率越小，波长越长。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>物理量</th><th>符号</th><th>单位</th><th>物理意义</th></tr></thead>
    <tbody>
      <tr><td><strong>波速</strong></td><td>c（真空中）</td><td>m/s</td><td>电磁波在单位时间内传播的距离——真空中恒为 $3 \\times 10^8\\,\\mathrm{m/s}$</td></tr>
      <tr><td><strong>波长</strong></td><td>$\\lambda$（lambda）</td><td>m（米）</td><td>相邻两个波峰（或波谷）之间的距离——一个完整波形的长度</td></tr>
      <tr><td><strong>频率</strong></td><td>$\\nu$（nu）或 f</td><td>Hz（赫兹）</td><td>单位时间内完成振动的次数——1 Hz = 1 次/秒。常用单位还有 kHz（$10^3$）、MHz（$10^6$）、GHz（$10^9$）</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>应用</strong>：已知频率求波长——$\\lambda = c / \\nu$；已知波长求频率——$\\nu = c / \\lambda$。例如，某无线电广播频率为 100 MHz（$10^8$ Hz），其波长 $\\lambda = 3 \\times 10^8 / 10^8 = 3\\,\\mathrm{m}$。</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">历史实验</span>
  <h3>三、赫兹实验——率先验证电磁波的存在</h3>
  <p><strong>历史背景</strong>：1864 年，英国物理学家<strong>麦克斯韦</strong>建立了电磁场理论，从理论上<strong>预言</strong>了电磁波的存在。他推导出电磁波的速度等于光速，从而提出"光也是电磁波"的大胆预言。</p>
  <p><strong>赫兹实验（1888 年）</strong>：德国物理学家<strong>赫兹</strong>（Hertz）第一次用实验<strong>证实</strong>了电磁波的存在。实验装置包括：</p>
  <ul>

    <li><strong>接收装置</strong>——一个开口的金属圆环（谐振环），两端也有小金属球，留有微小火花隙。当接收环放在离发射器一定距离处，环的开口处也会出现火花——说明接收到了电磁波。</li>
  </ul>
  <p><strong>实验意义</strong>：赫兹实验不仅证明了电磁波确实存在，还验证了电磁波具有<strong>反射、折射、干涉、偏振</strong>等波特有性质——与光的行为完全一致，有力支持了麦克斯韦"光是电磁波"的理论。</p>
  <p><strong>记忆要点</strong>：麦克斯韦<strong>预言</strong>了电磁波，赫兹<strong>验证</strong>了电磁波。频率单位"赫兹（Hz）"即因纪念赫兹而得名。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心对比</span>
  <h3>四、电磁波与声波的对比</h3>
  <div class="table-wrap">
  <table>

      <tr><td><strong>波的类型</strong></td><td><strong>横波</strong></td><td>纵波（在气体和液体中）/ 可在固体中同时以横波和纵波传播</td></tr>

      <tr><td><strong>典型例子</strong></td><td>无线电波、光、X 射线</td><td>人声、音乐、超声、地震波中的 P 波</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>辨析要点</strong>：太空中宇航员即使面对面也要靠无线电交流——因为声波无法在真空中传播，但电磁波（无线电波）可以。</p>
</div>

<div class="section-title" id="s15-2">§15.2 电磁波谱</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、电磁波谱的概念</h3>
  <p><strong>电磁波谱</strong>：将各种电磁波<strong>按波长（或频率）的顺序排列</strong>起来，就构成了电磁波谱。电磁波谱是一个<strong>连续的谱系</strong>——各波段之间没有严格的界限。</p>
  <p><strong>排列规律</strong>：按波长<strong>从长到短</strong>（频率从低到高）的顺序排列。从长波端到短波端依次为：</p>
  <div class="formula-block">
    $\\text{无线电波} \\rightarrow \\text{微波} \\rightarrow \\text{红外线} \\rightarrow \\text{可见光} \\rightarrow \\text{紫外线} \\rightarrow \\text{X射线} \\rightarrow \\gamma\\text{射线}$
  </div>
  <p><strong>记忆口诀</strong>："无限红紫 X $\\gamma$"——无（无线电波）限（微波）红（红外线）紫（紫外线）X（X 射线）$\\gamma$（$\\gamma$ 射线），可见光夹在红与紫之间。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心体系</span>
  <h3>二、电磁波谱各波段详解（按波长递减排列）</h3>

  <h4>1. 无线电波（波长：$10^4$ m ~ 1 mm）</h4>
  <p><strong>特点</strong>：波长最长，频率最低，穿透能力弱（易被障碍物阻挡）。</p>
  <p><strong>主要应用</strong>：</p>
  <ul>
    <li><strong>长波/中波/短波通信</strong>——无线电广播（AM 广播）、船舶通信、业余无线电。</li>
    <li><strong>电视广播</strong>（VHF 和 UHF 频段）——传送图像和声音信号。</li>
  </ul>
  <p><strong>补充</strong>：无线电波的波长范围极宽，不同波长的无线电波传播特性不同——长波可在水面下传播（用于潜艇通信），短波经电离层反射可实现远距离通信。</p>

  <h4>2. 微波（波长：1 mm ~ 1 m，频率：300 MHz ~ 300 GHz）</h4>
  <p><strong>特点</strong>：频率较高，波长较短，具有较好的<strong>定向传播</strong>特性。微波频率与<strong>水的固有频率</strong>接近。</p>
  <p><strong>主要应用</strong>：</p>
  <ul>
    <li><strong>雷达</strong>（Radio Detection and Ranging）——发射微波脉冲并接收反射波，实现测距定位。</li>
    <li><strong>卫星通信</strong>——微波能穿透电离层，可直接在卫星与地面之间传输。</li>
    <li><strong>WiFi 和蓝牙</strong>——2.4 GHz / 5 GHz 频段的微波，用于短距离无线通信。</li>
    <li><strong>微波炉</strong>——频率约 2450 MHz 的微波，使食物中的<strong>水分子共振</strong>发热。</li>
  </ul>

  <h4>3. 红外线（波长：0.76 $\\mu\\mathrm{m}$ ~ 1 mm）</h4>
  <p><strong>特点</strong>：人眼不可见，<strong>热效应显著</strong>——一切温度高于绝对零度的物体都在不断辐射红外线。温度越高，辐射的红外线越强。</p>
  <p><strong>主要应用</strong>：</p>
  <ul>
    <li><strong>红外遥控</strong>——电视、空调的遥控器发射红外线脉冲信号。</li>
    <li><strong>红外测温</strong>——红外测温枪通过检测人体/物体辐射的红外线来测定温度。</li>
    <li><strong>红外成像（热成像）</strong>——夜视仪、军事侦察中使用红外探测器将红外线转化为可见图像。</li>
    <li><strong>红外加热/取暖</strong>——红外烤箱、浴霸取暖灯利用红外线的热效应。</li>
  </ul>

  <h4>4. 可见光（波长：0.38 $\\mu\\mathrm{m}$ ~ 0.76 $\\mu\\mathrm{m}$ / 380 nm ~ 760 nm）</h4>
  <p><strong>特点</strong>：<strong>唯一能被人类眼睛感知</strong>的电磁波段。不同波长的可见光呈现不同的颜色。</p>
  <p><strong>可见光谱色序</strong>（按波长<strong>递减</strong>、频率<strong>递增</strong>排列）：</p>
  <div class="formula-block">
    $\\text{红} \\quad \\text{橙} \\quad \\text{黄} \\quad \\text{绿} \\quad \\text{蓝} \\quad \\text{靛} \\quad \\text{紫}$
  </div>
  <p><strong>核心关系</strong>：红光的<strong>波长最长、频率最低</strong>；紫光的<strong>波长最短、频率最高</strong>。由红光到紫光——波长递减，频率递增，光子能量递增（$E = h\\nu$，h 为普朗克常数）。</p>
  <p><strong>教材考点</strong>：可见光只是电磁波谱中<strong>非常窄</strong>的一个波段——犹如长河中极短的一段。人类能看见的仅此一小段，电磁波谱中绝大多数电磁波人眼不可见。</p>

  <h4>5. 紫外线（波长：10 nm ~ 0.38 $\\mu\\mathrm{m}$ / 380 nm）</h4>
  <p><strong>特点</strong>：频率高于可见光，<strong>荧光效应和杀菌作用</strong>显著。过量照射对人体有害。</p>
  <p><strong>主要应用</strong>：</p>
  <ul>
    <li><strong>荧光效应</strong>——验钞机中紫外线照射使荧光物质发光，用于识别钞票真伪。日光灯管内壁荧光粉在紫外线激发下发出可见光。</li>
    <li><strong>杀菌消毒</strong>——紫外线能破坏微生物的 DNA 结构，用于医院、实验室的杀菌消毒灯。</li>
    <li><strong>促进维生素 D 合成</strong>——适量紫外线照射皮肤有助于人体合成维生素 D（促进钙吸收）。</li>
    <li><strong>防护</strong>：臭氧层吸收太阳光中的大部分紫外线（臭氧层空洞导致紫外线增强——增加皮肤癌风险）。防晒霜通过吸收/反射紫外线保护皮肤。</li>
  </ul>

  <h4>6. X 射线（波长：10⁻² nm ~ 10 nm）</h4>
  <p><strong>特点</strong>：波长很短，频率很高，<strong>穿透能力强</strong>；由高速电子撞击金属靶产生。</p>
  <p><strong>主要应用</strong>：</p>
  <ul>
    <li><strong>医学成像</strong>——X 光拍片（骨骼、肺部等）和 CT 扫描。X 射线穿透密度不同的组织时衰减不同——骨骼吸收强（显白色），软组织吸收弱（显暗色）。</li>
    <li><strong>安检</strong>——机场、车站行包安检利用 X 射线透视行李。</li>
    <li><strong>工业探伤</strong>——检测金属零件内部的裂纹、气孔等缺陷。</li>
    <li><strong>安全注意</strong>：X 射线对生物细胞有损害，频繁或过量照射可能致癌——使用铅屏和铅衣防护。</li>
  </ul>

  <h4>7. $\\gamma$ 射线（波长：< 10⁻² nm）</h4>
  <p><strong>特点</strong>：波长最短，频率最高，<strong>穿透能力极强</strong>。由原子核内部能量变化（核反应、放射性衰变）产生。</p>
  <p><strong>主要应用</strong>：</p>
  <ul>
    <li><strong>癌症治疗（放射治疗）</strong>——利用 $\\gamma$ 射线的高能量破坏癌细胞 DNA，达到治疗目的。如"伽玛刀"——将多束 $\\gamma$ 射线聚焦于肿瘤位置，精确杀死癌细胞。</li>
    <li><strong>工业探伤</strong>——检测大型金属铸件、焊缝等内部的深层缺陷。</li>
    <li><strong>食品辐照灭菌</strong>——$\\gamma$ 射线杀死微生物，用于食品的保鲜和灭菌。</li>
    <li><strong>危险警示</strong>：$\\gamma$ 射线对生物体的破坏作用极强——必须用<strong>铅板或厚混凝土</strong>进行严格屏蔽。放射性标志（☢）表示该区域有放射性物质，严禁靠近。</li>
  </ul>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">综合对比</span>
  <h3>三、电磁波各波段的共同点与不同点</h3>

  <h4>共同点</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>共同点</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>本质相同</strong></td><td>都是<strong>电磁波</strong>——由变化的电场和磁场交替激发产生</td></tr>
      <tr><td><strong>真空速度相同</strong></td><td>在真空中都以<strong>光速</strong> $c = 3 \\times 10^8\\,\\mathrm{m/s}$ 传播</td></tr>
      <tr><td><strong>传播不需要介质</strong></td><td>都可以在真空中传播——不需要任何介质</td></tr>
      <tr><td><strong>都是横波</strong></td><td>都能发生<strong>反射、折射、干涉、偏振</strong>等波的共有现象</td></tr>
    </tbody>
  </table>
  </div>

  <h4>不同点</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>不同维度</th><th>长波段（无线电波/微波）</th><th>中波段（红外/可见/紫外）</th><th>短波段（X 射线/$\\gamma$ 射线）</th></tr></thead>
    <tbody>
      <tr><td><strong>波长</strong></td><td>长（米~千米级）</td><td>中等（纳米~微米级）</td><td>极短（皮米级及以下）</td></tr>
      <tr><td><strong>频率</strong></td><td>低</td><td>中等</td><td>极高</td></tr>
      <tr><td><strong>产生机理</strong></td><td>振荡电路中电子的<strong>周期性振荡</strong></td><td>原子外层电子的<strong>能级跃迁</strong></td><td>原子内层电子跃迁（X）/ 原子核内部变化（$\\gamma$）</td></tr>
      <tr><td><strong>穿透能力</strong></td><td>弱，易被障碍物阻挡</td><td>中等</td><td>极强，可穿透金属和混凝土</td></tr>
      <tr><td><strong>生物效应</strong></td><td>热效应为主（安全）</td><td>适当无害，过量有害（紫外线致癌）</td><td>电离辐射——破坏细胞 DNA，过量可致癌</td></tr>
      <tr><td><strong>典型应用</strong></td><td>通信、广播</td><td>遥控/照明/杀菌</td><td>医学成像/癌症治疗/探伤</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- ================================================================================== -->
<div class="section-title" id="s15-3">§15.3 电磁波的应用</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">应用体系</span>
  <h3>一、电磁波在通信中的应用</h3>

  <h4>1. 无线电广播的基本流程</h4>
  <p>无线电广播是将<strong>声音信号</strong>搭载到<strong>高频电磁波</strong>（载波）上进行远距离传输的技术，包含以下四个关键环节：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>步骤</th><th>过程</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>① 调制</strong></td><td>将低频声音信号<strong>"搭载"</strong>到高频载波上</td><td>方式有<strong>调幅（AM）</strong>——改变载波幅度；<strong>调频（FM）</strong>——改变载波频率。FM 抗干扰能力强于 AM，音质更好</td></tr>
      <tr><td><strong>② 发射</strong></td><td>通过<strong>天线</strong>将已调制的高频电磁波发射出去</td><td>天线的尺寸应与电磁波的波长<strong>匹配</strong>——通常天线长度为波长的 1/4 或 1/2</td></tr>
      <tr><td><strong>③ 接收</strong></td><td>接收天线接收到空中的电磁波，在接收电路中产生<strong>感应电流</strong></td><td><strong>调谐</strong>——通过调节接收电路的固有频率，与要接收电台的载波频率<strong>相同</strong>，实现<strong>共振（谐振）</strong>，从而选出台——这叫"调谐选台"</td></tr>
      <tr><td><strong>④ 解调</strong></td><td>从已调制的高频信号中<strong>"取出"</strong>原来的低频声音信号</td><td>解调又叫做<strong>检波</strong>。取出声音信号后经放大送入扬声器——发出声音</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 电视广播</h4>
  <p>电视广播同时传送<strong>图像信号</strong>（视频）和<strong>声音信号</strong>（音频）。基本原理与无线电广播类似：</p>
  <ul>
    <li>摄像机将图像光信号转为<strong>电信号</strong>（图像信号）。</li>
    <li>图像信号和声音信号分别调制到不同频率的载波上，叠加后通过天线发射。</li>
    <li>电视接收机同时接收图像和声音信号，分别解调后在屏幕上显示图像、扬声器发出声音。</li>
  </ul>

  <h4>3. 移动通信</h4>
  <p>移动通信（手机）通过<strong>基站（蜂窝网络）</strong>进行。手机与基站之间以电磁波（无线电波/微波）进行双向通信。每个基站覆盖一个"蜂窝"区域，相邻基站使用不同频率以避免干扰。当用户移动时，手机信号在不同基站之间<strong>自动切换</strong>，实现不间断通信。</p>

  <h4>4. 卫星通信</h4>
  <p>卫星通信利用<strong>微波</strong>（频率高，能穿透电离层）在卫星与地面站之间传输信号。</p>
  <p><strong>同步卫星</strong>（地球同步轨道卫星）：位于赤道上空约 36000 km 处，围绕地球运行的周期与地球自转周期完全<strong>相同</strong>（24 小时）——从地面看，卫星<strong>静止</strong>在天空中某一点。</p>
  <p><strong>三颗覆盖全球</strong>：在赤道上空<strong>等间距</strong>布置 <strong>3 颗同步通信卫星</strong>，其信号就能<strong>覆盖全球</strong>（除两极附近少数区域外）。这是卫星通信中一个重要数字——3 颗同步卫星实现全球通信。</p>

  <h4>5. 光纤通信</h4>
  <p>光纤通信利用<strong>光波</strong>（可见光或红外波段的电磁波）在<strong>光纤</strong>（光导纤维）中传播来传递信息。</p>
  <p><strong>光纤的结构</strong>：光纤由<strong>纤芯</strong>（高折射率）和<strong>包层</strong>（低折射率）组成。光从纤芯射向包层界面时，入射角<strong>大于临界角</strong>，发生<strong>全反射</strong>——光在纤芯中反复全反射，"曲折前进"而不泄漏到光纤之外，实现长距离传输。</p>
  <p><strong>优点</strong>：传输损耗小（中继距离远）、频带宽（信息容量大）、抗电磁干扰、不受雷击影响、体积小重量轻、材料资源丰富（主要成分为 SiO₂）。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">应用</span>
  <h3>二、雷达——电磁波测距定位</h3>
  <p><strong>全称</strong>：Radio Detection and Ranging（无线电探测与测距）。</p>
  <p><strong>工作原理</strong>：</p>
  <ol>
    <li>雷达发射机通过天线向某一方向发射<strong>微波脉冲</strong>。</li>
    <li>电磁波遇到障碍物（飞机、船只、云层等）后被<strong>反射</strong>回来——产生回波。</li>
    <li>雷达接收机接收反射波，记录从发射到接收的时间差 $\\Delta t$。</li>
    <li>根据 $s = c \\cdot \\Delta t / 2$（往返距离除以二——因为电磁波走了来回两趟），计算出目标的距离。</li>
  </ol>
  <p><strong>应用场景</strong>：</p>
  <ul>
    <li><strong>军事</strong>——防空预警、导弹制导、战场侦察。</li>
    <li><strong>航空</strong>——空中交通管制（引导飞机起降和航路飞行）。</li>
    <li><strong>航海</strong>——船舶导航、避碰、海上搜索救援。</li>
    <li><strong>气象</strong>——气象雷达探测云层和降水分布，用于天气预报。</li>
    <li><strong>交通</strong>——测速雷达（交警测速）利用多普勒效应，根据反射波频率变化计算车速。</li>
  </ul>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">原理分析</span>
  <h3>三、微波炉——电磁波加热原理</h3>
  <p><strong>核心原理</strong>：微波炉利用频率约为 <strong>2450 MHz</strong> 的微波加热食物。这一频率与<strong>水分子</strong>的<strong>固有振动频率</strong>非常接近。</p>
  <p><strong>加热过程</strong>：</p>
  <ol>
    <li>微波炉的磁控管产生高频微波。</li>
    <li>微波照射食物，食物中的<strong>水分子</strong>在微波电磁场作用下产生<strong>共振</strong>——水分子以极高的频率（每秒约 24.5 亿次）来回振动。</li>
    <li>水分子剧烈振动——分子间剧烈摩擦——将电磁能转化为<strong>内能</strong>（热）——食物温度迅速升高。</li>
  </ol>
  <p><strong>能量转化</strong>：<strong>电磁能 → 内能</strong>（热能）。微波炉不通过热传导从外向里加热——而是使食物内外<strong>同时</strong>被加热（或由内向外加热），加热速度远快于传统加热方式。</p>

  <h4>安全注意——金属绝对不能放入微波炉</h4>
  <p><strong>严禁</strong>将金属器皿（金属碗、铝箔、镀金边瓷器等）放入微波炉。原因：</p>
  <ul>
    <li>微波照射金属时，金属内的<strong>自由电子</strong>在微波电磁场作用下剧烈振荡——在金属表面感应出极大电流，产生强电场。</li>
    <li>强电场导致空气电离——产生<strong>火花放电</strong>（像闪电一样），严重时可能烧毁微波炉甚至引发<strong>火灾</strong>。</li>
    <li>金属还会将微波<strong>反射</strong>回磁控管——可能损坏磁控管。</li>
  </ul>
  <p>微波炉应使用<strong>陶瓷、玻璃、专用微波塑料</strong>等非金属容器。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">安全防护</span>
  <h3>四、电磁辐射与防护</h3>
  <p><strong>电磁辐射</strong>：电磁波携带能量向空间传播的过程。不同频率的电磁辐射对人体的影响差异很大。</p>

  <h4>1. 过度暴露电磁辐射的危害</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>波段</th><th>主要危害</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>无线电波/微波</strong>（低强度）</td><td>热效应——长时间暴露可引起组织轻微升温</td><td>日常 WiFi、手机基站的辐射强度远低于安全标准，<strong>正常使用</strong>无危害证据。但目前仍建议避免过长时间紧贴头部使用手机</td></tr>
      <tr><td><strong>红外线</strong></td><td>过量照射可灼伤皮肤、损伤眼睛</td><td>炼钢工人、焊工需佩戴护目镜防红外灼伤眼睛</td></tr>
      <tr><td><strong>紫外线</strong></td><td>过量照射导致皮肤晒伤、加速皮肤老化、增加<strong>皮肤癌和白内障风险</strong></td><td>UVA（长波）可穿透真皮层致老化；UVB（中波）致晒伤和皮肤癌；UVC（短波）被臭氧层全部吸收</td></tr>
      <tr><td><strong>X 射线和 $\\gamma$ 射线</strong></td><td><strong>电离辐射</strong>——打断 DNA 分子链，可导致细胞变异（致癌）或死亡</td><td>X 光检查一年控制在安全剂量内，铅制防护服可有效屏蔽</td></tr>
    </tbody>
  </table>
  </div>

  <h4>2. 合理防护措施</h4>
  <ul>
    <li><strong>削减来源</strong>——保持与辐射源的距离（辐射强度与距离的<strong>平方</strong>成反比）；减少使用时间；尽量使用耳机接听电话而非紧贴头部。</li>
    <li><strong>物理屏蔽</strong>——防紫外线：涂抹防晒霜（SPF 15+），穿戴遮阳帽/长袖衣，避免正午暴晒。防 X/$\\gamma$：铅板、铅衣、铅玻璃屏蔽。</li>
    <li><strong>选择安全产品</strong>——购买符合国家电磁辐射标准的电子产品（SAR 值合规手机），不使用劣质电磁产品。</li>
    <li><strong>正确看待"辐射焦虑"</strong>——日常生活中遇到的绝大多数电磁辐射（广播、电视信号、WiFi 等）强度远低于安全限值。所谓"WiFi 致癌"的说法缺乏科学证据——WiFi 所用射频能量仅为微波炉的万分之一。应科学理性看待电磁辐射，不必过度焦虑。</li>
  </ul>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">常见误区</span>
  <h3>本章常见误区辨析（7 条）</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>#</th><th>误区</th><th>正确理解</th><th>类型</th></tr></thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>"电磁波和声波一样，都需要介质传播"</td>
        <td>电磁波的传播<strong>不需要介质</strong>——可在真空中以光速传播。声波（机械波）必须有介质。本质区别：电磁波是变化的电磁场交替激发（场本身即可存在），声波是介质质点的振动。太空里电磁波畅通无阻，声波寸步难行。</td>
        <td><span class="miscon-type miscon-structural">&#128736; 结构</span></td>
      </tr>
      <tr>
        <td>2</td>
        <td>"红外线和紫外线都能被人眼看到"</td>
        <td>红外线和紫外线都<strong>不可见</strong>。人类的视觉只能感知波长约 380 nm ~ 760 nm 的<strong>可见光</strong>波段。红外线波长长于红光、紫外波长短于紫光——均在人眼感光范围之外。红外夜视仪用探测器而非肉眼"看"红外线。</td>
        <td><span class="miscon-type miscon-surface">&#127993; 表面</span></td>
      </tr>
      <tr>
        <td>3</td>
        <td>"紫外线都是有害的，越少越好"</td>
        <td>适量紫外线对人体是<strong>必要的</strong>——促进皮肤合成<strong>维生素 D</strong>（促进钙吸收，预防佝偻病和骨质疏松）。过量紫外线才致晒伤和增加皮肤癌风险。关键是<strong>适量</strong>——不可"零暴露"，也不可过量曝晒。</td>
        <td><span class="miscon-type miscon-deep">&#129504; 深层</span></td>
      </tr>
      <tr>

    <li><strong>"电子绕原子核沿圆形轨道运动"</strong>？这是玻尔模型的简化描述。现代量子力学认为电子没有确定的轨道，而是以"电子云"的概率分布存在。初中阶段可用"分层轨道"近似理解，但需要知道这只是模型。</li>
    <li><strong>"原子是中性的，所以原子核不带电"</strong>？错。原子核带正电（质子带正电），原子之所以整体中性，是因为核外带负电的电子数与核内质子数相等，正负抵消。</li>
    <li><strong>"原子核内的质子都带正电，为什么不会因排斥而炸开？"</strong>因为存在<strong>核力</strong>（强相互作用力）——这是一种比电磁力强得多的吸引力，把质子和中子牢牢束缚在原子核内部，克服了质子间的库仑斥力。核力作用范围极短（只有约 10⁻¹⁵ m 内有效）。</li>
  </ul>
</div>

<!-- §16.2 核能 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s16-2"><span class="sec-num">&#167;16.2</span> 核能</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、核能的概念——质量亏损与质能方程</h3>
  <p><strong>定义</strong>：原子核发生改变时释放的巨大能量叫做<strong>核能</strong>（也称原子能）。</p>
  <p><strong>核心原理</strong>：当原子核发生裂变或聚变时，生成核的总质量<strong>小于</strong>反应前核的总质量——这部分"消失"的质量叫做<strong>质量亏损</strong>（$\\Delta m$），它按照爱因斯坦的质能方程转化为能量释放：</p>
  <div class="formula-block">
    $E = mc^2,\\quad \\Delta E = \\Delta m \\cdot c^2$
  </div>
  <p>式中 $c = 3.0 \\times 10^8\\,\\mathrm{m/s}$ 为真空中的光速。由于 $c^2$ 的数值极大（$9 \\times 10^{16}$），极小的质量亏损就能释放出<strong>巨大的能量</strong>——这是核能远大于化学能的根本原因。</p>
  <p><strong>能量对比</strong>：1 kg 铀-235 完全裂变释放的能量 ≈ 1 kg 标准煤燃烧释放能量的 <strong>250 万倍</strong>。这是核能密度极高的数量级直观感受。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心机制</span>
  <h3>二、核裂变——重核分裂</h3>
  <p><strong>定义</strong>：质量较大的原子核（如铀-235、钚-239）在受到中子轰击后<strong>分裂</strong>成两个或多个质量中等的原子核，同时释放出巨大能量的过程。</p>

  <h4>1. 铀-235 的裂变反应</h4>
  <p>用<strong>中子</strong>轰击铀-235 原子核时，铀核分裂成两个中等质量的核（如钡核和氪核），同时放出 2～3 个<strong>新的中子</strong>和巨大的能量：</p>
  <div class="formula-block">
    $^{235}_{\\;92}\\mathrm{U} + \\,^{1}_{0}\\mathrm{n} \\rightarrow \\,^{141}_{\\;56}\\mathrm{Ba} + \\,^{92}_{36}\\mathrm{Kr} + 3\\,^{1}_{0}\\mathrm{n} + \\text{能量}$
  </div>

  <h4>2. 链式反应——核裂变的关键特征</h4>
  <p>裂变中释放的<strong>新中子</strong>又会轰击其他铀-235 核，引发更多的裂变——这种"一生二、二生四"的自动持续反应叫做<strong>链式反应</strong>。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>链式反应类型</th><th>条件</th><th>结果</th><th>应用</th></tr></thead>
    <tbody>
      <tr><td><strong>不可控链式反应</strong></td><td>裂变产生的中子全部引发新的裂变，无控制</td><td>短时间内释放巨大能量→爆炸</td><td><strong>原子弹</strong></td></tr>
      <tr><td><strong>可控链式反应</strong></td><td>用<strong>控制棒</strong>（镉棒或硼棒）吸收多余中子，使每次裂变平均有且仅有 1 个中子引发下一次裂变</td><td>平稳、持续地释放能量</td><td><strong>核电站</strong></td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>临界体积</strong>：铀-235 的质量必须达到一定的量（临界体积），链式反应才能持续进行——质量太小则中子逃逸率过高，无法维持链式反应。</p>

  <h4>3. 核电站的工作原理</h4>
  <p>核电站本质上是利用<strong>可控核裂变</strong>的装置：</p>
  <div class="formula-block">
    $\\text{核裂变} \\rightarrow \\text{热能} \\rightarrow \\text{水→高温高压蒸汽} \\rightarrow \\text{蒸汽轮机} \\rightarrow \\text{发电机} \\rightarrow \\text{电能}$
  </div>
  <p><strong>核心组成</strong>：核反应堆（燃料棒：铀-235；控制棒：镉/硼；慢化剂：水/石墨/重水，使快中子减速为慢中子以提高引发裂变的效率）→热交换器→蒸汽轮机→发电机。控制棒通过<strong>插入或拔出</strong>来调节吸收中子的数量，从而控制链式反应的速度。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">核心机制</span>
  <h3>三、核聚变——轻核结合</h3>
  <p><strong>定义</strong>：质量较小的原子核（如氢的同位素氘和氚）在<strong>极高温度</strong>下结合成质量较大的原子核，同时释放出巨大能量的过程。</p>

  <h4>1. 典型的核聚变反应</h4>
  <div class="formula-block">
    $^{2}_{1}\\mathrm{H}（\\text{氘}） + \\,^{3}_{1}\\mathrm{H}（\\text{氚}） \\rightarrow \\,^{4}_{2}\\mathrm{He}（\\text{氦}） + \\,^{1}_{0}\\mathrm{n} + \\text{巨大能量}$
  </div>
  <p><strong>反应条件</strong>：核聚变需要<strong>极高的温度</strong>（数千万至数亿摄氏度）——因为原子核都带正电，要克服彼此间的库仑斥力，必须让核以极高的速度碰撞在一起。这种在极高温下发生的聚变反应叫做<strong>热核反应</strong>。</p>

  <h4>2. 核聚变 vs 核裂变的对比</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>对比维度</th><th>核裂变</th><th>核聚变</th></tr></thead>
    <tbody>
      <tr><td><strong>反应过程</strong></td><td>重核 → 中等核</td><td>轻核 → 较重核</td></tr>
      <tr><td><strong>反应条件</strong></td><td>中子轰击，较易实现</td><td>需要极高温度（数千万~数亿℃）</td></tr>
      <tr><td><strong>单位质量释放能量</strong></td><td>巨大</td><td><strong>更大</strong>（约为裂变的 3 ～ 4 倍）</td></tr>
      <tr><td><strong>放射性废物</strong></td><td>产生大量放射性核废料</td><td>产物基本无放射性（氦是清洁的）</td></tr>
      <tr><td><strong>原料储量</strong></td><td>铀矿储量有限</td><td>氘在海水中极其丰富（每升海水约含 0.03 g 氘）</td></tr>
      <tr><td><strong>可控性</strong></td><td>已实现可控（核电站）</td><td><strong>尚未实现可控</strong>（仍在研究中——如"人造太阳"托卡马克装置）</td></tr>
      <tr><td><strong>应用（不可控）</strong></td><td>原子弹</td><td><strong>氢弹</strong>（威力远大于原子弹）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>3. 太阳的能量来源——天然核聚变反应堆</h4>
  <p>太阳内部发生的是氢核聚变成氦核的热核反应。每秒钟太阳将约 <strong>6 亿吨</strong>氢聚变为氦，释放的能量中只有约<strong>二十亿分之一</strong>到达地球——但这已经足够维持地球上几乎所有的生命活动和气候变化。太阳已经这样"燃烧"了约 50 亿年，还能持续约 50 亿年。</p>
  <p><strong>可控核聚变研究</strong>：人类正在努力实现"人造太阳"——可控核聚变一旦实现，将为人类提供几乎<strong>取之不尽、用之不竭</strong>的清洁能源。中国在"EAST"（东方超环，全超导托卡马克装置）上已实现等离子体温度 1.2 亿摄氏度维持 101 秒的世界纪录。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">综合分析</span>
  <h3>四、核能的优缺点及安全性</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th></th><th>优点</th><th>缺点/风险</th></tr></thead>
    <tbody>
      <tr>
        <td><strong>核裂变（核电站）</strong></td>
        <td>
          <ul>
            <li>能量密度极高（1 kg 铀 ≈ 2500 吨煤）</li>
            <li>不排放 CO₂、SO₂ 等温室气体和污染物</li>
            <li>技术上已成熟，大规模商业化运行</li>
            <li>燃料运输量小，受地理条件限制少</li>
          </ul>
        </td>
        <td>
          <ul>
            <li><strong>核废料</strong>处理极其困难——放射性持续数万年，需深埋地质处置</li>
            <li><strong>泄漏风险</strong>——切尔诺贝利（1986）、福岛（2011）事故教训惨痛</li>
            <li>反应堆退役后场地仍需长期监控</li>
            <li>核扩散风险——可能被用于制造核武器</li>
          </ul>
        </td>
      </tr>
      <tr>
        <td><strong>核聚变（可控→未来能源）</strong></td>
        <td>
          <ul>
            <li>能量密度更高（1 kg 聚变燃料 ≈ 1 万吨煤）</li>
            <li>原料极丰富（海水中的氘可用上亿年）</li>
            <li>产物几乎无放射性（主要是清洁的氦）</li>
            <li>固有安全——一旦装置破损，温度骤降，反应自动停止</li>
          </ul>
        </td>
        <td>
          <ul>
            <li><strong>尚未实现可控</strong>——仍处于研究阶段</li>
            <li>需要极高温度，目前投入能量大于输出能量</li>
            <li>材料问题——反应堆内壁需承受极高温度和强中子辐照</li>
          </ul>
        </td>
      </tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">物理常识</span>
  <h3>五、放射性及其防护——α、β、γ 射线</h3>
  <p><strong>天然放射性</strong>：某些元素的原子核能够<strong>自发地</strong>放出射线而衰变成其他原子核，这种现象叫做<strong>放射性</strong>。如铀（U）、镭（Ra）、钋（Po）等都有天然放射性。</p>
  <p><strong>三种射线对比</strong>：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>射线种类</th><th>本质</th><th>带电量</th><th>穿透能力</th><th>电离能力</th><th>可被什么挡住</th></tr></thead>
    <tbody>
      <tr><td><strong>α 射线</strong></td><td>氦原子核（$^{4}_{2}\\mathrm{He}^{2+}$）</td><td>+2e</td><td>最弱</td><td><strong>最强</strong></td><td>一张纸 / 几厘米空气</td></tr>
      <tr><td><strong>β 射线</strong></td><td>高速电子流（e⁻）</td><td>-e</td><td>中等</td><td>中等</td><td>几毫米铝板</td></tr>
      <tr><td><strong>γ 射线</strong></td><td>高能电磁波（光子）</td><td><strong>不带电</strong></td><td><strong>最强</strong></td><td>最弱</td><td>几厘米铅板 / 厚混凝土</td></tr>
    </tbody>
  </table>
  </div>
  <div class="formula-block">
    $\\text{穿透能力：}\\gamma \\gt \\beta \\gt \\alpha,\\quad \\text{电离能力：}\\alpha \\gt \\beta \\gt \\gamma$
  </div>
  <p><strong>重要辨析</strong>：γ 射线是电磁波（光子），不含带电粒子，因此在磁场中<strong>不发生偏转</strong>；而 α 和 β 射线是带电粒子流，在磁场中会向<strong>相反方向</strong>偏转（左手定则判断偏转方向）。</p>
  <p><strong>核辐射防护三原则</strong>：①<strong>时间</strong>——尽量减少受照射时间；②<strong>距离</strong>——尽量远离放射源（辐射强度与距离平方成反比）；③<strong>屏蔽</strong>——在不同放射源和人体之间放置适当屏蔽材料（α→纸，β→铝板，γ→铅板/厚混凝土）。</p>
  <p><strong>半衰期</strong>（拓展）：放射性元素的原子核衰变一半所需的时间。不同放射性核素的半衰期差异极大，如铀-238 的半衰期约 45 亿年，而钋-214 的半衰期仅 0.00016 秒。半衰期反映放射性物质的"寿命"——半衰期越长，放射性越持久。</p>
</div>

<!-- §16.3 太阳系与宇宙 -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<div class="section-title" id="s16-3"><span class="sec-num">&#167;16.3</span> 太阳系与宇宙</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">太阳系</span>
  <h3>一、太阳系的组成——八大行星与太阳</h3>
  <p><strong>太阳系</strong>以<strong>太阳</strong>为中心，包括绕太阳运动的<strong>八大行星</strong>、卫星、小行星、彗星等天体。</p>
  <p><strong>太阳</strong>是太阳系中唯一的恒星——它自身发光发热，其质量占整个太阳系总质量的 <strong>99.86%</strong>。</p>

  <h4>八大行星排序（由近到远）</h4>
  <div class="formula-block">
    $\\text{水星}\\ \\text{金星}\\ \\text{地球}\\ \\text{火星}\\ \\text{木星}\\ \\text{土星}\\ \\text{天王星}\\ \\text{海王星}$
  </div>
  <p><strong>记忆口诀</strong>：水金地火木土天海。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>行星</th><th>距太阳平均距离</th><th>特点</th></tr></thead>
    <tbody>
      <tr><td><strong>水星</strong></td><td>约 0.39 AU（5800 万 km）</td><td>离太阳最近，表面昼夜温差最大（白天约 430℃，夜晚约 -180℃）</td></tr>
      <tr><td><strong>金星</strong></td><td>约 0.72 AU</td><td>最亮的行星（"启明星"/"长庚星"），表面温度极高（约 465℃，温室效应失控）</td></tr>
      <tr><td><strong>地球</strong></td><td>约 1 AU（1.5 亿 km）</td><td>已知唯一存在生命的天体，表面约 71% 被海洋覆盖</td></tr>
      <tr><td><strong>火星</strong></td><td>约 1.52 AU</td><td>红色星球（氧化铁），有稀薄大气，人类深空探测的首要目标</td></tr>
      <tr><td><strong>木星</strong></td><td>约 5.2 AU</td><td>太阳系<strong>最大的行星</strong>（质量约等于其余七大行星总和的 2.5 倍），大红斑是巨大风暴</td></tr>
      <tr><td><strong>土星</strong></td><td>约 9.5 AU</td><td>以<strong>美丽的光环</strong>著称（主要由冰和岩石碎片组成），密度最低（小于水）</td></tr>
      <tr><td><strong>天王星</strong></td><td>约 19.2 AU</td><td>侧躺着自转（自转轴倾角约 98°），呈蓝绿色</td></tr>
      <tr><td><strong>海王星</strong></td><td>约 30.1 AU</td><td>太阳系中<strong>最远的行星</strong>（冥王星 2006 年被降级为矮行星），呈深蓝色</td></tr>
    </tbody>
  </table>
  </div>

  <h4>小行星带与冥王星</h4>
  <p><strong>小行星带</strong>：位于<strong>火星与木星之间</strong>（距太阳约 2.1 ～ 3.3 AU），包含数十万颗小行星。最大的小行星是"谷神星"（现归为矮行星，直径约 940 km）。</p>
  <p><strong>冥王星</strong>：1930 年发现，2006 年国际天文学联合会（IAU）将其从"行星"降级为<strong>"矮行星"</strong>——原因是不满足行星定义的第三条：必须"清空其轨道附近区域"。</p>

  <h4>行星绕太阳运动的规律</h4>
  <ul>
    <li>所有行星绕太阳沿<strong>椭圆轨道</strong>运动（开普勒第一定律），太阳位于椭圆的一个焦点上。</li>
    <li>离太阳越近的行星，运动速度<strong>越快</strong>（开普勒第二定律：行星与太阳的连线在相等时间内扫过相等面积）。</li>
    <li>公转周期的平方与轨道半长轴的立方成正比（开普勒第三定律：$T^2 \\propto a^3$）。</li>
  </ul>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">恒星</span>
  <h3>二、太阳——我们的恒星</h3>
  <p><strong>太阳的基本数据</strong>：</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>参数</th><th>数值</th></tr></thead>
    <tbody>
      <tr><td><strong>质量</strong></td><td>约 $2.0 \\times 10^{30}\\,\\mathrm{kg}$（地球质量的 33 万倍）</td></tr>
      <tr><td><strong>直径</strong></td><td>约 $1.39 \\times 10^6\\,\\mathrm{km}$（地球直径的 109 倍）</td></tr>
      <tr><td><strong>日地平均距离</strong></td><td>约 $1.5 \\times 10^8\\,\\mathrm{km}$（1 AU，天文单位）</td></tr>
      <tr><td><strong>表面温度</strong></td><td>约 5500℃（光球层）</td></tr>
      <tr><td><strong>中心温度</strong></td><td>约 $1.5 \\times 10^7\\,\\!^\\circ\\mathrm{C}$（1500 万摄氏度）</td></tr>
      <tr><td><strong>能量来源</strong></td><td><strong>氢核聚变成氦核</strong>的热核反应（每秒钟约 6 亿吨氢 → 约 5.96 亿吨氦，质量亏损约 400 万吨）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>太阳的大气层结构（由内到外）</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>层次</th><th>特征</th><th>温度</th><th>观测方式</th></tr></thead>
    <tbody>
      <tr><td><strong>光球层</strong></td><td>我们看到的"太阳表面"，厚约 500 km。有<strong>黑子</strong>（温度比周围低约 1500℃ 的暗区，磁活动区）</td><td>约 5500℃</td><td>肉眼/普通望远镜（需滤光！）</td></tr>
      <tr><td><strong>色球层</strong></td><td>在光球之上，呈玫瑰色。有<strong>日珥</strong>（巨大火焰状气体喷发）和<strong>耀斑</strong>（剧烈爆发，释放巨大能量）</td><td>数千℃ ～ 数万℃</td><td>日全食时可见 / 专用色球望远镜</td></tr>

    </tbody>
  </table>
  </div>
  <p><strong>温馨提示</strong>：绝对不能用肉眼直接看太阳！也不要使用普通望远镜直接看太阳——强光可在瞬间造成永久性眼损伤甚至失明。观测太阳必须使用专业滤光设备。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">天文常识</span>
  <h3>三、银河系——我们的星系</h3>
  <p><strong>银河系</strong>是太阳所在的<strong>星系</strong>（Galaxy），由<strong>数千亿颗恒星</strong>以及大量的星际气体、尘埃和暗物质组成。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>特征</th><th>数据</th></tr></thead>
    <tbody>
      <tr><td><strong>形态</strong></td><td><strong>旋涡星系</strong>——从侧面看呈扁盘状（铁饼形），中央凸起（核球）；从正面看呈螺旋状</td></tr>
      <tr><td><strong>直径</strong></td><td>约 <strong>10 万光年</strong>（$\\approx 9.46 \\times 10^{20}\\,\\mathrm{m}$）</td></tr>

    </tbody>
  </table>
  </div>
  <p><strong>核心认识</strong>：太阳只是银河系数千亿颗恒星中<strong>极其普通的一员</strong>——既不特殊也不处于中心位置。这个认识是人类宇宙观演进的重要里程碑（从"地球中心"→"太阳中心"→"太阳也只是银河系边缘的一个普通恒星"→"银河系只是宇宙中数千亿个星系之一"）。</p>

  <h4>光年——宇宙中的"尺子"</h4>
  <p><strong>定义</strong>：<strong>光年（ly）</strong>是<strong>长度单位</strong>（不是时间单位！），等于光在真空中一年内传播的距离：</p>
  <div class="formula-block">
    $1\\,\\mathrm{ly} = 3.0 \\times 10^8\\,\\mathrm{m/s} \\times 365 \\times 24 \\times 3600\\,\\mathrm{s} \\approx 9.46 \\times 10^{15}\\,\\mathrm{m}$
  </div>
  <p><strong>常见误解纠正</strong>：光年不是时间单位！"光年"= 光走一年的距离，是长度/距离单位。类似的说法还有"光秒"（光走一秒的距离 ≈ 30 万千米，即地月距离的量级）、"光分"（光走一分钟的距离，由地球到太阳约为 8.3 光分）。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">宇宙观</span>
  <h3>四、宇宙——从大爆炸到现代宇宙观</h3>

  <h4>1. 宇宙大爆炸理论</h4>
  <p>目前最被广泛接受的宇宙起源理论是<strong>大爆炸宇宙论</strong>（Big Bang Theory）：宇宙起源于约 <strong>138 亿年前</strong>的一个<strong>密度和温度都极高</strong>的"奇点"（singularity）的爆炸。大爆炸后宇宙不断膨胀，温度逐渐降低，先后形成了基本粒子→原子核（主要是氢和氦）→原子→恒星和星系——最终演化成我们今天看到的宇宙。</p>
  <p><strong>关键证据</strong>：①<strong>宇宙正在膨胀</strong>（红移现象）；②宇宙中氢和氦的丰度比例（约 3:1）；③<strong>宇宙微波背景辐射</strong>（CMB，约 2.725 K，大爆炸的"余温"）。</p>

  <h4>2. 红移现象——宇宙在膨胀的证据</h4>
  <p><strong>定义</strong>：当天体<strong>远离</strong>我们时，它发出的光谱线向波长更长的<strong>红色端</strong>移动——这就是<strong>红移</strong>（Redshift）。这类似于多普勒效应——警车远离时警笛声变低沉（频率变低）。</p>
  <p><strong>哈勃发现</strong>：1929 年，美国天文学家哈勃（Edwin Hubble）观测发现：遥远的星系几乎都在<strong>远离我们而去</strong>，且<strong>距离越远的星系，远离的速度越快</strong>（哈勃定律：$v = H_0 \\cdot d$）。这说明宇宙正在<strong>膨胀</strong>——不是天体在空间运动，而是<strong>空间本身在膨胀</strong>。</p>
  <p><strong>教学提示</strong>：红移表明宇宙在膨胀。如果时间倒推，所有物质在约 138 亿年前汇聚于一点——这就指向了大爆炸。</p>

  <h4>3. 宇宙观的发展历程</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>阶段</th><th>代表学说/人物</th><th>核心观点</th><th>历史地位</th></tr></thead>
    <tbody>
      <tr><td><strong>① 地心说</strong></td><td>托勒密（古希腊，公元2世纪）</td><td>地球是宇宙的<strong>中心</strong>，太阳、月亮和所有天体都绕地球转动。</td><td>统治西方天文学约 1400 年（符合日常观察），后被证伪</td></tr>
      <tr><td><strong>② 日心说</strong></td><td>哥白尼（波兰，1543年）</td><td><strong>太阳</strong>是宇宙的中心，地球只是一颗绕太阳运动的普通行星。</td><td>科学革命的开端，颠覆人类中心主义——但哥白尼仍认为太阳是宇宙中心（也是错的）</td></tr>
      <tr><td><strong>③ 太阳系观</strong></td><td>伽利略、开普勒、牛顿（17世纪）</td><td>太阳只是太阳系的中心，太阳系之外还有更广大的宇宙空间。行星沿椭圆轨道运动（开普勒），万有引力解释天体运动（牛顿）。</td><td>望远镜观测提供实证（伽利略发现木星卫星、金星相位），奠定经典天体力学</td></tr>
      <tr><td><strong>④ 银河系观</strong></td><td>赫歇尔、沙普利（18 ～ 20 世纪）</td><td>银河系是盘状的恒星系统，直径约 10 万光年。太阳不在银河系中心，而在边缘。</td><td>进一步"降格"太阳的位置——太阳非银河系中心</td></tr>
      <tr><td><strong>⑤ 现代宇宙观</strong></td><td>哈勃、爱因斯坦（20 世纪至今）</td><td>银河系只是宇宙中<strong>数千亿个星系</strong>中的一个。宇宙在膨胀，起源于大爆炸。<strong>没有绝对的"中心"</strong>。</td><td>人类对自我的认识不断"降格"：地球不是中心→太阳不是中心→银河系也不是中心→宇宙没有中心</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>深刻启示</strong>：人类宇宙观的演进是一部不断"去中心化"的历史——每一次观念的突破，都是对"人类特殊地位"的否定，也是对客观世界认识的深化。科学的本质不是证明"我们有多特殊"，而是<strong>如实认识我们身处其中的这个宇宙</strong>。</p>
</div>

  <p><strong>方法论启示</strong>：从肉眼观测→望远镜→射电望远镜→太空望远镜→探测器——人类的"视野"随着技术进步不断拓展。科学探索的本质就是：用更好的工具获取更多的证据，构建更精确的模型，提出更深远的问题。</p>
</div>

  <div class="ch-subtitle">Energy Transfer, Transformation &amp; Energy Sources &mdash; 沪科版五四制2024 &middot; 九年级下册 &middot; 能量与可持续发展</div>
</div>

<div class="chapter-intro">
  <strong>本章概述：</strong>「能量的转移和转化 能源」是沪科版五四制2024九年级下册物理的<strong>能量观念收束章节</strong>，也是上海中考<strong>概念辨析题和简答题</strong>的常见来源（占分 3～6 分）。本章从<strong>能量守恒定律</strong>这一自然界最普遍、最重要的基本定律出发，系统梳理<strong>能量转移与转化的常见实例</strong>，深入辨析能量转化的<strong>方向性</strong>（"热量不能自发从低温物体传到高温物体"）；随后展开<strong>能源分类体系</strong>（一次/二次、可再生/不可再生、常规/新能源）的全面学习；最后聚焦于<strong>新能源的开发与利用</strong>——太阳能、核能、风能、水能、氢能、地热能、海洋能，落脚于<strong>能源与可持续发展</strong>（节能减排、碳中和）。核心在于：区分能量"转移"与"转化"、牢记能量守恒定律的表述与适用范围、掌握能源分类的多维度判定、理解核电站能量转化链条、能将生活中的能量变化现象正确归类分析。
</div>

<!-- §17.1 能量的转移和转化 -->
<!-- ================================================================================== -->
<div class="section-title" id="s17-1">§17.1 能量的转移和转化</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、能量守恒定律——自然界最普遍最重要的基本定律之一</h3>
  <p><strong>能量守恒定律</strong>：<strong>能量既不会凭空产生，也不会凭空消失，它只能从一种形式转化为另一种形式，或者从一个物体转移到另一个物体，而在转化或转移的过程中，能量的总量保持不变。</strong></p>
  <p>这是自然界<strong>最普遍、最重要</strong>的基本定律之一。大到天体运行、小到原子核内部运动，从物理、化学到生物领域，能量守恒定律都普遍适用。人类对能量的每一次利用，本质上都是在不同形式之间转化能量或在不同物体之间转移能量，而宇宙中的总能量始终守恒。</p>

  <h4>定律的四个关键要素</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>要素</th><th>含义</th><th>举例</th></tr></thead>
    <tbody>
      <tr><td><strong>不能凭空产生</strong></td><td>不可能无中生有地创造能量</td><td>永动机不可能实现——它违背了能量守恒定律</td></tr>
      <tr><td><strong>不能凭空消失</strong></td><td>能量不会莫名其妙地消灭</td><td>摩擦生热——动能看似"消失"，实际转化为了等量的内能</td></tr>
      <tr><td><strong>转化</strong></td><td>能量从一种<strong>形式</strong>变为另一种形式</td><td>发电机：机械能→电能；电动机：电能→机械能</td></tr>
      <tr><td><strong>转移</strong></td><td>同种形式的能量在<strong>不同物体</strong>间传递</td><td>热传递：内能从高温物体转移到低温物体</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>永动机为什么不可能？</strong>历史上许多人试图制造不消耗能量却能持续对外做功的机器（第一类永动机），但全部失败。能量守恒定律从理论上宣告了第一类永动机的<strong>不可能性</strong>——对外做功必然消耗能量，不输入能量就不可能持续输出能量。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">辨析</span>
  <h3>二、能量转移与能量转化的区别</h3>
  <p><strong>能量转移</strong>：<strong>同种形式</strong>的能量从一个物体传到另一个物体——能量的形式<strong>不变</strong>，只是"换了个主人"。</p>
  <p><strong>能量转化</strong>：能量从<strong>一种形式</strong>变为<strong>另一种形式</strong>——能量的形式<strong>变了</strong>，这是能量的"变身"过程。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>类型</th><th>能量形式是否改变</th><th>本质</th><th>典型实例</th></tr></thead>
    <tbody>
      <tr><td><strong>能量转移</strong></td><td>不改变</td><td>同种能量在物体间传递</td><td>热传递（内能：高温物体→低温物体）；做功（机械能：锤子→钉子）</td></tr>
      <tr><td><strong>能量转化</strong></td><td>改变</td><td>不同形式能量之间互变</td><td>摩擦生热（机械能→内能）；发电机（机械能→电能）；光合作用（光能→化学能）</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>辨析要点</strong>：判断"转移"还是"转化"的关键是看<strong>能量的形式是否改变</strong>。热传递中，热水的内能和冷水的内能都是"内能"这一种形式——只不过内能从热水跑到了冷水——这是<strong>转移</strong>。而摩擦生热：运动的机械能转变成了热能（内能）——能量形式变了——这是<strong>转化</strong>。两者经常同时发生：发电机工作时，水轮机先将水的机械能<strong>转移</strong>给发电机转子，转子再将机械能<strong>转化</strong>为电能。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">实例</span>
  <h3>三、能量转化的常见实例（中考高频归类）</h3>
  <p>以下实例是上海中考"判断能量转化形式"题的高频考点，必须熟练掌握每一个实例中<strong>什么能转化为什么能</strong>。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>实例</th><th>能量转化方向</th><th>关键解释</th></tr></thead>
    <tbody>
      <tr><td><strong>摩擦生热</strong></td><td>机械能 → 内能</td><td>克服摩擦力做功，机械能减少，内能增加（两手搓一搓发热）</td></tr>
      <tr><td><strong>发电机发电</strong></td><td>机械能 → 电能</td><td>外力驱动线圈在磁场中转动，机械能转化为电能（电磁感应）</td></tr>
      <tr><td><strong>电动机工作</strong></td><td>电能 → 机械能</td><td>电流通过线圈在磁场中受力转动，电能转化为机械能</td></tr>
      <tr><td><strong>光合作用</strong></td><td>光能 → 化学能</td><td>绿色植物利用光能，将 CO₂和 H₂O合成有机物（葡萄糖），光能储存为化学能</td></tr>
      <tr><td><strong>电池放电</strong></td><td>化学能 → 电能</td><td>电池内部化学反应产生电压，化学能转化为电能供电路使用</td></tr>
      <tr><td><strong>电池充电</strong></td><td>电能 → 化学能</td><td>充电器将电能输入电池，驱动内部发生逆化学反应，将电能储存为化学能</td></tr>
      <tr><td><strong>燃料燃烧</strong></td><td>化学能 → 内能</td><td>燃料与氧气发生氧化反应释放热量（如天然气燃烧、汽车汽油燃烧）</td></tr>
      <tr><td><strong>白炽灯发光</strong></td><td>电能 → 光能 + 内能</td><td>电流通过钨丝→钨丝发热（内能）→高温发光（光能）；大部分电能转化为内能</td></tr>
      <tr><td><strong>电饭煲煮饭</strong></td><td>电能 → 内能</td><td>电流通过电阻丝发热，电能全部转化为内能（纯电阻电路）</td></tr>
      <tr><td><strong>太阳能电池</strong></td><td>光能 → 电能</td><td>光伏效应——光子激发半导体中的电子跃迁，将光能直接转化为电能</td></tr>
      <tr><td><strong>水力发电</strong></td><td>机械能 → 电能</td><td>水流冲击水轮机→水轮机转动（机械能）→带动发电机→电能（也可理解为：重力势能→动能→电能）</td></tr>
      <tr><td><strong>火箭发射</strong></td><td>化学能 → 内能 → 机械能</td><td>燃料燃烧（化学能→内能）→高温气体喷射（内能）→火箭获得动能和重力势能（机械能）</td></tr>
      <tr><td><strong>人体运动</strong></td><td>化学能 → 机械能</td><td>食物中的化学能（通过呼吸作用释放）→肌肉收缩 → 人体运动的机械能</td></tr>
      <tr><td><strong>地热发电</strong></td><td>内能 → 机械能 → 电能</td><td>地下热能→加热地下水变为蒸汽→推动汽轮机转动→发电机→电能</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>归纳口诀</strong>：摩擦机转内，发电机动电；电动电机转，光合光转化；电池化转电，燃烧化转内；白炽电转光与热，太阳能电池光转电。</p>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">核心辨析</span>
  <h3>四、能量转化的方向性——"品位"在降低</h3>
  <p><strong>能量转化的方向性</strong>：自然界中，能量的转化和转移是有<strong>方向</strong>的——有些过程可以<strong>自发</strong>发生，而其逆过程<strong>不能自发</strong>发生。</p>

  <h4>1. 热传递的方向性</h4>
  <p>热量可以<strong>自发地</strong>从高温物体传向低温物体，但热量<strong>不能自发地</strong>从低温物体传向高温物体。想让热量从低温物体传到高温物体（如冰箱、空调制冷），必须借助外界对系统<strong>做功</strong>（消耗电能），这不是"自发"的过程。</p>

  <h4>2. 能量转化的方向性</h4>
  <div class="table-wrap">
  <table>
    <thead><tr><th>可自发的过程</th><th>不可自发的过程（需外界做功才能实现）</th></tr></thead>
    <tbody>
      <tr><td>机械能 → 内能（摩擦生热——自动发生）</td><td>内能 → 机械能（需要热机——蒸汽机、内燃机——且不能100%转化）</td></tr>
      <tr><td>高温物体 → 低温物体（热传递——自动发生）</td><td>低温物体 → 高温物体（需要制冷机做功——冰箱、空调）</td></tr>
      <tr><td>化学能 → 内能（燃料燃烧——自动发生）</td><td>内能 → 化学能（需要特定的化学反应——如光合作用需要光能驱动）</td></tr>
      <tr><td>电能 → 内能（电流热效应——自动发生）</td><td>内能 → 电能（需要温差发电装置，效率很低）</td></tr>
    </tbody>
  </table>
  </div>

  <h4>3. 能量转化中的"品位降低"</h4>
  <p>在能量转化过程中，能量的"品位"（做有用功的能力）趋于<strong>降低</strong>。例如：机械能是"高品质"能量（可近100%转化为其他形式），而内能是"低品质"能量（不可能100%转化为机械能）。每一次能量转化，都有部分能量以<strong>内能</strong>的形式散失到环境中（无法再利用），这是能量转化的普遍规律。</p>

  <p><strong>考试关键表述</strong>："热量<strong>自发</strong>地从高温物体传向低温物体"——注意"自发"二字不可省略。在有外界干预（做功）的情况下，热量也可能从低温物体传到高温物体，但那不是自发过程。</p>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">概念</span>
  <h3>五、做功与热传递——能量转移的两种方式</h3>
  <p><strong>做功</strong>和<strong>热传递</strong>是改变物体内能的两种方式，实质上也是能量转移和转化的两种基本途径。</p>

  <div class="table-wrap">
  <table>
    <thead><tr><th>方式</th><th>能量变化实质</th><th>本质</th><th>实例</th></tr></thead>
    <tbody>
      <tr><td><strong>做功</strong></td><td>机械能 ⇄ 内能（或其他形式能量与内能互变）</td><td>能量在不同形式之间<strong>转化</strong></td><td>压缩空气升温（机械能→内能）；气体膨胀对外做功（内能→机械能）</td></tr>
      <tr><td><strong>热传递</strong></td><td>内能从高温物体到低温物体</td><td>能量在同一形式不同物体间<strong>转移</strong></td><td>热水袋暖手；暖气片散发热量</td></tr>
    </tbody>
  </table>
  </div>

  <p><strong>等效性</strong>：做功和热传递在改变物体内能上是<strong>等效</strong>的——一根铁丝变热，既可以放在火上烤（热传递），也可以用锤子反复敲打（做功）。但从能量转化/转移的角度看，它们的本质不同——前者是转移（内能从火→铁丝），后者是转化（机械能→内能）。</p>
</div>
