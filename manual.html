<html lang="zh-CN">

<style>
/* ================================================================
   DESIGN SYSTEM — "Scholarly Archive" 学术典藏
   ================================================================ */
:root {
  /* Color palette */
  --ink-900: #1a1f36;
  --ink-700: #2d3561;
  --ink-500: #4a5080;
  --ink-300: #8e95b8;
  --paper: #fdfaf3;
  --paper-warm: #f7f2e8;
  --paper-dark: #ebe4d5;
  --gold: #b8860b;
  --gold-light: #d4a535;
  --gold-pale: #faf3e0;
  --sage: #4a7c59;
  --sage-light: #6b9e7a;
  --sage-pale: #edf5ef;
  --rust: #c2543d;
  --rust-pale: #fef2ef;
  --slate: #5a6c7d;
  --slate-pale: #f0f3f5;

  /* Semantic tokens */
  --bg: var(--paper);
  --bg-alt: var(--paper-warm);
  --text: var(--ink-900);
  --text-secondary: var(--ink-500);
  --text-tertiary: var(--ink-300);
  --accent: var(--gold);
  --accent-light: var(--gold-light);
  --accent-bg: var(--gold-pale);
  --brand: var(--ink-700);
  --border: var(--paper-dark);
  --card: #fffefb;
  --card-shadow: 0 1px 3px rgba(26,31,54,0.06), 0 1px 2px rgba(26,31,54,0.04);
  --card-shadow-hover: 0 4px 12px rgba(26,31,54,0.08), 0 2px 4px rgba(26,31,54,0.04);
  --sidebar-bg: #161b2e;
  --sidebar-text: #c0c8dd;
  --sidebar-active: var(--gold-light);
  --sidebar-hover: rgba(255,255,255,0.04);

  /* Typography */
  --font-display: 'Noto Serif SC', 'SimSun', 'STSong', serif;
  --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;

  /* Spacing */
  --sidebar-width: 280px;
  --content-max: 900px;

  /* Radii */
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 12px;
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

html {
  scroll-behavior: smooth;
  scroll-padding-top: 24px;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg);
  line-height: 1.75;
  min-height: 100vh;
  /* Subtle paper texture */
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(184,134,11,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(45,53,97,0.02) 0%, transparent 50%);
}

/* ================================================================
   LAYOUT
   ================================================================ */
.app { display: flex; min-height: 100vh; }

/* ---- Sidebar ---- */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  color: var(--sidebar-text);
  z-index: 100;
  display: flex; flex-direction: column;
  overflow: hidden;
  border-right: 1px solid rgba(255,255,255,0.06);
  /* Subtle grain overlay */
  background-image:
    linear-gradient(var(--sidebar-bg), var(--sidebar-bg)),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.sidebar-header .logo {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: #f0e6d3;
  letter-spacing: 0.04em;
  line-height: 1.4;
}
.sidebar-header .logo-icon {
  display: inline-block; margin-right: 6px;
  font-size: 1.3rem; vertical-align: -2px;
}
.sidebar-header .subtitle {
  font-size: 0.7rem;
  color: var(--sidebar-text);
  opacity: 0.5;
  margin-top: 4px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.sidebar-nav {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.sidebar-footer {
  padding: 12px 20px; font-size: 0.68rem; opacity: 0.35;
  border-top: 1px solid rgba(255,255,255,0.06);
  text-align: center; flex-shrink: 0;
  letter-spacing: 0.04em;
}

/* Sidebar tree */
.grade-group { margin-bottom: 2px; }
.grade-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  color: #e8ddd0; font-size: 0.88rem; font-weight: 600;
  cursor: pointer; border: none; background: none; width: 100%; text-align: left;
  transition: background 0.15s; font-family: var(--font-display);
  letter-spacing: 0.03em;
}
.grade-toggle:hover { background: var(--sidebar-hover); }
.grade-toggle .arrow {
  font-size: 0.55rem; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  opacity: 0.5; flex-shrink: 0;
}
.grade-toggle.open .arrow { transform: rotate(90deg); }
.grade-toggle .grade-badge {
  font-size: 0.65rem; padding: 1px 8px; border-radius: 10px;
  font-weight: 500; letter-spacing: 0.05em;
  background: rgba(255,255,255,0.08);
  margin-left: auto;
}

.chapter-list { overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
.chapter-list.collapsed { max-height: 0 !important; }

.chapter-link {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 20px 6px 32px;
  color: var(--sidebar-text); text-decoration: none;
  font-size: 0.8rem; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.chapter-link:hover { background: rgba(255,255,255,0.04); color: #e8ddd0; }
.chapter-link.active { color: var(--sidebar-active); border-left-color: var(--sidebar-active); background: rgba(212,165,53,0.08); }
.chapter-link .ch-num {
  font-size: 0.68rem; opacity: 0.5; min-width: 20px;
  font-family: var(--font-mono);
}
.chapter-link .ch-arrow { font-size: 0.55rem; margin-left: auto; opacity: 0.4; transition: transform 0.2s; }
.chapter-group { margin-bottom: 1px; }

/* Section sublist in sidebar */
.section-sublist { overflow: hidden; transition: max-height 0.3s ease; background: rgba(0,0,0,0.1); }
.section-sublist.collapsed { max-height: 0 !important; }
.section-link {
  display: block; padding: 3px 12px 3px 48px; color: #8899aa; text-decoration: none;
  font-size: 0.73rem; transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.section-link:hover { color: #e8ddd0; background: rgba(255,255,255,0.03); }
.sec-dot { margin-right: 4px; opacity: 0.3; }

/* ---- Main content ---- */
.main {
  margin-left: var(--sidebar-width);
  flex: 1; max-width: var(--content-max); width: 100%;
  padding: 32px 48px 120px;
}

/* ---- Top bar ---- */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; padding: 12px 0 16px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 80;
  background: var(--bg);
  backdrop-filter: blur(8px);
}
.top-bar .breadcrumb {
  font-size: 0.85rem; color: var(--text-tertiary);
  font-family: var(--font-mono); letter-spacing: 0.02em;
}
.top-bar .breadcrumb span { color: var(--text-secondary); }

.search-wrap {
  position: relative; width: 280px;
}
.search-input {
  width: 100%; padding: 8px 14px 8px 36px;
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 0.85rem; font-family: var(--font-body);
  background: var(--card); color: var(--text);
  transition: all 0.2s; outline: none;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,134,11,0.08); }
.search-icon {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  font-size: 0.9rem; opacity: 0.35; pointer-events: none;
}
.search-results {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(26,31,54,0.12); max-height: 360px; overflow-y: auto;
  z-index: 60;
}
.search-results.visible { display: block; }
.search-result-item {
  display: block; padding: 10px 16px; text-decoration: none; color: var(--text);
  border-bottom: 1px solid var(--border); transition: background 0.1s;
  font-size: 0.85rem;
}
.search-result-item:hover { background: var(--paper-warm); }
.search-result-item:last-child { border-bottom: none; }
.search-result-item .sr-title { font-weight: 600; }
.search-result-item .sr-chapter { font-size: 0.72rem; color: var(--text-tertiary); }
.no-results { padding: 20px; text-align: center; color: var(--text-tertiary); font-size: 0.85rem; }

/* ================================================================
   CONTENT STYLING
   ================================================================ */
.chapter {
  margin-bottom: 56px; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.chapter:first-of-type { border-top: none; }

.chapter-header {
  margin-bottom: 24px; padding-bottom: 14px;
  border-bottom: 2px solid var(--accent);
  position: relative;
}
.chapter-header::after {
  content: ''; position: absolute; bottom: -2px; left: 0;
  width: 40px; height: 2px; background: var(--ink-700);
}
.chapter-header .ch-num-label {
  font-size: 0.78rem; color: var(--accent); font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  font-family: var(--font-mono);
}
.chapter-header h2 {
  font-family: var(--font-display);
  font-size: 1.8rem; color: var(--ink-900); font-weight: 900;
  letter-spacing: 0.04em; margin-top: 2px;
}
.chapter-header .ch-subtitle {
  font-size: 0.85rem; color: var(--text-secondary);
  margin-top: 4px; font-style: italic;
}

/* Section headers */
.section-title {
  font-family: var(--font-display);
  font-size: 1.25rem; color: var(--ink-700); font-weight: 700;
  margin: 32px 0 16px; padding-left: 16px;
  border-left: 3px solid var(--sage);
  letter-spacing: 0.03em;
}

/* Knowledge cards */
.knowledge-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 14px;
  box-shadow: var(--card-shadow);
  transition: box-shadow 0.25s, transform 0.25s;
  position: relative;
}
.knowledge-card:hover { box-shadow: var(--card-shadow-hover); }

.knowledge-card h3 {
  font-family: var(--font-display);
  font-size: 1.05rem; color: var(--ink-900); font-weight: 700;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
  letter-spacing: 0.03em;
}
.knowledge-card h4 {
  font-size: 0.95rem; color: var(--ink-700); font-weight: 600;
  margin: 14px 0 8px;
}

/* Card variants */
.card-definition { border-left: 4px solid var(--slate); }
.card-formula {
  border-left: 4px solid var(--accent);
  background: linear-gradient(135deg, var(--accent-bg) 0%, #fffefb 40%);
}
.card-example { border-left: 4px solid var(--sage); }
.card-warning { border-left: 4px solid var(--rust); background: var(--rust-pale); }
.card-key { border-left: 4px solid var(--ink-700); background: linear-gradient(135deg, #f4f5fa 0%, #fffefb 100%); }
.card-experiment { border-left: 4px solid #6b4e9e; }

.card-badge {
  display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 10px;
  border-radius: 12px; margin-bottom: 10px; letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge-def { background: #e8ecf2; color: #3d5068; }
.badge-formula { background: var(--accent-bg); color: #8b6914; }
.badge-example { background: var(--sage-pale); color: #3a5c42; }
.badge-warning { background: #fce4df; color: #a83d2c; }
.badge-key { background: #e8eaf2; color: #2d3561; }
.badge-experiment { background: #f0edf7; color: #563d82; }

/* Tables */
.table-wrap { overflow-x: auto; margin: 14px 0; border-radius: var(--radius-sm); }
table {
  width: 100%; border-collapse: collapse; font-size: 0.88rem;
}
thead th {
  background: var(--ink-700); color: #e8ddd0; padding: 10px 14px;
  text-align: left; font-weight: 600; font-family: var(--font-display);
  letter-spacing: 0.03em; font-size: 0.82rem;
}
thead th:first-child { border-radius: var(--radius-sm) 0 0 0; }
thead th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
tbody td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
tbody tr:nth-child(even) { background: var(--paper-warm); }
tbody tr:hover { background: #f0ede4; }

/* Formulas */
.formula-block {
  background: linear-gradient(135deg, #fafaf7 0%, #f4f1e8 100%);
  border: 1px solid var(--paper-dark); border-radius: var(--radius-sm);
  padding: 16px 24px; margin: 14px 0; text-align: center;
  overflow-x: auto; font-family: var(--font-mono); font-size: 1rem;
}
.formula-block .formula-label {
  font-size: 0.72rem; color: var(--text-tertiary); text-align: right;
  margin-top: 6px; font-family: var(--font-body);
}

/* Inline styles */
strong { color: var(--ink-700); font-weight: 600; }
em { color: var(--ink-500); }

.content-list {
  list-style: none; padding: 0; margin: 8px 0;
}
.content-list li {
  padding: 5px 0 5px 24px; position: relative;
  line-height: 1.7;
}
.content-list li::before {
  content: '—'; position: absolute; left: 0; top: 5px;
  color: var(--accent); font-size: 0.7rem; opacity: 0.6;
}

.content-list.numbered { counter-reset: cl; }
.content-list.numbered li { padding-left: 28px; }
.content-list.numbered li::before {
  counter-increment: cl; content: counter(cl) ".";
  color: var(--ink-500); font-size: 0.82rem; font-weight: 600;
  opacity: 0.7;
}

/* Highlight boxes */
.highlight-box {
  background: linear-gradient(135deg, #fffbeb 0%, #fffdf5 100%);
  border: 1px solid #e8dca0; border-radius: var(--radius);
  padding: 14px 20px; margin: 14px 0; font-size: 0.9rem;
}
.highlight-box .hl-icon { margin-right: 6px; }

/* Progress indicator */
.chapter-progress {
  display: flex; align-items: center; gap: 6px; margin-top: 16px;
  font-size: 0.75rem; color: var(--text-tertiary);
}
.chapter-progress .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--border);
}
.chapter-progress .dot.done { background: var(--sage); }

/* Scroll-to-top */
.scroll-top {
  position: fixed; bottom: 24px; right: 24px; z-index: 90;
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--card); color: var(--text-secondary); font-size: 1.2rem;
  cursor: pointer; box-shadow: var(--card-shadow); transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(10px); pointer-events: none;
}
.scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.scroll-top:hover { background: var(--ink-700); color: #e8ddd0; border-color: var(--ink-700); }

/* Mobile */
.menu-toggle {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  width: 40px; height: 40px; border: none; border-radius: 8px;
  background: var(--ink-700); color: #e8ddd0; font-size: 1.2rem;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }

@media (max-width: 860px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.visible { display: block; }
  .menu-toggle { display: flex; align-items: center; justify-content: center; }
  .main { margin-left: 0; padding: 20px 16px 80px; }
  .top-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
  .search-wrap { width: 100%; }
  .chapter-header h2 { font-size: 1.4rem; }
}

/* Print */
@media print {
  .sidebar, .menu-toggle, .scroll-top, .search-wrap, .top-bar { display: none; }
  .main { margin-left: 0; padding: 0; max-width: 100%; }
  .knowledge-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Mobile toggle -->
  <button class="menu-toggle" onclick="toggleSidebar()" aria-label="菜单">☰</button>
  <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- ================================================================
       SIDEBAR
       ================================================================ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><span class="logo-icon">⚛</span>上海初中物理</div>
      <div class="subtitle">知识手册 · Knowledge Manual</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Generated by JS -->
    </nav>
    <div class="sidebar-footer">沪科版（五四制）· 2024/2025</div>
  </aside>

  <!-- ================================================================
       MAIN CONTENT
       ================================================================ -->
  <main class="main" id="mainContent">
    <div class="top-bar">
      <div class="breadcrumb">📖 <span>知识手册</span> / 全部章节</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索知识点、公式、概念…" oninput="doSearch()">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <div id="contentArea">
      <!-- Generated by JS (all chapter content) -->
    </div>
  </main>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

<script>
// ================================================================
// DATA: Complete chapter structure
// ================================================================
const STRUCTURE = [
  { grade: '八年级上册', semester: 'g8a', chapters: [
    { id: 'ch01', num: 1, title: '测量', short: '测量', sections: [
      { id: 'ch01s1', t: '长度的测量' },{ id: 'ch01s2', t: '时间的测量' },{ id: 'ch01s3', t: '误差' },{ id: 'ch01s4', t: '科学记数法' },{ id: 'ch01s5', t: '质量的测量' },{ id: 'ch01s6', t: '跨学科实践' }]},
    { id: 'ch02', num: 2, title: '机械运动', short: '机械运动', sections: [
      { id: 'ch02s1', t: '运动的描述' },{ id: 'ch02s2', t: '速度' },{ id: 'ch02s3', t: '匀速直线运动' },{ id: 'ch02s4', t: 's-t与v-t图像' }]},
    { id: 'ch03', num: 3, title: '声现象', short: '声现象', sections: [

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  STRUCTURE.forEach((grade, gi) => {
    const gradeId = `grade-${gi}`;
    html += `<div class="grade-group">`;
    html += `<button class="grade-toggle${gi === 0 ? ' open' : ''}" onclick="toggleGrade('${gradeId}', this)" aria-expanded="${gi === 0}">`;
    html += `<span class="arrow">▶</span>${grade.grade}`;
    html += `<span class="grade-badge">${grade.chapters.length}章</span>`;
    html += `</button>`;
    html += `<div class="chapter-list${gi === 0 ? '' : ' collapsed'}" id="${gradeId}">`;
    grade.chapters.forEach(ch => {
      const chId = `ch-${ch.id}`;
      html += `<div class="chapter-group">`;
      html += `<a href="#${ch.id}" class="chapter-link" data-chapter="${ch.id}" onclick="activateChapter(this); toggleSections('${chId}'); if(window.innerWidth<860)toggleSidebar();">`;
      html += `<span class="ch-num">Ch${ch.num}</span>${ch.title}`;
      if (ch.sections && ch.sections.length) {
        html += `<span class="ch-arrow">▸</span>`;
      }
      html += `</a>`;
      if (ch.sections && ch.sections.length) {
        html += `<div class="section-sublist collapsed" id="${chId}">`;
        ch.sections.forEach(sec => {
          html += `<a href="#${sec.id}" class="section-link" data-section="${sec.id}" onclick="event.preventDefault();const el=document.getElementById('${sec.id}');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});">`;
          html += `<span class="sec-dot">·</span>${sec.t}`;
          html += `</a>`;
        });
        // Auto-add CFU self-check anchor
        html += `<a href="#${ch.id}-cfu" class="section-link" data-section="${ch.id}-cfu" onclick="event.preventDefault();const el=document.getElementById('${ch.id}-cfu');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});" style="color:#b8a060;">`;
        html += `<span class="sec-dot">✓</span>自查要点`;
        html += `</a>`;
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  nav.innerHTML = html;

  // Set chapter list heights for animation
  setTimeout(() => {
    document.querySelectorAll('.chapter-list').forEach(el => {
      if (!el.classList.contains('collapsed')) {
        el.style.maxHeight = el.scrollHeight + 'px';
      }
    });
  }, 100);
}

function toggleGrade(id, btn) {
  const list = document.getElementById(id);
  const isOpen = !list.classList.contains('collapsed');
  if (isOpen) {
    list.style.maxHeight = list.scrollHeight + 'px';
    requestAnimationFrame(() => {
      list.classList.add('collapsed');
      list.style.maxHeight = '0px';
    });
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
  } else {
    list.classList.remove('collapsed');
    list.style.maxHeight = list.scrollHeight + 'px';
    btn.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
    list.addEventListener('transitionend', function handler() {
      list.style.maxHeight = 'none';
      list.removeEventListener('transitionend', handler);
    });
  }
}

function activateChapter(link) {
  document.querySelectorAll('.chapter-link').forEach(l => l.classList.remove('active'));
  link.classList.add('active');
}

function toggleSections(id) {
  const list = document.getElementById(id);
  if (!list) return;
  const isOpen = !list.classList.contains('collapsed');
  if (isOpen) {
    list.classList.add('collapsed');
    list.style.maxHeight = '0px';
  } else {
    list.classList.remove('collapsed');
    list.style.maxHeight = list.scrollHeight + 'px';
  }
  // Update arrow
  const link = list.previousElementSibling;
  if (link) {
    const arrow = link.querySelector('.ch-arrow');
    if (arrow) arrow.textContent = isOpen ? '▸' : '▾';
  }
}

    <div class="section-title" id="ch02s1">2.1 运动的描述</div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>机械运动</h3>
      <p>一个物体相对于另一个物体<strong>位置的变化</strong>叫做机械运动，简称运动。</p>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>参照物</h3>
      <ul class="content-list">
        <li><strong>定义：</strong>判断一个物体是否运动时，被选作<strong>参考标准</strong>的物体叫做参照物。</li>
        <li><strong>选取原则：</strong>
          <ul class="content-list">
            <li>参照物可以<strong>任意选取</strong>（但不能选研究对象本身），通常选取地面或地面上静止的物体。</li>
            <li>参照物的选取不同，同一物体的运动状态可能<strong>不同</strong>。</li>
          </ul>
        </li>
        <li><strong>运动和静止的相对性：</strong>判断一个物体是运动还是静止，取决于所选的参照物。没有绝对静止的物体。</li>
      </ul>
    </div>

    <div class="knowledge-card card-example">
      <span class="card-badge badge-example">示例</span>
      <h3>运动和静止的相对性举例</h3>
      <ul class="content-list">
        <li>坐在行驶汽车中的乘客，以<strong>地面</strong>为参照物是<strong>运动</strong>的；以<strong>座椅</strong>为参照物是<strong>静止</strong>的。</li>
        <li>两列并排同速行驶的火车，彼此相对<strong>静止</strong>。若其中一列加速，则相对<strong>运动</strong>。</li>
        <li>"月亮在白莲花般的云朵里穿行"——以<strong>云</strong>为参照物，月亮是运动的。</li>
        <li>"小小竹排江中游，巍巍青山两岸走"——前半句以<strong>青山</strong>为参照物（竹排运动），后半句以<strong>竹排</strong>为参照物（青山运动）。</li>
      </ul>
    </div>

    <div class="section-title" id="ch02s2">2.2 速度</div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>速度的定义</h3>
      <p><strong>速度</strong>是表示物体运动<strong>快慢</strong>的物理量，等于运动物体在单位时间内通过的路程。</p>
      <p>速度是<strong>矢量</strong>，既有大小又有方向（初中阶段重点掌握大小的计算）。</p>
    </div>

    <div class="knowledge-card card-formula">
      <span class="card-badge badge-formula">公式</span>
      <h3>速度公式</h3>
      <div class="formula-block">
        $$v = \\frac{s}{t}$$
        <div class="formula-label">速度 = 路程 ÷ 时间</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>符号</th><th>物理量</th><th>SI单位</th><th>常用单位</th></tr></thead>
          <tbody>
            <tr><td>$v$</td><td>速度</td><td>$\\text{m/s}$（米每秒）</td><td>$\\text{km/h}$（千米每小时）</td></tr>
            <tr><td>$s$</td><td>路程</td><td>$\\text{m}$（米）</td><td>$\\text{km}$（千米）</td></tr>
            <tr><td>$t$</td><td>时间</td><td>$\\text{s}$（秒）</td><td>$\\text{h}$（小时）</td></tr>
          </tbody>
        </table>
      </div>
      <div class="highlight-box">
        <span class="hl-icon">🔑</span> <strong>单位换算：</strong>$1\ \\text{m/s} = 3.6\ \\text{km/h}$。推导：$1\ \\text{m/s} = \\frac{1 \\times 10^{-3}\ \\text{km}}{1/3600\ \\text{h}} = 3.6\ \\text{km/h}$
      </div>
    </div>

    <div class="section-title" id="ch02s3">2.3 匀速直线运动</div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>匀速直线运动</h3>
      <p>物体沿<strong>直线</strong>运动，且在<strong>任意相等时间</strong>内通过的路程<strong>相等</strong>，这样的运动叫做匀速直线运动。它是<strong>最简单的机械运动</strong>。</p>
      <p>匀速直线运动中，速度大小和方向都不变，$v = \\frac{s}{t}$ 中的 $v$ 是<strong>恒量</strong>。</p>
    </div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>变速直线运动与平均速度</h3>
      <p>物体沿直线运动，但速度大小<strong>发生变化</strong>的运动叫做变速直线运动。</p>
      <p><strong>平均速度</strong>只能<strong>粗略</strong>描述变速运动的快慢：</p>
      <div class="formula-block">
        $$\\bar{v} = \\frac{s_{\\text{总}}}{t_{\\text{总}}}$$
        <div class="formula-label">平均速度 = 总路程 ÷ 总时间（注意：不是速度的平均值！）</div>
      </div>
    </div>

    <div class="knowledge-card card-warning">
      <span class="card-badge badge-warning">易错</span>
      <h3>平均速度常见错误</h3>
      <ul class="content-list">
        <li>❌ $\\bar{v} = \\frac{v_1 + v_2}{2}$ —— 只有当两段路程所用时间相等时才成立。</li>
        <li>✅ 正确做法：必须先求总路程和总时间，再用 $\\bar{v} = \\frac{s_{\\text{总}}}{t_{\\text{总}}}$ 计算。</li>
        <li>例如：前半段路程速度 $v_1$，后半段路程速度 $v_2$，则 $\\bar{v} = \\frac{2v_1 v_2}{v_1 + v_2}$（而不是 $\\frac{v_1+v_2}{2}$）。</li>
      </ul>
    </div>

    <div class="section-title" id="ch02s4">2.4 s-t 图像与 v-t 图像</div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>s-t 图像（路程—时间图像）</h3>
      <ul class="content-list">
        <li><strong>图像类型：</strong>以时间 $t$ 为横轴，路程 $s$ 为纵轴。</li>
        <li><strong>静止：</strong>图像为一条<strong>水平线</strong>（$s$ 不随 $t$ 变化）。</li>
        <li><strong>匀速直线运动：</strong>图像为一条<strong>过原点的倾斜直线</strong>。斜率 = 速度 $v$（斜率越大，速度越大）。</li>
        <li><strong>变速运动：</strong>图像为<strong>曲线</strong>。曲线上某点的切线斜率表示该时刻的<strong>瞬时速度</strong>。</li>
        <li><strong>交点：</strong>两条 $s$-$t$ 图线的交点表示两物体<strong>相遇</strong>（同一时刻位于同一位置）。</li>
      </ul>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>v-t 图像（速度—时间图像）</h3>
      <ul class="content-list">
        <li><strong>图像类型：</strong>以时间 $t$ 为横轴，速度 $v$ 为纵轴。</li>
        <li><strong>匀速直线运动：</strong>图像为一条<strong>水平线</strong>（$v$ 不随 $t$ 变化）。</li>
        <li><strong>匀加速运动：</strong>图像为一条<strong>倾斜直线</strong>。斜率 = 加速度 $a$。</li>
        <li><strong>图像下方面积：</strong>速度图线与时间轴围成的面积 = 该段时间内通过的<strong>路程</strong>。</li>
      </ul>
    </div>

    <div class="section-title" id="ch02-cfu">✅ 自查要点（Check for Understanding）</div>

      </ol>
    </div>
  </section>`;

    <div class="knowledge-card card-definition">

      <p>声音是由物体的<strong>振动</strong>产生的。一切正在发声的物体都在<strong>振动</strong>，振动停止，发声也停止。</p>

        <li><strong>人耳听觉范围：</strong>约 <strong>$20\ \\text{Hz} \sim 20000\ \\text{Hz}$</strong>（20 Hz～20 kHz）。</li>

      <span class="card-badge badge-key">重点</span>
      <h3>重心</h3>
      <p>重力的作用点叫做<strong>重心</strong>。质量分布均匀、形状规则的物体，重心在其<strong>几何中心</strong>。</p>
      <p>⚠️ 重心不一定在物体上：圆环的重心在圆心（不在环上），空心球的重心在球心。</p>
    </div>

    <div class="section-title" id="ch05s3">5.3 二力合成 二力平衡</div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>合力与分力</h3>
      <p>如果一个力产生的效果跟几个力共同作用产生的效果<strong>相同</strong>，这个力就叫做那几个力的<strong>合力</strong>，那几个力叫做<strong>分力</strong>。求几个力的合力叫做<strong>力的合成</strong>。</p>
    </div>

    <div class="knowledge-card card-formula">
      <span class="card-badge badge-formula">公式</span>
      <h3>同一直线上二力的合成</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>情况</th><th>合力大小</th><th>合力方向</th></tr></thead>
        <tbody>
          <tr><td><strong>同向</strong></td><td>$F_{\\text{合}} = F_1 + F_2$</td><td>与两力方向相同</td></tr>
          <tr><td><strong>反向</strong></td><td>$F_{\\text{合}} = |F_1 - F_2|$（大力减小力）</td><td>与较大的力方向相同</td></tr>
        </tbody>
      </table></div>
      <p>当 $F_1 = F_2$ 且方向相反时，$F_{\\text{合}} = 0$（二力平衡）。</p>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>二力平衡的条件</h3>
      <div class="highlight-box">
        <span class="hl-icon">⚖️</span> <strong>作用在同一个物体上的两个力，如果大小相等、方向相反、并且作用在同一直线上，这两个力就彼此平衡。</strong>——简记：<strong>"同体、等大、反向、共线"</strong>，四个条件缺一不可。
      </div>
      <p><strong>平衡状态：</strong>物体处于<strong>静止</strong>状态或<strong>匀速直线运动</strong>状态时，物体处于平衡状态，受到的力是平衡力（合力为零）。</p>
    </div>

    <div class="knowledge-card card-warning">
      <span class="card-badge badge-warning">易错</span>
      <h3>平衡力 vs 相互作用力（高频混淆点！）</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>比较项</th><th>一对平衡力</th><th>一对相互作用力</th></tr></thead>
        <tbody>
          <tr><td><strong>受力物体</strong></td><td><strong>同一个物体</strong></td><td><strong>两个不同物体</strong></td></tr>
          <tr><td>大小/方向/共线</td><td>等大、反向、共线</td><td>等大、反向、共线</td></tr>
          <tr><td>力的性质</td><td>可以不同（如重力和支持力）</td><td>一定相同（如弹力和弹力）</td></tr>
          <tr><td>能否抵消</td><td><strong>能</strong>（合力为零）</td><td><strong>不能</strong>（作用在不同物体）</td></tr>
          <tr><td>实例</td><td>书放在桌上——重力和支持力</td><td>书对桌面的压力和桌面对书的支持力</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="section-title" id="ch05s4">5.4 摩擦力</div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>摩擦力</h3>
      <p>两个相互接触的物体，当它们发生<strong>相对运动</strong>或有<strong>相对运动趋势</strong>时，在接触面上产生一种<strong>阻碍相对运动</strong>的力，叫做摩擦力。</p>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>摩擦力的分类</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>类型</th><th>条件</th><th>实例</th></tr></thead>
        <tbody>
          <tr><td><strong>静摩擦力</strong></td><td>有相对运动趋势但未发生相对运动</td><td>手握瓶子不掉落、推桌子推不动</td></tr>
          <tr><td><strong>滑动摩擦力</strong></td><td>物体在另一物体表面上滑动</td><td>拖地、擦黑板、滑冰</td></tr>
          <tr><td><strong>滚动摩擦力</strong></td><td>物体在另一物体表面上滚动</td><td>车轮滚动、滚珠轴承</td></tr>
        </tbody>
      </table></div>
      <p>在相同条件下，<strong>滚动摩擦力远小于滑动摩擦力</strong>。</p>
    </div>

    <div class="knowledge-card card-experiment">
      <span class="card-badge badge-experiment">实验</span>
      <h3>探究：影响滑动摩擦力大小的因素</h3>
      <p><strong>实验方法：</strong><strong>控制变量法</strong>。用弹簧测力计<strong>水平匀速</strong>拉动物体在水平面上滑动，此时弹簧测力计的示数等于滑动摩擦力的大小（利用二力平衡原理）。</p>
      <p><strong>结论：</strong>滑动摩擦力的大小与<strong>接触面的粗糙程度</strong>和<strong>压力大小</strong>有关——接触面越粗糙，滑动摩擦力越大；压力越大，滑动摩擦力越大。</p>
      <p><strong>无关因素：</strong>与接触面积大小<strong>无关</strong>、与物体运动速度<strong>无关</strong>。</p>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>增大和减小摩擦的方法</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>目的</th><th>方法</th><th>实例</th></tr></thead>
        <tbody>
          <tr><td rowspan="3"><strong>增大有益摩擦</strong></td><td>增大压力</td><td>刹车用力捏手刹</td></tr>
          <tr><td>增大接触面粗糙程度</td><td>鞋底花纹、轮胎花纹、体操镁粉</td></tr>
          <tr><td>变滚动为滑动</td><td>紧急刹车车轮抱死</td></tr>
          <tr><td rowspan="4"><strong>减小有害摩擦</strong></td><td>减小压力</td><td>减轻物体重量</td></tr>
          <tr><td>减小接触面粗糙程度</td><td>打磨光滑</td></tr>
          <tr><td>变滑动为滚动</td><td>滚动轴承</td></tr>
          <tr><td>使接触面彼此分离</td><td>加润滑油、气垫船、磁悬浮列车</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="section-title" id="ch05s5">5.5 牛顿第一定律</div>

    <div class="knowledge-card card-experiment">
      <span class="card-badge badge-experiment">实验</span>
      <h3>伽利略理想实验（探究阻力对运动的影响）</h3>
      <p>让小车从同一斜面<strong>同一高度</strong>由静止滑下（控制到达水平面的初速度相同），分别在毛巾、棉布、木板上运动。</p>
      <p><strong>结论：</strong>水平面越光滑，小车受到的阻力越小，运动的距离越<strong>远</strong>。</p>
      <p><strong>科学推理：</strong>若水平面<strong>绝对光滑</strong>（不受阻力），小车将<strong>一直运动下去</strong>。这是<strong>理想实验法</strong>（实验+推理），不能用实验直接验证。</p>
    </div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>牛顿第一定律（惯性定律）</h3>
      <div class="highlight-box">
        <span class="hl-icon">🍎</span> <strong>一切物体在没有受到力的作用时，总保持静止状态或匀速直线运动状态。</strong>
      </div>
      <ul class="content-list">
        <li>"一切物体"——普遍适用，没有例外。</li>
        <li>"没有受到力的作用"——理想情况。实际中物体受<strong>平衡力</strong>（合力为零）时效果等效。</li>
        <li>"总保持"——原来静止的保持静止；原来运动的保持匀速直线运动。</li>
        <li><strong>核心意义：</strong>力<strong>不是</strong>维持运动的原因，力是<strong>改变物体运动状态</strong>的原因。</li>
      </ul>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>惯性</h3>
      <p>一切物体都有保持<strong>原有运动状态不变</strong>的性质，这种性质叫做惯性。</p>
      <ul class="content-list">
        <li><strong>普遍性：</strong>一切物体在任何情况下都有惯性（静止有惯性，运动也有惯性；受力有惯性，不受力也有惯性）。</li>
        <li><strong>大小：</strong>惯性大小只与物体的<strong>质量</strong>有关——质量越大，惯性越大。<strong>与速度无关！</strong></li>
        <li><strong>注意表述：</strong>惯性不是力，不能说"受到惯性作用"或"惯性力"。正确说法：物体<strong>由于惯性</strong>（或"因为惯性"）而……</li>
      </ul>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>力与运动的关系总结</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>受力情况</th><th>运动状态</th><th>实例</th></tr></thead>
        <tbody>
          <tr><td>不受力（理想）/受平衡力</td><td>静止或匀速直线运动</td><td>天花板吊灯、匀速行驶的汽车</td></tr>
          <tr><td>$F_{\\text{合}}$ 与运动方向相同</td><td><strong>加速</strong>运动</td><td>汽车启动、自由落体</td></tr>
          <tr><td>$F_{\\text{合}}$ 与运动方向相反</td><td><strong>减速</strong>运动</td><td>刹车、竖直上抛上升过程</td></tr>
          <tr><td>$F_{\\text{合}}$ 与运动方向垂直</td><td>速度方向改变（大小不变）</td><td>匀速圆周运动</td></tr>
        </tbody>
      </table></div>
      <p style="margin-top:8px;"><strong>核心结论：</strong>力<strong>不是</strong>维持运动的原因，力是<strong>改变物体运动状态</strong>的原因。物体的运动<strong>不需要</strong>力来维持。</p>
    </div>

    <div class="knowledge-card card-example">
      <span class="card-badge badge-example">示例</span>
      <h3>典型例题精讲</h3>
      <h4>例1（重力的计算）</h4>
      <p>一名中学生的质量为 $50\ \\text{kg}$，求他受到的重力。（$g = 10\ \\text{N/kg}$）</p>
      <p><strong>解：</strong>$G = mg = 50 \\times 10 = \mathbf{500\ \\text{N}}$</p>
      <h4>例2（相互作用力辨析）</h4>
      <p>鸡蛋碰石头，鸡蛋碎了而石头完好。以下说法正确的是：A.鸡蛋受到的力大于石头受到的力 B.鸡蛋对石头的作用力小于石头对鸡蛋的作用力 C.鸡蛋和石头受到的力大小相等 D.鸡蛋先对石头施加力</p>
      <p><strong>答案：C。</strong>相互作用力始终大小相等、同时产生同时消失。鸡蛋破了是因为鸡蛋壳的承受能力比石头小，而非力的大小不同。</p>
      <h4>例3（惯性的理解）</h4>
      <p>关于惯性，下列说法正确的是：A.物体运动速度越大惯性越大 B.物体静止时没有惯性 C.宇航员在太空中没有惯性 D.一切物体在任何情况下都有惯性</p>
      <p><strong>答案：D。</strong>惯性是一切物体的固有属性，只与质量有关，与运动状态、是否受力、所处位置均无关。</p>
      <h4>例4（二力平衡与相互作用力的区分）</h4>
      <p>一个杯子静止在水平桌面上。杯子受到的重力和桌面对杯子的支持力是一对______；杯子对桌面的压力和桌面对杯子的支持力是一对______。</p>
      <p><strong>答案：平衡力</strong>（作用在同一物体——杯子上）；<strong>相互作用力</strong>（作用在不同物体上——杯子和桌面）。</p>
      <h4>例5（力的合成）</h4>
      <p>同一直线上的两个力 $F_1 = 8\ \\text{N}$，$F_2 = 3\ \\text{N}$。求合力可能的大小和方向。</p>
      <p><strong>解：</strong>同向时 $F_{\\text{合}} = 8 + 3 = 11\ \\text{N}$（与两力同向）。反向时 $F_{\\text{合}} = |8-3| = 5\ \\text{N}$（与 $F_1$ 同向）。合力可能为 11N 或 5N。</p>
    </div>

    <div class="knowledge-card card-warning">
      <span class="card-badge badge-warning">易错</span>
      <h3>第5章 — 常见误区（附误区类型）</h3>
      <p style="font-size:0.8rem;color:var(--text-tertiary);margin-bottom:8px;">🏷️ 表面 = 术语/标签错误 | 🔧 结构 = 因果模型错误 | 🧠 深层 = 根本性概念冲突</p>
      <div class="table-wrap"><table>
        <thead><tr><th>易错点</th><th>正确理解</th><th style="width:60px;">类型</th></tr></thead>
        <tbody>
          <tr><td>"物体不受力就会慢慢停下来"</td><td>错！这是亚里士多德的错误观点。牛顿第一定律：不受力时保持静止或<strong>匀速直线运动</strong></td><td>🧠 深层</td></tr>
          <tr><td>"速度大的物体惯性大"</td><td>错！惯性大小只与<strong>质量</strong>有关。慢行的大卡车比飞快的自行车惯性大得多</td><td>🔧 结构</td></tr>
          <tr><td>"受到惯性力"、"在惯性的作用下"</td><td>表述错误。惯性<strong>不是力</strong>，应说"由于惯性"或"具有惯性"</td><td>🏷️ 表面</td></tr>
          <tr><td>"摩擦力总是阻碍物体运动"</td><td>错！摩擦力阻碍的是<strong>相对运动</strong>（或趋势）。人走路正是靠<strong>向前</strong>的摩擦力——此时摩擦力是<strong>动力</strong></td><td>🔧 结构</td></tr>
          <tr><td>"物体受平衡力就一定静止"</td><td>不一定。受平衡力的物体也可能做<strong>匀速直线运动</strong></td><td>🔧 结构</td></tr>
          <tr><td>"二力平衡只需大小相等、方向相反"</td><td>不全！还必须<strong>作用在同一物体</strong>且<strong>在同一直线</strong>——四个条件缺一不可</td><td>🏷️ 表面</td></tr>
          <tr><td>"物体的重心一定在物体上"</td><td>不一定。圆环、空心球、L形物体的重心在物体外部</td><td>🏷️ 表面</td></tr>
          <tr><td>"物体运动方向就是受力方向"</td><td>不一定。刹车时物体向前运动但受向后的摩擦力；抛体运动中速度方向和受力方向不同</td><td>🔧 结构</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="section-title" id="ch05-cfu">✅ 自查要点（Check for Understanding）</div>
    <div class="knowledge-card" style="border-left: 4px solid #6366f1; background: linear-gradient(135deg, #eef2ff 0%, #fffefb 100%);">
      <span class="card-badge" style="background:#e0e7ff;color:#4338ca;">自测</span>

        <li>一个物体放在水平桌面上静止，它受到哪些力？这些力是平衡力还是相互作用力？物体对桌面的压力和桌面对物体的支持力呢？</li>
        <li>质量为 $60\ \\text{kg}$ 的人在地球上重多少牛？在月球上重多少牛？（$g_{\\text{地}} = 10\ \\text{N/kg}$，$g_{\\text{月}} = 1.6\ \\text{N/kg}$）</li>
        <li>滑动摩擦力的大小与哪些因素有关？与哪些因素无关？实验用什么方法？</li>

    <div class="knowledge-card card-key">

        <thead><tr><th>应用类型</th><th>公式</th><th>典型问题</th></tr></thead>
        <tbody>
          <tr><td><strong>鉴别物质</strong></td><td>$\\rho = m/V$</td><td>测出质量和体积，计算密度后对照密度表</td></tr>
          <tr><td><strong>求质量</strong></td><td>$m = \\rho V$</td><td>已知密度和体积，求质量（如：大理石雕像）</td></tr>
          <tr><td><strong>求体积</strong></td><td>$V = m/\\rho$</td><td>已知质量和密度，求体积</td></tr>
          <tr><td><strong>空心实心判断</strong></td><td>比较 $\\rho_{\\text{球}}$ 与 $\\rho_{\\text{物质}}$</td><td>球的平均密度 < 物质密度 → 空心（三种判断方法）</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="section-title" id="ch06s2">§6.2 固体、液体密度的测量</div>

    <div class="knowledge-card card-experiment">
      <span class="card-badge badge-experiment">实验</span>
      <h3>量筒的使用</h3>
      <ul class="content-list">
        <li><strong>用途：</strong>测量<strong>液体体积</strong>，也可用排水法间接测量不规则固体的体积。</li>
        <li><strong>读数方法：</strong>视线应与<strong>凹液面的最低处</strong>保持水平（水和水溶液）。水银为凸液面，读最高处。</li>
        <li><strong>单位：</strong>$1\\ \\mathrm{mL} = 1\\ \\mathrm{cm^3}$，$1\\ \\mathrm{L} = 1\\ \\mathrm{dm^3} = 10^{-3}\\ \\mathrm{m^3}$。</li>
      </ul>
      <div class="highlight-box"><span class="hl-icon">⚠️</span> <strong>常见错误：</strong>俯视读数<strong>偏大</strong>，仰视读数<strong>偏小</strong>——"俯大仰小"。量筒必须放在水平桌面上，不可手持读数。</div>
    </div>

    <div class="knowledge-card card-experiment">
      <span class="card-badge badge-experiment">实验</span>
      <h3>测量不规则固体的密度（排水法）</h3>
      <p><strong>原理：</strong>$\\rho = m/V$。<strong>器材：</strong>天平、量筒、水、细线。</p>
      <ol style="margin-left:20px; line-height:2;">
        <li><strong>先测质量：</strong>用天平称出固体的质量 $m$。</li>
        <li><strong>再测体积：</strong>量筒中倒入适量水，记下体积 $V_1$；用细线系住固体，浸没水中，记下 $V_2$。</li>
        <li><strong>计算：</strong>$V = V_2 - V_1$，$\\rho = \\frac{m}{V_2 - V_1}$。</li>
      </ol>
      <div class="highlight-box"><span class="hl-icon">⚠️</span> <strong>顺序不能颠倒！</strong>必须先测质量再测体积。若先测体积，固体沾水后使质量测量偏大，密度结果偏大。</div>
    </div>

    <div class="knowledge-card card-experiment">
      <span class="card-badge badge-experiment">实验</span>
      <h3>测量液体的密度（"部分倒入法"）</h3>
      <ol style="margin-left:20px; line-height:2;">
        <li>用天平称出<strong>烧杯和液体</strong>的总质量 $m_1$。</li>
        <li>将<strong>一部分</strong>液体倒入量筒中，测出倒入液体的体积 $V$。</li>
        <li>用天平称出<strong>剩余液体和烧杯</strong>的总质量 $m_2$。</li>
        <li>倒入量筒中液体的质量：$m = m_1 - m_2$，密度：$\\rho = \\frac{m_1 - m_2}{V}$。</li>
      </ol>
      <p><strong>优点：</strong>部分倒入法避免了液体残留在烧杯壁导致的体积偏小误差。</p>
    </div>

    <div class="section-title" id="ch06s3">§6.3 压力与压强</div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>压力</h3>
      <p><strong>垂直</strong>作用在物体表面上的力叫做<strong>压力</strong>，符号 $F$。</p>
      <div class="highlight-box"><span class="hl-icon">⚠️</span> <strong>压力 ≠ 重力！</strong>压力方向垂直于接触面，重力方向竖直向下。只有当物体放在<strong>水平面</strong>上且无其他外力时，压力大小才等于重力：$F = G$。在斜面上，$F < G$。</div>
    </div>

    <div class="knowledge-card card-formula">
      <span class="card-badge badge-formula">公式</span>
      <h3>压强</h3>
      <p>物体单位面积上受到的压力叫做<strong>压强</strong>，符号 $p$。压强表示压力<strong>作用效果</strong>的物理量。</p>
      <div class="formula-block">
        $$p = \\frac{F}{S}$$
        <div class="formula-label">压强 = 压力 ÷ 受力面积</div>
      </div>
      <p>$p$ — 压强，单位：<strong>帕斯卡（Pa）</strong>，$1\\ \\mathrm{Pa} = 1\\ \\mathrm{N/m^2}$。$F$ — 压力（N），$S$ — 受力面积（$\\mathrm{m^2}$）。</p>
      <p>常用换算：$1\\ \\mathrm{kPa} = 10^3\\ \\mathrm{Pa}$，$1\\ \\mathrm{MPa} = 10^6\\ \\mathrm{Pa}$。</p>
      <div class="highlight-box"><span class="hl-icon">🔑</span> <strong>常见陷阱：</strong>$S$ 是<strong>接触面积</strong>，不是物体的底面积！一个底面积 $0.1\\ \\mathrm{m^2}$ 的物体放在 $0.05\\ \\mathrm{m^2}$ 的桌面上，受力面积取 $0.05\\ \\mathrm{m^2}$。</div>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>增大和减小压强的方法</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>目的</th><th>方法</th><th>实例</th></tr></thead>
        <tbody>
          <tr><td rowspan="2"><strong>增大压强</strong></td><td>增大压力</td><td>用力按图钉</td></tr>
          <tr><td>减小受力面积</td><td>刀刃锋利、针尖尖锐、钉尖尖锐</td></tr>
          <tr><td rowspan="2"><strong>减小压强</strong></td><td>减小压力</td><td>桥梁限重</td></tr>
          <tr><td>增大受力面积</td><td>书包带做宽、铁轨铺枕木、坦克装履带</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="section-title" id="ch06s4">§6.4 液体压强</div>

    <div class="knowledge-card card-experiment">
      <span class="card-badge badge-experiment">实验</span>
      <h3>探究液体内部压强规律</h3>
      <p><strong>器材：</strong>微小压强计（U形管压强计）。<strong>方法：</strong>控制变量法。</p>
      <p><strong>结论：</strong></p>
      <ul class="content-list">
        <li>同种液体，同一深度，向各个方向的压强<strong>相等</strong>。</li>
        <li>同种液体，深度越大，压强<strong>越大</strong>。</li>
        <li>同一深度，液体密度越大，压强<strong>越大</strong>。</li>
      </ul>
      <p>液体压强只与<strong>液体密度 $\\rho$</strong> 和<strong>深度 $h$</strong> 有关，与容器形状、底面积、液体总质量<strong>均无关</strong>。</p>
    </div>

    <div class="knowledge-card card-formula">
      <span class="card-badge badge-formula">公式</span>
      <h3>液体压强公式</h3>
      <div class="formula-block">
        $$p = \\rho g h$$
        <div class="formula-label">液体压强 = 密度 × g值 × 深度</div>
      </div>
      <p>$p$ — 液体压强（Pa），$\\rho$ — 液体密度（$\\mathrm{kg/m^3}$），$g = 9.8\\ \\mathrm{N/kg}$（常取 $10\\ \\mathrm{N/kg}$），$h$ — 深度（m），即从<strong>液面</strong>到所研究点的<strong>竖直距离</strong>。</p>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>p=F/S 与 p=ρgh 的区别</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>比较</th><th>$p = F/S$</th><th>$p = \\rho g h$</th></tr></thead>
        <tbody>
          <tr><td><strong>适用范围</strong></td><td>一切压强（固/液/气）</td><td>液体内部压强（和均质柱形固体对水平面）</td></tr>
          <tr><td><strong>决定因素</strong></td><td>压力和受力面积</td><td>液体密度和深度</td></tr>
          <tr><td><strong>解题顺序</strong></td><td>直接代入</td><td>先用 $p = \\rho g h$ 求压强，再用 $F = pS$ 求压力</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>连通器</h3>
      <p>上端开口、下端连通的容器。<strong>原理：</strong>同种液体不流动时，各容器液面总保持<strong>相平</strong>。</p>
      <p><strong>应用：</strong>茶壶（壶嘴与壶身）、锅炉水位计、水塔供水系统、三峡船闸。</p>
    </div>

    <div class="section-title" id="ch06s5">§6.5 大气压强</div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>大气压强的存在</h3>
      <p>大气由于受重力且具有流动性，对浸在其中的物体产生压强，叫做<strong>大气压强</strong>，简称大气压。</p>
      <p><strong>马德堡半球实验（1654年）：</strong>将两个铜质半球合拢抽去空气，用16匹马才拉开——有力地证明了大气压的存在且很大。</p>
      <p><strong>生活现象：</strong>吸管喝饮料、吸盘挂钩、钢笔吸墨水、拔火罐——都是大气压的作用。</p>
    </div>

    <div class="knowledge-card card-experiment">
      <span class="card-badge badge-experiment">实验</span>
      <h3>托里拆利实验（中考核心考点）</h3>
      <p><strong>原理：</strong>管内水银柱上方为<strong>真空</strong>，大气压等于管内水银柱产生的压强：$p_0 = \\rho_{\\text{汞}} g h$。</p>
      <div class="formula-block">
        $$p_0 = 13.6 \\times 10^3 \\times 9.8 \\times 0.76 \\approx 1.013 \\times 10^5\\ \\mathrm{Pa}$$
        <div class="formula-label">标准大气压 ≈ 1.013×10⁵ Pa ≈ 760 mmHg</div>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>实验操作变化</th><th>对水银柱竖直高度的影响</th></tr></thead>
        <tbody>
          <tr><td>玻璃管倾斜</td><td><strong>不变</strong>（水银柱长度变长，竖直高度不变）</td></tr>
          <tr><td>换用更粗的玻璃管</td><td><strong>不变</strong></td></tr>
          <tr><td><strong>管内混入空气</strong></td><td><strong>变小</strong>（最常考！大气压 = 水银柱压强 + 管内气压）</td></tr>
          <tr><td>拿到高山上做实验</td><td><strong>变小</strong>（高山气压低）</td></tr>
        </tbody>
      </table></div>
      <p><strong>用水银的原因：</strong>水银密度大（$13.6 \\times 10^3\\ \\mathrm{kg/m^3}$），是水的13.6倍。若用水，水柱将高达约10.3m，实验极不方便。</p>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>大气压的变化与沸点</h3>
      <ul class="content-list">
        <li><strong>随高度：</strong>海拔越高，大气越稀薄，气压<strong>越低</strong>（海拔3000m内，每升高10m，气压约减小100Pa）。</li>
        <li><strong>沸点与气压：</strong>气压越大，沸点<strong>越高</strong>（高压锅原理——锅内气压增大，水沸点可达120°C以上）。气压越低，沸点越低（高山上煮饭不易熟）。</li>
      </ul>
    </div>

    <div class="section-title" id="ch06s6">§6.6 流体压强与流速的关系</div>

    <div class="knowledge-card card-definition">
      <span class="card-badge badge-def">定义</span>
      <h3>伯努利原理</h3>
      <p>液体和气体统称<strong>流体</strong>。在流体中，<strong>流速越大的位置，压强越小</strong>。</p>
    </div>

    <div class="knowledge-card card-experiment">
      <span class="card-badge badge-experiment">实验</span>
      <h3>验证实验</h3>
      <ul class="content-list">
        <li><strong>吹纸实验：</strong>向两张纸中间吹气→纸向中间靠拢（中间流速大压强小，外侧压强大）。</li>
        <li><strong>漏斗吹乒乓球：</strong>漏斗口向下吹气→乒乓球不掉落（上方流速大压强小，下方大气压托住球）。</li>
      </ul>
    </div>

    <div class="knowledge-card card-key">
      <span class="card-badge badge-key">重点</span>
      <h3>飞机升力原理与生活应用</h3>
      <p><strong>飞机升力：</strong>机翼上表面凸起、下表面平坦。飞行时上方气流路径长→流速大→压强小，下方流速小→压强大，上下压力差产生<strong>向上的升力</strong>。</p>
      <div class="table-wrap"><table>
        <thead><tr><th>现象</th><th>解释</th></tr></thead>
        <tbody>
          <tr><td><strong>站台安全线</strong></td><td>列车快速驶过，人与车间空气流速大压强小，人可能被"吸入"</td></tr>
          <tr><td><strong>两船并行相吸</strong></td><td>两船间水流速大压强小，外侧压强大，将两船"挤"在一起</td></tr>
          <tr><td><strong>喷雾器</strong></td><td>气流快速通过管口→管口上方流速大压强小→液体被大气压压出并雾化</td></tr>
          <tr><td><strong>足球"香蕉球"</strong></td><td>球旋转带动周围空气形成速度差→两侧压强差→轨迹弯曲</td></tr>
          <tr><td><strong>台风掀屋顶</strong></td><td>屋顶上方风速大压强小，屋内压强大于上方→产生向上的力</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="knowledge-card card-example">
      <span class="card-badge badge-example">示例</span>
      <h3>典型例题精讲</h3>

      <h4>例1（密度基本计算）</h4>
      <p>一块金属的质量为 $540\\ \\mathrm{g}$，体积为 $200\\ \\mathrm{cm^3}$。求该金属的密度，并判断可能是什么金属。</p>
      <p><strong>解：</strong>$\\rho = \\frac{m}{V} = \\frac{540\\ \\mathrm{g}}{200\\ \\mathrm{cm^3}} = 2.7\\ \\mathrm{g/cm^3}$。查密度表，铝的密度为 $2.7\\ \\mathrm{g/cm^3}$，可能是<strong>铝</strong>。</p>

      <h4>例2（空心实心判断）</h4>
      <p>一个质量为 $540\\ \\mathrm{g}$ 的铝球，体积为 $300\\ \\mathrm{cm^3}$。判断该球是实心还是空心？（$\\rho_{\\text{铝}} = 2.7\\ \\mathrm{g/cm^3}$）</p>
      <p><strong>解（比较密度法）：</strong>$\\rho_{\\text{球}} = \\frac{540\\ \\mathrm{g}}{300\\ \\mathrm{cm^3}} = 1.8\\ \\mathrm{g/cm^3} < 2.7\\ \\mathrm{g/cm^3}$ → <strong>空心</strong>。</p>
      <p>空心体积：实心铝体积 $V_{\\text{铝}} = \\frac{540}{2.7} = 200\\ \\mathrm{cm^3}$，空心体积 = $300 - 200 = \\mathbf{100\\ \\mathrm{cm^3}}$。</p>

      <h4>例3（压强基本计算）</h4>
      <p>一个质量为 $60\\ \\mathrm{kg}$ 的人，双脚站立时与地面的接触面积为 $0.04\\ \\mathrm{m^2}$。求他对地面的压强。单脚站立时压强变为多少？（$g = 10\\ \\mathrm{N/kg}$）</p>
      <p><strong>解：</strong>$F = G = mg = 60 \\times 10 = 600\\ \\mathrm{N}$。双脚：$p = \\frac{F}{S} = \\frac{600}{0.04} = 1.5 \\times 10^4\\ \\mathrm{Pa}$。单脚（面积减半）：$p' = \\frac{600}{0.02} = 3.0 \\times 10^4\\ \\mathrm{Pa}$。</p>

      <h4>例4（液体压强计算）</h4>
      <p>三峡大坝水深 $175\\ \\mathrm{m}$，求坝底受到的水的压强。（$\\rho_{\\text{水}} = 1.0 \\times 10^3\\ \\mathrm{kg/m^3}$，$g = 10\\ \\mathrm{N/kg}$）</p>
      <p><strong>解：</strong>$p = \\rho g h = 1.0 \\times 10^3 \\times 10 \\times 175 = \\mathbf{1.75 \\times 10^6\\ \\mathrm{Pa}}$。</p>
    </div>

    <div class="knowledge-card card-warning">
      <span class="card-badge badge-warning">易错</span>
      <h3>第6章 — 常见误区（附误区类型）</h3>
      <p style="font-size:0.8rem;color:var(--text-tertiary);margin-bottom:8px;">🏷️ 表面 = 术语/标签错误 | 🔧 结构 = 因果模型错误 | 🧠 深层 = 根本性概念冲突</p>
      <div class="table-wrap"><table>
        <thead><tr><th>易错点</th><th>正确理解</th><th style="width:60px;">类型</th></tr></thead>
        <tbody>
          <tr><td>"密度与质量成正比"</td><td>错！密度是物质的<strong>特性</strong>，同种物质密度固定不变（$m/V$ 恒定）</td><td>🔧 结构</td></tr>
          <tr><td>"铁比木头重"</td><td>错！应该说<strong>铁的密度比木头大</strong>。一大块木头比小铁钉重得多</td><td>🏷️ 表面</td></tr>
          <tr><td>"压力就是重力"</td><td>错！压力<strong>垂直于接触面</strong>，重力<strong>竖直向下</strong>。仅水平面且无其他外力时数值相等</td><td>🔧 结构</td></tr>
          <tr><td>"液体压强与容器形状有关"</td><td>错！$p = \\rho g h$，液体压强只与<strong>$\\rho$ 和 $h$</strong> 有关</td><td>🔧 结构</td></tr>
          <tr><td>"托里拆利实验中玻璃管倾斜使水银柱变高"</td><td>错！水银柱的<strong>竖直高度</strong>不变（始终约760mm），只是长度变长</td><td>🏷️ 表面</td></tr>
          <tr><td>"飞机能飞是因为空气'吹'到机翼下方把飞机抬起来"</td><td>不准确！升力来自上下表面<strong>压强差</strong>——上方流速大压强小，下方流速小压强大</td><td>🧠 深层</td></tr>
          <tr><td>"1 g/cm³ = 1000 kg/m³ 是把单位放大了"</td><td>错！$1\\ \\mathrm{g/cm^3} = 10^3\\ \\mathrm{kg/m^3}$，数值变大是因为分母单位从 $\\mathrm{cm^3}$ 变成了 $\\mathrm{m^3}$</td><td>🏷️ 表面</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="section-title" id="ch06-cfu">✅ 自查要点（Check for Understanding）</div>
    <div class="knowledge-card" style="border-left: 4px solid #6366f1; background: linear-gradient(135deg, #eef2ff 0%, #fffefb 100%);">
      <span class="card-badge" style="background:#e0e7ff;color:#4338ca;">自测</span>
      <h3>学完本章，你应该能回答：</h3>
      <ol style="margin-left:20px; line-height:2.2;">
        <li>冰的密度比水小，所以冰浮在水面上。这说明密度由什么决定？</li>
        <li>一个质量为 $500\\ \\mathrm{g}$ 的空心铁球，体积为 $100\\ \\mathrm{cm^3}$，如何判断它确实是空心的？（$\\rho_{\\text{铁}} = 7.9\\ \\mathrm{g/cm^3}$）</li>
        <li>书包带为什么要做宽？图钉的针尖为什么要尖锐？用压强公式解释。</li>

  <section class="chapter" id="ch07">
    <div class="chapter-header">

      <h2>浮力</h2>

<div class="section-title" id="ch07s1">§7.1 浮力</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>浮力的概念</h3>
  <p>浸在液体（或气体）中的物体受到液体（或气体）对它<strong>竖直向上</strong>的力，叫做<strong>浮力</strong>（buoyancy force），用符号 $F_{\\text{浮}}$ 表示。</p>
  <ul class="content-list">
    <li><strong>施力物体：</strong>液体（或气体）。</li>
    <li><strong>方向：</strong>总是<strong>竖直向上</strong>（与重力方向相反）。</li>
    <li><strong>产生原因：</strong>液体对物体上下表面的<strong>压力差</strong>——下表面深度大、压强大，上表面深度小、压强小，这个向上的压力差就是浮力。</li>
  </ul>
  <p>浮力是流体对浸入物体的作用力的<strong>合力</strong>，其本质由液体压强差产生。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">重点</span>
  <h3>浮力产生的原因——压力差法</h3>
  <p>设想一个长方体浸没在液体中，其上下表面均受到液体的压力。由于下表面所处深度大，液体压强 $p = \\rho g h$ 更大，下表面受到向上的压力 $F_{\\text{向上}}$ 大于上表面受到向下的压力 $F_{\\text{向下}}$：</p>
  <div class="formula-block">
    $F_{\\text{浮}} = F_{\\text{向上}} - F_{\\text{向下}}$
    <div class="formula-label">浮力 = 下表面受到的向上压力 − 上表面受到的向下压力</div>
  </div>
  <div class="highlight-box">
    <span class="hl-icon">⚠️</span> <strong>注意：</strong>只有当物体下表面有液体时，才受浮力。若物体与容器底部紧密贴合（如桥墩、打入河底的木桩），下表面没有液体，则$F_{\\text{向上}} = 0$，物体<strong>不受浮力</strong>（反而被压得更紧）。
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">重点</span>
  <h3>称重法测浮力</h3>
  <p>先用弹簧测力计在空气中测出物体的重力 $G$，再将物体浸入液体中，读出弹簧测力计的示数 $F_{\\text{拉}}$（即物体在液体中时测力计的读数），两次示数之差即为浮力：</p>
  <div class="formula-block">
    $F_{\\text{浮}} = G - F_{\\text{拉}}$
    <div class="formula-label">称重法：浮力 = 空气中物重 − 液体中拉力示数</div>
  </div>
  <p><strong>适用条件：</strong>物体在液体中处于平衡状态（静止或匀速运动），常用于密度大于液体的物体（下沉物体）。</p>
</div>

<div class="section-title" id="ch07s2">§7.2 阿基米德原理</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">实验</span>
  <h3>探究浮力大小与排开液体重力的关系</h3>
  <p><strong>实验器材：</strong>弹簧测力计、溢水杯、小桶、待测物体（石块）、细线。</p>
  <p><strong>实验步骤：</strong></p>
  <ol style="margin-left:20px; line-height:2;">
    <li>用弹簧测力计测出物体在空气中的重力 $G_{\\text{物}}$。</li>
    <li>用弹簧测力计测出空小桶的重力 $G_{\\text{桶}}$。</li>
    <li>将溢水杯装满水，把物体缓慢浸入水中，用空小桶接溢出的水。</li>
    <li>读出此时弹簧测力计的示数 $F_{\\text{拉}}$，算出浮力 $F_{\\text{浮}} = G_{\\text{物}} - F_{\\text{拉}}$。</li>
    <li>用弹簧测力计测出小桶和溢出水的总重力 $G_{\\text{总}}$，算出排开水所受的重力 $G_{\\text{排}} = G_{\\text{总}} - G_{\\text{桶}}$。</li>
    <li>比较 $F_{\\text{浮}}$ 与 $G_{\\text{排}}$ 的大小关系。</li>
  </ol>
  <p><strong>实验结论：</strong>$F_{\\text{浮}} = G_{\\text{排}}$，即浸在液体中的物体所受的浮力等于物体排开的液体所受的重力。</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">公式</span>
  <h3>阿基米德原理</h3>
  <p>浸在液体中的物体受到<strong>竖直向上</strong>的浮力，浮力的大小等于物体<strong>排开的液体所受的重力</strong>。</p>
  <div class="formula-block">
    $F_{\\text{浮}} = G_{\\text{排}} = \\rho_{\\text{液}} g V_{\\text{排}}$
    <div class="formula-label">阿基米德原理：浮力 = 排开液体的重力</div>
  </div>
  <p>式中：$F_{\\text{浮}}$ — 浮力（$\\mathrm{N}$），$\\rho_{\\text{液}}$ — 液体密度（$\\mathrm{kg/m^3}$），$g = 9.8 \\,\\mathrm{N/kg}$（常取 $10 \\,\\mathrm{N/kg}$），$V_{\\text{排}}$ — 物体<strong>排开液体的体积</strong>（$\\mathrm{m^3}$）。</p>
  <div class="highlight-box">
    <span class="hl-icon">🔑</span> <strong>核心理解：</strong>浮力大小只与<strong>$\\rho_{\\text{液}}$</strong>和<strong>$V_{\\text{排}}$</strong>有关，与物体自身的密度、形状、物体在液体中的深度<strong>均无关</strong>（浸没后深度改变不影响浮力）。
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">重点</span>
  <h3>$V_{\\text{排}}$ 的理解与换算</h3>
  <p><strong>$V_{\\text{排}}$</strong>是物体排开液体的体积，并非一定等于物体的体积 $V_{\\text{物}}$：</p>
  <div class="table-wrap"><table>
    <thead><tr><th>物体状态</th><th>$V_{\\text{排}}$ 与 $V_{\\text{物}}$ 的关系</th><th>示例</th></tr></thead>
    <tbody>
      <tr><td><strong>完全浸没</strong>（下沉或悬浮）</td><td>$V_{\\text{排}} = V_{\\text{物}}$</td><td>全部没入水中</td></tr>
      <tr><td><strong>部分浸入</strong>（漂浮）</td><td>$V_{\\text{排}} < V_{\\text{物}}$</td><td>$V_{\\text{排}}$ = 浸入液体部分的体积</td></tr>
    </tbody>
  </table></div>
  <p><strong>常用换算：</strong>$1 \\,\\mathrm{m^3} = 10^6 \\,\\mathrm{cm^3}$，$1 \\,\\mathrm{L} = 1 \\,\\mathrm{dm^3} = 10^{-3} \\,\\mathrm{m^3}$，$1 \\,\\mathrm{mL} = 1 \\,\\mathrm{cm^3}$。解题时必须统一单位，$V_{\\text{排}}$ 通常换算为 $\\mathrm{m^3}$。</p>
</div>

<div class="section-title" id="ch07s3">§7.3 物体的浮沉条件</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>浮沉条件判断（两种方法）</h3>
  <h4>方法一：比较浮力与重力</h4>
  <div class="table-wrap"><table>
    <thead><tr><th>状态</th><th>$F_{\\text{浮}}$ 与 $G$</th><th>$\\rho_{\\text{物}}$ 与 $\\rho_{\\text{液}}$</th><th>运动情况</th></tr></thead>
    <tbody>
      <tr><td><strong>上浮</strong></td><td>$F_{\\text{浮}} > G$</td><td>$\\rho_{\\text{物}} < \\rho_{\\text{液}}$</td><td>向上运动（动态过程）</td></tr>
      <tr><td><strong>下沉</strong></td><td>$F_{\\text{浮}} < G$</td><td>$\\rho_{\\text{物}} > \\rho_{\\text{液}}$</td><td>向下运动（动态过程）</td></tr>
      <tr><td><strong>悬浮</strong></td><td>$F_{\\text{浮}} = G$</td><td>$\\rho_{\\text{物}} = \\rho_{\\text{液}}$</td><td>可静止在液体中<strong>任何深度</strong></td></tr>
      <tr><td><strong>漂浮</strong></td><td>$F_{\\text{浮}} = G$</td><td>$\\rho_{\\text{物}} < \\rho_{\\text{液}}$</td><td>静止在<strong>液面上</strong>（$V_{\\text{排}} < V_{\\text{物}}$）</td></tr>
    </tbody>
  </table></div>
  <h4>方法二：比较物体密度与液体密度</h4>
  <p>当物体<strong>完全浸没</strong>时，$V_{\\text{排}} = V_{\\text{物}}$，此时 $F_{\\text{浮}} = \\rho_{\\text{液}} g V_{\\text{物}}$，$G = \\rho_{\\text{物}} g V_{\\text{物}}$。比较：</p>
  <ul class="content-list">
    <li>$\\rho_{\\text{物}} < \\rho_{\\text{液}}$ → $F_{\\text{浮}} > G$ → 物体<strong>上浮</strong>，最终<strong>漂浮</strong>。</li>
    <li>$\\rho_{\\text{物}} = \\rho_{\\text{液}}$ → $F_{\\text{浮}} = G$ → 物体可<strong>悬浮</strong>。</li>
    <li>$\\rho_{\\text{物}} > \\rho_{\\text{液}}$ → $F_{\\text{浮}} < G$ → 物体<strong>下沉</strong>。</li>
  </ul>
  <div class="highlight-box">
    <span class="hl-icon">⚠️</span> <strong>特别区分：悬浮 vs 漂浮</strong>——两者均有 $F_{\\text{浮}} = G$，但<strong>悬浮</strong>时 $\\rho_{\\text{物}} = \\rho_{\\text{液}}$、$V_{\\text{排}} = V_{\\text{物}}$，可停在任意深度；<strong>漂浮</strong>时 $\\rho_{\\text{物}} < \\rho_{\\text{液}}$、$V_{\\text{排}} < V_{\\text{物}}$，只能停在液面上。
  </div>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">重点</span>
  <h3>浮力的应用</h3>
  <h4>1. 轮船——空心法增大浮力</h4>
  <p>轮船用钢铁制成，铁块在水中会下沉（$\\rho_{\\text{铁}} > \\rho_{\\text{水}}$），但将轮船做成<strong>空心</strong>后，排开水的体积大大增加，从而获得足够大的浮力使轮船漂浮。轮船的大小通常用<strong>排水量</strong>表示。</p>
  <p><strong>排水量：</strong>轮船满载时排开水的<strong>质量</strong>，符号 $m_{\\text{排}}$，单位：吨（t）。</p>
  <div class="formula-block">
    $F_{\\text{浮}} = G_{\\text{排}} = m_{\\text{排}} g$
    <div class="formula-label">轮船所受浮力 = 排开水的重力 = 排水量 × g</div>
  </div>
  <p>轮船从海里驶入河里（$\\rho_{\\text{海水}} > \\rho_{\\text{河水}}$），浮力不变（始终等于轮船重力），但排开水的体积增大，船体<strong>下沉</strong>一些。</p>

  <h4>2. 潜水艇——改变自身重力</h4>
  <p>潜水艇靠改变<strong>自身重力</strong>来实现浮沉（改变水舱中的水量），其体积不变（$V_{\\text{排}}$ 不变），所以浸没后浮力<strong>不变</strong>。</p>

  <h4>3. 气球和飞艇——改变 $V_{\\text{排}}$</h4>
  <p>气球内充有密度<strong>小于</strong>空气密度的气体（如氢气、氦气），使总平均密度小于空气密度而上浮。通过改变体积来改变浮力大小。</p>

  <h4>4. 密度计——漂浮原理</h4>
  <p>密度计在不同液体中均处于<strong>漂浮</strong>状态，所受浮力始终等于自身重力（不变），根据 $F_{\\text{浮}} = \\rho_{\\text{液}} g V_{\\text{排}}$ 可知：液体密度越大，$V_{\\text{排}}$ 越小，密度计<strong>露出液面的部分越多</strong>（即"上小下大"的刻度排列）。</p>
</div>

<div class="section-title">📝 典型例题精讲</div>

<div class="knowledge-card card-example">
  <span class="card-badge badge-example">示例</span>
  <h3>§7.1 浮力 — 例题2道</h3>

  <h4>例1（称重法计算浮力）</h4>
  <p>用弹簧测力计悬挂一金属块，在空气中称得示数为 $5.4 \\,\\mathrm{N}$。将金属块浸没在水中时，弹簧测力计示数为 $3.4 \\,\\mathrm{N}$。求：（1）金属块受到的浮力；（2）金属块的体积；（3）金属块的密度。（$\\rho_{\\text{水}} = 1.0 \\times 10^3 \\,\\mathrm{kg/m^3}$，$g = 10 \\,\\mathrm{N/kg}$）</p>
  <p><strong>解：</strong></p>
  <p>（1）称重法求浮力：$F_{\\text{浮}} = G - F_{\\text{拉}} = 5.4 - 3.4 = \\mathbf{2.0 \\,\\mathrm{N}}$。</p>
  <p>（2）由 $F_{\\text{浮}} = \\rho_{\\text{水}} g V_{\\text{排}}$，浸没时 $V_{\\text{排}} = V_{\\text{物}}$：</p>
  <p>$V_{\\text{物}} = V_{\\text{排}} = \\dfrac{F_{\\text{浮}}}{\\rho_{\\text{水}} g} = \\dfrac{2.0}{1.0 \\times 10^3 \\times 10} = \\mathbf{2.0 \\times 10^{-4} \\,\\mathrm{m^3} = 200 \\,\\mathrm{cm^3}}$。</p>
  <p>（3）金属块的质量 $m = \\dfrac{G}{g} = \\dfrac{5.4}{10} = 0.54 \\,\\mathrm{kg}$。</p>
  <p>密度 $\\rho = \\dfrac{m}{V_{\\text{物}}} = \\dfrac{0.54}{2.0 \\times 10^{-4}} = \\mathbf{2.7 \\times 10^3 \\,\\mathrm{kg/m^3}}$，该金属为<strong>铝</strong>。</p>
  <p><strong>答题要点：</strong>称重法 $F_{\\text{浮}} = G - F_{\\text{拉}}$ 是求解浮力最直接的方法之一，结合阿基米德原理可一步求 $V_{\\text{排}}$，进而求密度。注意单位统一：体积用 $\\mathrm{m^3}$。</p>

  <h4>例2（压力差法判断浮力）</h4>
  <p>一边长为 $10 \\,\\mathrm{cm}$ 的正方体，上表面距水面 $5 \\,\\mathrm{cm}$，下表面距水面 $15 \\,\\mathrm{cm}$。求物体受到的浮力。（$\\rho_{\\text{水}} = 1.0 \\times 10^3 \\,\\mathrm{kg/m^3}$，$g = 10 \\,\\mathrm{N/kg}$）</p>
  <p><strong>解：</strong></p>
  <p>上表面所受向下压强：$p_{\\text{上}} = \\rho g h_{\\text{上}} = 1.0 \\times 10^3 \\times 10 \\times 0.05 = 500 \\,\\mathrm{Pa}$。</p>
  <p>下表面所受向上压强：$p_{\\text{下}} = \\rho g h_{\\text{下}} = 1.0 \\times 10^3 \\times 10 \\times 0.15 = 1500 \\,\\mathrm{Pa}$。</p>
  <p>正方体底面积 $S = 0.1 \\times 0.1 = 1.0 \\times 10^{-2} \\,\\mathrm{m^2}$。</p>
  <p>$F_{\\text{浮}} = F_{\\text{向上}} - F_{\\text{向下}} = p_{\\text{下}}S - p_{\\text{上}}S = (1500 - 500) \\times 1.0 \\times 10^{-2} = \\mathbf{10 \\,\\mathrm{N}}$。</p>
  <p><strong>验证（阿基米德原理）：</strong>物体体积 $V = (0.1)^3 = 1.0 \\times 10^{-3} \\,\\mathrm{m^3}$，浸没时 $V_{\\text{排}} = V$，$F_{\\text{浮}} = \\rho g V_{\\text{排}} = 1.0 \\times 10^3 \\times 10 \\times 1.0 \\times 10^{-3} = 10 \\,\\mathrm{N}$。结果一致。</p>
  <p><strong>答题要点：</strong>压力差法是浮力的本质定义，适用于任何形状的物体。阿基米德原理计算更简便，两种方法等价。</p>
</div>

<div class="knowledge-card card-example">
  <span class="card-badge badge-example">示例</span>
  <h3>§7.2 阿基米德原理 — 例题2道</h3>

  <h4>例3（阿基米德原理计算 + $V_{\\text{排}}$ 换算）</h4>
  <p>一物体重 $80 \\,\\mathrm{N}$，将其浸没在装满水的溢水杯中，溢出的水的质量为 $5 \\,\\mathrm{kg}$。求：（1）物体受到的浮力；（2）物体的体积；（3）该物体在水中将上浮还是下沉？（$g = 10 \\,\\mathrm{N/kg}$）</p>
  <p><strong>解：</strong></p>
  <p>（1）由阿基米德原理 $F_{\\text{浮}} = G_{\\text{排}} = m_{\\text{排}} g = 5 \\times 10 = \\mathbf{50 \\,\\mathrm{N}}$。</p>
  <p>（2）由 $F_{\\text{浮}} = \\rho_{\\text{水}} g V_{\\text{排}}$，浸没时 $V_{\\text{物}} = V_{\\text{排}}$：</p>
  <p>$V_{\\text{物}} = \\dfrac{F_{\\text{浮}}}{\\rho_{\\text{水}} g} = \\dfrac{50}{1.0 \\times 10^3 \\times 10} = \\mathbf{5.0 \\times 10^{-3} \\,\\mathrm{m^3}}$。</p>
  <p>（3）比较 $F_{\\text{浮}}$ 与 $G$：$F_{\\text{浮}} = 50 \\,\\mathrm{N} < G = 80 \\,\\mathrm{N}$，物体<strong>下沉</strong>。</p>
  <p><strong>答题要点：</strong>溢出水质量可直接得到 $G_{\\text{排}}$ 从而求 $F_{\\text{浮}}$。注意 $V_{\\text{排}}$ 单位的正确换算：$1 \\,\\mathrm{m^3} = 10^3 \\,\\mathrm{dm^3} = 10^6 \\,\\mathrm{cm^3}$，计算时统一用 $\\mathrm{m^3}$。</p>

  <h4>例4（阿基米德原理的灵活应用——部分浸入）</h4>
  <p>一木块漂浮在水面上，有 $\\dfrac{2}{5}$ 的体积露出水面。已知木块体积为 $500 \\,\\mathrm{cm^3}$。求：（1）木块受到的浮力；（2）木块的质量；（3）木块的密度。（$g = 10 \\,\\mathrm{N/kg}$）</p>
  <p><strong>解：</strong></p>
  <p>（1）木块有 $\\dfrac{2}{5}$ 露出，则浸入部分为 $1 - \\dfrac{2}{5} = \\dfrac{3}{5}$，即 $V_{\\text{排}} = \\dfrac{3}{5} \\times 500 = 300 \\,\\mathrm{cm^3} = 3 \\times 10^{-4} \\,\\mathrm{m^3}$。</p>
  <p>$F_{\\text{浮}} = \\rho_{\\text{水}} g V_{\\text{排}} = 1.0 \\times 10^3 \\times 10 \\times 3 \\times 10^{-4} = \\mathbf{3.0 \\,\\mathrm{N}}$。</p>
  <p>（2）漂浮时 $F_{\\text{浮}} = G$，所以 $G = 3.0 \\,\\mathrm{N}$。</p>
  <p>$m = \\dfrac{G}{g} = \\dfrac{3.0}{10} = \\mathbf{0.3 \\,\\mathrm{kg}}$。</p>
  <p>（3）$\\rho_{\\text{木}} = \\dfrac{m}{V} = \\dfrac{0.3}{5 \\times 10^{-4}} = \\mathbf{0.6 \\times 10^3 \\,\\mathrm{kg/m^3}}$。</p>
  <p><strong>验证：</strong>漂浮条件 $\\rho_{\\text{木}} < \\rho_{\\text{水}}$，$0.6 < 1.0$，合理。且有 $\\dfrac{\\rho_{\\text{木}}}{\\rho_{\\text{水}}} = \\dfrac{V_{\\text{排}}}{V} = \\dfrac{3}{5}$，二者一致。</p>
  <p><strong>答题要点：</strong>漂浮时 $V_{\\text{排}} < V_{\\text{物}}$，务必区分。部分浸入时，$\\dfrac{V_{\\text{排}}}{V_{\\text{物}}} = \\dfrac{\\rho_{\\text{物}}}{\\rho_{\\text{液}}}$（漂浮时的重要比例关系）。</p>
</div>

<div class="knowledge-card card-example">
  <span class="card-badge badge-example">示例</span>
  <h3>§7.3 浮沉条件与浮力应用 — 例题2道</h3>

  <h4>例5（浮沉条件判断 + 密度比较）</h4>
  <p>体积相同的三个小球 A、B、C 放入水中后，A 沉到水底，B 悬浮在水中，C 漂浮在水面上。已知它们的密度分别为 $\\rho_{\\text{A}}$、$\\rho_{\\text{B}}$、$\\rho_{\\text{C}}$。试比较：（1）它们所受浮力的大小关系；（2）它们密度的大小关系。</p>
  <p><strong>解：</strong></p>
  <p>（1）浮力大小比较——用 $F_{\\text{浮}} = \\rho_{\\text{水}} g V_{\\text{排}}$，三球 $\\rho_{\\text{水}}$ 和 $g$ 相同，关键看 $V_{\\text{排}}$：</p>
  <p>A 沉底：$V_{\\text{排A}} = V$（全部浸没）。B 悬浮：$V_{\\text{排B}} = V$（全部浸没）。C 漂浮：$V_{\\text{排C}} < V$（部分浸没）。</p>
  <p>因此：<strong>$F_{\\text{A}} = F_{\\text{B}} > F_{\\text{C}}$</strong>。</p>
  <p>（2）密度比较——用密度法判断浮沉：</p>
  <p>A 下沉 → $\\rho_{\\text{A}} > \\rho_{\\text{水}}$。B 悬浮 → $\\rho_{\\text{B}} = \\rho_{\\text{水}}$。C 漂浮 → $\\rho_{\\text{C}} < \\rho_{\\text{水}}$。</p>
  <p>因此：<strong>$\\rho_{\\text{A}} > \\rho_{\\text{B}} > \\rho_{\\text{C}}$</strong>。</p>
  <p><strong>答题要点：</strong>体积相同时，浮力大小取决于 $V_{\\text{排}}$（而非浮沉状态）；密度大小取决于浮沉结果。此题常考"两两比较"的思维链条，务必完整。</p>

  <h4>例6（轮船排水量）</h4>
  <p>一艘轮船的排水量为 $5000 \\,\\mathrm{t}$，自重为 $1.5 \\times 10^7 \\,\\mathrm{N}$。求：（1）轮船满载时所受的浮力；（2）轮船最多能装载的货物重力；（3）若该轮船从海水（$\\rho_{\\text{海水}} = 1.03 \\times 10^3 \\,\\mathrm{kg/m^3}$）驶入淡水河，船体是上浮一些还是下沉一些？为什么？（$g = 10 \\,\\mathrm{N/kg}$）</p>
  <p><strong>解：</strong></p>
  <p>（1）排水量 $m_{\\text{排}} = 5000 \\,\\mathrm{t} = 5 \\times 10^6 \\,\\mathrm{kg}$。</p>
  <p>$F_{\\text{浮}} = G_{\\text{排}} = m_{\\text{排}} g = 5 \\times 10^6 \\times 10 = \\mathbf{5 \\times 10^7 \\,\\mathrm{N}}$。</p>
  <p>（2）轮船漂浮，满载时 $F_{\\text{浮}} = G_{\\text{船}} + G_{\\text{货}}$。</p>
  <p>$G_{\\text{货}} = F_{\\text{浮}} - G_{\\text{船}} = 5 \\times 10^7 - 1.5 \\times 10^7 = \\mathbf{3.5 \\times 10^7 \\,\\mathrm{N}}$。</p>
  <p>货物质量 $m_{\\text{货}} = \\dfrac{G_{\\text{货}}}{g} = \\dfrac{3.5 \\times 10^7}{10} = \\mathbf{3.5 \\times 10^6 \\,\\mathrm{kg} = 3500 \\,\\mathrm{t}}$。</p>
  <p>（3）轮船从海水驶入淡水，船的重力不变，漂浮时浮力始终等于重力，故 $F_{\\text{浮}}$ 不变。由 $F_{\\text{浮}} = \\rho_{\\text{液}} g V_{\\text{排}}$，$\\rho_{\\text{液}}$ 减小（淡水密度小），$g$ 不变，为使 $F_{\\text{浮}}$ 不变，$V_{\\text{排}}$ 必须<strong>增大</strong>。因此船体<strong>下沉一些</strong>。</p>
  <p><strong>答题要点：</strong>排水量单位常用吨，需换算为 kg 才能代入 $G = mg$。轮船问题是"漂浮模型中 $F_{\\text{浮}}$ 不变、$V_{\\text{排}}$ 随 $\\rho_{\\text{液}}$ 改变"的典型应用。</p>
</div>

<div class="section-title">⚠️ 常见误区（附误区类型）</div>

<div class="knowledge-card card-warning">

      <tr><td>"浸没越深浮力越大"</td><td>错！浸没后 $V_{\\text{排}}$ 不变，$F_{\\text{浮}} = \\rho_{\\text{液}} g V_{\\text{排}}$ 不变。潜水艇在水下不同深度，浮力相同</td><td>🔧 结构</td></tr>
      <tr><td>"上浮物体受到的浮力一定大"</td><td>错！<strong>漂浮</strong>时 $F_{\\text{浮}} = G$，只能说明浮力等于重力。一个漂浮的木块和一个下沉的铁块相比，铁块受到的浮力可能更大（排开水更多）</td><td>🧠 深层</td></tr>
      <tr><td>"浮力大小与物体的密度有关"</td><td>错！由阿基米德原理 $F_{\\text{浮}} = \\rho_{\\text{液}} g V_{\\text{排}}$，浮力只与<strong>$\\rho_{\\text{液}}$</strong>和<strong>$V_{\\text{排}}$</strong>有关，与物体自身密度<strong>无关</strong></td><td>🔧 结构</td></tr>
      <tr><td>"物体排开液体的体积等于物体的体积"</td><td>不全！只有<strong>浸没</strong>时 $V_{\\text{排}} = V_{\\text{物}}$。漂浮时 $V_{\\text{排}}$ 只等于浸入部分的体积，$V_{\\text{排}} < V_{\\text{物}}$</td><td>🏷️ 表面</td></tr>
      <tr><td>"悬浮和漂浮是一回事"</td><td>不是！两者 $F_{\\text{浮}} = G$ 但本质不同。悬浮：$\\rho_{\\text{物}} = \\rho_{\\text{液}}$，$V_{\\text{排}} = V_{\\text{物}}$，可停在任意深度。漂浮：$\\rho_{\\text{物}} < \\rho_{\\text{液}}$，$V_{\\text{排}} < V_{\\text{物}}$，只停在液面</td><td>🔧 结构</td></tr>
      <tr><td>"轮船从海里驶入河里浮力变化了"</td><td>错！轮船始终<strong>漂浮</strong>，$F_{\\text{浮}} = G$ 不变。变化的是 $V_{\\text{排}}$——河水密度小，排开体积增大，船体下沉</td><td>🔧 结构</td></tr>
      <tr><td>"下沉的物体不受浮力"</td><td>错！只要物体在液体中且下表面有液体，就一定受浮力。石块沉入水底，水底是松软的淤泥时仍有浮力；只有与容器底<strong>紧密贴合</strong>时才不受浮力（下表面无液体）</td><td>🧠 深层</td></tr>
    </tbody>
  </table></div>
</div>

<div class="section-title" id="s8-1">§8.1 杠杆</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、杠杆的定义</h3>
  <p>在<strong>力</strong>的作用下能绕<strong>固定点</strong>转动的<strong>硬棒</strong>，叫做杠杆。杠杆可以是直的，也可以是弯曲的（如瓶起子、羊角锤、指甲刀中的曲杆）。一根硬棒能成为杠杆的<strong>两个条件</strong>：①有力的作用；②能绕固定点转动。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">五要素</span>
  <h3>二、杠杆的五要素</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>要素</th><th>符号</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>支点</strong></td><td>$O$</td><td>杠杆绕其转动的固定点</td></tr>
      <tr><td><strong>动力</strong></td><td>$F_1$</td><td>使杠杆转动的力</td></tr>
      <tr><td><strong>阻力</strong></td><td>$F_2$</td><td>阻碍杠杆转动的力</td></tr>
      <tr><td><strong>动力臂</strong></td><td>$l_1$</td><td>从支点 $O$ 到<strong>动力作用线</strong>的垂直距离</td></tr>
      <tr><td><strong>阻力臂</strong></td><td>$l_2$</td><td>从支点 $O$ 到<strong>阻力作用线</strong>的垂直距离</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-warning">
  <span class="card-badge badge-warning">易错辨析</span>
  <h3>三、力臂的正确理解 —— 核心难点</h3>
  <p><strong>力臂是支点到力作用线的距离，不是支点到力作用点的距离！</strong></p>
  <p>力臂是<strong>垂线段</strong>——从支点向力的作用线作垂线，垂足到支点的距离才是力臂。当力的方向与杠杆<strong>不垂直</strong>时，力臂必定<strong>小于</strong>支点到力作用点的距离。</p>
  <h4>力臂画法（三步法）</h4>
  <ol>
    <li><strong>找支点</strong>：标出杠杆的固定转动点 $O$</li>
    <li><strong>画作用线</strong>：沿力的方向画出力的作用线（正向或反向延长均可）</li>
    <li><strong>作垂线</strong>：从支点 $O$ 向力的作用线作<strong>垂线</strong>，垂足到支点的距离即为力臂，标上 $l_1$ 或 $l_2$</li>
  </ol>
  <p><strong>口诀</strong>："一找点，二画线，三作垂线段，四标力臂符。"</p>
</div>

<div class="knowledge-card card-formula">
  <span class="card-badge badge-formula">核心公式</span>
  <h3>四、杠杆的平衡条件（阿基米德杠杆原理）</h3>
  <p>当杠杆在动力和阻力作用下<strong>静止</strong>或<strong>匀速转动</strong>时，我们就说杠杆平衡了。</p>
  <div class="formula-block">
    $F_1 \\times l_1 = F_2 \\times l_2$
  </div>
  <p><strong>文字表述</strong>：动力 × 动力臂 = 阻力 × 阻力臂。</p>
  <p>亦可写作：</p>
  <div class="formula-block">
    $\\frac{F_1}{F_2} = \\frac{l_2}{l_1}$
  </div>
  <p><strong>物理意义</strong>：力与力臂成<strong>反比</strong>——力臂越长，所需力越小（越省力）；力臂越短，所需力越大（越费力）。</p>
</div>

<div class="knowledge-card card-experiment">
  <span class="card-badge badge-experiment">实验探究</span>
  <h3>五、实验：探究杠杆的平衡条件</h3>
  <p><strong>实验器材</strong>：带刻度杠杆、支架、钩码若干、弹簧测力计。</p>
  <p><strong>实验步骤</strong>：</p>
  <ol>
    <li>调节杠杆两端螺母，使杠杆在<strong>水平位置平衡</strong>（目的：消除杠杆自重对实验的影响；便于直接从杠杆刻度上读出力臂长度）。</li>
    <li>在杠杆两侧挂不同数量的钩码，调节悬挂位置使杠杆再次水平平衡。</li>
    <li>记录动力 $F_1$、动力臂 $l_1$、阻力 $F_2$、阻力臂 $l_2$。</li>
    <li>多次实验（改变钩码数量和位置，至少 3～5 组），验证 $F_1 l_1 = F_2 l_2$。</li>
  </ol>
  <p><strong>注意事项</strong>：实验中不能用弹簧测力计<strong>斜拉</strong>（斜拉时力臂变小，读数偏大，但平衡条件依然成立——因为力臂是从支点到力作用线的垂直距离）。</p>
</div>

<div class="knowledge-card card-key">
  <span class="card-badge badge-key">分类对比</span>
  <h3>六、杠杆的分类</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>类型</th><th>力臂关系</th><th>力关系</th><th>特点</th><th>生活实例</th></tr></thead>
    <tbody>
      <tr><td><strong>省力杠杆</strong></td><td>$l_1 > l_2$</td><td>$F_1 < F_2$</td><td>省力，<strong>费距离</strong></td><td>瓶起子、羊角锤、撬棒、铡刀、手推车、钢丝钳</td></tr>
      <tr><td><strong>费力杠杆</strong></td><td>$l_1 < l_2$</td><td>$F_1 > F_2$</td><td>费力，<strong>省距离</strong></td><td>镊子、筷子、钓鱼竿、缝纫机踏板、理发剪刀、人的前臂（肱二头肌带动）</td></tr>
      <tr><td><strong>等臂杠杆</strong></td><td>$l_1 = l_2$</td><td>$F_1 = F_2$</td><td>不省力也不费力，不省距离也不费距离</td><td>天平、定滑轮（实质）、跷跷板（两端等重时）</td></tr>
    </tbody>
  </table>
  </div>
  <p><strong>判断口诀</strong>：力臂长则力小（省力杠杆），力臂短则力大（费力杠杆），力臂相等则力也等（等臂杠杆）。</p>
  <p><strong>核心思想</strong>：使用任何机械都<strong>不能省功</strong>——省力的机械必然费距离，省距离的机械必然费力。</p>
</div>

<div class="section-title" id="s8-2">§8.2 滑轮</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>一、定滑轮</h3>
  <p><strong>定义</strong>：轴固定不动的滑轮。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>项目</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>特点</strong></td><td><strong>不省力</strong>（$F = G$），但可以<strong>改变力的方向</strong></td></tr>

    </tbody>
  </table>
  </div>
</div>

<div class="knowledge-card card-definition">
  <span class="card-badge badge-def">定义</span>
  <h3>二、动滑轮</h3>
  <p><strong>定义</strong>：轴随物体一起移动的滑轮。</p>
  <div class="table-wrap">
  <table>
    <thead><tr><th>项目</th><th>说明</th></tr></thead>
    <tbody>
      <tr><td><strong>特点</strong></td><td><strong>省一半力</strong>（$F = G/2$，不计滑轮重和摩擦），但不能改变力的方向</td></tr>
      <tr><td><strong>实质</strong></td><td><strong>省力杠杆</strong>——动力臂 $l_1 = 2r$，阻力臂 $l_2 = r$，即 $l_1 = 2l_2$</td></tr>
      <tr><td><strong>绳端移动距离</strong></td><td>$s = 2h$（绳端移动距离是物体上升高度的两倍）</td></tr>
